<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary — Codex Study Lab</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--panel:#0d1220;--panel2:#111827;--panel3:#17202e;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
  --blue:#3b82f6;--blue-s:rgba(59,130,246,.13);--blue-b:rgba(59,130,246,.28);
  --green:#10b981;--green-s:rgba(16,185,129,.12);--green-b:rgba(16,185,129,.28);
  --gold:#f59e0b;--gold-s:rgba(245,158,11,.1);--gold-b:rgba(245,158,11,.25);
  --purple:#a855f7;--purple-s:rgba(168,85,247,.13);--purple-b:rgba(168,85,247,.28);
  --teal:#06b6d4;--teal-s:rgba(6,182,212,.12);--teal-b:rgba(6,182,212,.28);
  --text:#eef2ff;--muted:#8fa3c0;--dim:#4a6380;--r:14px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60vw 45vh at 0% 0%,rgba(245,158,11,.04) 0%,transparent 55%),
             radial-gradient(ellipse 50vw 35vh at 100% 100%,rgba(168,85,247,.04) 0%,transparent 55%);}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;
  background:rgba(13,18,32,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);padding:0 18px;height:56px;}
.nav-back{width:34px;height:34px;border-radius:9px;background:transparent;
  border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;
  justify-content:center;text-decoration:none;color:var(--muted);transition:.18s;flex-shrink:0;}
.nav-back:hover{background:var(--panel3);color:var(--text);}
.nav-logo{display:flex;align-items:center;gap:8px;padding:0 12px;border-right:1px solid var(--border);}
.nav-logo-icon{width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),#d97706);
  display:flex;align-items:center;justify-content:center;}
.nav-logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.92rem;color:var(--gold);}
.nav-doc{flex:1;padding:0 12px;font-size:.8rem;font-weight:600;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-doc em{color:var(--text);font-style:normal;}
.nav-actions{display:flex;gap:7px;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:5px;background:var(--panel2);
  border:1px solid var(--border2);border-radius:9px;padding:6px 12px;
  font-size:.73rem;font-weight:600;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.15s;white-space:nowrap;}
.nav-btn:hover{background:var(--panel3);color:var(--text);}
.nav-btn.gold{background:var(--gold-s);border-color:var(--gold-b);color:var(--gold);}
.nav-btn.gold:hover{background:var(--gold-b);}

.main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:22px 16px 60px;}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:4px;margin-bottom:18px;}
.tab{flex:1;padding:9px 8px;border:none;border-radius:9px;background:transparent;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;transition:.18s;text-align:center;display:flex;align-items:center;
  justify-content:center;gap:5px;}
.tab.active{background:var(--panel3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* QUICK LINKS */
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.ql{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;
  font-size:.77rem;font-weight:600;text-decoration:none;transition:.18s;border:1px solid;}
.ql.notes{background:var(--blue-s);border-color:var(--blue-b);color:var(--blue);}
.ql.cards{background:var(--green-s);border-color:var(--green-b);color:var(--green);}
.ql.quiz{background:var(--purple-s);border-color:var(--purple-b);color:var(--purple);}
.ql:hover{opacity:.8;transform:translateY(-1px);}

/* CONTENT CARD */
.content-card{background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.cc-head{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--border);background:var(--panel2);}
.cc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;
  display:flex;align-items:center;gap:7px;}
.cc-actions{display:flex;gap:6px;}
.cc-btn{background:var(--panel3);border:1px solid var(--border2);color:var(--muted);
  border-radius:7px;padding:5px 11px;font-size:.7rem;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.15s;}
.cc-btn:hover{color:var(--text);background:rgba(255,255,255,.08);}
.cc-btn.share{background:var(--green-s);border-color:var(--green-b);color:var(--green);}
.cc-btn.share:hover{background:var(--green-b);}
.cc-body{padding:20px 22px;font-size:.83rem;line-height:1.85;
  max-height:72vh;overflow-y:auto;}
.cc-body::-webkit-scrollbar{width:4px;}
.cc-body::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:3px;}

/* FORMATTED TEXT */
.s-h1{font-family:'Syne',sans-serif;font-weight:800;font-size:.98rem;
  color:var(--text);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.s-h1:first-child{margin-top:0;}
.s-h2{font-family:'Syne',sans-serif;font-weight:700;font-size:.87rem;
  color:var(--gold);margin:14px 0 6px;display:flex;align-items:center;gap:6px;}
.s-h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.81rem;
  color:var(--teal);margin:10px 0 4px;}
.s-p{color:var(--muted);margin-bottom:9px;line-height:1.8;}
.s-li{display:flex;gap:8px;margin-bottom:6px;color:var(--muted);}
.s-li-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:8px;}
.s-callout{background:rgba(245,158,11,.07);border-left:3px solid var(--gold);
  border-radius:0 9px 9px 0;padding:10px 15px;margin:10px 0;font-size:.81rem;color:var(--text);}

/* EXAM PREP */
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:580px){.exam-grid{grid-template-columns:1fr;}}
.exam-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.ec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.77rem;
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}

/* OVERVIEW GRID */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
@media(max-width:480px){.ov-grid{grid-template-columns:1fr;}}
.ov-cell{background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:12px 14px;}
.ov-label{font-size:.69rem;color:var(--dim);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.ov-val{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* SKELETON */
.skel{background:var(--panel2);border-radius:8px;animation:sk 1.4s ease-in-out infinite;}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.85}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border2);color:var(--text);
  padding:10px 18px;border-radius:12px;font-size:.82rem;font-weight:500;
  box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:9999;white-space:nowrap;animation:tIn .22s ease;}
.toast.success{border-color:var(--green-b);background:rgba(16,185,129,.1);}
.toast.error{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07);}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:580px){.main{padding:14px 12px 50px;}.cc-body{padding:14px 14px;}.nav-btn span{display:none;}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyCd7l9eOMbO7F4TSuV55VqnaJUQbFvsibA",authDomain:"codex-study-hub-923c5.firebaseapp.com",
  projectId:"codex-study-hub-923c5",storageBucket:"codex-study-hub-923c5.appspot.com",
  messagingSenderId:"750631534625",appId:"1:750631534625:web:5f59e1841bb856bdbba360"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);

let rawSummary='',loadedData={};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function boldify(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');}
function toast(msg,type=''){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}

/* ── RENDER TEXT ──────────────────────── */
function renderText(text,container,accent='gold'){
  if(!text||!text.trim()){
    container.innerHTML=`<div style="color:var(--dim);padding:24px;text-align:center;font-size:.82rem">No content available.</div>`;
    return;}
  const lines=text.split('\n');let html='';
  for(const raw of lines){
    const line=raw.trim();if(!line)continue;
    if(/^##\s/.test(line)){
      html+=`<div class="s-h2" style="color:var(--${accent})"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>${esc(line.replace(/^##\s/,''))}</div>`;
    }else if(/^###\s/.test(line)){
      html+=`<div class="s-h3">${esc(line.replace(/^###\s/,''))}</div>`;
    }else if(/^#\s/.test(line)||/^[A-Z][A-Z\s]{4,}:?\s*$/.test(line)){
      html+=`<div class="s-h1">${esc(line.replace(/^#\s/,''))}</div>`;
    }else if(/^[-*•]\s/.test(line)){
      html+=`<div class="s-li"><div class="s-li-dot"></div><span>${boldify(line.replace(/^[-*•]\s/,''))}</span></div>`;
    }else if(/^\d+\.\s/.test(line)){
      html+=`<div class="s-li"><div class="s-li-dot"></div><span>${boldify(line)}</span></div>`;
    }else if(/^(NOTE|IMPORTANT|KEY):/i.test(line)){
      html+=`<div class="s-callout">${boldify(line)}</div>`;
    }else{
      html+=`<div class="s-p">${boldify(line)}</div>`;}}
  container.innerHTML=html||`<div class="s-p">${esc(text)}</div>`;}

/* ── EXAM PREP ────────────────────────── */
function buildExam(notes,keyPoints,fcRaw,qzRaw){
  const grid=document.getElementById('examGrid');
  const topicLines=(notes+'\n'+keyPoints).split('\n')
    .filter(l=>/^(##|###|\*\*|[A-Z][A-Z\s]{3,}:)/.test(l.trim()))
    .map(l=>l.replace(/^[#*]+\s*/,'').replace(/:\s*$/,'').trim())
    .filter(l=>l.length>3&&l.length<80).slice(0,8);
  const defLines=(notes+'\n'+keyPoints).split('\n')
    .filter(l=>{const t=l.trim();return/^[A-Za-z][A-Za-z\s]+:\s+\w/.test(t)&&t.length<200;})
    .slice(0,6);
  let fcCount=0,qCount=0;
  try{fcCount=JSON.parse(fcRaw||'[]').length;}catch(_){}
  try{qCount=JSON.parse(qzRaw||'[]').length;}catch(_){}

  const examTips=[
    'Review flashcards daily for 15 minutes',
    'Complete the practice quiz without notes first',
    'Focus on key definitions and terminology',
    'Re-read sections you scored poorly on',
    'Teach the concepts to someone else'];

  grid.innerHTML=`
    <div class="exam-card" style="border-color:var(--purple-b)">
      <div class="ec-title" style="color:var(--purple)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>
        Likely Exam Topics
      </div>
      ${topicLines.length
        ?topicLines.map(t=>`<div class="s-li"><div class="s-li-dot" style="background:var(--purple)"></div><span style="font-size:.78rem">${esc(t)}</span></div>`).join('')
        :'<div class="s-p" style="color:var(--dim);font-size:.78rem">Upload a content-rich PDF for topic extraction.</div>'}
    </div>
    <div class="exam-card" style="border-color:var(--blue-b)">
      <div class="ec-title" style="color:var(--blue)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"/></svg>
        Key Definitions
      </div>
      ${defLines.length
        ?defLines.map(d=>{
            const ci=d.indexOf(':');if(ci<1||ci>60)return`<div class="s-li"><div class="s-li-dot" style="background:var(--blue)"></div><span style="font-size:.78rem">${boldify(d)}</span></div>`;
            const term=d.slice(0,ci).trim();const def=d.slice(ci+1).trim();
            return`<div style="margin-bottom:6px;font-size:.77rem"><strong style="color:var(--blue)">${esc(term)}:</strong> <span style="color:var(--muted)">${esc(def.slice(0,90))}${def.length>90?'…':''}</span></div>`;}).join('')
        :'<div class="s-p" style="color:var(--dim);font-size:.78rem">No formal definitions detected.</div>'}
    </div>
    <div class="exam-card" style="border-color:var(--green-b)">
      <div class="ec-title" style="color:var(--green)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Study Resources
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[
          {href:'flashcards.html',label:`${fcCount} Flashcards`,color:'green',icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><path stroke-linecap="round" d="M8 21h8M12 17v4"/>'},
          {href:'quiz.html',label:`${qCount} Quiz Questions`,color:'purple',icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>'},
          {href:'notes.html',label:'Full Study Notes',color:'blue',icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>'}
        ].map(r=>`<a href="${r.href}" style="text-decoration:none;display:flex;align-items:center;justify-content:space-between;
          background:var(--${r.color}-s);border:1px solid var(--${r.color}-b);border-radius:8px;padding:9px 12px">
          <span style="display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;color:var(--${r.color})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${r.icon}</svg>
            ${r.label}
          </span>
          <svg width="12" height="12" fill="none" stroke="var(--${r.color})" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </a>`).join('')}
      </div>
    </div>
    <div class="exam-card" style="border-color:var(--gold-b)">
      <div class="ec-title" style="color:var(--gold)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Exam Tips
      </div>
      ${examTips.map(t=>`<div class="s-li"><div class="s-li-dot" style="background:var(--gold)"></div><span style="font-size:.78rem">${esc(t)}</span></div>`).join('')}
    </div>`;}

/* ── OVERVIEW ─────────────────────────── */
function buildOverview(data){
  const out=data.outputs||{};
  const created=data.createdAt?.toDate
    ?data.createdAt.toDate().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    :'—';
  let fcCount=0,qCount=0;
  try{fcCount=JSON.parse(out.flashcards||'[]').length;}catch(_){}
  try{qCount=JSON.parse(out.quiz||'[]').length;}catch(_){}
  const noteWords=(out.notes?.match(/\b\w+\b/g)||[]).length;
  const sumWords=(out.summary?.match(/\b\w+\b/g)||[]).length;

  const cells=[
    {icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',label:'File',val:data.fileName||'—'},
    {icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',label:'Created',val:created},
    {icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',label:'Notes',val:noteWords.toLocaleString()+' words'},
    {icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"/>',label:'Summary',val:sumWords.toLocaleString()+' words'},
    {icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><path stroke-linecap="round" d="M8 21h8M12 17v4"/>',label:'Flashcards',val:fcCount+' cards'},
    {icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>',label:'Quiz',val:qCount+' questions'}];

  document.getElementById('overviewContent').innerHTML=`
    <div class="ov-grid">
      ${cells.map(c=>`<div class="ov-cell">
        <div class="ov-label">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${c.icon}</svg>
          ${esc(c.label)}
        </div>
        <div class="ov-val" title="${esc(String(c.val))}">${esc(String(c.val))}</div>
      </div>`).join('')}
    </div>
    <div style="background:var(--panel2);border:1px solid var(--gold-b);border-radius:11px;padding:13px 16px">
      <div style="font-size:.69rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;gap:5px">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        PDF Preview
      </div>
      <div style="font-size:.77rem;color:var(--muted);line-height:1.7">${esc(data.pdfTextPreview||'No preview available.')}</div>
    </div>`;}

/* ── TAB SWITCH ───────────────────────── */
window.switchTab=function(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['summary','exam','overview'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});};

window.copySummary=function(){
  navigator.clipboard.writeText(rawSummary||document.getElementById('summaryContent').innerText||'')
    .then(()=>toast('Summary copied','success')).catch(()=>{});};

window.shareWA=function(){
  const text=(rawSummary||'').slice(0,600);
  const msg=encodeURIComponent(`Study Summary — Codex Study Hub:\n\n${text}…`);
  window.open(`https://wa.me/?text=${msg}`,'_blank');};

/* ── LOAD — cache first, then Firestore ── */
async function load(user){
  const docId=sessionStorage.getItem('slDocId');
  if(!docId){location.href='study_lab.html';return;}

  let data=null;

  // 1. Try sessionStorage cache
  const cacheRaw=sessionStorage.getItem('slCache_new');
  if(cacheRaw){
    try{
      const cache=JSON.parse(cacheRaw);
      const out=cache.outputs||{};
      if(out.summary&&out.summary.length>20){
        data={fileName:cache.fileName,fileSize:cache.fileSize,
          outputs:out,pdfTextPreview:'',createdAt:null};}
    }catch(_){}}

  // 2. Load from Firestore
  if(!data){
    try{
      const snap=await getDoc(doc(db,'study_lab_documents',docId));
      if(!snap.exists()||snap.data().uid!==user.uid){location.href='study_lab.html';return;}
      data=snap.data();
    }catch(e){
      toast('Could not load summary: '+e.message,'error');
      document.getElementById('summaryContent').innerHTML=`<div style="color:var(--red);padding:20px;text-align:center;font-size:.82rem">${e.message}</div>`;
      return;}}

  const out=data.outputs||{};
  document.getElementById('docName').textContent=data.fileName||'Document';
  rawSummary=out.summary||'';
  loadedData=data;

  renderText(rawSummary,document.getElementById('summaryContent'),'gold');
  buildExam(out.notes||'',out.keyPoints||'',out.flashcards,out.quiz);
  buildOverview(data);}

onAuthStateChanged(auth,user=>{if(!user){location.href='Login.html';return;}load(user);});
</script>
