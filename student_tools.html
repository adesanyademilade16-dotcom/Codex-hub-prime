<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Tools — Codex Study Hub</title>
    <!-- Basic Meta -->
  <meta name="description" content="Codex Study Hub helps OOU students master CBT exams with past questions, structured notes, AI assistance, progress tracking, and leaderboards.">
  <meta name="keywords" content="Codex Study Hub, OOU CBT, past questions, exam practice, study notes, leaderboard, OOU 100 level">
  <meta name="author" content="Codex Study Hub">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Codex Study Hub - Smart CBT Practice for OOU Students">
  <meta property="og:description" content="Practice real CBT exams, access study notes, track progress and climb the leaderboard. Built for Olabisi Onabanjo University students.">
  <meta property="og:image" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/og-image.png">
  <meta property="og:url" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Codex Study Hub">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Codex Study Hub - Smart CBT Practice for OOU Students">
  <meta name="twitter:description" content="Practice real CBT exams, access study notes, track progress and climb the leaderboard.">
  <meta name="twitter:image" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080c14; --s1:#0f1623; --s2:#151e30; --s3:#1c283d;
      --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
      --blue:#3b82f6; --blue-s:rgba(59,130,246,.12); --blue-b:rgba(59,130,246,.25);
      --green:#10b981; --gold:#f59e0b; --red:#ef4444;
      --text:#f0f4ff; --muted:#8fa3c0; --dim:#4a6380; --r:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70vw 50vh at 5% 0%,rgba(99,102,241,.07) 0%,transparent 60%)}
    .shell{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:18px 16px 80px}
    
    .topbar{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px 18px;margin-bottom:22px}
    .back-btn{width:36px;height:36px;border-radius:9px;background:var(--s2);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;text-decoration:none;color:var(--text);transition:.2s}
    .back-btn:hover{border-color:var(--blue)}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem}
    .admin-btn{margin-left:auto;padding:8px 16px;background:var(--gold);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;display:none}
    .admin-btn:hover{opacity:.9}

    .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:30px}
    .tool-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .22s;position:relative;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center}
    .tool-card:hover{transform:translateY(-3px);border-color:var(--blue)}
    .tool-img{width:100%;height:120px;object-fit:cover;border-radius:10px;margin-bottom:12px;background:var(--s2)}
    .tool-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
    .delete-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;background:var(--red);border:none;border-radius:6px;color:#fff;cursor:pointer;display:none;font-size:.9rem;align-items:center;justify-content:center}
    .delete-btn:hover{opacity:.8}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
    .modal.show{display:flex}
    .modal-content{background:var(--s1);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:460px;width:100%}
    .modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:20px;text-align:center}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;margin-bottom:6px;font-size:.88rem;font-weight:600;color:var(--muted)}
    .form-group input{width:100%;padding:12px;background:var(--s2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:.9rem}
    .form-group input:focus{border-color:var(--blue);outline:none}
    .form-group input[type="file"]{padding:8px}
    
    .image-upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.2s;background:var(--s2)}
    .image-upload-zone:hover{border-color:var(--blue);background:var(--blue-s)}
    .image-upload-zone.has-image{border-style:solid;border-color:var(--green)}
    .upload-icon{font-size:2.5rem;margin-bottom:10px}
    .upload-text{font-size:.85rem;color:var(--muted)}
    .image-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:12px;display:none}
    .image-preview.show{display:block}
    
    .btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.95rem;margin-top:8px}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-primary:hover:not(:disabled){opacity:.9}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-secondary{background:var(--s2);color:var(--muted);border:1px solid var(--border2)}
    .btn-secondary:hover{background:var(--s3)}

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .icon{font-size:4rem;margin-bottom:16px}

    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  
        /* ── ADDED RESPONSIVE FIXES ── */
        @media(max-width:1024px){
            .shell{ padding:14px 14px 70px; }
            .tools-grid{ grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); }
        }
        @media(max-width:768px){
            .shell{ padding:14px 12px 70px; }
            .tools-grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
        }
        @media(max-width:480px){
            .shell{ padding:12px 10px 60px; }
            .tools-grid{ grid-template-columns:repeat(2,1fr); gap:10px; }
            .tool-img{ height:90px; }
            .tool-name{ font-size:.88rem; }
            .modal-content{ padding:20px 16px; }
            .page-title{ font-size:.95rem; }
        }

    </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="home.html" class="back-btn">←</a>
    <div class="page-title">🛠️ Student Tools</div>
    <button class="admin-btn" id="adminBtn" onclick="openAddModal()">+ Add Tool</button>
  </div>

  <div id="toolsContainer" class="tools-grid">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <p>Loading tools...</p>
    </div>
  </div>
</div>

<!-- Add Tool Modal -->
<div class="modal" id="addModal">
  <div class="modal-content">
    <div class="modal-title">Add New Tool</div>
    <div class="form-group">
      <label>Tool Name</label>
      <input type="text" id="toolName" placeholder="e.g. ArchiGuide">
    </div>
    <div class="form-group">
      <label>Tool URL</label>
      <input type="url" id="toolUrl" placeholder="https://example.com">
    </div>
    <div class="form-group">
      <label>Tool Icon/Image</label>
      <input type="file" id="toolImageFile" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      <div class="image-upload-zone" id="uploadZone" onclick="document.getElementById('toolImageFile').click()">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Tap to select image</div>
        <div class="upload-text" style="font-size:.75rem;margin-top:5px;color:var(--dim)">JPG, PNG, GIF (Max 5MB)</div>
      </div>
      <img id="imagePreview" class="image-preview" alt="Preview">
    </div>
    <button class="btn btn-primary" id="saveBtn" onclick="saveTool()">Save Tool</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCd7l9eOMbO7F4TSuV55VqnaJUQbFvsibA",
  authDomain: "codex-study-hub-923c5.firebaseapp.com",
  projectId: "codex-study-hub-923c5",
  storageBucket: "codex-study-hub-923c5.appspot.com",
  messagingSenderId: "750631534625",
  appId: "1:750631534625:web:5f59e1841bb856bdbba360"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Cloudinary configuration (same as used in profile.html)
const CLOUD_NAME = "dngom9ylf";
const UPLOAD_PRESET = "codex_pdf";

const ADMIN_EMAIL = "codexhub16@gmail.com";
let isAdmin = false;
let currentUser = null;
let selectedImageFile = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "Login.html";
    return;
  }
  
  currentUser = user;
  isAdmin = user.email === ADMIN_EMAIL;
  
  if (isAdmin) {
    document.getElementById('adminBtn').style.display = 'block';
  }
  
  await loadTools();
});

async function loadTools() {
  try {
    const toolsRef = collection(db, "student_tools");
    const snapshot = await getDocs(toolsRef);
    
    const container = document.getElementById('toolsContainer');
    
    if (snapshot.empty) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔧</div>
          <p>No tools available yet.</p>
          ${isAdmin ? '<p style="font-size:.85rem;margin-top:10px">Click "Add Tool" to add the first tool.</p>' : ''}
        </div>
      `;
      return;
    }
    
    container.innerHTML = '';
    
    snapshot.forEach((docSnap) => {
      const tool = docSnap.data();
      const toolCard = document.createElement('a');
      toolCard.className = 'tool-card';
      toolCard.href = tool.url;
      toolCard.target = '_blank';
      toolCard.rel = 'noopener noreferrer';
      
      toolCard.innerHTML = `
        ${isAdmin ? `<button class="delete-btn" onclick="deleteTool(event, '${docSnap.id}')">×</button>` : ''}
        <img src="${tool.image}" alt="${tool.name}" class="tool-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 120%22%3E%3Crect fill=%22%230f1623%22 width=%22200%22 height=%22120%22/%3E%3Ctext x=%22100%22 y=%2260%22 text-anchor=%22middle%22 fill=%22%238fa3c0%22 font-family=%22sans-serif%22 font-size=%2216%22%3E🛠️%3C/text%3E%3C/svg%3E'">
        <div class="tool-name">${tool.name}</div>
      `;
      
      container.appendChild(toolCard);
    });
    
    if (isAdmin) {
      const deleteButtons = document.querySelectorAll('.delete-btn');
      deleteButtons.forEach(btn => btn.style.display = 'flex');
    }
    
  } catch (error) {
    console.error("Error loading tools:", error);
    document.getElementById('toolsContainer').innerHTML = `
      <div class="empty-state">
        <div class="icon">❌</div>
        <p>Error loading tools</p>
      </div>
    `;
  }
}

window.handleImageSelect = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // Check file size (max 5MB)
  if (file.size > 5 * 1024 * 1024) {
    alert('❌ Image too large. Please select an image under 5MB.');
    return;
  }
  
  // Check file type
  if (!file.type.startsWith('image/')) {
    alert('❌ Please select an image file.');
    return;
  }
  
  selectedImageFile = file;
  
  // Show preview
  const reader = new FileReader();
  reader.onload = function(e) {
    const preview = document.getElementById('imagePreview');
    preview.src = e.target.result;
    preview.classList.add('show');
    
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.classList.add('has-image');
    uploadZone.querySelector('.upload-text').textContent = '✓ Image selected';
  };
  reader.readAsDataURL(file);
};

window.openAddModal = function() {
  document.getElementById('addModal').classList.add('show');
};

window.closeModal = function() {
  document.getElementById('addModal').classList.remove('show');
  document.getElementById('toolName').value = '';
  document.getElementById('toolUrl').value = '';
  document.getElementById('toolImageFile').value = '';
  document.getElementById('imagePreview').classList.remove('show');
  document.getElementById('uploadZone').classList.remove('has-image');
  document.getElementById('uploadZone').querySelector('.upload-text').textContent = 'Tap to select image';
  selectedImageFile = null;
};

window.saveTool = async function() {
  const name = document.getElementById('toolName').value.trim();
  const url = document.getElementById('toolUrl').value.trim();
  const saveBtn = document.getElementById('saveBtn');
  
  if (!name || !url) {
    alert('❌ Please enter tool name and URL');
    return;
  }
  
  if (!selectedImageFile) {
    alert('❌ Please select an image');
    return;
  }
  
  // Disable button and show loading
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span> Uploading...';
  
  try {
    // Upload image to Cloudinary
    const formData = new FormData();
    formData.append('file', selectedImageFile);
    formData.append('upload_preset', UPLOAD_PRESET);
    
    const uploadResponse = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
      method: 'POST',
      body: formData
    });
    
    if (!uploadResponse.ok) {
      throw new Error('Image upload failed');
    }
    
    const uploadData = await uploadResponse.json();
    const imageUrl = uploadData.secure_url;
    
    // Save tool to Firestore
    const toolsRef = collection(db, "student_tools");
    await addDoc(toolsRef, {
      name: name,
      url: url,
      image: imageUrl,
      createdAt: new Date(),
      createdBy: currentUser.email
    });
    
    closeModal();
    await loadTools();
    alert('✅ Tool added successfully!');
    
  } catch (error) {
    console.error("Error adding tool:", error);
    alert('❌ Error adding tool: ' + error.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Tool';
  }
};

window.deleteTool = async function(event, toolId) {
  event.preventDefault();
  event.stopPropagation();
  
  if (!confirm('Delete this tool?')) return;
  
  try {
    await deleteDoc(doc(db, "student_tools", toolId));
    await loadTools();
    alert('✅ Tool deleted');
  } catch (error) {
    console.error("Error deleting tool:", error);
    alert('❌ Error: ' + error.message);
  }
};
</script>
</body>
</html>
