<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Study Hub - Log In</title>
      <!-- Basic Meta -->
  <meta name="description" content="Codex Study Hub helps OOU students master CBT exams with past questions, structured notes, AI assistance, progress tracking, and leaderboards.">
  <meta name="keywords" content="Codex Study Hub, OOU CBT, past questions, exam practice, study notes, leaderboard, OOU 100 level">

  <!-- Open Graph / Social -->
<!-- Open Graph -->
  <meta property="og:title" content="Codex Study Hub - CBT Practice & Exam Prep for OOU Students">
  <meta property="og:description" content="Practice real CBT exams, access study notes, track progress, and climb the leaderboard. Built for Olabisi Onabanjo University students.">
  <meta property="og:image" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Codex Study Hub - CBT Practice & Exam Prep for OOU Students">
  <meta name="twitter:description" content="Practice real CBT exams, access study notes, track progress, and climb the leaderboard.">
  <meta name="twitter:image" content="https://adesanyademilade16-dotcom.github.io/Codex-hub-prime/og-image.png">

    <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

    <style>
        :root { --primary:#007bff; --bg:#f8f9fa; --card:#ffffff; --border:#ced4da; }
        *{box-sizing:border-box;margin:0;padding:0}
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .container { width:100%; max-width:420px; padding:2rem; background:var(--card); border-radius:14px; box-shadow:0 8px 28px rgba(0,0,0,.13); }
        .header { text-align:center; margin-bottom:1.8rem; }
        .cbt-logo { width:90px; display:block; margin:0 auto 12px; }
        h2 { font-size:1.4rem; color:#343a40; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:.3rem; font-weight:600; color:#495057; font-size:.9rem; }
        input { width:100%; padding:.75rem; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; transition:border-color .2s; }
        input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(0,123,255,.15); }
        .btn { width:100%; padding:.8rem; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:.5rem; transition:all .2s; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:#0056b3; }
        .btn-google { background:#fff; color:#333; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:600; margin-bottom:14px; }
        .btn-google:hover { background:#f8f9fa; border-color:#4285f4; color:#4285f4; }
        .divider { text-align:center; margin:14px 0; color:#aaa; font-size:.88rem; position:relative; }
        .divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:#e9ecef; }
        .divider::before { left:0; }
        .divider::after { right:0; }
        .links { text-align:center; margin-top:1.2rem; font-size:.9rem; color:#555; }
        .links a { color:var(--primary); text-decoration:none; font-weight:600; }
        .links a:hover { text-decoration:underline; }
        .alert { padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:.88rem; font-weight:600; display:none; }
        .alert-error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
        .alert-success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,.8); z-index:999; justify-content:center; align-items:center; flex-direction:column; gap:12px; }
        .loading-overlay.show { display:flex; }
        .loading-overlay p { font-weight:600; color:#333; }
    </style>
</head>
<body>

<!-- Full-page loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div style="width:40px;height:40px;border:4px solid #007bff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
    <p id="loadingMsg">Checking session...</p>
</div>

<div class="container" id="loginContainer" style="display:none">
    <div class="header">
        <img src="logo.png" alt="Codex" class="cbt-logo">
        <h2>Log in to Continue</h2>
    </div>

    <div id="alertError" class="alert alert-error"></div>
    <div id="alertSuccess" class="alert alert-success"></div>

    <!-- Google -->
    <button class="btn btn-google" id="googleBtn" onclick="signInWithGoogle()">
        <img src="https://www.google.com/favicon.ico" width="20" height="20" alt="G">
        Sign in with Google
    </button>

    <div class="divider">— or —</div>

    <!-- Email / Password -->
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="you@gmail.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Log In</button>
    </form>

    <div class="links" style="margin-top:.8rem">
        <a href="reset-password.html">Forgot Password?</a>
    </div>
    <div class="links">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script type="module">
// ─── IMPORTANT: Every function that touches the DOM must be inside this module.
// ─── Functions called from HTML onclick= must be assigned to window.X
import { initializeApp }            from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         GoogleAuthProvider, signInWithPopup,
         onAuthStateChanged }        from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey:            "AIzaSyCd7l9eOMbO7F4TSuV55VqnaJUQbFvsibA",
    authDomain:        "codex-study-hub-923c5.firebaseapp.com",
    projectId:         "codex-study-hub-923c5",
    storageBucket:     "codex-study-hub-923c5.appspot.com",
    messagingSenderId: "750631534625",
    appId:             "1:750631534625:web:5f59e1841bb856bdbba360"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// ── UI helpers ─────────────────────────────────────────────────────────────
const overlay   = document.getElementById('loadingOverlay');
const loadMsg   = document.getElementById('loadingMsg');
const container = document.getElementById('loginContainer');
const errEl     = document.getElementById('alertError');
const okEl      = document.getElementById('alertSuccess');

function showOverlay(msg)   { loadMsg.textContent = msg; overlay.classList.add('show'); }
function hideOverlay()      { overlay.classList.remove('show'); container.style.display = 'block'; }
function showError(msg)     { errEl.textContent = msg; errEl.style.display = 'block'; okEl.style.display = 'none'; }
function showSuccess(msg)   { okEl.textContent  = msg; okEl.style.display  = 'block'; errEl.style.display = 'none'; }
function clearAlerts()      { errEl.style.display = 'none'; okEl.style.display = 'none'; }

// ── onAuthStateChanged — only acts AFTER a sign-in action, not on cold load ──
// We use a flag so the initial page load doesn't auto-redirect on unauthenticated state
let authResolved = false;

onAuthStateChanged(auth, async (user) => {
    if (!authResolved) {
        // First call — just decide whether to show login page or redirect
        authResolved = true;
        if (user) {
            // User already has a session — go straight to home
            showOverlay('Resuming session...');
            await redirectUser(user);
        } else {
            hideOverlay();
        }
        return;
    }
    // Subsequent calls (after sign-in actions) — handled inside each action
});

// ── Redirect logic — checks Firestore for complete profile ─────────────────
async function redirectUser(user) {
    try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (!snap.exists()) {
            // Brand-new Google user — create minimal doc
            await setDoc(doc(db, "users", user.uid), {
                fullName: user.displayName || "Student",
                email:    user.email,
                faculty: "", department: "", semester: "",
                createdAt: new Date(),
                authProvider: "google",
                uid: user.uid
            });
            window.location.href = 'chooseFaculty.html';
            return;
        }
        const data = snap.data();
        // Save session so subject_selection.html can read email for trial keys
        localStorage.setItem('loggedInUser', JSON.stringify({
            uid: user.uid,
            email: user.email,
            fullName: data.fullName || '',
            faculty: data.faculty || '',
            department: data.department || '',
            semester: data.semester || ''
        }));
        if (!data.faculty || data.faculty === '') {
            window.location.href = 'chooseFaculty.html';
        } else {
            window.location.href = 'home.html';
        }
    } catch (e) {
        showError('⚠️ Could not load profile: ' + e.message);
        hideOverlay();
    }
}

// ── Google Sign In ──────────────────────────────────────────────────────────
window.signInWithGoogle = async function() {
    clearAlerts();
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Connecting to Google...';

    try {
        const result = await signInWithPopup(auth, provider);
        showOverlay('Signing you in...');
        await redirectUser(result.user);
    } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<img src="https://www.google.com/favicon.ico" width="20" height="20" alt="G"> Sign in with Google';

        if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
            // User just closed the popup — no error needed
        } else if (e.code === 'auth/popup-blocked') {
            showError('❌ Popup blocked by browser. Please allow popups for this site and try again.');
        } else {
            showError('❌ Google sign-in failed: ' + e.message);
        }
    }
};

// ── Email / Password Login ──────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlerts();

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';

    try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        showOverlay('Signing you in...');
        await redirectUser(cred.user);
    } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Log In';

        const msgs = {
            'auth/user-not-found':     '❌ No account found with this email. Please sign up first.',
            'auth/wrong-password':     '❌ Incorrect password. Please try again.',
            'auth/invalid-email':      '❌ Invalid email format.',
            'auth/invalid-credential': '❌ Wrong email or password.',
            'auth/too-many-requests':  '❌ Too many attempts. Please wait a moment and try again.',
        };
        showError(msgs[e.code] || ('❌ ' + e.message));
    }
});
</script>
</body>
</html>
