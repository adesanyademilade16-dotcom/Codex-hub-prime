<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary:#007bff; --bg:#f8f9fa; --card:#fff; --border:#ced4da; }
        *{box-sizing:border-box;margin:0;padding:0}
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:400px; padding:2rem; background:var(--card); border-radius:14px; box-shadow:0 6px 22px rgba(0,0,0,.12); }
        .header { text-align:center; margin-bottom:1.6rem; }
        .cbt-logo { width:80px; display:block; margin:0 auto 10px; }
        h2 { font-size:1.35rem; color:#343a40; margin-bottom:4px; }
        .header p { color:#6c757d; font-size:.88rem; line-height:1.5; }
        .form-group { margin-bottom:1.2rem; }
        label { display:block; margin-bottom:.35rem; font-weight:600; color:#495057; font-size:.88rem; }
        input { width:100%; padding:.75rem; border:1.5px solid var(--border); border-radius:8px; font-size:.93rem; transition:border-color .2s; }
        input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(0,123,255,.15); }
        .btn { width:100%; padding:.8rem; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:.5rem; transition:all .2s; }
        .btn:hover:not(:disabled) { background:#0056b3; }
        .btn:disabled { opacity:.6; cursor:not-allowed; }
        .alert { padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:.88rem; font-weight:600; display:none; }
        .alert-error   { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
        .alert-success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
        .links { text-align:center; margin-top:1.2rem; font-size:.9rem; }
        .links a { color:var(--primary); text-decoration:none; font-weight:600; }
        .spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Codex" class="cbt-logo">
        <h2>Reset Your Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <div id="alertError"   class="alert alert-error"></div>
    <div id="alertSuccess" class="alert alert-success"></div>

    <form id="resetForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="you@gmail.com" autocomplete="email">
        </div>
        <button type="submit" class="btn" id="resetBtn">Send Reset Link</button>
    </form>

    <div class="links">
        <a href="Login.html">← Back to Login</a>
    </div>
</div>

<script type="module">
import { initializeApp }                 from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
    apiKey:            "AIzaSyCd7l9eOMbO7F4TSuV55VqnaJUQbFvsibA",
    authDomain:        "codex-study-hub-923c5.firebaseapp.com",
    projectId:         "codex-study-hub-923c5",
    storageBucket:     "codex-study-hub-923c5.appspot.com",
    messagingSenderId: "750631534625",
    appId:             "1:750631534625:web:5f59e1841bb856bdbba360"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

const errEl = document.getElementById('alertError');
const okEl  = document.getElementById('alertSuccess');

document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    const email = document.getElementById('email').value.trim().toLowerCase();
    const btn   = document.getElementById('resetBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending...';

    try {
        await sendPasswordResetEmail(auth, email);

        okEl.textContent  = '✅ Reset link sent! Check your inbox (and spam folder). Redirecting to login...';
        okEl.style.display = 'block';
        btn.textContent = 'Email Sent ✓';

        setTimeout(() => { window.location.href = 'Login.html'; }, 3500);

    } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';

        const msgs = {
            'auth/user-not-found': '❌ No account found with this email address.',
            'auth/invalid-email':  '❌ Please enter a valid email address.',
            'auth/too-many-requests': '❌ Too many requests. Please wait before trying again.',
        };
        errEl.textContent  = msgs[e.code] || ('❌ ' + e.message);
        errEl.style.display = 'block';
    }
});
</script>
</body>
</html>
