<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Study Hub — Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f4f9; --white:#fff; --surface2:#edf0f7;
  --border:#e2e6f0; --border2:#d0d6e8;
  --blue:#2563eb; --blue-light:#eff4ff; --blue-mid:#bfcfff;
  --green:#059669; --green-light:#ecfdf5;
  --red:#dc2626; --red-light:#fef2f2;
  --amber:#d97706; --amber-light:#fffbeb;
  --purple:#7c3aed;
  --text:#0f172a; --text2:#334155; --muted:#64748b; --dim:#94a3b8;
  --r:14px; --r-sm:9px;
  --sh-sm:0 1px 4px rgba(15,23,42,.09),0 1px 2px rgba(15,23,42,.05);
  --sh:0 4px 14px rgba(15,23,42,.09),0 2px 6px rgba(15,23,42,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);padding-bottom:76px}

/* TOP BAR */
.top-bar{background:var(--white);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  box-shadow:var(--sh-sm)}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);
  border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-mark img{width:30px;height:30px;object-fit:cover;border-radius:6px}
.logo-text{font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;color:var(--text)}
.logo-text span{color:var(--blue)}
.top-actions{display:flex;align-items:center;gap:8px}
.top-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);
  font-family:inherit;font-weight:600;font-size:.8rem;cursor:pointer;transition:.2s;
  text-decoration:none;border:1px solid var(--border);background:var(--white);color:var(--text2)}
.top-btn:hover{background:var(--surface2)}
.top-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);
  box-shadow:0 2px 8px rgba(37,99,235,.28);display:none}
.top-btn.primary:hover{background:#1d4ed8;transform:translateY(-1px)}
.top-btn svg{width:14px;height:14px}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 55%,#7c3aed 100%);
  padding:24px 16px 28px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-9.5zm-2 0v7.5h-16v-5h5v-5H2V20h16v.5zM20 18H40V0H20v18zm2-16h16v14H22V2z'/%3E%3C/g%3E%3C/svg%3E")}
.hero-title{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;
  color:#fff;margin-bottom:4px;position:relative}
.hero-sub{color:rgba(255,255,255,.72);font-size:.84rem;margin-bottom:16px;position:relative}
.search-wrap{position:relative;max-width:560px}
.search-wrap input{width:100%;padding:13px 14px 13px 44px;border:none;border-radius:12px;
  font-family:inherit;font-size:.9rem;color:var(--text);
  background:rgba(255,255,255,.96);box-shadow:0 4px 18px rgba(0,0,0,.22);transition:.2s}
.search-wrap input:focus{outline:none;box-shadow:0 4px 22px rgba(0,0,0,.3),0 0 0 3px rgba(255,255,255,.35)}
.search-wrap input::placeholder{color:var(--dim)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none}
.search-ico svg{width:16px;height:16px}

/* FILTER TABS */
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px}
.filter-bar::-webkit-scrollbar{display:none}
.f-tab{flex-shrink:0;padding:13px 16px;font-family:inherit;font-weight:600;font-size:.82rem;
  color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;
  cursor:pointer;transition:.18s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.f-tab svg{width:13px;height:13px;opacity:.7}
.f-tab:hover{color:var(--text2)}
.f-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.f-tab.active svg{opacity:1}

/* PAGE */
.page{max-width:800px;margin:0 auto;padding:20px 12px 16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 10px;text-align:center;box-shadow:var(--sh-sm)}
.stat-n{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;
  color:var(--blue);line-height:1;margin-bottom:3px}
.stat-l{font-size:.7rem;color:var(--muted);font-weight:500}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
.sec-count{font-size:.75rem;color:var(--muted);background:var(--surface2);
  padding:3px 9px;border-radius:20px;font-weight:500}

/* 2-COL GRID */
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:30px}

/* DOCUMENT CARD */
.doc-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);
  overflow:hidden;box-shadow:var(--sh-sm);transition:all .22s;position:relative;
  display:flex;flex-direction:column}
.doc-card:hover{box-shadow:var(--sh);border-color:var(--blue-mid);transform:translateY(-2px)}

/* thumbnail */
.doc-thumb-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;flex-shrink:0}
.doc-thumb-wrap img.real-thumb{width:100%;height:100%;object-fit:cover;display:block}

/* styled fallback */
.doc-fallback{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;padding:14px}
.thumb-past-questions .doc-fallback{background:linear-gradient(160deg,#fff5f5,#fef2f2)}
.thumb-lecture-notes  .doc-fallback{background:linear-gradient(160deg,#eff6ff,#eff4ff)}
.thumb-textbook       .doc-fallback{background:linear-gradient(160deg,#f0fdf4,#ecfdf5)}
.thumb-other          .doc-fallback{background:linear-gradient(160deg,#fffbeb,#fef3c7)}
.fallback-doc-icon{width:38px;height:38px;opacity:.22}
.fallback-lines{display:flex;flex-direction:column;gap:5px;width:68%;margin-top:2px}
.fallback-lines span{display:block;height:3px;border-radius:2px;background:currentColor;opacity:.18}
.fallback-lines span:nth-child(1){width:100%}
.fallback-lines span:nth-child(2){width:82%}
.fallback-lines span:nth-child(3){width:92%}
.fallback-lines span:nth-child(4){width:70%}
.fallback-lines span:nth-child(5){width:88%}
.fallback-lines span:nth-child(6){width:60%}
.fallback-lines span:nth-child(7){width:94%}

/* page count / views */
.view-count{position:absolute;bottom:7px;right:7px;
  background:rgba(15,23,42,.52);color:#fff;
  font-size:.64rem;font-weight:700;padding:3px 7px;border-radius:6px;
  backdrop-filter:blur(4px);display:flex;align-items:center;gap:3px}
.view-count svg{width:9px;height:9px}

/* trending ribbon */
.trend-ribbon{position:absolute;top:0;left:0;z-index:10;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.4px;
  padding:4px 8px 4px 6px;border-radius:0 0 8px 0;
  display:flex;align-items:center;gap:3px}
.trend-ribbon svg{width:10px;height:10px}

/* admin delete */
.del-btn{position:absolute;top:6px;right:6px;z-index:10;
  width:26px;height:26px;background:rgba(220,38,38,.82);color:#fff;
  border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);transition:.18s}
.del-btn:hover{background:var(--red);transform:scale(1.06)}
.del-btn svg{width:12px;height:12px}

/* card body */
.doc-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1}
.doc-cat-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.doc-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;
  font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-past-questions{background:var(--red-light);color:var(--red)}
.badge-lecture-notes {background:var(--blue-light);color:var(--blue)}
.badge-textbook      {background:var(--green-light);color:var(--green)}
.badge-other         {background:var(--amber-light);color:var(--amber)}
.badge-level         {background:var(--surface2);color:var(--muted)}
.doc-title{font-family:'Sora',sans-serif;font-weight:700;font-size:.8rem;
  color:var(--text);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.doc-sub{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:3px}
.doc-sub svg{width:10px;height:10px;flex-shrink:0}
.doc-actions{display:flex;gap:5px;margin-top:auto;padding-top:7px}
.d-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);
  font-family:inherit;font-weight:600;font-size:.72rem;
  cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:4px}
.d-btn:hover{background:var(--border)}
.d-btn svg{width:11px;height:11px}
.d-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.d-btn.primary:hover{background:#1d4ed8}

/* LOADING / EMPTY */
.loading-wrap{display:flex;flex-direction:column;align-items:center;
  gap:14px;padding:56px 20px;color:var(--muted);grid-column:1/-1}
.spinner{width:30px;height:30px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-wrap{display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:52px 20px;color:var(--muted);text-align:center;grid-column:1/-1}
.empty-wrap svg{width:60px;height:60px;opacity:.18}
.empty-wrap h3{font-family:'Sora',sans-serif;font-size:.92rem;color:var(--text2)}
.empty-wrap p{font-size:.8rem}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--white);border-top:1px solid var(--border);
  display:flex;height:62px;box-shadow:0 -3px 14px rgba(15,23,42,.07)}
.n-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;cursor:pointer;color:var(--dim);
  font-family:inherit;text-decoration:none;transition:.18s;padding:6px 0}
.n-item.active{color:var(--blue)}
.n-item svg{width:21px;height:21px}
.n-label{font-size:.66rem;font-weight:600;letter-spacing:.2px}

/* UPLOAD SHEET */
.overlay{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(15,23,42,.48);backdrop-filter:blur(3px);animation:fIn .2s ease}
.overlay.open{display:flex;align-items:flex-end}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--white);border-radius:22px 22px 0 0;
  width:100%;max-height:94vh;overflow-y:auto;
  animation:sUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{display:flex;justify-content:center;padding:11px 0 0;
  position:sticky;top:0;background:var(--white);z-index:5}
.handle-bar{width:38px;height:4px;background:var(--border);border-radius:2px}
.sh-head{padding:10px 20px 16px;display:flex;align-items:center;gap:11px;
  border-bottom:1px solid var(--border);position:sticky;top:26px;background:var(--white);z-index:4}
.sh-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--purple));
  border-radius:11px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sh-icon svg{width:19px;height:19px}
.sh-head h2{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700}
.sh-close{margin-left:auto;width:32px;height:32px;background:var(--surface2);
  border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:.18s}
.sh-close svg{width:14px;height:14px}
.sh-close:hover{background:var(--red-light);color:var(--red);border-color:#fecaca}
.sh-body{padding:18px 20px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-weight:600;font-size:.78rem;color:var(--text2)}
.field label .req{color:var(--red)}
.field input,.field select{padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);font-family:inherit;font-size:.86rem;color:var(--text);
  background:var(--white);transition:.2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.09)}
.field input::placeholder{color:var(--dim)}
.field select option{background:var(--white)}
.mode-tog{display:flex;background:var(--surface2);padding:3px;border-radius:var(--r-sm);margin-bottom:14px}
.m-btn{flex:1;padding:9px;border:none;background:transparent;
  font-family:inherit;font-weight:600;font-size:.8rem;color:var(--muted);
  border-radius:7px;cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;gap:5px}
.m-btn svg{width:13px;height:13px}
.m-btn.active{background:var(--white);color:var(--blue);
  box-shadow:var(--sh-sm);border:1px solid var(--border)}
.dropzone{border:2px dashed var(--blue-mid);border-radius:11px;padding:26px 14px;
  background:var(--blue-light);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:.2s}
.dropzone:hover{border-color:var(--blue);background:#e6eeff}
.dropzone svg{width:30px;height:30px;color:var(--blue);opacity:.55}
.dropzone p{font-size:.83rem;color:var(--muted);font-weight:500;text-align:center}
.dropzone span{font-size:.75rem;color:var(--dim)}
.dropzone input{display:none}
.file-prev{display:none;background:var(--blue-light);border:1px solid var(--blue-mid);
  border-radius:var(--r-sm);padding:11px 13px;align-items:center;gap:11px;margin-top:8px}
.file-prev.show{display:flex}
.fp-icon{flex-shrink:0;color:var(--blue);opacity:.65}
.fp-icon svg{width:28px;height:28px}
.fp-info{flex:1;min-width:0}
.fp-name{font-weight:600;font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fp-size{font-size:.72rem;color:var(--muted);margin-top:1px}
.fp-rm{background:none;border:none;color:var(--muted);cursor:pointer;transition:.18s;padding:4px}
.fp-rm:hover{color:var(--red)}
.fp-rm svg{width:14px;height:14px}
.sub-btn{width:100%;padding:13px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border:none;border-radius:11px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;
  cursor:pointer;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:0 4px 14px rgba(37,99,235,.28);transition:.22s}
.sub-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,.38)}
.sub-btn svg{width:17px;height:17px}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--text);color:#fff;padding:10px 22px;border-radius:50px;
  font-size:.82rem;font-weight:600;opacity:0;pointer-events:none;z-index:400;
  transition:.28s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo-wrap">
    <div class="logo-mark">
      <img src="logo.png" alt="Codex" onerror="this.style.display='none'">
    </div>
    <span class="logo-text">Codex <span>Hub</span></span>
  </div>
  <div class="top-actions">
    <a href="home.html" class="top-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Back
    </a>
    <button class="top-btn primary" id="uploadFab" onclick="openUpload()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Upload
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <p class="hero-title">Study Resources</p>
  <p class="hero-sub">Lecture notes, past questions &amp; textbooks</p>
  <div class="search-wrap">
    <span class="search-ico">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </span>
    <input type="text" id="searchInput" placeholder="Search by title, subject or category…" oninput="renderPDFs()">
  </div>
</div>

<!-- FILTER TABS -->
<div class="filter-bar">
  <button class="f-tab active" onclick="filterByCategory('all')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>All
  </button>
  <button class="f-tab" onclick="filterByCategory('Past Questions')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Past Questions
  </button>
  <button class="f-tab" onclick="filterByCategory('Lecture Notes')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Lecture Notes
  </button>
  <button class="f-tab" onclick="filterByCategory('Textbook')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v18l7-3 7 3V3H5z"/></svg>Textbooks
  </button>
  <button class="f-tab" onclick="filterByCategory('Other')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Other
  </button>
</div>

<div class="page">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Resources</div></div>
    <div class="stat"><div class="stat-n" id="statPQ">—</div><div class="stat-l">Past Q's</div></div>
    <div class="stat"><div class="stat-n" id="statNotes">—</div><div class="stat-l">Notes</div></div>
  </div>
  <div class="sec-head">
    <span class="sec-title" id="secTitle">All Resources</span>
    <span class="sec-count" id="secCount">…</span>
  </div>
  <div class="doc-grid" id="pdfGrid">
    <div class="loading-wrap"><div class="spinner"></div><span style="font-size:.84rem">Loading…</span></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a href="home.html" class="n-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span class="n-label">Home</span>
  </a>
  <button class="n-item active">

<script>
window.openUpload  = ()=>{ document.getElementById('overlay').classList.add('open'); document.body.style.overflow='hidden'; };
window.closeUpload = ()=>{ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; };
window.overlayClick = e=>{ if(e.target===document.getElementById('overlay')) closeUpload(); };

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+type;
  setTimeout(()=>{ el.className='toast'; },3200);
}

window.setMode=function(mode){
  document.getElementById('modeFile').classList.toggle('active',mode==='file');
  document.getElementById('modeLink').classList.toggle('active',mode==='link');
  document.getElementById('fileWrap').style.display=mode==='file'?'':'none';
  document.getElementById('pdfLink').style.display=mode==='link'?'':'none';
  window._mode=mode;
};
window._mode='file';

document.getElementById('pdfFile').addEventListener('change',function(){
  const f=this.files[0]; if(!f) return;
  document.getElementById('prevName').textContent=f.name;
  document.getElementById('prevSize').textContent=(f.size/1024/1024).toFixed(2)+' MB';
  document.getElementById('filePrev').classList.add('show');
});
window.clearPreview=function(){
  document.getElementById('pdfFile').value='';
  document.getElementById('filePrev').classList.remove('show');
};

window.filterByCategory=function(cat){
  window._cat=cat;
  document.querySelectorAll('.f-tab').forEach(t=>{
    const txt=t.textContent.trim();
    t.classList.toggle('active',
      (cat==='all'&&txt==='All')||(txt===cat)||(cat==='Textbook'&&txt==='Textbooks')
    );
  });
  const labels={all:'All Resources','Past Questions':'Past Questions',
    'Lecture Notes':'Lecture Notes','Textbook':'Textbooks','Other':'Other'};
  document.getElementById('secTitle').textContent=labels[cat]||cat;
  renderPDFs();
};
window._cat='all';

window.downloadPDF=async function(url,filename){
  if(!url) return toast('No file URL.','err');
  let dl=url;
  if(url.includes('cloudinary.com')) dl=url.replace('/upload/','/upload/fl_attachment/');
  try{
    const r=await fetch(dl); if(!r.ok) throw new Error();
    const b=await r.blob(),bUrl=URL.createObjectURL(b),a=document.createElement('a');
    a.href=bUrl; a.download=filename.replace(/\s+/g,'_')+'.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(bUrl);
  }catch{ window.open(dl,'_blank'); }
};

/* Cloudinary PDF → first-page JPEG thumbnail */
function getThumbUrl(url){
  if(!url) return null;
  // raw upload PDF → image/upload with page:1 transformation
  if(url.includes('cloudinary.com')&&url.includes('/raw/upload/')){
    return url
      .replace('/raw/upload/','/image/upload/w_400,h_560,c_limit,f_jpg,q_70,pg_1/')
      .replace(/\.(pdf|PDF)$/,'.jpg');
  }
  // auto/upload pdf
  if(url.includes('cloudinary.com')&&/\.pdf($|\?)/i.test(url)){
    return url
      .replace('/upload/','/image/upload/w_400,h_560,c_limit,f_jpg,q_70,pg_1/')
      .replace(/\.pdf($|\?)/i,'.jpg');
  }
  // already an image on cloudinary
  if(url.includes('cloudinary.com')&&/\.(png|jpg|jpeg|webp)/i.test(url)) return url;
  return null;
}
</script>

<script type="module">

/* SVG icons per category used inside fallback thumbnail */
const CAT_ICONS={

  'Textbook'      :`<svg class="fallback-doc-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M5 3v18l7-3 7 3V3H5z"/></svg>`,

};
const CAT_CFG={
  'Past Questions':{key:'past-questions',cls:'thumb-past-questions'},
  'Lecture Notes' :{key:'lecture-notes', cls:'thumb-lecture-notes'},
  'Textbook'      :{key:'textbook',      cls:'thumb-textbook'},

};

window.renderPDFs=async function(){
  const grid=document.getElementById('pdfGrid');
  const q=document.getElementById('searchInput').value.toLowerCase();
  grid.innerHTML='<div class="loading-wrap"><div class="spinner"></div><span style="font-size:.84rem">Loading…</span></div>';
  try{
    const snap=await getDocs(query(collection(db,"pdfs"),orderBy("createdAt","desc")));
    const isAdmin=currentUser&&currentUser.email===ADMIN;
    let all=[]; snap.forEach(s=>all.push({id:s.id,...s.data()}));

    document.getElementById('statTotal').textContent=all.length;
    document.getElementById('statPQ').textContent=all.filter(d=>d.category==='Past Questions').length;
    document.getElementById('statNotes').textContent=all.filter(d=>d.category==='Lecture Notes').length;

    // top-3 trending = highest views
    const trendIds=new Set([...all].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,3).map(d=>d.id));

    let filtered=all.filter(d=>{
      const ms=!q||(d.title||'').toLowerCase().includes(q)||(d.subject||'').toLowerCase().includes(q)||(d.category||'').toLowerCase().includes(q);
      const mc=window._cat==='all'||d.category===window._cat;
      return ms&&mc;
    });

    document.getElementById('secCount').textContent=`${filtered.length} resource${filtered.length!==1?'s':''}`;
    if(!filtered.length){
      grid.innerHTML=`<div class="empty-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <h3>No resources found</h3><p>Try a different search or be the first to upload!</p>
      </div>`; return;
    }

    const esc=s=>(s||'').replace(/['"<>&]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    let html='';
    filtered.forEach(d=>{
      const cfg2=CAT_CFG[d.category]||CAT_CFG['Other'];
      const isTrend=trendIds.has(d.id);
      const safeTitle=esc(d.title||'Untitled');
      const safeUrl=esc(d.url||'');
      const views=d.views||0;
      const thumbUrl=getThumbUrl(d.url||'');
      const fallbackIcon=CAT_ICONS[d.category]||CAT_ICONS['Other'];

      // Thumbnail: real Cloudinary JPEG or styled SVG fallback
      const thumbContent = thumbUrl
        ? `<img class="real-thumb" src="${thumbUrl}" alt="Preview" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="doc-fallback" style="display:none">
             ${fallbackIcon}
             <div class="fallback-lines"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
           </div>`
        : `<div class="doc-fallback">
             ${fallbackIcon}
             <div class="fallback-lines"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
           </div>`;

      html+=`
      <div class="doc-card">
        <div class="doc-thumb-wrap ${cfg2.cls}">
          ${isTrend?`<div class="trend-ribbon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            Trending
          </div>`:''}
          ${isAdmin?`<button class="del-btn" onclick="delDoc('${d.id}')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>`:''}
          ${thumbContent}
          ${views>0?`<div class="view-count">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            ${views}
          </div>`:''}
        </div>
        <div class="doc-body">
          <div class="doc-cat-row">
            <span class="doc-badge badge-${cfg2.key}">${d.category||'Other'}</span>
            <span class="doc-badge badge-level">${d.level||'—'}</span>
          </div>
          <div class="doc-title">${safeTitle}</div>
          <div class="doc-sub">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            ${esc(d.uploader||'Anonymous')} &middot; ${esc(d.subject||'—')}
          </div>
          <div class="doc-actions">
            <button class="d-btn" onclick="viewDoc('${d.id}','${safeUrl}')">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>

        </div>

  }catch(e){
    grid.innerHTML=`<div class="empty-wrap"><p style="color:var(--red)">Error: ${e.message}</p></div>`;

/* VIEW — increments Firestore counter → drives trending */
window.viewDoc=async function(id,url){
  if(!url) return;
  try{ await updateDoc(doc(db,"pdfs",id),{views:increment(1)}); }catch(_){}
  window.open(url,'_blank');
};

/* DELETE */
window.delDoc=async function(id){
  if(!currentUser||currentUser.email!==ADMIN){ toast('Only admin can delete.','err'); return; }
  if(confirm("Delete this resource permanently?")){
    await deleteDoc(doc(db,"pdfs",id));
    toast('Deleted','ok'); renderPDFs();
  }
};

/* UPLOAD */
window.handleUpload=async function(){
  if(!currentUser) return toast('Please login first!','err');
  const title=document.getElementById('pdfTitle').value.trim();
  const subject=document.getElementById('pdfSubject').value.trim();
  const category=document.getElementById('pdfCategory').value;
  const uploader=document.getElementById('pdfUploader').value.trim();
  const level=document.getElementById('pdfLevel').value;
  if(!title||!subject||!category||!uploader) return toast('Fill all required fields','err');
  let url='';
  try{
    if(window._mode==='file'){
      const file=document.getElementById('pdfFile').files[0];
      if(!file) throw new Error("Please select a file");
      const fd=new FormData();
      fd.append('file',file); fd.append('upload_preset',PRESET); fd.append('resource_type','auto');
      const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/upload`,{method:'POST',body:fd});
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      url=data.secure_url;
    } else {
      url=document.getElementById('pdfLink').value.trim();
      if(!url) throw new Error("Please enter a valid link");
    }
    await addDoc(collection(db,"pdfs"),{
      title,subject,category,uploader,level,url,views:0,
      uploadedBy:currentUser.uid,createdAt:new Date()
    });
    ['pdfTitle','pdfSubject','pdfUploader','pdfLink'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('pdfCategory').value='';
    clearPreview();
    closeUpload();
    toast('Uploaded successfully!','ok');
    renderPDFs();
  }catch(e){ toast('Error: '+e.message,'err'); }
};
</script>
