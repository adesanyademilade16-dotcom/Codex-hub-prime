        { name: "Language", notes: `WHAT IS LANGUAGE?
Language is a systematic, rule-governed, and creative system of symbols (sounds, words, signs) used by humans to communicate thoughts, feelings, and information.

CHARACTERISTICS OF HUMAN LANGUAGE
1. Arbitrariness: No natural link between a word and its meaning.
2. Productivity/Creativity: We can create and understand infinitely new sentences.
3. Displacement: We can talk about things not in the immediate time and place.
4. Cultural transmission: Language is learned from the community; not biologically inherited.
5. Duality of patterning: Sounds combine to form words; words combine to form sentences.

COMPONENTS OF LANGUAGE
• Phonology: The study of sounds (phonemes).
• Morphology: The study of word structure (morphemes — smallest meaningful units).
  e.g., un-help-ful = prefix+root+suffix
• Syntax: The study of sentence structure; grammar rules.
• Semantics: The study of meaning.
• Pragmatics: How context affects meaning in communication.

GRAMMAR ESSENTIALS — PARTS OF SPEECH
• Noun: Person, place, thing, or idea. (Lagos, book, happiness)
• Pronoun: Replaces a noun. (he, she, it, they, we)
• Verb: Action or state. (run, think, is, become)
• Adjective: Describes a noun. (big, beautiful, first)
• Adverb: Describes a verb/adjective/adverb. (quickly, very, soon)
• Preposition: Shows relationship. (in, on, at, between, beside)
• Conjunction: Joins clauses. (and, but, because, although, however)`, link: "https://www.britannica.com/topic/language" },

        { name: "Nature and Function of Language", notes: `THE NATURE OF LANGUAGE
Language is unique to humans. It is a complex communication system that allows us to express abstract ideas, emotions, hypothetical situations, and refer to events in the past and future.

THEORIES OF LANGUAGE ORIGIN
• Divine/Bow-wow theory: Language imitated natural sounds.
• Pooh-pooh theory: Language arose from emotional cries and exclamations.
• Gestural theory: Language evolved from manual gestures (still supported by some evidence).
• Modern view: Language evolved gradually as human brains and vocal tracts developed.

FUNCTIONS OF LANGUAGE
1. COMMUNICATIVE: Expressing and exchanging information.
2. EXPRESSIVE: Conveying personal feelings, emotions, attitudes.
3. DIRECTIVE: Giving commands, requests, instructions.
4. SOCIAL/PHATIC: Maintaining social relationships (greetings, small talk).
5. METALINGUISTIC: Using language to talk about language.
6. IMAGINATIVE: Creating fiction, poetry, fantasy.
7. REFERENTIAL: Describing the external world.

LANGUAGE AS A SOCIAL PHENOMENON
• Language reflects and shapes culture.
• Different varieties (dialects, registers) serve different social contexts.
• Language power: those who control language often control social narratives.
• Code-switching: moving between languages or dialects based on context.`, link: "https://www.britannica.com/topic/linguistics" },

        { name: "Sentence Errors", notes: `COMMON SENTENCE ERRORS IN ENGLISH

1. SUBJECT-VERB DISAGREEMENT
• Rule: Singular subject → singular verb; plural subject → plural verb.
• Error: "The list of items are ready." ✗
• Correct: "The list of items is ready." ✓ (subject = "list", not "items")

2. DANGLING MODIFIER
• A modifier that does not clearly refer to any word in the sentence.
• Error: "Walking to school, the rain started." ✗ (Who was walking?)
• Correct: "Walking to school, I was caught in the rain." ✓

3. RUN-ON SENTENCE
• Two independent clauses joined without proper punctuation.
• Error: "She studied hard she passed the exam." ✗
• Correct: "She studied hard; she passed the exam." ✓
• Or: "She studied hard, so she passed the exam." ✓

4. SENTENCE FRAGMENT
• An incomplete sentence lacking a subject, verb, or complete thought.
• Error: "Because she studied hard." ✗ (dependent clause)
• Correct: "She passed because she studied hard." ✓

5. TENSE INCONSISTENCY
• Shifting tenses within the same context.
• Error: "He walked into the room and sits down." ✗
• Correct: "He walked into the room and sat down." ✓

6. MISPLACED MODIFIER
• Modifier placed too far from what it modifies.
• Error: "She almost drove her children to school every day." ✗ (almost drove?)
• Correct: "She drove her children to school almost every day." ✓`, link: "https://owl.purdue.edu/owl/general_writing/grammar/sentence_fragments.html" },

        { name: "Listening & Speaking Skills", notes: `LISTENING SKILLS

TYPES OF LISTENING
• Passive Listening: Hearing without active engagement.
• Active Listening: Full attention; processing meaning; responding appropriately.
• Critical Listening: Evaluating the message; judging accuracy and intent.
• Empathic Listening: Understanding the speaker's feelings and perspective.

BARRIERS TO EFFECTIVE LISTENING
• Physical: Noise, poor acoustics, distance.
• Psychological: Preconceptions, emotional reactions, daydreaming.
• Linguistic: Unfamiliar vocabulary, accent differences.

ACTIVE LISTENING TECHNIQUES
1. Maintain appropriate eye contact.
2. Avoid interrupting the speaker.
3. Show non-verbal feedback (nodding, leaning forward).
4. Ask clarifying questions after the speaker finishes.
5. Paraphrase to confirm understanding.

SPEAKING SKILLS
• Clarity: Use clear, precise language. Avoid jargon with general audiences.
• Volume: Project voice appropriately for the audience size.
• Pace: Speak at 120–150 words per minute.
• Pitch & Tone: Vary pitch to maintain interest.
• Pronunciation: Articulate clearly; use standard pronunciation.
• Intonation: Rising intonation for questions; falling for statements.
• Body Language: Posture, gestures, and facial expressions reinforce speech.

TYPES OF SPEAKING
• Informative: Presenting facts.
• Persuasive: Convincing the audience (debate, advocacy).
• Formal presentation: Academic or professional address.`, link: "https://www.spmrcollege.org/ccadmin/files/420222109597.pdf" },

        { name: "Speech Sounds", notes: `PHONETICS — The Scientific Study of Speech Sounds

WHAT IS A PHONEME?
The smallest unit of SOUND in a language that can change meaning.
• /p/ and /b/ are different phonemes: "pat" vs "bat" — minimal pair.
• English has approximately 44 phonemes.

VOWEL SOUNDS
Short: /ɪ/ (sit), /e/ (bed), /æ/ (cat), /ɒ/ (hot), /ʊ/ (book), /ʌ/ (cup)
Long: /iː/ (see), /ɑː/ (car), /ɔː/ (law), /uː/ (food), /ɜː/ (bird)
Diphthongs: /eɪ/ (day), /aɪ/ (my), /ɔɪ/ (boy), /əʊ/ (go), /aʊ/ (now)

CONSONANT SOUNDS — classified by:

• Place of articulation:
  Bilabial (both lips): /p/, /b/, /m/
  Labiodental (lip+teeth): /f/, /v/
  Dental (teeth): /θ/ (think), /ð/ (this)
  Alveolar (tooth ridge): /t/, /d/, /n/, /s/, /z/, /l/, /r/
  Velar (soft palate): /k/, /g/, /ŋ/ (sing)

• Manner of articulation:
  Plosives (stops): /p, b, t, d, k, g/ — complete blockage then release
  Fricatives: /f, v, s, z, ʃ, ʒ, θ, ð, h/ — turbulent airflow
  Nasals: /m, n, ŋ/ — airflow through nose

• Voicing:
  Voiced: /b, d, g, v, z, ʒ, ð/
  Voiceless: /p, t, k, f, s, ʃ, θ/`, link: "https://speechandlanguage.org.uk/educators-and-professionals/resource-library-for-educators/speech-sounds/" },

        { name: "Comprehension", notes: `LEVELS OF COMPREHENSION

1. LITERAL COMPREHENSION (Surface Level)
   Understanding what is directly stated.
   Questions: "According to the passage, what/who/where/when...?"

2. INFERENTIAL COMPREHENSION (Reading Between the Lines)
   Understanding what is implied but not directly stated.
   Questions: "Why do you think...?" / "What does the author suggest...?"

3. CRITICAL/EVALUATIVE COMPREHENSION (Beyond the Text)
   Making judgements about quality, validity, and intent.
   Questions: "Do you agree with the author's argument? Why?"

READING STRATEGIES
• Skimming: Rapidly reading to get the general idea.
• Scanning: Looking for specific information.
• SQ3R Method: Survey → Question → Read → Recite → Review.
• Annotating: Marking key points and questions in the text margin.

ANSWERING COMPREHENSION QUESTIONS
1. Read the passage carefully at least once.
2. Identify the TONE: Is it formal, informal, persuasive, narrative?
3. Identify the THEME: Central message or idea.
4. For each question, refer back to the relevant part of the passage.
5. Use your OWN words where asked; quote the text when asked for evidence.

SUMMARY WRITING
• Identify the main points only; omit examples and repetition.
• Write in continuous prose, not bullet points.
• Use your own words; do not copy phrases from the text.
• Stay within the word limit given.`, link: "https://dictionary.cambridge.org/dictionary/english/comprehension" },

        { name: "Lexis and Structure", notes: `LEXIS (VOCABULARY)

WORD FORMATION
• Affixation: un+happy = unhappy; kind+ness = kindness.
• Compounding: rain+bow = rainbow; black+board = blackboard.
• Blending: smoke + fog = smog; breakfast + lunch = brunch.
• Borrowing: French (ballet, menu), Arabic (algebra, safari).

COLLOCATIONS — Words that habitually go together:
• Make: make a decision, make progress, make a mistake.
• Do: do homework, do business, do research.
• Take: take a photo, take a break, take advantage.

SYNONYMS, ANTONYMS, HOMONYMS
• Synonyms: Similar meanings. big/large/huge; begin/start/commence.
• Antonyms: Opposite meanings. hot/cold; love/hate.
• Homonyms: Same spelling/pronunciation, different meaning. "bank" (river bank vs financial bank).
• Homophones: Same sound, different spelling. "there/their/they're."

SENTENCE ELEMENTS
• Subject (S): Who/what the sentence is about.
• Verb (V): The action or state.
• Object (O): Receives the action.
• Complement (C): Describes the subject/object.
• Adverbial (A): Shows when, where, how.

COMMON GRAMMATICAL ERRORS
• Subject-verb agreement: "The list of items is ready." (NOT "are")
• Tense consistency: Don't shift tenses within the same paragraph.`, link: "https://www.africanscholarpublications.com/wp-content/uploads/2021/10/AJHSS_Vol21_No6_June_2021-17.pdf" },

        { name: "Phonetics & Phonology", notes: `PHONETICS vs PHONOLOGY

PHONETICS: The study of the physical properties of speech sounds — how they are produced, transmitted, and perceived.
• Articulatory phonetics: How sounds are made by the vocal tract.
• Acoustic phonetics: Physical properties of sound waves.
• Auditory phonetics: How sounds are perceived by the ear/brain.

PHONOLOGY: The study of how sounds function within a particular language system — the rules governing sound patterns.
• A phoneme is an abstract sound category; a phone is an actual sound produced.

THE INTERNATIONAL PHONETIC ALPHABET (IPA)
A standardised system of symbols representing speech sounds.
• Each symbol represents one and only one sound.
• Enclosed in slashes /p/ for phonemes or brackets [p] for phones.

SYLLABLE STRUCTURE
• A syllable has a nucleus (vowel), an optional onset (consonants before), and an optional coda (consonants after).
• CV: open syllable (no coda) → "go," "see"
• CVC: closed syllable (with coda) → "cat," "sit"

ASSIMILATION
When a sound becomes similar to a neighbouring sound.
• "input" → pronounced as [ɪmpʊt] (n → m before p)

NIGERIAN ENGLISH PHONOLOGY
• Nigerian English tends to have equal stress on all syllables.
• Some consonant clusters simplified: "sixth" → "sixt"
• The distinction between /p/ and /f/ sometimes blurred in some dialects.`, link: "https://www.britannica.com/science/phonetics" },

        { name: "Parts and Figure of Speech", notes: `PARTS OF SPEECH — REVIEW

Noun: Names a person, place, thing, or idea.
  Types: Proper (Lagos), Common (city), Abstract (love), Collective (flock)
Pronoun: Personal (I, you, he, she), Relative (who, which), Possessive (my, your, his)
Adjective: Degrees: positive (tall), comparative (taller), superlative (tallest)
Verb: Transitive (requires object), Intransitive, Linking (be, seem)
Adverb: Modifies a verb, adjective, or other adverb. (slowly, very, here, yesterday)

FIGURES OF SPEECH

1. SIMILE — Comparison using "like" or "as."
   "He ran like the wind." / "She is as brave as a lion."

2. METAPHOR — Direct comparison WITHOUT "like" or "as."
   "Life is a journey." / "He is a lion in battle."

3. PERSONIFICATION — Human qualities given to non-human things.
   "The wind whispered through the trees." / "Time flies."

4. HYPERBOLE — Deliberate exaggeration.
   "I've told you a million times!" / "I'm so hungry I could eat a horse."

5. IRONY — Saying the opposite of what you mean.
   "What lovely weather!" (said during a thunderstorm)

6. ONOMATOPOEIA — Words that sound like what they describe.
   Buzz, crash, hiss, splash, tick-tock, roar.

7. ALLITERATION — Repetition of the same initial consonant sound.
   "Peter Piper picked a peck of pickled peppers."

8. OXYMORON — Two contradictory terms placed together.
   "deafening silence," "bitter sweet," "living death"`, link: "https://byjus.com/english/figures-of-speech/" },

        { name: "Stress", notes: `STRESS IN ENGLISH

WHAT IS STRESS?
Stress refers to the extra emphasis (loudness, higher pitch, and longer duration) placed on certain syllables in words and certain words in sentences.

WORD STRESS (Primary/Lexical Stress)
English is a stress-timed language — stressed syllables occur at roughly regular intervals.

Rules for two-syllable words:
• Most NOUNS/ADJECTIVES: stress on the FIRST syllable.
  TAble, CHAIr, HAPpy, CLEver, PREsent (noun)
• Most VERBS: stress on the SECOND syllable.
  reLAX, beLIEVE, preSENT (verb), rePEAT, reCORD

Suffix-shifting rules:
• Words ending in -tion, -sion, -ic: stress falls on the syllable BEFORE the suffix.
  eduCAtion, expreSsion, econOMic

SENTENCE STRESS
• Content words receive stress: nouns, main verbs, adjectives, adverbs.
• Function words are typically unstressed: articles, prepositions, conjunctions.

INTONATION — Patterns of rising and falling pitch
• FALLING intonation (↘): Statements, commands, and WH-questions.
• RISING intonation (↗): Yes/no questions, uncertainty.
• FALL-RISE (↘↗): Uncertainty, contrast, or politeness.

IMPORTANCE: Wrong stress can change meaning!
  REcord (noun) vs reCORD (verb)`, link: "https://speechandlanguage.org.uk/educators-and-professionals/resource-library-for-educators/speech-sounds/" },

        { name: "Note Taking", notes: `WHY IS NOTE TAKING IMPORTANT?
• Helps consolidate learning during lectures.
• Creates a personal record for revision.
• Improves concentration and engagement.
• Research shows that writing notes by hand improves retention more than typing.

TYPES OF NOTE TAKING METHODS

1. THE CORNELL METHOD
• Divide page into 3 sections:
  - Right main column (70%): Main notes from lecture.
  - Left cue column (30%): Key words, questions after class.
  - Bottom summary box: 1–2 sentence summary of the page.
• Review cue column and summary during revision.

2. OUTLINE METHOD
• Hierarchical structure using headings, subheadings, and bullets.
• Main topic → Sub-topic → Details → Examples

3. MIND MAPPING
• Central topic in the middle; branches for main ideas; sub-branches for details.
• Good for visual learners and seeing connections.

4. CHARTING METHOD
• Use columns for categories, rows for topics.
• Good for comparing items.

TIPS FOR EFFECTIVE NOTES
• Use abbreviations: w/ (with), b/c (because), → (leads to), ≈ (approximately)
• Don't write everything; write KEY POINTS
• Leave white space — easier to add later
• Review notes within 24 hours to reinforce memory
• Use headings and underlining to organise`, link: "https://learningcenter.unc.edu/tips-and-tools/taking-notes-in-class/" },

        { name: "Summary Writing", notes: `WHAT IS A SUMMARY?
A summary is a condensed, objective restatement of the main ideas of a text in your own words, omitting details, examples, and repetitions.

STEPS FOR WRITING A SUMMARY

1. READ THE PASSAGE CAREFULLY
   Read at least twice — once for general understanding, once for detail.

2. IDENTIFY THE MAIN IDEA
   What is the author's central argument or topic?

3. IDENTIFY KEY SUPPORTING POINTS
   These are the major ideas, NOT examples or elaborations.

4. MAKE BRIEF NOTES
   Jot down main points in your own words before writing.

5. WRITE THE SUMMARY
   • State the author's main point first.
   • Include key supporting points.
   • Omit: examples, statistics (unless central), repetitions, direct quotes (unless essential).
   • Use reporting language: "The passage discusses...", "The author argues..."
   • Write in continuous prose (not bullet points).
   • Maintain the same order as the original.

6. CHECK LENGTH
   A summary is usually 1/3 of the original length, or the word limit specified.

7. EDIT AND CHECK
   • Are all points in your own words?
   • Have you stayed within the word limit?
   • Does the summary flow logically?

COMMON MISTAKES
• Copying sentences from the text.
• Adding your own opinions.
• Including too many minor details.`, link: "https://owl.purdue.edu/owl/general_writing/the_writing_process/paraphrasing.html" },

        { name: "Effective Public Speaking", notes: `WHAT IS PUBLIC SPEAKING?
Public speaking is the process of communicating information or ideas to a live audience in a structured, deliberate manner with the intent to inform, influence, or entertain.

TYPES OF PUBLIC SPEECHES
• Informative: Educates the audience (lecture, tutorial presentation).
• Persuasive: Seeks to change beliefs or actions (debate, advocacy speech).
• Demonstrative: Shows how to do something (practical demo).
• Ceremonial/Special occasion: Tribute, toast, eulogy.

PREPARATION STAGES
1. Analyse your audience: Who are they? What do they know? What do they need?
2. Choose a purpose: Inform, persuade, or entertain?
3. Research and organise content: Introduction → Body → Conclusion.
4. Prepare visual aids (if needed): PowerPoint, posters.
5. Rehearse: Practice out loud, time yourself.

DELIVERY TECHNIQUES
• Voice: Speak clearly, vary pitch and pace for emphasis.
• Eye contact: Maintain natural eye contact with different parts of the audience.
• Body language: Stand straight, use natural gestures; avoid fidgeting.
• Pauses: Use strategic pauses for emphasis and to let points sink in.
• Managing nerves: Deep breathing, preparation, positive visualisation.

STRUCTURE OF A SPEECH
• Introduction: Grab attention (hook), state your topic, preview main points.
• Body: 3–5 main points with supporting evidence.
• Conclusion: Summarise, call to action or memorable closing statement.

COMMON MISTAKES TO AVOID
• Reading from paper instead of speaking to the audience.
• Speaking too fast (caused by nervousness).
• Excessive filler words: "um," "erm," "like," "you know"`, link: "https://www.skillsyouneed.com/present/public-speaking.html" }
    ]
},

//  GES151 — AGRICULTURE

"GES151": {
    name: "Agriculture",
    resourceKey: "AGR",
    topics: [
        { name: "Agricultural Systems", notes: `WHAT IS AN AGRICULTURAL SYSTEM?
An organised way in which farming activities are carried out in a given environment, involving inputs, processes, outputs, and feedback.

TYPES OF AGRICULTURAL SYSTEMS

1. SUBSISTENCE AGRICULTURE
• Farmers grow food primarily for their own family's consumption.
• Uses simple tools, family labour, small plots.

2. COMMERCIAL AGRICULTURE
• Large-scale farming for profit; produce is sold in markets.
• Uses mechanisation, hired labour, improved seeds, and chemical inputs.

3. MIXED FARMING
• Combines crop production with livestock rearing on the same farm.
• Animals provide manure for crops; crops provide fodder for animals.

4. SHIFTING CULTIVATION
• Land is cleared, farmed for a few years until fertility declines, then abandoned.
• Farmer moves to a new plot; old land is left to regenerate (fallow).

5. PLANTATION AGRICULTURE
• Large estates producing a single cash crop (monoculture) for export.
• Examples: Palm oil, rubber, cocoa.

6. ORGANIC FARMING
• Uses natural inputs only — no synthetic fertilisers or pesticides.

7. IRRIGATION AGRICULTURE
• Artificial supply of water to crops.
• Types: Surface (furrow/flood), Drip (trickle), Sprinkler.

KEY INPUTS, PROCESSES, AND OUTPUTS
Inputs: Seeds, water, soil, labour, machinery, capital, sunlight.
Processes: Planting, cultivating, irrigating, pest control, harvesting.
Outputs: Crops, livestock products, income, waste products.`, link: "https://foodsupplyissues.weebly.com/agricultural-systems.html" },

        { name: "Principles of Agricultural Extension", notes: `WHAT IS AGRICULTURAL EXTENSION?
Agricultural extension is the systematic process of transferring improved agricultural knowledge, skills, and technologies from researchers to farmers, enabling them to improve their farming practices and livelihoods.

KEY PRINCIPLES

1. FARMER-CENTRED APPROACH
• Extension activities must meet farmers' actual needs.
• Farmers are treated as intelligent adults capable of making their own decisions.

2. VOLUNTARY PARTICIPATION
• Participation in extension programmes should be voluntary — not forced.

3. SELF-HELP PROMOTION
• Extension aims to build farmers' capacity to solve problems themselves.

4. PRACTICAL DEMONSTRATION
• "Seeing is believing." Extension agents use field demonstrations rather than just lectures.
• Demonstration farm plots show new techniques in real conditions.

5. LOCAL ADAPTATION
• Technologies and messages must be adapted to local conditions.

METHODS OF EXTENSION
• Individual contact: Farm visits, office calls, result demonstrations.
• Group contact: Field days, study tours, farmer groups.
• Mass media: Radio, TV, newspapers, mobile phone messaging.

ROLE OF EXTENSION AGENTS IN NIGERIA
• Train farmers in improved crop varieties, fertiliser use, pest control.
• Link farmers to markets and agricultural credit.
• Collect feedback from farmers for research institutions.
• In Nigeria, state ADPs (Agricultural Development Programmes) coordinate extension services.`, link: "https://www.fao.org/in-action/family-farming-10-years/news/detail/en/c/1393714/" },

        { name: "Crop Production", notes: `STEPS IN CROP PRODUCTION

1. LAND PREPARATION
• Clearing: Removing trees, shrubs, and weeds.
• Primary tillage: Deep ploughing to break up the soil.
• Secondary tillage: Harrowing to create a fine seedbed.
• Ridging/Mounding: Raising soil into ridges for better drainage.

2. SEED SELECTION AND TREATMENT
• Select certified seeds: High germination rate, disease-free, improved varieties.

3. PLANTING
• Direct seeding: Seeds planted directly into the field (e.g., maize, groundnut).
• Transplanting: Raising seedlings in a nursery then transplanting (e.g., tomato, cabbage).

4. FERTILISER APPLICATION
• Nitrogen (N): Promotes leafy vegetative growth.
• Phosphorus (P): Promotes root development and flowering.
• Potassium (K): Promotes fruit/grain development.
• Organic fertilisers: Compost, farmyard manure.

5. WEED CONTROL
Methods: Hand weeding, mechanical (tractor cultivator), chemical (herbicides), mulching.

6. PEST AND DISEASE CONTROL
• Integrated Pest Management (IPM): Combines cultural, biological, and chemical methods.

7. HARVESTING
• Timing: Harvest at correct physiological maturity.
• Methods: Manual (cutlass, sickle) or mechanical (combine harvester).

IMPORTANT NIGERIAN CROPS
• Cereals: Maize, Rice, Sorghum, Millet.
• Legumes: Cowpea (beans), Groundnut, Soybean.
• Tubers: Cassava, Yam, Sweet potato.
• Cash crops: Cocoa, Oil palm, Rubber, Cashew.`, link: "https://byjus.com/biology/crop-production/" },

        { name: "Soil Science", notes: `WHAT IS SOIL?
Soil is the uppermost layer of the Earth's surface — a natural body consisting of minerals, organic matter, water, air, and living organisms.

SOIL PROFILE (Horizons)
• O Horizon: Organic matter (leaf litter, compost) — topmost layer.
• A Horizon (Topsoil): Dark, most fertile; high in organic matter.
• B Horizon (Subsoil): Accumulation of leached minerals.
• C Horizon: Partially weathered parent material.
• R Horizon: Bedrock (unweathered parent rock).

SOIL TEXTURE
• Sandy soil: Large particles; drains quickly; poor water/nutrient retention.
• Clay soil: Very small particles; retains water and nutrients well but poorly aerated.
• Silt soil: Medium particles; fertile and good moisture retention.
• Loam soil: Ideal mix of sand, silt, and clay — best for most crops.

SOIL pH
• Most crops prefer: pH 6.0–7.0.
• Acidic soil: Corrected by adding lime (CaCO₃).
• Alkaline soil: Corrected by adding sulphur or organic matter.

SOIL EROSION
• Types: Sheet erosion, Rill erosion, Gully erosion.
• Causes: Deforestation, overgrazing, poor tillage, heavy rainfall on bare soil.
• Prevention: Contour farming, cover crops, windbreaks, terracing, mulching.

NITROGEN FIXATION
Bacteria (Rhizobium in legume root nodules) convert N₂ gas into NH₃, making nitrogen available to plants.`, link: "https://geo.libretexts.org/Bookshelves/Soil_Science" },

        { name: "Aquaculture", notes: `DEFINITION
Aquaculture (fish farming) is the controlled cultivation of aquatic organisms (fish, shellfish, aquatic plants) for food and other products.

IMPORTANCE OF AQUACULTURE
• Supplements wild fish catch — global fish stocks are declining.
• Provides cheap, high-quality protein.
• Major source of income for farmers in Nigeria's inland areas.
• Nigeria is the largest fish consumer in Africa — aquaculture helps bridge the supply gap.

MAJOR FISH SPECIES FARMED IN NIGERIA
• Catfish (Clarias gariepinus): Most popular; fast growth; hardy; tolerates poor water quality. 6–8 months to harvest size (0.5–1.5 kg).
• Tilapia (Oreochromis niloticus): Fast grower; can survive crowded conditions; omnivore.

TYPES OF AQUACULTURE
• Pond culture: Earthen ponds dug near water source.
• Tank culture: Concrete or plastic tanks; allows better management and control.
• Cage culture: Fish in cages suspended in rivers, lakes, or reservoirs.
• Flow-through systems: Continuous water flow maintains quality.

POND MANAGEMENT
• Water quality: Oxygen levels, pH (6.5–8.5), temperature.
• Feeding: 2–3 times daily; commercial fish feed (35–40% protein for catfish).
• Stocking density: Proper spacing to prevent overcrowding.
• Harvesting: Drain ponds or use nets; sell when fish reach market size.

CHALLENGES
• High cost of quality fish feed.
• Disease outbreaks.
• Poor water quality management.
• Market access issues.`, link: "https://www.fao.org/fishery/en/aquaculture" },

        { name: "Livestock Management", notes: `WHAT IS LIVESTOCK MANAGEMENT?
The science and practice of rearing, feeding, breeding, and managing domestic animals for productive purposes.

CLASSIFICATION OF FARM ANIMALS

1. RUMINANTS (4-chambered stomach; chew cud)
• Cattle: Beef and dairy breeds; meat, milk, hides.
• Sheep: Meat, wool, skin.
• Goats (Red Sokoto, West African Dwarf): Meat, milk, skin.

2. MONOGASTRIC ANIMALS (single stomach)
• Pigs: Very efficient feed converters.
• Rabbits: Rapid reproduction; meat production.

3. POULTRY (Avians)
• Broilers (meat): 6–8 weeks to table weight (~2 kg).
• Layers (eggs): Begin production at ~18–20 weeks; lay ~250–300 eggs/year.

FEEDING
• Roughages: High fibre (hay, silage, grass) — for ruminants.
• Concentrates: High energy/protein (maize, soybean meal) — for all classes.

BREEDING
• Natural mating, Artificial Insemination (AI).
• Gestation periods: Cattle: ~283 days | Goat/Sheep: ~150 days | Pig: ~114 days

HEALTH MANAGEMENT
• Vaccination: Newcastle Disease (poultry), FMD (cattle/pigs).
• Deworming: Regular removal of internal parasites.
• Tick control: External parasites — dipping or pour-on acaricides.`, link: "https://byjus.com/biology/animal-husbandry-food-animals/" },

        { name: "Farm Machinery & Tools", notes: `CLASSIFICATION OF FARM TOOLS AND MACHINERY

SIMPLE HAND TOOLS
• Hoe: Primary weeding and cultivation tool in subsistence farming.
• Cutlass/Machete: Clearing vegetation, harvesting.
• Garden Fork: Turning and loosening soil.
• Sickle: Harvesting cereals and grasses.
• Knapsack Sprayer: Manual pesticide/herbicide application.

MECHANISED FARM EQUIPMENT

1. TRACTOR — Primary source of farm power.
  • Power Take-Off (PTO): Shaft that powers attached implements.

2. TILLAGE IMPLEMENTS
  • Mouldboard plough: Turns and buries crop residues.
  • Disc plough: Works in hard, dry, trashy soils.
  • Disc harrow: Secondary tillage; breaks clods and levels soil.
  • Ridger: Creates ridges for planting tubers (yam, cassava).

3. PLANTING EQUIPMENT
  • Seed drill: Places seeds at correct depth and spacing.

4. SPRAYING EQUIPMENT
  • Knapsack sprayer (manual): Carried on back; up to 15–20 litre tank.
  • Boom sprayer (tractor-mounted): Large-scale; covers wide swaths.

5. HARVESTING EQUIPMENT
  • Combine harvester: Simultaneously cuts, threshes, and cleans grain crops.

CHALLENGES IN NIGERIA
High cost of equipment, fuel scarcity, lack of spare parts, inadequate technical skills, poor rural roads limiting access.`, link: "https://www.britannica.com/technology/farm-machinery" },

        { name: "Rural Development", notes: `DEFINITION
Rural development refers to the process of improving the quality of life and economic well-being of people living in rural areas.

KEY DIMENSIONS OF RURAL DEVELOPMENT
• Economic: Increasing farm income, diversifying rural livelihoods.
• Social: Improving education, healthcare, clean water, and sanitation.
• Physical: Building roads, electricity, markets, and communication infrastructure.
• Institutional: Strengthening local governance and community organisations.

RURAL DEVELOPMENT APPROACHES

1. TOP-DOWN APPROACH (State-led)
• Government designs and implements projects without consulting communities.
• Pros: Can implement large-scale infrastructure quickly.
• Cons: Projects often fail because they don't match actual needs.

2. BOTTOM-UP/PARTICIPATORY APPROACH
• Communities identify their own needs and participate in planning.
• More sustainable; builds local ownership.

KEY INSTITUTIONS IN NIGERIA
• ADPs (Agricultural Development Programmes): coordinate extension, input supply, and rural infrastructure.
• FADAMA Programme: World Bank-funded scheme for smallholder farmers.
• CBN/Government: Agricultural loan schemes.

CHALLENGES OF RURAL DEVELOPMENT IN NIGERIA
• Poor infrastructure (roads, electricity).
• Low investment in rural education and healthcare.
• Youth migration to urban areas.
• Insecurity in some rural areas (banditry, farmer-herder conflicts).
• Corruption and mismanagement of rural development funds.`, link: "https://www.ifad.org/en/rural-development" },

        { name: "Importance and Challenges of Agriculture", notes: `IMPORTANCE OF AGRICULTURE IN NIGERIA

1. FOOD SECURITY
• Provides staple foods: cassava, yam, rice, maize, beans, plantain.
• Nigeria must feed 220+ million people.

2. EMPLOYMENT
• ~60–70% of Nigeria's working population is directly or indirectly employed in agriculture.
• Provides livelihoods in rural areas where formal employment is scarce.

3. RAW MATERIALS FOR INDUSTRY
• Cocoa (chocolate/beverages), rubber (tyres/products), oil palm (soap, margarine, biodiesel), cotton (textiles).

4. FOREIGN EXCHANGE EARNINGS
• Before oil, agriculture was Nigeria's main foreign exchange earner.
• Cocoa, sesame, cashew, and ginger are major agricultural exports.

5. CONTRIBUTION TO GDP
• Agriculture contributes approximately 22–26% of Nigeria's GDP.

MAJOR CHALLENGES

1. CLIMATE CHANGE
• Erratic rainfall, droughts, and flooding are disrupting planting seasons.
• Lake Chad shrinkage affects farming/fishing in the Northeast.

2. LAND DEGRADATION
• Soil erosion, desertification in the North, deforestation in the South.

3. POST-HARVEST LOSSES
• Estimated 30–50% of produce lost between farm and market.

4. LIMITED ACCESS TO FINANCE
• Smallholder farmers struggle to access affordable loans.

5. INSECURITY
• Farmer-herder conflicts and banditry disrupt farming in many states.

6. POOR INFRASTRUCTURE
• Bad rural roads increase cost of moving produce to market.`, link: "https://www.fao.org/nigeria/en/" }
    ]
},

"GST112": {
    name: "Nigerian Peoples & Culture",
    resourceKey: "GST",
    topics: [
        { name: "Concept of Culture", notes: `DEFINITION
Culture is the total way of life of a people — their beliefs, values, norms, arts, institutions, and habits passed from generation to generation.

COMPONENTS OF CULTURE
• Material Culture: Physical objects made or used by a group (tools, clothing, buildings).
• Non-material Culture: Beliefs, language, values, norms, customs, and traditions.

KEY TERMS
• Norms: Accepted rules of behaviour in society.
• Values: Core beliefs about what is good or desirable.
• Mores: Strong moral norms (violations are seen as immoral).
• Folkways: Everyday customs with no strong moral attachment.
• Taboo: A strong cultural prohibition.

CHARACTERISTICS OF CULTURE
1. Culture is learned (not innate) — through socialisation.
2. Culture is shared — by members of a group.
3. Culture is cumulative — builds on previous generations.
4. Culture is dynamic — changes over time.
5. Culture is symbolic — especially through language.

CULTURAL RELATIVISM vs ETHNOCENTRISM
• Ethnocentrism: Judging another culture by the standards of your own.
• Cultural Relativism: Understanding a culture on its own terms.`, link: "https://www.britannica.com/topic/culture" },

        { name: "Mapping Nigerian Cultures", notes: `NIGERIA'S CULTURAL DIVERSITY
Nigeria has over 250 ethnic groups with distinct languages, traditions, and practices.

MAJOR ETHNIC GROUPS
• Hausa-Fulani (North): Islamic traditions; emirate system; farming and trade.
• Yoruba (Southwest): Highly urbanised; rich oral traditions; masquerades (Egungun).
• Igbo (Southeast): Decentralised government; Odinani religion; age grades; Ozo title system.

CULTURAL ZONES
• North: Durbar festivals, leather work, Nok terracotta heritage.
• Southwest: Osun-Osogbo festival, Adire textile, Ife bronze works.
• Southeast: Igbo masquerades, Uli art, Obi palace architecture.
• South-South: Ijaw water festivals, Efik/Ibibio traditions.

LANGUAGE
Nigeria has 3 major languages (Hausa, Yoruba, Igbo) and English as the official language, plus hundreds of minority languages.`, link: "https://www.britannica.com/place/Nigeria/Cultural-life" },

        { name: "Ethics and Discipline", notes: `ETHICS DEFINED
Ethics is the branch of philosophy that deals with moral principles — what is right, wrong, good, or bad in human conduct.

TYPES OF ETHICS
• Normative Ethics: Studies standards for right and wrong.
• Applied Ethics: Application of ethical principles to real-world situations.
• Meta-ethics: Studies the nature and meaning of ethical claims.

DISCIPLINE
Discipline is the practice of training oneself (or others) to follow rules or codes of conduct.
• Self-discipline: Internal control of one's actions.
• Social discipline: Conformity to societal norms and laws.

IMPORTANCE IN NATIONAL DEVELOPMENT
• Promotes productivity and accountability.
• Reduces corruption and misconduct.
• Builds trust and social order.

PROFESSIONAL ETHICS
Each profession has its own ethical code:
• Medical: Do no harm, patient confidentiality.
• Legal: Uphold justice, client privilege.
• Academic: Integrity, no plagiarism.`, link: "https://www.britannica.com/topic/ethics-philosophy" },

        { name: "Norms and Values", notes: `NORMS
Norms are shared expectations about behaviour within a group or society.
• Prescriptive Norms: What you SHOULD do (e.g., greet elders).
• Proscriptive Norms: What you should NOT do (e.g., theft, disrespect).

VALUES
Values are deeply held beliefs about what is important or worthwhile.
• Terminal Values: Desired end states (e.g., peace, equality, freedom).
• Instrumental Values: Preferred behaviours to achieve those ends (e.g., honesty, courage).

NIGERIAN CORE VALUES
• Respect for elders and authority.
• Communalism (community over individual).
• Hospitality and generosity.
• Hard work and integrity.

SOCIALISATION
The process through which norms and values are transmitted:
Family → School → Peer groups → Media → Religion`, link: "https://www.sociologyguide.com/basic-concepts/norms.php" },

        { name: "African Religion", notes: `FEATURES OF AFRICAN TRADITIONAL RELIGION (ATR)
1. Belief in a Supreme Being (e.g., Olodumare in Yoruba, Chineke/Chukwu in Igbo).
2. Belief in lesser divinities/spirits who mediate between humans and the Supreme Being.
3. Ancestor veneration — the dead are believed to influence the living.
4. Use of rituals, sacrifices, and shrines.
5. Oral transmission — no single sacred text.

YORUBA RELIGION
• Supreme God: Olodumare / Olorun.
• Orisha (deities): Sango (thunder), Ogun (iron), Yemoja (water), Obatala (creation).
• Ifa: Divination system; highly sophisticated oral corpus.

IGBO RELIGION
• Supreme Being: Chineke or Chukwu.
• Chi: Personal spirit/guardian angel.
• Ani: Earth goddess; enforces moral order.

IMPACT OF CHRISTIANITY AND ISLAM
• Both arrived through trade and conquest.
• ATR elements often syncretised with imported religions.`, link: "https://www.britannica.com/topic/African-religion" },

        { name: "Moral Values Reorientation", notes: `BACKGROUND
Nigeria's moral crisis — corruption, violence, dishonesty — has prompted calls for reorientation.

KEY CONCEPTS
• Moral reorientation means reshaping attitudes, values, and behaviours toward ethical standards.
• MAMSER (Mass Mobilisation for Self-Reliance, Social Justice, and Economic Recovery) — a 1980s Nigerian programme.
• WAI (War Against Indiscipline) — 1984 Buhari government initiative.
• NEEDS (National Economic Empowerment and Development Strategy) — included value reorientation.

CAUSES OF MORAL DECAY IN NIGERIA
1. Colonial disruption of traditional value systems.
2. Poverty and inequality.
3. Corruption and impunity among leaders.
4. Poor educational system.
5. Negative media influence.

STRATEGIES FOR REORIENTATION
• Religious and civic education.
• Role modelling by leaders.
• Strict enforcement of laws.
• Community and family value transmission.
• Youth empowerment programmes.`, link: "https://www.researchgate.net/publication/moral-reorientation-nigeria" },

        { name: "Pre-Colonial Arts", link: "https://www.britannica.com/art/African-art", notes: `SCULPTURE AND METALWORK
• Nok Terracotta (~500 BC–200 AD): earliest large-scale sculpture in sub-Saharan Africa.
• Ife Bronze/Brass Heads (12th–15th c): extraordinary naturalism — idealised royal portraits.
• Benin Bronzes: commissioned by Oba — documented royal history. Looted in 1897 British Punitive Expedition.
• Igbo-Ukwu (~9th–10th c): sophisticated bronze casting predating known West African traditions.
• Lost-wax (cire perdue) technique: wax model → clay casing → melt wax → pour metal.

TEXTILES: Aso-oke (Yoruba woven fabric), Adire (Yoruba tie-dye with indigo).

ORAL LITERATURE: myths, legends, folktales (Tortoise stories), proverbs, praise poetry (Oriki), epics.

WRITING SYSTEM: Nsibidi (Efik/Ekoi/Igbo) — pre-colonial pictographic symbol system.

ARCHITECTURE: Hausa earthen (adobe) mosque architecture — thick walls, ornamental facades.` },

        { name: "Economic Self-Reliance", notes: `DEFINITION
Economic self-reliance is the ability of an individual, community, or nation to meet its own economic needs without excessive dependence on external aid or support.

NIGERIA'S ECONOMIC CHALLENGES
• Overdependence on oil revenue.
• Neglect of agriculture and solid minerals.
• High unemployment, especially youth unemployment.
• Import dependency for manufactured goods.

STRATEGIES FOR SELF-RELIANCE
1. Diversification of the economy (agriculture, manufacturing, ICT, tourism).
2. Development of small and medium enterprises (SMEs).
3. Encouraging local content and "Buy Nigeria" campaigns.
4. Investment in vocational and technical education.
5. Reducing corruption to attract investment.

ROLE OF INDIVIDUALS
• Develop marketable skills.
• Save and invest locally.
• Support locally made products.
• Engage in entrepreneurship.

HISTORICAL EXAMPLE
Operation Feed the Nation (1976) and Green Revolution (1980) — Nigerian agricultural self-reliance programmes.`, link: "https://www.britannica.com/topic/economic-development" },

        { name: "Transitional Society", link: "https://www.un.org/africarenewal", notes: `DEFINITION
A transitional society is one undergoing significant transformation from one social, economic, or political order to another — typically traditional to modern.

FORCES DRIVING NIGERIA'S TRANSITION
1. Colonialism: imposed Western political systems, economy, education, religion.
2. Urbanisation: mass rural-urban migration → megacities (Lagos, Kano, Ibadan).
3. Technology: mobile phones, internet, social media, digital payments.
4. Education: new classes, shifts social mobility pathways.
5. Globalisation: opportunities and threats.

KEY FEATURES
• "Dual Society": coexistence of modern (urban, formal) and traditional (rural, customary) sectors.
• Extended family → nuclear family transition.
• Cultural hybridity: Afrobeats blends Yoruba rhythms with R&B.` },

        { name: "Negative Attitudes in Society", link: "https://www.transparency.org/", notes: `CORRUPTION: diverts public resources, undermines trust, increases inequality.
TRIBALISM/ETHNICISM: preferring own ethnic group; discriminating against others — undermines national unity.
RELIGIOUS BIGOTRY: intolerance and discrimination against people of other faiths.
CULTURE OF IMPUNITY: powerful individuals evade accountability — normalises corruption.
"GET-RICH-QUICK" MENTALITY: promotes dishonesty, fraud, cutting corners.
"PULL-HIM-DOWN" (PHD) SYNDROME: envy and sabotage of others' success.
FATALISM: "it is God's will" — discourages personal responsibility.
ELECTORAL MALPRACTICE: rigging and vote-buying undermine democratic governance.
EXAMINATION MALPRACTICE: devalues qualifications, produces incompetent professionals.
GENDER DISCRIMINATION: limits girls' access to education; excludes women from leadership.

SOLUTION: comprehensive — education, positive role models, strong institutions, economic opportunity, active civic engagement.` }
    ]
},

"MTH102": {
    name: "Elementary Mathematics II",
    resourceKey: "MTH",
    topics: [
        { name: "Functions of a Real Variable", notes: `DEFINITION
A function f: ℝ → ℝ assigns to each real number x exactly one real number f(x).

TYPES OF FUNCTIONS
• Linear: f(x) = mx + c (straight line)
• Quadratic: f(x) = ax² + bx + c (parabola)
• Polynomial: f(x) = aₙxⁿ + ... + a₀
• Rational: f(x) = P(x)/Q(x), Q(x) ≠ 0
• Exponential: f(x) = aˣ
• Logarithmic: f(x) = logₐx
• Trigonometric: sin x, cos x, tan x

DOMAIN AND RANGE
• Domain: Set of all valid input values x.
• Range: Set of all output values f(x).

COMPOSITE FUNCTIONS
(f ∘ g)(x) = f(g(x))

INVERSE FUNCTIONS
If f(x) = y, then f⁻¹(y) = x.
Condition: f must be one-to-one (bijective).

ODD AND EVEN FUNCTIONS
• Even: f(-x) = f(x) — symmetric about y-axis. Example: cos x, x²
• Odd: f(-x) = -f(x) — symmetric about origin. Example: sin x, x³`, link: "https://www.khanacademy.org/math/algebra/x2f8bb11595b61c86:functions" },

        { name: "Limits and Continuity", notes: `LIMITS
The limit of f(x) as x → a is L if f(x) gets arbitrarily close to L as x approaches a.

Notation: lim(x→a) f(x) = L

LIMIT RULES
• Sum: lim[f(x) + g(x)] = lim f(x) + lim g(x)
• Product: lim[f(x)·g(x)] = lim f(x) · lim g(x)
• Quotient: lim[f(x)/g(x)] = lim f(x) / lim g(x), provided lim g(x) ≠ 0

IMPORTANT LIMITS
• lim(x→0) (sin x)/x = 1
• lim(x→∞) (1 + 1/x)ˣ = e

CONTINUITY
f(x) is continuous at x = a if:
1. f(a) is defined
2. lim(x→a) f(x) exists
3. lim(x→a) f(x) = f(a)

TYPES OF DISCONTINUITY
• Removable (hole): Limit exists but ≠ f(a)
• Jump: Left and right limits differ
• Infinite: Function goes to ±∞`, link: "https://www.khanacademy.org/math/calculus-1/cs1-limits-and-continuity" },

        { name: "Mean Value Theorem", notes: `THE MEAN VALUE THEOREM (MVT)
If f(x) is continuous on [a, b] and differentiable on (a, b), then there exists at least one point c in (a, b) such that:

f'(c) = [f(b) − f(a)] / (b − a)

GEOMETRIC INTERPRETATION
The slope of the tangent line at x = c equals the slope of the secant line joining (a, f(a)) and (b, f(b)).

In simple terms: There must be a point where the instantaneous rate of change equals the average rate of change over the interval.

ROLLE'S THEOREM (special case of MVT)
If f(x) is continuous on [a, b], differentiable on (a, b), and f(a) = f(b), then there exists at least one point c in (a, b) such that f'(c) = 0.

Geometric interpretation: If a curve starts and ends at the same height, there must be a horizontal tangent somewhere in between.

WORKED EXAMPLE
f(x) = x² − 3x on [1, 4]
f(1) = 1 − 3 = −2,   f(4) = 16 − 12 = 4
Average rate = (4 − (−2))/(4 − 1) = 6/3 = 2
f'(x) = 2x − 3;  Set f'(c) = 2:
2c − 3 = 2 → c = 2.5   (which is in (1, 4)) ✓

APPLICATIONS
• Proving inequalities
• Showing a function has at most one root
• Deriving other important theorems in calculus`, link: "https://www.khanacademy.org/math/calculus-1/cs1-analyzing-functions" },

        { name: "Differential Calculus", notes: `DEFINITION OF DERIVATIVE
The derivative of f(x) is:
  f'(x) = lim(h→0) [f(x+h) - f(x)] / h

It represents the instantaneous rate of change, or the slope of the tangent line.

BASIC DIFFERENTIATION RULES
• Constant Rule: d/dx[c] = 0
• Power Rule: d/dx[xⁿ] = nxⁿ⁻¹
• Sum/Difference Rule: d/dx[f ± g] = f' ± g'
• Product Rule: d/dx[fg] = f'g + fg'
• Quotient Rule: d/dx[f/g] = (f'g - fg') / g²
• Chain Rule: d/dx[f(g(x))] = f'(g(x)) · g'(x)

STANDARD DERIVATIVES
• d/dx[sin x] = cos x
• d/dx[cos x] = -sin x
• d/dx[eˣ] = eˣ
• d/dx[ln x] = 1/x

WORKED EXAMPLE
Differentiate f(x) = 3x⁴ - 2x² + 5
f'(x) = 12x³ - 4x`, link: "https://www.khanacademy.org/math/calculus-1/cs1-derivatives-definition-and-basic-rules" },

        { name: "Implicit Functions", link: "https://mathworld.wolfram.com/ImplicitFunction.html", notes: `IMPLICIT DIFFERENTIATION: used when y cannot be easily isolated.

METHOD
Differentiate both sides with respect to x.
When differentiating a term involving y, multiply by dy/dx.
Then solve for dy/dx.

EXAMPLES
1. x²+y²=25 (circle)
   2x+2y(dy/dx)=0 → dy/dx = −x/y

2. x³+y³=6xy
   3x²+3y²(dy/dx)=6y+6x(dy/dx)
   dy/dx = (2y−x²)/(y²−2x)

APPLICATION: finding tangent line to a curve given implicitly.` },

        { name: "Parametric Equations", link: "https://mathworld.wolfram.com/ParametricEquations.html", notes: `PARAMETRIC EQUATIONS: express x and y in terms of parameter t:
  x = f(t),   y = g(t)

DIFFERENTIATION
dy/dx = (dy/dt) / (dx/dt)

EXAMPLES
1. Circle: x=r·cos(t), y=r·sin(t), 0≤t≤2π
   dy/dx = (r·cos t)/(−r·sin t) = −cot(t)

2. Projectile: x=u·cos(θ)·t,  y=u·sin(θ)·t−½gt²
   Eliminating t gives: y = x·tan θ − gx²/(2u²cos²θ)

ARC LENGTH: L = ∫√[(dx/dt)²+(dy/dt)²] dt` },

        { name: "Application of Differentiation", notes: `FINDING MAXIMA AND MINIMA
1. Find f'(x) and set it to zero: f'(x) = 0
2. Solve for x (critical points)
3. Use second derivative test:
   • f''(x) > 0 → local minimum
   • f''(x) < 0 → local maximum
   • f''(x) = 0 → inconclusive (inflection point)

INCREASING AND DECREASING FUNCTIONS
• f'(x) > 0 → f is increasing
• f'(x) < 0 → f is decreasing

RATE OF CHANGE
• Velocity = ds/dt (rate of change of displacement)
• Acceleration = dv/dt = d²s/dt²

TANGENT AND NORMAL LINES
• Slope of tangent at x = a: m = f'(a)
• Equation of tangent: y - f(a) = f'(a)(x - a)
• Normal is perpendicular to tangent: slope = -1/f'(a)

EXAMPLE
Find the maximum of f(x) = -x² + 4x + 1
f'(x) = -2x + 4 = 0 → x = 2
f''(x) = -2 < 0 → maximum at x = 2
Maximum value = f(2) = -4 + 8 + 1 = 5`, link: "https://www.khanacademy.org/math/calculus-1/cs1-analyzing-functions" },

        { name: "Integration", notes: `DEFINITION
Integration is the reverse of differentiation. If F'(x) = f(x), then:
∫f(x)dx = F(x) + C  (C = constant of integration)

BASIC INTEGRATION RULES
• ∫xⁿ dx = xⁿ⁺¹/(n+1) + C, (n ≠ -1)
• ∫1/x dx = ln|x| + C
• ∫eˣ dx = eˣ + C
• ∫sin x dx = -cos x + C
• ∫cos x dx = sin x + C
• ∫sec²x dx = tan x + C

METHODS OF INTEGRATION
1. Substitution: Let u = g(x), then du = g'(x)dx
   Example: ∫2x(x²+1)⁵dx → let u = x²+1

2. Integration by Parts: ∫u dv = uv - ∫v du
   Choose u and dv using LIATE rule:
   Logarithmic, Inverse trig, Algebraic, Trig, Exponential

3. Partial Fractions: For rational functions

WORKED EXAMPLE
∫(3x² + 2x) dx = x³ + x² + C`, link: "https://www.khanacademy.org/math/calculus-1/cs1-integrals" },

        { name: "Definite Integrals", notes: `DEFINITION
∫[a to b] f(x) dx = F(b) - F(a)

This gives the net area between the curve y = f(x) and the x-axis from x = a to x = b.

FUNDAMENTAL THEOREM OF CALCULUS
If F'(x) = f(x), then:
  ∫[a to b] f(x) dx = F(b) - F(a)

PROPERTIES
• ∫[a to a] f(x)dx = 0
• ∫[a to b] f(x)dx = -∫[b to a] f(x)dx
• ∫[a to b] [f(x) + g(x)]dx = ∫[a to b]f(x)dx + ∫[a to b]g(x)dx

WORKED EXAMPLE
∫[0 to 2] (x² + 1) dx
= [x³/3 + x] from 0 to 2
= (8/3 + 2) - (0 + 0)
= 8/3 + 2 = 14/3 ≈ 4.67`, link: "https://www.khanacademy.org/math/calculus-1/cs1-integrals" },

        { name: "Area and Volume Applications", notes: `AREA BETWEEN TWO CURVES
Area = ∫[a to b] [f(x) - g(x)] dx
where f(x) ≥ g(x) on [a, b]

STEPS
1. Find intersection points (set f(x) = g(x))
2. Identify which function is on top
3. Integrate the difference

EXAMPLE
Area between y = x² and y = x:
Intersection: x² = x → x = 0, 1
Area = ∫[0 to 1] (x - x²) dx = [x²/2 - x³/3] from 0 to 1
     = 1/2 - 1/3 = 1/6

VOLUMES OF REVOLUTION
Disk Method (rotating about x-axis):
V = π ∫[a to b] [f(x)]² dx

Shell Method (rotating about y-axis):
V = 2π ∫[a to b] x·f(x) dx

EXAMPLE — Volume of a sphere:
Rotate y = √(r² - x²) about x-axis from -r to r:
V = π ∫[-r to r] (r² - x²) dx = 4πr³/3 ✓`, link: "https://www.khanacademy.org/math/calculus-1/cs1-integrals" }
    ]
},
