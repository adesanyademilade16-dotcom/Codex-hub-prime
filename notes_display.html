The 1884–1885 Berlin Conference (the "Scramble for Africa") saw 14 European nations divide Africa among themselves without the participation of any African people. The resulting borders were purely administrative lines drawn on a map.

KEY EFFECTS ON DEMARCATION
• Ethnic Splitting: Unified groups were divided across multiple countries. Example: The Yoruba people were split between Nigeria (British) and the Republic of Benin (French). The Ewe were split between Ghana and Togo.
• Cultural Disruption: Families, trade networks, and cultural practices were severed overnight by new "paper borders."
• Creation of Multi-ethnic States: Rival or incompatible ethnic groups were forced into a single colony (e.g., Nigeria's 250+ ethnic groups).

KEY EFFECTS ON IMMIGRATION
• Forced Labour Migration: Colonial powers extracted workers for mines, railways, and plantations far from their home regions.
• Urbanisation: Colonial capitals like Lagos, Dakar, and Nairobi became economic magnets.
• Modern Refugee Crises: Post-independence conflicts stemming from colonial borders have driven mass migration.

KEY CONCEPT: "Arbitrary Borders"
The borders satisfied European strategic interests (access to rivers, mineral wealth, preventing rival European powers) but had zero regard for African geography, ethnicity, language, or pre-existing kingdoms.`,

COLONIAL BOUNDARIES IN WEST AFRICA

• This creates a "language barrier" that complicates regional integration even today.

IMPACT ON MODERN BORDERS
• Most of West Africa's 16 modern states inherited colonial boundaries as sacrosanct under the OAU/AU's "Intangibility of Colonial Frontiers" principle.

            notes: `AFRICA IN THE GLOBAL POWER STRUCTURE
After independence (1950s–1960s), African states entered a Cold War world dominated by the US, USSR, and Western Europe. They had to navigate this landscape while dealing with weak institutions and colonial economic dependency.

FRANÇAFRIQUE — France's Post-Colonial Sphere of Influence
This is the informal network of political, military, and economic relationships France has maintained with its former African colonies since independence.
• Military: France has maintained permanent military bases in countries like Senegal, Djibouti, and Gabon. France has intervened militarily over 50 times in Africa since 1960.
• Economic: The CFA Franc (used by 14 countries) was pegged to the French Franc (now the Euro), giving France effective control over monetary policy of sovereign nations.
• Political: France backed many authoritarian leaders ("Françafrique men") in exchange for loyalty and access to resources (oil in Gabon, uranium in Niger, cocoa in Côte d'Ivoire).

RECENT SHIFTS (2020s)
• A wave of anti-French coups and sentiment in the Sahel (Mali 2021, Burkina Faso 2022, Niger 2023) has forced France to withdraw troops.
• Russia's Wagner Group (now Africa Corps) has filled some of the resulting security vacuum.
• China's Belt and Road Initiative now competes directly with French economic dominance in infrastructure.`,

            name: "Concentric circle and core Interest",
            notes: `THEORY OF CONCENTRIC CIRCLES IN FOREIGN POLICY
This theory describes how a nation orders its foreign policy priorities from the most vital to the least urgent — like rings expanding outward from a centre.

THE THREE CIRCLES (Applied to Nigeria)

CIRCLE 1 — INNER CORE (National Security & Survival)
• Protecting Nigeria's territorial integrity.
• Countering internal threats: Boko Haram, ISWAP, banditry, separatist agitations.
• Securing borders from cross-border arms trafficking and terrorism.
• Nigeria will act unilaterally here if necessary.

CIRCLE 2 — MIDDLE RING (Regional Stability)
• Maintaining stability within the ECOWAS zone.
• Example: Nigeria's intervention in Liberia (ECOMOG 1990), Sierra Leone, and opposition to the 2023 Niger coup.
• Supporting regional economic integration (ECOWAS common market, Eco currency).
• Managing relations with Francophone neighbours.

CIRCLE 3 — OUTER RING (Global Engagement)
• Nigeria's role in the African Union and United Nations.
• Seeking a permanent seat on the UN Security Council.
• Engaging in global trade, oil diplomacy (OPEC), and climate negotiations.

        {
            name: "Challenges of Arbitrary Porosity Border",
            notes: `WHAT IS A POROUS BORDER?
A porous border is one that can be crossed easily and illegally — without official checkpoints. In Africa, most borders are porous because they were drawn through uninhabited terrain (forests, deserts, rivers) with no physical demarcation or infrastructure built.

WHY ARE AFRICAN BORDERS SO POROUS?
• Colonial borders were lines on a European map, not physical realities on the ground.
• Africa has approximately 84,000 km of land borders — most with minimal official crossing points.
• Rural communities on both sides of a border often share the same ethnicity, language, and market system.

CONSEQUENCES OF POROUS BORDERS

1. ARMS TRAFFICKING
   Libya's post-2011 collapse flooded West and Central Africa with weapons, fuelling insurgencies in Mali, Niger, Nigeria, and Burkina Faso.

2. HUMAN TRAFFICKING & SMUGGLING
   Major smuggling corridors exist across the Sahara and within West Africa (fuel, food, narcotics).

3. DISEASE SPREAD
   Ebola (2014–2016) and COVID-19 spread rapidly across porous West African borders.

4. TERRORISM & INSURGENCY
   Boko Haram/ISWAP exploits the Nigeria-Niger-Chad-Cameroon "tri-border" zone, where effective state authority is absent.

5. ECONOMIC LOSSES
   Parallel trade and smuggling deprive governments of tax and customs revenue.

SOLUTIONS BEING ATTEMPTED
• ECOWAS Free Movement Protocol
• Multinational Joint Task Force (MNJTF) for Lake Chad Basin security
• Biometric border management systems`,
            link: "https://www.un.org/africarenewal/magazine/august-2017/porous-borders-and-security-africa"

        {
            name: "Structural Porosity",
            notes: `DEFINITION
Structural porosity refers to the systemic, built-in weaknesses of African border infrastructure that make illegal crossings not just possible but almost inevitable. It is different from "incidental" porosity caused by temporary lapses.

KEY STRUCTURAL FACTORS

1. LACK OF PHYSICAL INFRASTRUCTURE
   • Most borders lack fencing, walls, or natural barriers.
   • Between Nigeria and Niger's 1,497 km border, there are only a handful of official posts.
   • Many border zones have no roads, making patrolling impossible.

2. UNDERSTAFFED & UNDERFUNDED BORDER AGENCIES
   • Customs and immigration officers are too few to monitor vast rural stretches.
   • Low salaries create high vulnerability to bribery.

3. ABSENCE OF TECHNOLOGY
   • Limited use of surveillance cameras, sensors, drones, or biometric databases.
   • No real-time information sharing between neighbouring countries' border agencies.

4. OVERLAPPING JURISDICTIONS
   • Multiple agencies (police, military, customs, immigration, NDLEA) operate at borders without clear coordination frameworks.

5. WEAK LEGAL FRAMEWORKS
   • Many border-crossing offences carry minimal penalties.

STRUCTURAL vs INCIDENTAL POROSITY
• Structural: A border with no official post for 200 km (built-in weakness).
• Incidental: A bribed guard at an official post (a failure of an otherwise functional system).`,
            link: "https://www.brookings.edu/articles/security-in-africa-and-the-role-of-borders/"

        {
            name: "British versus French Colonial Analysis",
            notes: `BRITISH COLONIAL SYSTEM — KEY FEATURES

PHILOSOPHY: Economically Driven / Pragmatic
• Primary goal was profit — securing raw materials and markets for British goods.
• Maintained existing power structures where possible (Indirect Rule).
• Less interest in culturally transforming Africans.

INDIRECT RULE (Lord Lugard, Northern Nigeria)
• Governed through existing Emirs, Obas, and Chiefs.
• These traditional rulers collected taxes, maintained order, and enforced colonial law — but under British supervision.
• Advantage: Cheaper to administer.
• Identity Outcome: Subjects remained Nigerians, Ghanaians, Ugandans with their own identities intact.

FRENCH COLONIAL SYSTEM — KEY FEATURES

PHILOSOPHY: Culturally Driven / Assimilationist
• Primary goal was cultural integration — making the colonies extensions of France itself.
• Africans were told their civilisation was inferior and needed to be replaced by French culture.

DIRECT RULE
• Traditional rulers were stripped of real power; French-appointed officials ran everything.
• Replaced local languages in schools, courts, and administration with French.

THE ÉVOLUÉS
• A small, educated African elite who had mastered French language and culture.
• Seen as the model for what all Africans should become.

SUMMARY TABLE
Dimension         | British          | French
------------------|------------------|------------------
Governing Style   | Indirect Rule    | Direct Rule
Cultural Policy   | Preservation     | Assimilation
Language          | English+Local    | French only
Traditional Chiefs| Empowered        | Disempowered`,

        },
        {
            name: "French assimilation and association",
            notes: `TWO COMPETING FRENCH COLONIAL PHILOSOPHIES

ASSIMILATION
Definition: The policy of making colonised peoples into French citizens by replacing their culture, language, religion, and legal systems with French equivalents.

Key Assumptions:
• French civilisation was universally superior ("Mission Civilisatrice" — Civilising Mission).
• All humans could theoretically become culturally French if educated properly.

Practice:
• French language was made mandatory in all schools.
• Traditional courts were replaced by French law.
• The "Four Communes" (Senegal: Saint-Louis, Gorée, Dakar, Rufisque) actually had French citizenship from 1848 — the showcase of assimilation.

Weakness: Too expensive and socially impossible to extend to tens of millions of Africans.

ASSOCIATION
Definition: A more pragmatic policy that recognised African cultures as distinct but as "lesser" — to be guided rather than replaced.

Practice:
• Local chiefs were kept in place but under French authority.
• Some traditional courts continued for local disputes.
• French remained the language of power but local languages were tolerated.

IN PRACTICE: France oscillated between both policies throughout the colonial period, using assimilation as an ideal and association as a practical necessity.`,

        {
            name: "Colonial legacy and Post-independence",
            notes: `THE PERSISTENCE OF COLONIAL STRUCTURES
Even after political independence (1957–1980 for most of Africa), colonial institutions, economies, and mindsets did not simply disappear.

POLITICAL LEGACY
• Most constitutions were copies of the colonial power's system (Westminster model for British colonies).
• Borders remained unchanged (OAU 1963 resolution).
• Many post-independence leaders were products of colonial schools.

ECONOMIC LEGACY
• Export-oriented economies: Colonies were designed to export raw materials and import manufactured goods. This structure persists.
• CFA Franc (for 14 Francophone states): The currency is guaranteed by France, printed in France (until recently), and requires 50% of foreign reserves to be deposited in the French Treasury. Critics call it a continuation of economic colonialism.
• Land: In settler colonies, colonial land ownership patterns persisted even after independence.

CULTURAL/LINGUISTIC LEGACY
• French and English remain the official languages of most African states.
• African legal systems are largely colonial imports (Common Law for Anglophone, Civil Law for Francophone).
• Educational curricula often still prioritise European history over African history.

POSITIVE LEGACIES (contested)
• Infrastructure: roads, railways, and urban centres built during colonialism.
• Modern state institutions (courts, civil service, universities).
• Pan-African movements arose partly as a reaction to colonial oppression.`,
            link: "https://www.un.org/en/chronicle/article/colonial-legacy-and-africa"
        },
        {
            name: "Implication for Nigeria-Francophone Relations",
            notes: `NIGERIA'S UNIQUE POSITION
Nigeria is the only major Anglophone country in West Africa surrounded entirely by Francophone neighbours:
• West: Republic of Benin (Dahomey)
• North-West/North: Niger
• North-East: Chad (partially Francophone)
• East: Cameroon (bilingual but Francophone-dominated)

This creates a geopolitical reality sometimes called the "Anglophone Island" problem.

KEY AREAS OF TENSION AND COOPERATION

1. ECOWAS INTEGRATION
• Language barrier slows decision-making and policy implementation.
• The proposed ECO single currency has stalled — Francophone states already have the CFA Franc backed by France.

2. SECURITY COOPERATION
• Boko Haram/ISWAP is a transnational insurgency affecting Nigeria, Niger, Chad, and Cameroon — requiring multilateral cooperation across the language divide.
• Multinational Joint Task Force (MNJTF) coordinates all four Lake Chad Basin countries.

3. TRADE RELATIONS
• Petrol smuggling from Nigeria to Benin, Niger, and Cameroon is a massive informal trade.
• The AfCFTA (African Continental Free Trade Area) may help formalise cross-border trade.

4. IMMIGRATION
• Movement of pastoralists (herdsmen) across borders drives farmer-herder conflicts.

NIGERIA'S STRATEGIC RESPONSE
Nigeria uses ECOWAS as its primary tool for regional leadership, funding peacekeeping missions and advocating for democratic governance.`,
            link: "https://www.cfr.org/backgrounder/nigeria-africa"
        }
    ]

        { name: "Definitions of Translation", notes: `WHAT IS TRANSLATION?
Translation is the process of converting a text written in one language (source language) into another language (target language) while preserving meaning, style, and intent.

KEY DEFINITIONS FROM SCHOLARS
• Nida & Taber (1969): "Translation consists of reproducing in the receptor language the closest natural equivalent of the source language message, first in terms of meaning and secondly in terms of style."
• Roman Jakobson (1959): Distinguished three types:
  1. Intralingual: Rewording within the same language
  2. Interlingual: Between two different languages (French → English)
  3. Intersemiotic: From words to another sign system (text → sign language, text → film)
• Catford (1965): "The replacement of textual material in one language by equivalent textual material in another language."

WHAT TRANSLATION IS NOT
• It is NOT word-for-word substitution (this is called "literal translation" and usually produces unnatural results).
• It is NOT simply finding dictionary equivalents — cultural context matters enormously.

FALSE FRIENDS (Faux Amis) — Words that look similar but have different meanings:
• "Actuellement" (Fr) = Currently (NOT "Actually")
• "Sensible" (Fr) = Sensitive (NOT "Sensible")
• "Rester" (Fr) = To stay (NOT "To rest")`, link: "https://dictionary.cambridge.org/dictionary/english/translation" },

        { name: "Importance of Translation", notes: `WHY TRANSLATION MATTERS

1. DIPLOMACY & INTERNATIONAL RELATIONS
• The United Nations uses 6 official languages: Arabic, Chinese, English, French, Russian, Spanish.
• Every resolution, treaty, and speech is translated simultaneously.

2. INTERNATIONAL BUSINESS & TRADE
• Companies cannot enter new markets without translating contracts, marketing materials, and product instructions.

3. SCIENCE & KNOWLEDGE TRANSFER
• Most cutting-edge scientific research is published in English. Translation makes it accessible to French, Portuguese, Arabic, and other scientific communities.

4. LITERATURE & CULTURE
• Chinua Achebe's "Things Fall Apart" has been translated into 57 languages; without translation, it would have remained a regional work.

5. LAW & JUSTICE
• Legal systems in multilingual states (like Cameroon — English/French) require precise legal translation.

6. WEST AFRICA SPECIFIC
• In court proceedings, police investigations, and government administration across Anglophone-Francophone borders, translators and interpreters are essential.`, link: "https://www.britishcouncil.org/voices-magazine/why-translation-important" },

        { name: "Words: French to English", notes: `CORE VOCABULARY — FRENCH → ENGLISH

BASIC NOUNS
La Maison → The House    |  Le Livre → The Book
La Femme → The Woman     |  L'Homme → The Man
L'École → The School     |  La Voiture → The Car

COMMON VERBS (Infinitives)

Être → To be

COMMON ADJECTIVES

TRANSLATION TIPS

• Adjectives must agree with the gender and number of the noun.
  e.g., "Un grand homme" but "Une grande femme"

        { name: "Words: English to French", notes: `CORE VOCABULARY — ENGLISH → FRENCH

IMPORTANT GRAMMAR RULES FOR TRANSLATION

GENDER: Every French noun has a gender. You must learn it with the word.

ARTICLES (The / A):

        { name: "Present tense translation", notes: `THE FRENCH PRÉSENT — THREE ENGLISH EQUIVALENTS

The French present tense is used where English uses three different forms:

French Form         → English Equivalents
"Je parle"          → "I speak" (Simple present)
                    → "I am speaking" (Present continuous)
                    → "I do speak" (Emphatic present)

WHEN IS FRENCH PRESENT TENSE USED?
1. Habitual actions: "Je mange à midi." = "I eat at noon." (every day)
2. Actions happening now: "Je mange." = "I am eating." (right now)
3. General truths: "L'eau bout à 100°C." = "Water boils at 100°C."
4. Near future (with time expression): "Je pars demain." = "I am leaving tomorrow."

CONJUGATION PATTERNS
REGULAR -ER verbs (Parler): -e, -es, -e, -ons, -ez, -ent
REGULAR -IR verbs (Finir): -is, -is, -it, -issons, -issez, -issent
REGULAR -RE verbs (Vendre): -s, -s, -, -ons, -ez, -ent

IRREGULAR VERBS (must memorise)
Être (to be):    suis, es, est, sommes, êtes, sont
Avoir (to have): ai, as, a, avons, avez, ont
Aller (to go):   vais, vas, va, allons, allez, vont
Faire (to do):   fais, fais, fait, faisons, faites, font`, link: "https://www.cliffsnotes.com/study-guides/french/french-i/french-i-the-present-tense/the-present-tense" },

        { name: "French in West Africa", notes: `FRENCH AS A LINGUA FRANCA IN WEST AFRICA

French is an official language in 20 African countries. Most are in West and Central Africa:
• West Africa: Senegal, Côte d'Ivoire, Burkina Faso, Guinea, Mali, Niger, Togo, Benin, Mauritania
• Total speakers in Africa: estimated 150–230 million (more French speakers in Africa than in France itself).

HISTORICAL ORIGIN
• French was established as the language of colonial administration by France.
• Post-independence, African leaders chose to keep French as the official language because:
  1. No single African language commanded a national majority.
  2. French provided a neutral ground among rival ethnic groups.
  3. It facilitated continued ties with France and Francophone international institutions.

VARIETIES OF AFRICAN FRENCH
• Ivoirian French (Nouchi): Blends French with Dioula and English slang.
• Camfranglais (Cameroon): Mixes French, English, and Cameroonian Pidgin.
• Wolofal French (Senegal): Influenced by Wolof phonology and idiom.

ROLE IN EDUCATION & GOVERNMENT
• All formal education in Francophone West Africa is conducted in French.
• Government documents, laws, court proceedings in French.
• Only 15–20% of the population are truly fluent in French.`, link: "https://www.francophonie.org/english" },

        { name: "Varieties of French", notes: `FRENCH IS NOT ONE LANGUAGE — IT IS A FAMILY OF VARIETIES

STANDARD/METROPOLITAN FRENCH (Français Standard)
• Based on the Parisian dialect; the prestige variety taught in schools and used in formal media.
• This is what foreign language learners usually study.

CANADIAN FRENCH (Québécois)
• Spoken by ~7 million people in Quebec, Canada.
• Preserved features of 17th-century French that disappeared in France.
• Contains many loanwords from English: "char" (car), "chum" (boyfriend/friend).

BELGIAN FRENCH (Français Belge)
• Key differences: "septante" (70) instead of "soixante-dix" in France.

AFRICAN VARIETIES

Ivoirian French / Nouchi (Côte d'Ivoire)
• "Nouchi" is a street argot blending French, Dioula, and Bété.

Camfranglais (Cameroon)
• A creole mixing French, English, and local languages.

Dakar French (Sénégal)
• Heavily influenced by Wolof phonology and vocabulary.

SIGNIFICANCE FOR TRANSLATION
A translator must know WHICH variety of French the source text is written in, as vocabulary, grammar, and cultural references differ significantly across varieties.`, link: "https://www.lutece-langue.com/blog/dialects-and-varieties-of-the-french-language/" }
    ]
},

        { name: "Units & Dimensions", notes: `THE SI SYSTEM (Système International d'Unités)
The internationally agreed system of measurement, with 7 base units:

Quantity         | SI Unit    | Symbol
-----------------|------------|-------
Length           | metre      | m
Mass             | kilogram   | kg
Time             | second     | s
Electric Current | ampere     | A
Temperature      | kelvin     | K
Amount of substance | mole   | mol
Luminous intensity | candela  | cd

DERIVED UNITS
Force (Newton): N = kg·m·s⁻²
Energy/Work (Joule): J = kg·m²·s⁻²
Power (Watt): W = kg·m²·s⁻³
Pressure (Pascal): Pa = kg·m⁻¹·s⁻²

DIMENSIONAL ANALYSIS
Express quantities in terms of: Mass [M], Length [L], Time [T], Current [I], Temperature [Θ]
• Velocity = distance/time → [LT⁻¹]
• Acceleration → [LT⁻²]
• Force = mass × acceleration → [MLT⁻²]
• Energy = force × distance → [ML²T⁻²]
• Pressure = force/area → [ML⁻¹T⁻²]

USES OF DIMENSIONAL ANALYSIS
1. Check equation consistency: both sides must have the same dimensions.
2. Derive formulas (dimensional method).
3. Convert between unit systems.

UNIT PREFIXES
nano(n)=10⁻⁹, micro(μ)=10⁻⁶, milli(m)=10⁻³, kilo(k)=10³, mega(M)=10⁶, giga(G)=10⁹`, link: "https://byjus.com/jee/units-and-dimensions/" },

        { name: "Vectors & Scalars", notes: `DEFINITIONS
• Scalar: A physical quantity described by magnitude (size) only.
  Examples: mass, speed, temperature, time, distance, energy.
• Vector: A physical quantity described by both magnitude AND direction.
  Examples: displacement, velocity, acceleration, force, momentum.

VECTOR ADDITION
• Component Method (most accurate):
  Resolve each vector into x and y components:
  Fx = F cosθ,  Fy = F sinθ
  Sum components: Rx = ΣFx,  Ry = ΣFy
  Resultant: R = √(Rx² + Ry²),  angle θ = arctan(Ry/Rx)

VECTOR MULTIPLICATION
• Dot Product (Scalar): A·B = |A||B|cosθ → gives a scalar. Used in: Work (W = F·d)
• Cross Product (Vector): A×B = |A||B|sinθ (n̂) → gives a vector perpendicular to both. Used in: Torque (τ = r×F)

UNIT VECTORS
Standard unit vectors: î (x-direction), ĵ (y-direction), k̂ (z-direction)
A vector A = Axî + Ayĵ + Azk̂

WORKED EXAMPLE
A force of 10N at 30° to the horizontal:
  Fx = 10 cos30° = 10 × (√3/2) ≈ 8.66 N
  Fy = 10 sin30° = 10 × 0.5 = 5 N`, link: "https://byjus.com/maths/what-are-vector-and-scalar-quantities/" },

        { name: "Dot Product", notes: `THE DOT (SCALAR) PRODUCT
A · B = |A||B|cosθ where θ is the angle between the vectors.

COMPONENT FORM
A · B = AxBx + AyBy + AzBz

KEY PROPERTIES
• Result is a SCALAR (just a number, no direction).
• A · A = |A|² (dot product of a vector with itself = square of magnitude)
• If A ⊥ B (perpendicular): A · B = 0 (cos 90° = 0)
• If A ∥ B (parallel): A · B = |A||B| (cos 0° = 1)

APPLICATIONS
• Work done: W = F · d = Fd cosθ
• Finding angle between vectors: cosθ = (A·B)/(|A||B|)
• Projection of A onto B: |A|cosθ = (A·B)/|B|

WORKED EXAMPLE
A = (3, 4, 0), B = (1, 2, 0)
A · B = 3×1 + 4×2 + 0×0 = 3 + 8 = 11
|A| = √(9+16) = 5,  |B| = √(1+4) = √5
cosθ = 11 / (5×√5) = 11/11.18 ≈ 0.984
θ ≈ 10.3°`, link: "https://byjus.com/maths/dot-product/" },

        { name: "Newton's Laws", notes: `THE THREE LAWS OF MOTION (Isaac Newton, 1687)

FIRST LAW — Law of Inertia
"An object at rest remains at rest, and an object in motion remains in uniform motion in a straight line, unless acted upon by a net external force."

SECOND LAW — Law of Acceleration
"The acceleration of an object is directly proportional to the net force acting on it and inversely proportional to its mass."

F = ma  (where F = net force in N, m = mass in kg, a = acceleration in m/s²)

Example: A 5 kg box is pushed with a net force of 20 N.
  a = F/m = 20/5 = 4 m/s²

THIRD LAW — Law of Action and Reaction
"For every action, there is an equal and opposite reaction."

Examples:
• Rocket propulsion: Hot gases pushed backward → rocket moves forward.
• Walking: Foot pushes back on ground → ground pushes foot forward.

WEIGHT AND NORMAL FORCE
• Weight W = mg (force of gravity downward)
• Normal force N = reaction of surface pushing up on object
• On a flat surface with no vertical acceleration: N = W = mg`, link: "https://www.britannica.com/science/Newtons-laws-of-motion" },

        { name: "Projectile Motion", notes: `DEFINITION
Projectile motion is the motion of an object thrown or projected into the air, subject only to gravity (ignoring air resistance).

KEY PRINCIPLE: Horizontal and vertical motions are INDEPENDENT.

HORIZONTAL (x-direction): uniform velocity (no acceleration)
  x = u cosθ × t

VERTICAL (y-direction): constant downward acceleration g = 10 m/s²
  y = u sinθ × t − ½gt²
  vy = u sinθ − gt

IMPORTANT FORMULAS
• Time of flight: T = 2u sinθ / g
• Maximum height: H = u² sin²θ / 2g
• Horizontal range: R = u² sin(2θ) / g
• Maximum range occurs at θ = 45°

WORKED EXAMPLE
A ball is projected at 20 m/s at 30° to the horizontal. Find:
  ux = 20 cos30° = 20(√3/2) ≈ 17.3 m/s
  uy = 20 sin30° = 20(0.5) = 10 m/s
  Time of flight T = 2(10)/10 = 2 s
  Range R = 17.3 × 2 = 34.6 m
  Max height H = (10)²/(2×10) = 5 m`, link: "https://byjus.com/physics/projectile-motion/" },

        { name: "Kinematics", notes: `DEFINITIONS
• Distance: Total path length travelled (scalar)
• Displacement: Shortest straight-line path from start to end, with direction (vector)
• Speed: Rate of change of distance (scalar) = distance / time
• Velocity: Rate of change of displacement (vector) = displacement / time
• Acceleration: Rate of change of velocity (vector) = Δv / Δt

EQUATIONS OF MOTION (for constant acceleration)
Let: u = initial velocity, v = final velocity, a = acceleration, s = displacement, t = time

1. v = u + at
2. s = ut + ½at²
3. v² = u² + 2as
4. s = (u + v)/2 × t

WORKED EXAMPLES

Example 1: A car starts from rest and accelerates at 3 m/s² for 5 s.
  u = 0, a = 3, t = 5
  v = u + at = 0 + 3(5) = 15 m/s
  s = ut + ½at² = 0 + ½(3)(25) = 37.5 m

Example 2: A ball is thrown upward at 20 m/s. How high does it go? (g = 10 m/s²)
  At max height, v = 0. a = −10
  v² = u² + 2as → 0 = 400 + 2(−10)s → s = 20 m`, link: "https://www.britannica.com/science/kinematics" },

        { name: "Center of Mass", notes: `DEFINITION
The centre of mass (CoM) is the single point where the entire mass of a system can be considered to be concentrated for the purposes of analysing translational motion.

FORMULA (General)
x_cm = Σ(mᵢxᵢ) / Σmᵢ   (and similarly for y and z coordinates)

WORKED EXAMPLE
Two masses: m₁ = 3 kg at x = 1 m and m₂ = 5 kg at x = 5 m.
  x_cm = (3×1 + 5×5) / (3+5) = (3 + 25) / 8 = 28/8 = 3.5 m
The CoM is at 3.5 m — closer to the heavier mass.

APPLICATIONS
• STABILITY: An object tips over when its CoM falls outside its base of support.
• COLLISIONS: In elastic and inelastic collisions, the CoM of the system continues moving at constant velocity (if no external forces).
• PROJECTILES: Even when an irregularly shaped object is thrown, its CoM traces a perfect parabola.`, link: "https://byjus.com/jee/center-of-mass/" },

        { name: "Angular Velocity", notes: `CIRCULAR MOTION
When an object moves in a circle, it has angular displacement, angular velocity, and angular acceleration.

KEY QUANTITIES
• Angular displacement (θ): measured in radians (rad)
• Angular velocity (ω): rate of change of angular displacement
  ω = Δθ/Δt   units: rad/s
• Angular acceleration (α): rate of change of angular velocity
  α = Δω/Δt   units: rad/s²
• Period (T): time for one complete revolution
  T = 2π/ω
• Frequency (f): revolutions per second
  f = 1/T = ω/(2π)

LINEAR-ANGULAR RELATIONSHIPS
• Arc length: s = rθ
• Linear velocity: v = rω
• Centripetal (linear) acceleration: a = v²/r = rω²

CENTRIPETAL FORCE
The net inward force that keeps an object moving in a circle:
  F_c = mv²/r = mω²r

WORKED EXAMPLE
A wheel of radius 0.5 m rotates at 10 rad/s.
  v = rω = 0.5 × 10 = 5 m/s
  a_c = rω² = 0.5 × 100 = 50 m/s²
  F_c = m×a_c (requires mass to find actual force)`, link: "https://byjus.com/physics/angular-velocity/" },

        { name: "Simple Harmonic Motion", notes: `DEFINITION
Simple Harmonic Motion (SHM) is a type of periodic motion where the restoring force is proportional to displacement from equilibrium, directed toward equilibrium.

F = −kx   (Hooke's Law for springs)

The negative sign means force opposes displacement.

KEY EQUATIONS
• Displacement: x = A cos(ωt + φ)
• Velocity: v = −Aω sin(ωt + φ)
• Acceleration: a = −ω²x
• Angular frequency: ω = √(k/m) for a spring-mass system
• Period: T = 2π/ω = 2π√(m/k)
• Frequency: f = 1/T

ENERGY IN SHM
• Total mechanical energy = ½kA² (constant)
• At displacement x: KE = ½k(A²−x²), PE = ½kx²
• At equilibrium (x=0): all KE, no PE
• At amplitude (x=A): all PE, no KE

PENDULUM
For small angles: T = 2π√(L/g)   where L = length, g = 9.8 m/s²
Note: period is INDEPENDENT of mass and amplitude (for small swings).

WORKED EXAMPLE
Spring k = 400 N/m, mass m = 4 kg, amplitude A = 0.1 m
ω = √(400/4) = 10 rad/s
T = 2π/10 ≈ 0.628 s
Max speed = Aω = 0.1 × 10 = 1 m/s`, link: "https://byjus.com/physics/simple-harmonic-motion/" },

        { name: "Work, Energy, Power", notes: `WORK
Formula: W = F × d × cosθ
• If θ = 0°: W = Fd (maximum work)
• If θ = 90°: W = 0 (force perpendicular to motion, no work done)
• If θ = 180°: W = −Fd (force opposes motion)
Unit: Joule (J) = N·m = kg·m²·s⁻²

ENERGY
Kinetic Energy (KE): Energy of motion
  KE = ½mv²

Potential Energy (PE): Stored energy due to position
  Gravitational PE = mgh
  Elastic PE = ½kx²

WORK-ENERGY THEOREM
Net work done on an object = change in its kinetic energy
  W_net = ΔKE = ½mv² − ½mu²

CONSERVATION OF MECHANICAL ENERGY (no friction)
  KE + PE = constant → ½mv₁² + mgh₁ = ½mv₂² + mgh₂

POWER
  P = W/t = F × v
Unit: Watt (W) = J/s

EFFICIENCY
  Efficiency = (Useful output energy / Total input energy) × 100%`, link: "https://byjus.com/physics/work-energy-power/" },

        { name: "Equilibrium", notes: `CONDITIONS FOR EQUILIBRIUM
An object is in equilibrium when it is not accelerating (linear or rotational).

TWO CONDITIONS
1. TRANSLATIONAL EQUILIBRIUM: Net force = 0
   ΣFx = 0   and   ΣFy = 0
   (All horizontal forces balance; all vertical forces balance)

2. ROTATIONAL EQUILIBRIUM: Net torque = 0
   Στ = 0
   (Clockwise moments = Anticlockwise moments about any pivot)

TORQUE (MOMENT)
τ = F × d (perpendicular distance from pivot to line of action of force)
Unit: N·m

TYPES OF EQUILIBRIUM
• Stable: If disturbed, object returns to original position (e.g., ball in a bowl)
• Unstable: If disturbed, object moves further away (e.g., ball on top of a hill)
• Neutral: If disturbed, object stays in new position (e.g., ball on a flat surface)

WORKED EXAMPLE
A uniform beam 4 m long, mass 20 kg, supported at both ends.
A 30 kg load is placed 1 m from the left end. Find reactions R₁ and R₂.

Taking moments about left end:
  R₂ × 4 = 20×2×10 + 30×1×10 (weight of beam acts at centre)
  4R₂ = 400 + 300 = 700
  R₂ = 175 N
  R₁ = (20+30)×10 − 175 = 500 − 175 = 325 N`, link: "https://byjus.com/physics/equilibrium/" },

        { name: "Thermodynamics", notes: `THERMODYNAMICS — The study of heat, work, and energy transformations.

THE FOUR LAWS

ZEROTH LAW — Thermal Equilibrium
"If system A is in thermal equilibrium with system B, and B is in thermal equilibrium with C, then A is in thermal equilibrium with C."

FIRST LAW — Conservation of Energy
ΔU = Q − W
  ΔU = change in internal energy
  Q = heat added to system (+) or removed (−)
  W = work done BY the system (+) or ON the system (−)

SECOND LAW — Entropy
"Heat cannot spontaneously flow from a cold body to a hot body."
  • No heat engine can be 100% efficient.
  • Entropy of an isolated system always increases or stays the same.

THIRD LAW
"As temperature approaches absolute zero (0 K = −273.15°C), the entropy of a perfect crystal approaches zero."

THERMODYNAMIC PROCESSES
• Isothermal: T = constant → ΔU = 0, so Q = W
• Adiabatic: Q = 0 (no heat exchange) → ΔU = −W
• Isochoric (Isovolumetric): V = constant → W = 0, so ΔU = Q
• Isobaric: P = constant → W = PΔV

HEAT ENGINES & EFFICIENCY
  η = 1 − (T_cold / T_hot)  (Carnot efficiency — maximum theoretical)`, link: "https://www.britannica.com/science/thermodynamics" }
    ]
},

"CHM101": {
    name: "Chemistry",
    resourceKey: "CHM",
    topics: [
        { name: "Atomic Structure", notes: `THE ATOM
Atoms consist of a nucleus (containing protons and neutrons) surrounded by electrons in shells.

SUBATOMIC PARTICLES
Proton (+1, mass ≈ 1 amu, in nucleus)
Neutron (0, mass ≈ 1 amu, in nucleus)
Electron (−1, mass ≈ 0, in shells)

KEY DEFINITIONS
• Atomic Number (Z): Number of protons. Defines the element. (H=1, C=6, O=8, Na=11)
• Mass Number (A): Protons + Neutrons. A = Z + N
• Isotopes: Same element (same Z), different number of neutrons. e.g., ¹²C and ¹⁴C (both carbon)

ELECTRON CONFIGURATION
Filling order (Aufbau Principle): 1s → 2s → 2p → 3s → 3p → 4s → 3d → 4p...

Examples:
• Hydrogen (Z=1): 1s¹
• Carbon (Z=6): 1s² 2s² 2p²
• Sodium (Z=11): 1s² 2s² 2p⁶ 3s¹  (or [Ne] 3s¹)
• Chlorine (Z=17): 1s² 2s² 2p⁶ 3s² 3p⁵  (or [Ne] 3s² 3p⁵)

THREE KEY PRINCIPLES
1. Aufbau Principle: Fill lowest energy levels first.
2. Pauli Exclusion Principle: Each orbital holds max 2 electrons with opposite spins.
3. Hund's Rule: Fill each orbital in a sub-shell singly before doubling up.

PERIODIC TABLE TRENDS
• Atomic radius: Decreases across a period; Increases down a group.
• Ionisation Energy: Increases across a period; Decreases down a group.
• Electronegativity: Increases across a period; Decreases down a group.`, link: "https://www.britannica.com/science/atom/Atomic-bonds" },

        { name: "Redox Reactions", notes: `REDOX REACTIONS
Redox reactions involve the simultaneous transfer of electrons — one species loses electrons (oxidation) and another gains electrons (reduction).

MNEMONIC: OIL RIG
• Oxidation Is Loss (of electrons)
• Reduction Is Gain (of electrons)

OXIDATION STATES (NUMBERS)
Rules for assigning oxidation states:
• Free element: 0
• Monoatomic ion: equals its charge
• O is usually −2 (except in peroxides: −1)
• H is usually +1 (except in metal hydrides: −1)
• Sum of oxidation states in a neutral compound = 0
• Sum in an ion = charge of the ion

OXIDISING and REDUCING AGENTS
• Oxidising agent: gains electrons; is itself reduced. e.g., MnO₄⁻, Cl₂, H₂O₂
• Reducing agent: loses electrons; is itself oxidised. e.g., Zn, Fe, Na₂SO₃

BALANCING REDOX EQUATIONS (Half-Equation Method)
1. Split into two half-equations (oxidation and reduction).
2. Balance atoms (O by adding H₂O, H by adding H⁺, charge by adding e⁻).
3. Multiply half-equations so electrons cancel.
4. Add half-equations together.

EXAMPLE:
Zn + Cu²⁺ → Zn²⁺ + Cu
Oxidation: Zn → Zn²⁺ + 2e⁻
Reduction: Cu²⁺ + 2e⁻ → Cu`, link: "https://www.khanacademy.org/science/chemistry/oxidation-reduction" },

        { name: "Energetics", notes: `THERMOCHEMISTRY — Energy changes in chemical reactions.

ENTHALPY (H)
Heat content of a substance at constant pressure.
ΔH = H_products − H_reactants
• ΔH < 0 (negative): Exothermic — releases heat. Products more stable than reactants.
• ΔH > 0 (positive): Endothermic — absorbs heat.

STANDARD ENTHALPY CHANGES
• ΔHf° (Formation): enthalpy change when 1 mole of compound is formed from its elements in standard state.
• ΔHc° (Combustion): enthalpy change when 1 mole of substance burns completely in excess oxygen.
• ΔHneutralisation: for acid + base → salt + water. Approximately −57 kJ/mol for strong acid + strong base.

HESS'S LAW
"The total enthalpy change for a reaction is the same regardless of the route taken — as long as start and end states are the same."

This allows us to calculate ΔH for reactions that cannot be measured directly.

BOND ENTHALPIES
ΔH_reaction ≈ Σ(bonds broken) − Σ(bonds formed)
• Breaking bonds ABSORBS energy (endothermic).
• Forming bonds RELEASES energy (exothermic).

WORKED EXAMPLE: CH₄ + 2O₂ → CO₂ + 2H₂O  ΔHc° = −890 kJ/mol (exothermic)`, link: "https://byjus.com/chemistry/thermochemistry/" },

        { name: "Electronic Configuration", notes: `QUANTUM MECHANICAL MODEL OF THE ATOM

ENERGY LEVELS AND SUBLEVELS
• n = 1: only 1s sublevel (2 electrons max)
• n = 2: 2s and 2p sublevels (8 electrons max)
• n = 3: 3s, 3p, 3d sublevels (18 electrons max)
• n = 4: 4s, 4p, 4d, 4f sublevels (32 electrons max)

ORBITAL TYPES
• s orbital: spherical; 1 per sublevel (2 e⁻ max)
• p orbital: dumbbell-shaped; 3 per sublevel (6 e⁻ max)
• d orbital: complex shape; 5 per sublevel (10 e⁻ max)
• f orbital: complex shape; 7 per sublevel (14 e⁻ max)

AUFBAU ORDER
1s, 2s, 2p, 3s, 3p, 4s, 3d, 4p, 5s, 4d, 5p, 6s, 4f, 5d...

KEY CONFIGURATIONS (Important Elements)
Fe (Z=26): [Ar] 3d⁶ 4s²   (forms Fe²⁺ and Fe³⁺)
Cu (Z=29): [Ar] 3d¹⁰ 4s¹  (exception: full d orbital is stable)
Cr (Z=24): [Ar] 3d⁵ 4s¹   (exception: half-full d orbital is stable)

RELATIONSHIP TO PERIODIC TABLE
• Period = highest principal quantum number n
• Group → indicates s or p block filling
• Transition metals → d block (Groups 3–12)
• Lanthanides/Actinides → f block`, link: "https://www.khanacademy.org/science/chemistry/atomic-structure-and-properties/electron-configurations-jay-sal/a/electron-configurations-article" },

        { name: "Chemical Bonding", notes: `THREE MAIN TYPES OF CHEMICAL BONDS

1. IONIC BOND
• Formed by TRANSFER of electrons from a metal to a non-metal.
• Example: Na + Cl → Na⁺ + Cl⁻ → NaCl (table salt)
• Properties: High melting points, conduct electricity when dissolved or molten, form crystal lattices.

2. COVALENT BOND
• Formed by SHARING of electrons between non-metal atoms.
• Single bond: Share 1 pair (2e⁻) → e.g., H₂, H-Cl
• Double bond: Share 2 pairs (4e⁻) → e.g., O=O, CO₂
• Triple bond: Share 3 pairs (6e⁻) → e.g., N≡N
• Properties: Lower melting points than ionic; generally poor conductors.

3. METALLIC BOND
• Positive metal ions surrounded by a "sea" of delocalized electrons.
• These free electrons are responsible for electrical and thermal conductivity.

BOND POLARITY & ELECTRONEGATIVITY
• Electronegativity difference < 0.5: Non-polar covalent
• Difference 0.5–1.7: Polar covalent
• Difference > 1.7: Ionic

INTERMOLECULAR FORCES
• Van der Waals / London dispersion: Weakest; in all molecules.
• Dipole-dipole: Between polar molecules.
• Hydrogen bonding: Strongest intermolecular force; between H and N, O, or F.`, link: "https://www.britannica.com/science/chemical-bonding" },

        { name: "Stoichiometry", notes: `THE MOLE CONCEPT
The mole is chemistry's counting unit. 1 mole = 6.022 × 10²³ particles (Avogadro's Number).

KEY FORMULAS
• Number of moles: n = mass (g) / molar mass (g/mol)
• Number of particles: N = n × Nₐ
• Molar mass: Sum of atomic masses of all atoms in the formula.
  H₂O: 2(1) + 16 = 18 g/mol
  NaCl: 23 + 35.5 = 58.5 g/mol

BALANCING CHEMICAL EQUATIONS
Atoms must be conserved.
Example: 2H₂ + O₂ → 2H₂O  ✓   (4H, 2O on each side)

STOICHIOMETRIC CALCULATIONS
Use mole ratios from balanced equations.

Example: N₂ + 3H₂ → 2NH₃
Q: How many grams of NH₃ form from 14 g of N₂?
  n(N₂) = 14/28 = 0.5 mol
  Ratio N₂:NH₃ = 1:2, so n(NH₃) = 2 × 0.5 = 1.0 mol
  Mass of NH₃ = 1.0 × 17 = 17 g

LIMITING REAGENT
The reagent that is completely consumed first.
  Check: Which reagent produces less product? That is the limiting reagent.

PERCENTAGE YIELD
  % yield = (actual yield / theoretical yield) × 100%`, link: "https://byjus.com/jee/stoichiometry-and-stoichiometric-calculations/" },

        { name: "Acids and Bases", notes: `THREE DEFINITIONS

1. ARRHENIUS (1884)
  • Acid: Produces H⁺ ions in water. e.g., HCl → H⁺ + Cl⁻
  • Base: Produces OH⁻ ions in water. e.g., NaOH → Na⁺ + OH⁻

2. BRØNSTED-LOWRY (1923)
  • Acid: Proton (H⁺) DONOR.
  • Base: Proton (H⁺) ACCEPTOR.
  • Introduces conjugate acid-base pairs.

3. LEWIS (1923)
  • Acid: Electron pair ACCEPTOR. e.g., BF₃, AlCl₃
  • Base: Electron pair DONOR. e.g., NH₃, H₂O

THE pH SCALE
pH = −log[H⁺]
• pH 0–6: Acidic    •  pH 7: Neutral    •  pH 8–14: Basic/Alkaline
pH + pOH = 14 (at 25°C)

STRONG vs WEAK ACIDS & BASES
• Strong acid: Completely dissociates. e.g., HCl, H₂SO₄, HNO₃
• Weak acid: Partially dissociates. e.g., CH₃COOH (acetic acid)
• Strong base: Completely dissociates. e.g., NaOH, KOH

NEUTRALISATION REACTION
Acid + Base → Salt + Water
HCl + NaOH → NaCl + H₂O

INDICATORS
• Litmus: Red in acid, blue in base
• Phenolphthalein: Colourless in acid, pink in base`, link: "https://www.britannica.com/science/acid-base-reaction" },

        { name: "Reaction Kinetics", notes: `DEFINITION
Chemical kinetics is the study of reaction rates — how fast reactions proceed and what factors affect speed.

REACTION RATE
Rate = change in concentration / change in time
  Rate = −Δ[Reactant]/Δt = +Δ[Product]/Δt
Units: mol·L⁻¹·s⁻¹

RATE LAW (Rate Equation)
For a reaction: aA + bB → Products
  Rate = k[A]^m[B]^n
• k = rate constant (depends only on temperature)
• m + n = overall order of reaction

FACTORS AFFECTING REACTION RATE
1. CONCENTRATION: Higher concentration → more collisions → faster rate.
2. TEMPERATURE: Higher temperature → more kinetic energy → faster rate.
3. SURFACE AREA: Smaller particle size → more surface exposed → faster reaction.
4. CATALYSTS: Lower the activation energy → faster rate without being consumed.
5. PRESSURE (for gases): Higher pressure ≈ higher concentration → faster rate.

HALF-LIFE (t½)
Time for concentration of reactant to halve.
• First order: t½ = ln2 / k = 0.693 / k  (constant, independent of initial concentration)`, link: "https://www.britannica.com/science/reaction-rate" },

        { name: "Electrolysis", notes: `DEFINITION
Electrolysis is the process of using electrical energy to drive a non-spontaneous chemical reaction, causing decomposition of compounds.

KEY COMPONENTS
• Electrolyte: Solution or molten ionic compound that conducts electricity.
• Cathode (−): Electrode connected to negative terminal. REDUCTION occurs here.
• Anode (+): Electrode connected to positive terminal. OXIDATION occurs here.

MNEMONIC: PANIC
• Positive Anode, Negative Is Cathode

ELECTRODE REACTIONS

At Cathode (reduction):
  Cu²⁺ + 2e⁻ → Cu   (copper deposition)
  2H⁺ + 2e⁻ → H₂   (hydrogen gas)

At Anode (oxidation):
  2Cl⁻ → Cl₂ + 2e⁻   (chlorine gas)
  2H₂O → O₂ + 4H⁺ + 4e⁻   (oxygen gas)

FARADAY'S LAWS
• First: Mass of substance deposited ∝ charge passed (Q = It)
• Second: Masses deposited by same charge ∝ equivalent mass

Formula: m = (Q × M) / (n × F)
  m = mass (g), Q = charge (C), M = molar mass, n = electrons transferred, F = 96500 C/mol

INDUSTRIAL APPLICATIONS
• Electroplating: coating metals (e.g., chrome plating, gold plating)
• Extraction of aluminium (Hall-Héroult process)
• Chlor-alkali process: produces NaOH, Cl₂, H₂ from brine`, link: "https://www.bbc.co.uk/bitesize/guides/zqdw7hv/revision/1" },

        { name: "Chemical Equilibrium", notes: `DEFINITION
A reaction reaches equilibrium when the rate of forward reaction equals the rate of the reverse reaction, and concentrations of reactants and products remain constant.

THE EQUILIBRIUM CONSTANT (Kc)
For: aA + bB ⇌ cC + dD
  Kc = [C]^c [D]^d / [A]^a [B]^b

• Kc > 1: Products favoured at equilibrium.
• Kc < 1: Reactants favoured at equilibrium.

LE CHATELIER'S PRINCIPLE
"If a system at equilibrium is disturbed, it will shift to counteract the disturbance."

Effect of changes:
• CONCENTRATION: Increase reactant → shifts RIGHT (more products). Decrease → shifts LEFT.
• TEMPERATURE: Increase T → favours endothermic direction.
• PRESSURE: Increase P → shifts toward side with FEWER moles of gas.
• CATALYST: Reaches equilibrium FASTER but does NOT change Kc.

HABER PROCESS (industrial NH₃ synthesis)
N₂(g) + 3H₂(g) ⇌ 2NH₃(g)   ΔH = −92 kJ/mol

Conditions: 450°C, 200 atm, Fe catalyst.
• High P favours product (fewer moles of gas on right).
• Low T favours product (exothermic) but reaction too slow; 450°C is a compromise.`, link: "https://www.chemguide.co.uk/physical/equilibria/writing.html" }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  COS101 — COMPUTER SCIENCE I

"COS101": {
    name: "Computer Science",
    resourceKey: "COS",
    topics: [
        { name: "History of Computers", notes: `PRE-COMPUTER ERA
• Abacus (~2400 BC): Earliest counting device.
• Blaise Pascal's Pascaline (1642): First mechanical adding machine.
• Charles Babbage's Analytical Engine (1837): Conceptual mechanical general-purpose computer.
• Ada Lovelace: Wrote the first algorithm for Babbage's Analytical Engine — first programmer.

GENERATIONS OF COMPUTERS

GENERATION 1 (1940s–1950s) — Vacuum Tubes
• Room-sized, extremely hot, very slow. Examples: ENIAC (1946), UNIVAC.

GENERATION 2 (1950s–1960s) — Transistors
• Smaller, cheaper, faster. High-level languages: COBOL, FORTRAN.

GENERATION 3 (1960s–1970s) — Integrated Circuits (ICs)
• Multiple transistors on a single silicon chip. IBM System/360.

GENERATION 4 (1970s–present) — Microprocessors
• Entire CPU on a single chip (Intel 4004, 1971). Personal computers, Internet era.

GENERATION 5 (present & future) — AI & Parallel Processing
• Artificial Intelligence, Machine Learning, Quantum Computing.`, link: "https://www.britannica.com/technology/computer/History-of-computing" },

        { name: "Basic components of computer", notes: `THE VON NEUMANN ARCHITECTURE
Most modern computers are based on John von Neumann's 1945 model:
CPU + Memory + Input/Output devices, connected by a bus.

1. CENTRAL PROCESSING UNIT (CPU) — "The Brain"
• ALU (Arithmetic Logic Unit): Performs mathematical and logical operations.
• Control Unit (CU): Fetches, decodes, and executes instructions.
• Registers: Ultra-fast tiny storage inside CPU.

2. MEMORY
• RAM (Random Access Memory): Temporary, volatile storage.
• ROM (Read-Only Memory): Permanent, non-volatile. Contains BIOS/firmware.
• Cache Memory: Very fast memory between CPU and RAM.

3. STORAGE (Secondary Memory)
• HDD (Hard Disk Drive): Magnetic, slower but cheaper.
• SSD (Solid State Drive): Flash memory, much faster.

4. INPUT DEVICES
Keyboard, Mouse, Touchscreen, Scanner, Microphone, Camera.

5. OUTPUT DEVICES
Monitor/Display, Printer, Speaker, Projector.

6. THE BUS SYSTEM
• Data Bus: Carries actual data.
• Address Bus: Carries memory addresses.
• Control Bus: Carries control signals.`, link: "https://www.apu.apus.edu/area-of-study/information-technology/resources/basic-components-of-a-computer/" },

        { name: "Algorithms & Flowcharts", notes: `WHAT IS AN ALGORITHM?
A finite, ordered set of well-defined instructions to solve a specific problem.

PROPERTIES OF A GOOD ALGORITHM
• Correctness: Produces the right answer.
• Efficiency: Uses minimal time and memory.
• Clarity: Easy to understand and implement.
• Generality: Works for a range of inputs.

FLOWCHARTS — Standard Symbols
• Oval (Terminator): Start / End
• Parallelogram: Input / Output
• Rectangle: Process (computation)
• Diamond: Decision (Yes/No branch)
• Arrow: Direction of flow

FLOWCHART EXAMPLE — Find largest of 2 numbers:
[Start] → [Input A, B] → <A > B?> → Yes → [Print A] → [End]
                                   → No  → [Print B] → [End]

PSEUDOCODE EXAMPLE — Find largest of three numbers:
  INPUT A, B, C
  IF A > B AND A > C THEN
    PRINT "A is largest"
  ELSE IF B > C THEN
    PRINT "B is largest"
  ELSE
    PRINT "C is largest"
  END IF

ALGORITHM COMPLEXITY (Big-O)
• O(1): Constant   O(log n): Logarithmic   O(n): Linear
• O(n log n): Log-linear   O(n²): Quadratic   O(2ⁿ): Exponential`, link: "https://www.geeksforgeeks.org/fundamentals-of-algorithms/" },

        { name: "FORTRAN", notes: `WHAT IS FORTRAN?
FORTRAN (FORmula TRANslation) was the first high-level programming language, developed by IBM's John Backus team between 1954–1957.

WHY FORTRAN WAS REVOLUTIONARY
• Before FORTRAN, programmers wrote in assembly language — very tedious and machine-specific.
• FORTRAN allowed scientists and engineers to write programs using mathematical notation close to their own.
• It proved that high-level languages were practical and efficient.

KEY FEATURES
• Originally designed for scientific and numerical computing.
• Strong support for arrays and matrix operations.
• Compiled language — translated to machine code for fast execution.

GENERATIONS OF FORTRAN
• FORTRAN I (1957): First version — used on IBM 704.
• FORTRAN II (1958): Added subroutines.
• FORTRAN IV / FORTRAN 66: First standard.
• FORTRAN 77: Structured programming (IF-THEN-ELSE, DO loops).
• Fortran 90/95/2003/2008: Modern features (free form, modules, object-oriented features).

BASIC FORTRAN SYNTAX (FORTRAN 77 style)
      PROGRAM HELLO
      PRINT *, 'Hello, World!'
      END

LEGACY
• Still used today in weather forecasting, climate modelling, and physics simulations.
• Many high-performance numerical libraries (BLAS, LAPACK) are written in Fortran.`, link: "https://www.britannica.com/technology/FORTRAN" },

        { name: "Data Structures", notes: `WHAT IS A DATA STRUCTURE?
A way of organising and storing data in a computer so that it can be accessed and modified efficiently.

ARRAYS
• Fixed-size, ordered collection of elements of the same type.
• Access by index: O(1). Search: O(n). Insert/Delete in middle: O(n).

LINKED LISTS
• Dynamic chain of nodes; each node has data + pointer to next node.
• Types: Singly, Doubly, Circular.

STACKS
• LIFO (Last In, First Out).
• Operations: push (add to top), pop (remove from top).
• Applications: Undo functionality, function call stack.

QUEUES
• FIFO (First In, First Out).
• Operations: enqueue (add to rear), dequeue (remove from front).
• Applications: Print queues, CPU scheduling.

TREES
• Hierarchical structure with a root node and child nodes.
• Binary Search Tree (BST): Left child < root < right child. Search: O(log n) average.

GRAPHS
• Nodes (vertices) connected by edges.
• Applications: Social networks, maps (Google Maps), internet routing.
• Traversal: BFS (Breadth-First Search), DFS (Depth-First Search).

HASH TABLES
• Key-value pairs; uses a hash function to map keys to storage locations.
• Average access: O(1) — extremely fast.`, link: "https://www.geeksforgeeks.org/data-structures/" },

        { name: "Hardware & Software", notes: `HARDWARE
Physical components of a computer system that you can touch.

CATEGORIES OF HARDWARE
• Input hardware: Keyboard, mouse, scanner, microphone, camera, touchscreen
• Processing hardware: CPU (Central Processing Unit), GPU (Graphics Processing Unit)
• Output hardware: Monitor, printer, speakers, projector
• Storage hardware: HDD, SSD, USB flash drive, optical disc (CD/DVD)
• Communication hardware: Network card (NIC), Wi-Fi adapter, modem, router

SOFTWARE
Programs and operating instructions that run on hardware.

CATEGORIES OF SOFTWARE
1. SYSTEM SOFTWARE
   • Operating System (OS): manages all hardware and software resources.
   • Examples: Windows, Linux, macOS, Android, iOS
   • Device Drivers: allow OS to communicate with specific hardware.
   • Utilities: disk cleanup, antivirus, file management tools.

2. APPLICATION SOFTWARE
   • Programs designed for end-users to perform specific tasks.
   • Productivity: Microsoft Office, Google Docs
   • Educational: MATLAB, simulators
   • Entertainment: games, media players

3. PROGRAMMING TOOLS
   • Compilers, interpreters, IDEs, debuggers

HARDWARE vs SOFTWARE RELATIONSHIP
• Software provides instructions; hardware executes them.
• Neither is useful without the other.`, link: "https://www.britannica.com/technology/computer-hardware" },

        { name: "Programming Fundamentals", notes: `CORE CONCEPTS

1. VARIABLES & DATA TYPES
• Integer (int): Whole numbers → 5, −3, 100
• Float/Double: Decimal numbers → 3.14, −0.5
• String (str): Text → "Hello", "Lagos"
• Boolean (bool): True or False only

2. OPERATORS
• Arithmetic: +, −, ×, ÷, % (modulo)
• Comparison: == (equal), != (not equal), >, <, >=, <=
• Logical: AND, OR, NOT

3. CONTROL STRUCTURES (Decision Making)
IF / ELSE IF / ELSE:
  if (age >= 18):
      print("Adult")
  elif (age >= 13):
      print("Teenager")
  else:
      print("Child")

4. LOOPS (Repetition)
For Loop: for i in range(1, 6): print(i)   # Prints 1 to 5

While Loop:
  count = 0
  while count < 5:
      print(count)
      count += 1

5. FUNCTIONS (Reusable blocks of code)
  def add(a, b):
      return a + b
  result = add(3, 7)   # result = 10

PROGRAMMING PARADIGMS
• Procedural: Step-by-step instructions (C, Pascal)
• Object-Oriented (OOP): Classes and objects (Java, Python, C++)`, link: "https://www.w3schools.com/python/python_intro.asp" },

        { name: "Operating Systems", notes: `WHAT IS AN OPERATING SYSTEM (OS)?
Software that acts as an intermediary between the user/applications and the computer hardware.

FUNCTIONS OF AN OS
1. PROCESS MANAGEMENT: Creates, schedules, and terminates processes.
2. MEMORY MANAGEMENT: Allocates and deallocates RAM to processes.
3. FILE SYSTEM MANAGEMENT: Organises data in files and directories.
4. DEVICE MANAGEMENT: Controls input/output devices via device drivers.
5. SECURITY & PROTECTION: User authentication, access control, firewall.
6. USER INTERFACE: Provides CLI (Command Line Interface) or GUI.

TYPES OF OPERATING SYSTEMS
• Multi-tasking: Runs multiple programs simultaneously (Windows, Linux, macOS).
• Multi-user: Multiple users access resources simultaneously (Linux servers).
• Real-time OS (RTOS): For time-critical systems (medical devices, aircraft controls).
• Mobile OS: Android (Linux-based), iOS (Unix-based).

POPULAR OPERATING SYSTEMS
• Windows (Microsoft): Most common for personal/business computers.
• Linux (Open-source): Servers, development, Android.
• macOS (Apple): Unix-based, used on Apple Mac computers.

KEY CONCEPTS
• KERNEL: The core of the OS; has direct access to hardware.
• PROCESS vs THREAD: Process = independent running program; Thread = smaller unit within a process.
• DEADLOCK: When two processes each wait for the other to release a resource.
• VIRTUAL MEMORY: Uses disk storage as an extension of RAM.`, link: "https://www.geeksforgeeks.org/introduction-of-operating-system-set-1/" }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  STA111 — STATISTICS I
// ═══════════════════════════════════════════════════════════════
"STA111": {
    name: "Statistics",
    resourceKey: "STA",
    topics: [
        { name: "Data Collection", notes: `WHAT IS DATA?
Data is raw facts and figures gathered for analysis.

TYPES OF DATA
• Qualitative (Categorical): Non-numerical; describes categories.
  Examples: Gender (male/female), Colour, Religion.
• Quantitative (Numerical): Measurable numbers.
  • Discrete: Countable. e.g., Number of students.
  • Continuous: Any value in a range. e.g., Height, Weight.
• Primary Data: Collected directly by the researcher.
  Methods: Surveys, experiments, interviews, observation.
• Secondary Data: Already collected by someone else.

DATA COLLECTION METHODS

1. QUESTIONNAIRE/SURVEY
• Open-ended (free response) or Closed-ended (multiple choice).
• Advantages: Cheap, fast, can reach many people.

2. INTERVIEWS
• Structured (fixed questions) or Unstructured (flexible).

3. OBSERVATION
• Researcher watches and records behaviour.

4. EXPERIMENT
• Researcher manipulates an independent variable and measures effect.

SAMPLING METHODS
• Simple Random Sampling: Every member has equal chance of selection.
• Stratified Sampling: Population divided into strata; sample taken from each.
• Systematic Sampling: Every kth member selected from a list.
• Cluster Sampling: Entire clusters selected randomly.
• Convenience Sampling: Easiest to reach — prone to bias.`, link: "https://byjus.com/maths/data-collection-methods/" },

        { name: "Measures of Central Tendency", notes: `PURPOSE
Measures of central tendency describe the "centre" or "typical value" of a dataset.

1. MEAN (Arithmetic Mean)
Mean (x̄) = Σx / n   where Σx = sum of all values, n = number of values

Example: Data = {5, 8, 12, 15, 20}
  Mean = (5+8+12+15+20) / 5 = 60 / 5 = 12

• Strength: Uses all data values; most common measure.
• Weakness: Affected by extreme values (outliers).

2. MEDIAN
The middle value when data is arranged in ascending order.
  • If n is odd: Median = the ((n+1)/2)th value
  • If n is even: Median = average of (n/2)th and (n/2+1)th values

Example (odd): {3, 7, 9, 12, 15} → Median = 9
Example (even): {3, 7, 9, 12} → Median = (7+9)/2 = 8

• Strength: Not affected by outliers.

3. MODE
The value that appears most frequently.

Example: {3, 7, 7, 12, 15, 7, 3} → Mode = 7

• Strength: Only measure that works for categorical data.

WHICH MEASURE TO USE?
• Symmetric data without outliers: Mean
• Skewed data or outliers present: Median
• Categorical data or finding most popular: Mode`, link: "https://byjus.com/maths/central-tendency/" },

        { name: "Probability Theory", notes: `DEFINITION
P(Event) = Number of favourable outcomes / Total number of equally likely outcomes
Range: 0 ≤ P(E) ≤ 1

KEY TERMINOLOGY
• Experiment: An action with uncertain outcome (rolling a die).
• Sample Space (S): All possible outcomes. e.g., S = {1,2,3,4,5,6} for a die.
• Event (E): A subset of the sample space.
• Complement (E'): All outcomes NOT in E. P(E') = 1 − P(E)

FUNDAMENTAL RULES

ADDITION RULE:
P(A ∪ B) = P(A) + P(B) − P(A ∩ B)
• If A and B are mutually exclusive: P(A ∪ B) = P(A) + P(B)

MULTIPLICATION RULE:
• If A and B are independent: P(A ∩ B) = P(A) × P(B)
• If A and B are dependent: P(A ∩ B) = P(A) × P(B|A)

CONDITIONAL PROBABILITY:
P(A|B) = P(A ∩ B) / P(B)

BAYES' THEOREM:
P(A|B) = [P(B|A) × P(A)] / P(B)

WORKED EXAMPLES
Q: A bag has 3 red and 5 blue balls. P(drawing 2 red balls without replacement)?
  P(1st red) = 3/8
  P(2nd red | 1st red) = 2/7
  P(both red) = 3/8 × 2/7 = 3/28`, link: "https://utstat.utoronto.ca/mikevans/jeffrosenthal/book.pdf" },

        { name: "Errors and Approximation", notes: `TYPES OF ERRORS IN MEASUREMENT

1. SYSTEMATIC ERRORS (Bias)
• Errors that consistently occur in the same direction.
• Caused by: Faulty instruments, poor calibration.
• Cannot be reduced by taking more measurements; must be corrected at the source.

2. RANDOM ERRORS
• Unpredictable fluctuations around the true value.
• Can be reduced by taking more measurements and averaging.

3. GROSS ERRORS (Blunders)
• Mistakes made by the experimenter; usually obvious outliers.

MEASURES OF ERROR
• Absolute Error: |True value − Measured value|
• Relative Error: Absolute Error / True Value
• Percentage Error: Relative Error × 100%

Example: True = 10 kg, Measured = 10.3 kg
  Absolute Error = 0.3 kg
  Relative Error = 0.3/10 = 0.03
  Percentage Error = 3%

APPROXIMATION METHODS

ROUNDING:
• Round to n decimal places: 3.14159 → 3.14 (2 d.p.)
• Round to n significant figures: 3.14159 → 3.142 (4 s.f.)

SIGNIFICANT FIGURES RULES:
• All non-zero digits are significant.
• Zeros between non-zero digits: significant.
• Leading zeros: NOT significant.
• Trailing zeros after decimal: Significant.`, link: "https://byjus.com/maths/absolute-and-relative-error/" }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  STA121 — STATISTICS (Advanced)
// ═══════════════════════════════════════════════════════════════
"STA121": {
    name: "Statistics",
    resourceKey: "STA",
    topics: [
        { name: "Population and sample", notes: `POPULATION
The population is the entire group that a researcher wants to study.
A census studies the ENTIRE population.

SAMPLE
A sample is a subset of the population, selected to represent the whole.
Key requirement: The sample must be REPRESENTATIVE of the population.

WHY SAMPLE INSTEAD OF CENSUS?
• Cost: Studying every individual is often prohibitively expensive.
• Time: Sampling is much faster.
• Practicality: Some populations are infinite or inaccessible.

KEY TERMS
• Parameter: A numerical characteristic of the POPULATION (often unknown). e.g., μ.
• Statistic: A numerical characteristic calculated from the SAMPLE. e.g., x̄.
• Sampling Frame: The actual list of all members of the population.
• Sampling Bias: When the sample systematically over- or under-represents certain groups.

SAMPLE SIZE CONSIDERATIONS
• Larger samples: More accurate (less sampling error) but more expensive.
• General rule: n ≥ 30 for the Central Limit Theorem to apply.`, link: "https://byjus.com/maths/population-and-sample/" },

        { name: "Sample distribution and proportion", notes: `SAMPLING DISTRIBUTION
A sampling distribution is the probability distribution of a statistic (like x̄) computed from many different samples of the same size from the same population.

THE CENTRAL LIMIT THEOREM (CLT) — Most Important Theorem in Statistics
"Regardless of the shape of the population distribution, the sampling distribution of the sample mean (x̄) will be approximately normally distributed when the sample size n is large enough (n ≥ 30)."

Properties of the sampling distribution of x̄:
• Mean: μ_x̄ = μ  (same as population mean)
• Standard Error: σ_x̄ = σ/√n
• Shape: Approximately Normal (for n ≥ 30)

STANDARD ERROR (SE)
SE = σ/√n
• As n increases, SE decreases → more precise estimates.

SAMPLE PROPORTION (p̂)
  p̂ = x/n   (x = number with characteristic, n = sample size)

Sampling distribution of p̂:
  Mean: μ_p̂ = p  (true population proportion)
  Standard Error: SE_p̂ = √[p(1−p)/n]`, link: "https://www.geeksforgeeks.org/maths/sampling-distribution/" },

        { name: "Regression and correlation", notes: `CORRELATION
Correlation measures the STRENGTH and DIRECTION of the linear relationship between two variables.

Pearson Correlation Coefficient (r):
  Range: −1 ≤ r ≤ 1
  r = +1: Perfect positive linear relationship
  r = 0: No linear relationship
  r = −1: Perfect negative linear relationship

IMPORTANT: Correlation does NOT imply causation!

SIMPLE LINEAR REGRESSION
  Ŷ = a + bX
  b (slope) = Σ[(x−x̄)(y−ȳ)] / Σ(x−x̄)²
  a (y-intercept) = ȳ − b·x̄

COEFFICIENT OF DETERMINATION (R²)
  R² = r²
  Interpretation: The proportion of variation in Y explained by X.
  e.g., R² = 0.81 means X explains 81% of the variation in Y.`, link: "https://byjus.com/maths/correlation-and-regression/" },

        { name: "Probability and elementary time analysis", notes: `POISSON DISTRIBUTION
Models the number of events occurring in a fixed time interval at a constant average rate.

PMF: P(X = k) = (e^(−λ) × λᵏ) / k!
Properties: Mean = λ   |   Variance = λ

WORKED EXAMPLE (Poisson)
On average, 3 customers arrive per minute (λ=3).
P(exactly 5 arrive in a minute) = e^(−3) × 3⁵ / 5! ≈ 10.1%

EXPONENTIAL DISTRIBUTION
Models the TIME BETWEEN consecutive Poisson events.
  PDF: f(x) = λe^(−λx)   for x ≥ 0
  CDF: P(X ≤ x) = 1 − e^(−λx)
  Mean = 1/λ  |  Variance = 1/λ²
  Memoryless property: Past waiting time does not affect future waiting time.

APPLICATIONS
• Reliability engineering: Time between machine failures
• Queuing theory: Customer service waiting times`, link: "https://byjus.com/ncert-solutions-class-10-maths/chapter-15-probability/" },

        { name: "Hypothesis Testing", notes: `WHAT IS HYPOTHESIS TESTING?
A formal statistical procedure for making decisions about a population parameter based on sample data.

THE TWO HYPOTHESES
• Null Hypothesis (H₀): The default position — assumes NO effect.
• Alternative Hypothesis (H₁): What we want to prove.

SIGNIFICANCE LEVEL (α)
α = 0.05 (5%) or α = 0.01 (1%) — the probability of wrongly rejecting H₀.

THE FIVE STEPS
1. State H₀ and H₁.
2. Choose significance level α and test statistic.
3. Calculate the test statistic from sample data.
4. Find the p-value (or compare to critical value).
5. Decision: If p-value < α → Reject H₀.

THE p-VALUE
• Small p-value (< α): Evidence AGAINST H₀ → Reject H₀.
• Large p-value (≥ α): Insufficient evidence against H₀.

TYPES OF ERRORS
• Type I Error (α): Rejecting H₀ when it is TRUE. (False Positive)
• Type II Error (β): Failing to reject H₀ when it is FALSE. (False Negative)
• Power (1−β): Probability of correctly rejecting a false H₀.

COMMON TEST STATISTICS
• z-test: Large sample (n≥30), known σ. z = (x̄−μ₀) / (σ/√n)
• t-test: Small sample (n<30), unknown σ. t = (x̄−μ₀) / (s/√n)  [df = n−1]
• χ²-test: For categorical data, goodness-of-fit, independence.`, link: "https://www.geeksforgeeks.org/software-testing/understanding-hypothesis-testing/" }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  BIO101 — BIOLOGY I
// ═══════════════════════════════════════════════════════════════
"BIO101": {
    name: "Biology",
    resourceKey: "BIO",
    topics: [
        { name: "The Cell", notes: `CELL THEORY
1. All living things are made of one or more cells.
2. The cell is the basic unit of life.
3. All cells arise from pre-existing cells (Virchow, 1855).

PROKARYOTIC vs EUKARYOTIC CELLS

PROKARYOTIC (No membrane-bound nucleus)
• DNA floats freely in cytoplasm.
• No membrane-bound organelles.
• Examples: Bacteria, Archaea.

EUKARYOTIC (True membrane-bound nucleus)
• Membrane-bound organelles present.
• Examples: Animal, plant, fungal, and protist cells.

KEY ORGANELLES
• Nucleus: Contains DNA; controls cell activities.
• Mitochondria: "Powerhouse" — produces ATP via cellular respiration.
• Ribosome: Site of protein synthesis.
• Rough ER: Synthesises and transports proteins.
• Golgi Apparatus: Packages, modifies, and ships proteins/lipids.
• Lysosome: Contains digestive enzymes; breaks down waste.
• Chloroplast: In plant cells only; site of photosynthesis.
• Cell Membrane: Phospholipid bilayer; controls what enters and exits the cell.
• Cell Wall: In plants (cellulose), fungi, bacteria; structural support.

CELL TRANSPORT
• Passive (no energy): Diffusion, Osmosis, Facilitated diffusion.
• Active (needs ATP energy): Active transport, Endocytosis, Exocytosis.`, link: "https://www.britannica.com/science/cell-theory" },

        { name: "Cell Division", notes: `WHY DO CELLS DIVIDE?
• Growth: Increasing number of cells allows organisms to grow.
• Repair and replacement: Replacing dead or damaged cells.
• Reproduction: Producing new organisms.

THE CELL CYCLE
G₁ (Growth 1) → S (DNA Synthesis/Replication) → G₂ (Growth 2) → M (Mitosis/Meiosis)

DNA REPLICATION (during S phase)
• Each strand of the double helix serves as a template.
• DNA polymerase builds new complementary strands.
• Result: 2 identical DNA molecules from 1.
• Base pairing: A–T and G–C

MITOSIS
Division of somatic (body) cells → 2 identical diploid daughter cells.
Stages: PMAT — Prophase, Metaphase, Anaphase, Telophase.

MEIOSIS
Division of reproductive cells → 4 genetically unique haploid gametes.
Occurs in gonads (testes, ovaries).

KEY DIFFERENCE
• Mitosis: 2n → 2n (same chromosome number, same genetics — for growth/repair)
• Meiosis: 2n → n  (halved chromosome number — for sexual reproduction)`, link: "https://www.khanacademy.org/science/biology/cellular-molecular-biology/mitosis/a/cell-cycle-and-cell-division" },

        { name: "Mitosis and Meiosis", notes: `MITOSIS — STAGES (PMAT)

1. PROPHASE
• Chromatin condenses into visible chromosomes.
• Nuclear envelope breaks down.
• Spindle fibres form.

2. METAPHASE
• Chromosomes align at the cell's equator (metaphase plate).
• Spindle fibres attach to centromeres.

3. ANAPHASE
• Sister chromatids separate and are pulled to opposite poles.
• Cell begins to elongate.

4. TELOPHASE + CYTOKINESIS
• Nuclear envelopes reform around each set of chromosomes.
• Cytoplasm divides (cytokinesis).
• Result: 2 identical diploid cells.

MEIOSIS — TWO DIVISIONS
MEIOSIS I (Reduction Division):
• Homologous chromosome pairs line up and then separate.
• Results in 2 haploid cells (n).
• CROSSING OVER occurs in Prophase I — creates genetic variation.

MEIOSIS II (Like mitosis):
• Sister chromatids separate.
• Results in 4 haploid cells.

COMPARISON
Feature      | Mitosis       | Meiosis
-------------|---------------|-------------
Purpose      | Growth/Repair | Sexual Repro.
Result       | 2 diploid     | 4 haploid
Divisions    | 1             | 2
Genetic result| Identical    | Varied`, link: "https://www.khanacademy.org/science/biology/cellular-molecular-biology/meiosis/a/meiosis-review" },

        { name: "Genetics", notes: `GREGOR MENDEL — "Father of Genetics"
Austrian monk who conducted pea plant experiments (1860s).

MENDEL'S FIRST LAW — Law of Segregation
• Each organism has two alleles for each trait (one from each parent).
• During gamete formation (meiosis), these alleles separate — each gamete carries only one allele.

MENDEL'S SECOND LAW — Law of Independent Assortment
• Genes for different traits are distributed to gametes independently.

KEY TERMS
• Gene: A segment of DNA that codes for a specific trait.
• Allele: Different versions of the same gene.
• Dominant allele: Expressed whenever present (capital letter).
• Recessive allele: Only expressed when two copies present (bb).
• Genotype: Genetic makeup (e.g., BB, Bb, bb).
• Phenotype: Physical appearance/expression.

PUNNETT SQUARE EXAMPLE
Cross: Bb × Bb
  Phenotype ratio: 3 Brown : 1 Blue

DNA STRUCTURE
• Double helix (Watson & Crick, 1953).
• Base pairing: A–T  and  C–G
• Central Dogma: DNA → RNA (Transcription) → Protein (Translation)`, link: "https://medlineplus.gov/ency/article/002048.htm" },

        { name: "Taxonomy", notes: `TAXONOMY
The science of classifying organisms, developed by Carl Linnaeus.

HIERARCHICAL CLASSIFICATION (broadest to narrowest):
Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species

MNEMONIC: "Dear King Philip Came Over For Good Soup"

THREE DOMAINS (Woese System)
1. Bacteria: Prokaryotes (eubacteria)
2. Archaea: Prokaryotes (extremophiles)
3. Eukarya: All eukaryotes

FIVE KINGDOMS (Whittaker)
1. Monera: Bacteria, Cyanobacteria (prokaryotes)
2. Protista: Amoeba, Paramecium (unicellular eukaryotes)
3. Fungi: Moulds, mushrooms, yeasts
4. Plantae: All plants
5. Animalia: All animals

BINOMIAL NOMENCLATURE
Each organism has a two-part Latin name: Genus species
• Homo sapiens (humans)
• Panthera leo (lion)
• Rules: Genus capitalised; species lowercase; italicised.

CHARACTERISTICS USED FOR CLASSIFICATION
• Cell type (prokaryotic vs eukaryotic)
• Cell wall composition
• Nutrition mode (autotrophic vs heterotrophic)
• Reproductive method
• Body organisation
• Evolutionary relationships (phylogeny)`, link: "https://www.khanacademy.org/science/biology/her/tree-of-life/a/overview-of-taxonomy" },

        { name: "Ecology", notes: `WHAT IS ECOLOGY?
Ecology is the scientific study of the interactions between organisms and their environment.

LEVELS OF ECOLOGICAL ORGANISATION
1. Individual organism
2. Population: All individuals of the same species in an area.
3. Community: All populations of different species in an area.
4. Ecosystem: Community + its abiotic environment.
5. Biome: Large geographic area with characteristic climate.
6. Biosphere: All ecosystems on Earth combined.

ENERGY FLOW IN ECOSYSTEMS
• Producers (Autotrophs): Make their own food via photosynthesis.
• Primary Consumers (Herbivores): Eat producers.
• Secondary Consumers (Carnivores): Eat primary consumers.
• Decomposers: Break down dead matter (fungi, bacteria).

FOOD CHAIN (West African savanna):
Grass → Grasshopper → Lizard → Eagle

10% RULE: Only ~10% of energy is transferred from one trophic level to the next.

BIOGEOCHEMICAL CYCLES
• Carbon Cycle: Photosynthesis, respiration, decomposition, combustion.
• Nitrogen Cycle: Nitrogen fixation (Rhizobium bacteria), nitrification, denitrification.
• Water Cycle: Evaporation, transpiration, condensation, precipitation.

ECOLOGICAL RELATIONSHIPS
• Mutualism (+/+): Both benefit. e.g., Bees and flowers.
• Parasitism (+/−): One benefits, other harmed. e.g., Tapeworm in intestines.
• Competition (−/−): Both harmed by shared resource.`, link: "https://byjus.com/biology/ecology/" },

        { name: "Mutation", notes: `DEFINITION
A mutation is a permanent change in the DNA sequence of an organism.

TYPES OF MUTATIONS

GENE (POINT) MUTATIONS — Changes within a single gene:
• Substitution: One nucleotide replaced by another.
  - Silent: No change in amino acid.
  - Missense: Different amino acid → altered protein.
  - Nonsense: Stop codon created → shortened protein.
• Insertion: Extra nucleotide added → frameshift.
• Deletion: Nucleotide removed → frameshift.

CHROMOSOMAL MUTATIONS — Changes affecting chromosome structure:
• Deletion: Segment of chromosome lost.
• Duplication: Segment duplicated.
• Inversion: Segment reversed.
• Translocation: Segment moves to a different chromosome.

CHROMOSOMAL NUMBER MUTATIONS:
• Polyploidy: Extra sets of chromosomes (common in plants, e.g., wheat is hexaploid).
• Aneuploidy: Abnormal number of one chromosome.
  - Trisomy 21: Three copies of chromosome 21 → Down syndrome.

CAUSES OF MUTATIONS (Mutagens)
• Physical: UV radiation, X-rays, gamma rays.
• Chemical: Benzene, formaldehyde, tobacco compounds.
• Biological: Certain viruses can integrate DNA into host genome.

SIGNIFICANCE
• Most mutations are neutral; some are harmful; rare ones are beneficial and drive evolution.
• Cancer is caused by mutations in genes controlling cell growth.`, link: "https://www.khanacademy.org/science/biology/dna-as-the-genetic-material/dna-replication/a/mutations-dna-and-evolution" },

        { name: "Adaptation", notes: `DEFINITION
An adaptation is any heritable characteristic that increases an organism's ability to survive and reproduce in its environment. Adaptations evolve through natural selection over many generations.

TYPES OF ADAPTATIONS

1. STRUCTURAL ADAPTATIONS (Physical features)
• Camel's hump: Stores fat for energy; feet are wide for walking on sand.
• Cactus: Thick stem stores water; spines for protection and reduce water loss.
• Fish's streamlined body: Reduces water resistance for efficient swimming.
• Giraffe's long neck: Reaches leaves high in trees.

2. PHYSIOLOGICAL ADAPTATIONS (Biochemical/internal processes)
• Deep-sea fish produce their own light (bioluminescence).
• Arctic animals produce antifreeze proteins to prevent ice crystal formation.
• Sickle cell trait (partial protection against malaria — very relevant in West Africa).

3. BEHAVIOURAL ADAPTATIONS (Actions)
• Migration: Birds fly south for winter.
• Hibernation: Bears sleep through winter.
• Camouflage behaviour: Stick insects remain motionless.
• Nocturnal activity: Avoids daytime predators and heat.

ADAPTATION IN WEST AFRICAN ENVIRONMENTS
• Savanna animals (e.g., wildebeest): Seasonal migration to follow rain and grass.
• Mangrove trees: Special roots (pneumatophores) allow breathing in flooded soil.
• Desert adapted plants (e.g., date palm): Deep root systems to access groundwater.`, link: "https://www.britannica.com/science/adaptation-biology" },

        { name: "Plant and Animal Physiology", notes: `PLANT PHYSIOLOGY

1. PHOTOSYNTHESIS
  6CO₂ + 6H₂O + Light energy → C₆H₁₂O₆ (glucose) + 6O₂

• Two stages:
  - Light reactions (thylakoid membrane): Water splits; ATP + NADPH produced; O₂ released.
  - Calvin Cycle (stroma): CO₂ fixed into glucose using ATP and NADPH.

2. TRANSPIRATION
Loss of water vapour from leaves through stomata.
• Creates transpiration pull — draws water up from roots through xylem.

3. TRANSPORT IN PLANTS
• Xylem: Carries water and dissolved minerals from roots to leaves. Dead, lignified tissue.
• Phloem: Carries dissolved sugars. Living tissue.

ANIMAL PHYSIOLOGY

1. DIGESTION
• Amylase (saliva): Starch → maltose.
• Pepsin (stomach): Proteins → peptides.
• Lipase (small intestine): Fats → fatty acids + glycerol.

2. CELLULAR RESPIRATION
  C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36–38 ATP (aerobic)

3. CIRCULATION
• Heart pumps blood through arteries (away) and veins (toward heart).
• Double circulatory system: Pulmonary + Systemic.

4. KEY HORMONES
• Insulin (pancreas): Lowers blood glucose.
• Glucagon (pancreas): Raises blood glucose.
• Adrenaline (adrenal gland): "Fight or flight" response.`, link: "https://www.sciencedirect.com/topics/earth-and-planetary-sciences/animal-physiology" }
    ]
},

"GST111": {
