"PHY102": {
    name: "General Physics II",
    resourceKey: "PHY",
    topics: [
        { name: "Sound Waves", notes: `NATURE OF SOUND
Sound is a mechanical, longitudinal wave — particles vibrate parallel to the direction of propagation. It requires a medium (cannot travel through vacuum).

SPEED OF SOUND
• In air at 0°C: ≈ 331 m/s
• In air at T°C: v = 331√(1 + T/273) m/s
• In water: ≈ 1500 m/s | In steel: ≈ 5100 m/s

FREQUENCY RANGES
• Infrasound: f < 20 Hz
• Audible range: 20 Hz – 20,000 Hz
• Ultrasound: f > 20,000 Hz

KEY PROPERTIES
• Pitch: Determined by frequency. Higher f → higher pitch.
• Loudness: Related to amplitude/intensity. I = P/A (W/m²)

INTENSITY LEVEL (DECIBELS)
β = 10 log(I/I₀) dB, where I₀ = 10⁻¹² W/m² (threshold of hearing)

DOPPLER EFFECT
Apparent change in frequency due to relative motion between source and observer.
f' = f[(v ± v₀)/(v ∓ vₛ)]
• Source approaching → higher pitch
• Source receding → lower pitch`, link: "https://www.physicsclassroom.com/class/sound" },

        { name: "Interference, Diffraction, Reflection & Polarization", link: "https://www.physicsclassroom.com/class/light", notes: `INTERFERENCE
Constructive: path difference = mλ    Destructive: path difference = (m+½)λ

YOUNG'S DOUBLE SLIT: β=λD/d (fringe width)
  λ=wavelength, D=screen distance, d=slit separation
  Increasing d → DECREASES fringe width.

DIFFRACTION: most pronounced when obstacle size ≈ wavelength.
Single slit: first minimum at a sinθ=λ

BRAGG'S LAW (X-ray diffraction): nλ=2d sinθ

TOTAL INTERNAL REFLECTION: light in denser medium at angle>critical angle (sinθ_c=n₂/n₁). Used in optical fibres!

BREWSTER'S ANGLE: reflected light is completely polarized.
NEWTON'S RINGS: thin-film interference.
MALUS'S LAW: I=I₀cos²θ` },

        { name: "Geometrical Optics", link: "https://www.physicsclassroom.com/class/refraction", notes: `SNELL'S LAW: n₁sinθ₁ = n₂sinθ₂
Bends TOWARD normal entering denser medium; AWAY from normal entering rarer medium.

MIRROR FORMULA: 1/f=1/v+1/u (=2/R)   m=−v/u
Concave: f>0 (converging)   Convex: f<0 (diverging)

LENS FORMULA: 1/f=1/v−1/u   Lens Maker's: 1/f=(n−1)(1/R₁−1/R₂)
Convex: f>0   Concave: f<0   Power P=1/f (dioptres, f in metres)   P₁+P₂ combined.

DEFECTS OF VISION
Myopia (short-sighted): corrected with CONCAVE lens.
Hyperopia (long-sighted): corrected with CONVEX lens.
Near point of normal eye ≈ 25 cm.` },

        { name: "Electromagnetic Waves", notes: `NATURE
Electromagnetic (EM) waves are transverse waves consisting of oscillating electric and magnetic fields perpendicular to each other and to the direction of propagation. They travel at c = 3×10⁸ m/s in vacuum.

THE ELECTROMAGNETIC SPECTRUM (low f → high f)
1. Radio waves (TV, radio): f ~ kHz–GHz
2. Microwaves (radar, cooking): f ~ GHz
3. Infrared (heat): f ~ THz
4. Visible light: 430–750 THz
5. Ultraviolet: above visible
6. X-rays: medical imaging
7. Gamma rays: nuclear reactions, highest energy

KEY RELATIONSHIP
c = fλ where c = 3×10⁸ m/s, f = frequency, λ = wavelength

ENERGY OF A PHOTON
E = hf = hc/λ  where h = 6.63 × 10⁻³⁴ J·s (Planck's constant)`, link: "https://www.physicsclassroom.com/class/light" },

        { name: "Electrostatics & Gauss's Law", notes: `COULOMB'S LAW
The force between two point charges:
F = kq₁q₂/r²
where k = 9×10⁹ N·m²/C², q₁, q₂ are charges, r is distance.

ELECTRIC FIELD
E = F/q = kQ/r²  (N/C or V/m)
Direction: Away from +Q, toward −Q.

ELECTRIC POTENTIAL
V = kQ/r  (in Volts, V)
Relationship: E = -dV/dr

GAUSS'S LAW
The total electric flux through a closed surface equals the enclosed charge divided by ε₀:
ΦE = ∮E·dA = Qenc/ε₀

APPLICATIONS OF GAUSS'S LAW
• Infinite line charge: E = λ/(2πε₀r)
• Infinite plane: E = σ/(2ε₀)
• Sphere: E = kQ/r² (outside), E = 0 (inside conductor)

CAPACITORS
C = Q/V = ε₀A/d (parallel plate)
Energy stored: U = ½CV² = Q²/(2C)`, link: "https://www.khanacademy.org/science/physics/electric-charge-electric-force-and-voltage" },

        { name: "Electric Potential", notes: `ELECTRIC POTENTIAL (V)
Electric potential at a point is the work done per unit positive charge in bringing a test charge from infinity to that point.

V = kQ/r  (Volts, V)

For multiple charges:
V = k Σ(Qᵢ/rᵢ)   (superposition principle)

POTENTIAL DIFFERENCE (Voltage)
The work done per unit charge moving between two points:
  V_AB = V_A − V_B = W_AB / q

EQUIPOTENTIAL SURFACES
• Surfaces on which the potential is the same everywhere.
• Electric field lines are always perpendicular to equipotential surfaces.
• No work is done moving a charge along an equipotential surface.

RELATIONSHIP BETWEEN E AND V
E = -dV/dr  (E is the negative gradient of V)

WORKED EXAMPLE
Find potential 0.5 m from a charge of +4 μC:
V = kQ/r = (9×10⁹ × 4×10⁻⁶) / 0.5
V = 36000 / 0.5 = 72,000 V = 72 kV

ENERGY OF A CHARGE IN A POTENTIAL
Work done: W = qV
Potential energy: PE = qV
For two charges: PE = kq₁q₂/r`, link: "https://www.khanacademy.org/science/physics/electric-charge-electric-force-and-voltage/electric-potential-voltage/a/electric-potential-voltage" },

        { name: "DC Circuits", notes: `OHM'S LAW
V = IR  (Voltage = Current × Resistance)
I in Amperes (A), V in Volts (V), R in Ohms (Ω)

RESISTORS IN SERIES
R_total = R₁ + R₂ + R₃ + ...
• Same current through all; Voltage divides

RESISTORS IN PARALLEL
1/R_total = 1/R₁ + 1/R₂ + 1/R₃ + ...
• Same voltage across all; Current divides

KIRCHHOFF'S LAWS
• KCL (Junction Rule): ΣI_in = ΣI_out (current conservation)
• KVL (Loop Rule): ΣV = 0 around any closed loop (energy conservation)

POWER IN CIRCUITS
P = IV = I²R = V²/R  (Watts)

EMF AND INTERNAL RESISTANCE
Terminal voltage: V = ε - Ir
where ε = EMF, r = internal resistance

WORKED EXAMPLE
Two resistors 4Ω and 6Ω in parallel:
1/R = 1/4 + 1/6 = 5/12 → R = 12/5 = 2.4 Ω`, link: "https://www.khanacademy.org/science/physics/circuits-topic" },

        { name: "Magnetic Fields", notes: `MAGNETIC FORCE ON A CHARGE
F = qv × B  →  F = qvB sinθ
• Direction: Right-hand rule
• No work done by magnetic force (always ⊥ to velocity)

MAGNETIC FORCE ON A CURRENT-CARRYING CONDUCTOR
F = IL × B  →  F = BIL sinθ

BIOT-SAVART LAW
dB = (μ₀/4π)(I dl × r̂)/r²
μ₀ = 4π × 10⁻⁷ T·m/A (permeability of free space)

MAGNETIC FIELD RESULTS
• Long straight wire: B = μ₀I/(2πr)
• Solenoid: B = μ₀nI (n = turns per unit length)
• Circular loop at centre: B = μ₀I/(2R)

MOTION OF CHARGE IN MAGNETIC FIELD
Circular motion: r = mv/(qB)
Cyclotron frequency: f = qB/(2πm)`, link: "https://www.physicsclassroom.com/class/circuits" },

        { name: "Electromagnetic Induction", notes: `FARADAY'S LAW
The induced EMF in a circuit equals the negative rate of change of magnetic flux:
ε = -dΦ_B/dt

MAGNETIC FLUX
Φ_B = BA cosθ  (Weber, Wb = T·m²)

LENZ'S LAW
The induced current opposes the change in flux that causes it (conservation of energy).

MOTIONAL EMF
When a conductor of length L moves with velocity v in field B:
ε = BLv (when B, L, v are mutually perpendicular)

SELF-INDUCTANCE
ε = -L(dI/dt)
L = μ₀N²A/l (Henry, H)

ENERGY IN AN INDUCTOR
U = ½LI²

GENERATORS AND MOTORS
• Generator: Mechanical energy → electrical energy (Faraday's law)
• Motor: Electrical energy → mechanical energy (force on current)`, link: "https://www.physicsclassroom.com/class/circuits" },

        { name: "AC Voltages", link: "https://www.physicsclassroom.com/class/circuits",
          notes: `RMS VALUES: V_rms=V₀/√2   I_rms=I₀/√2

PHASE RELATIONSHIPS
• Resistor: V and I IN PHASE.
• Inductor: V LEADS I by 90°.
• Capacitor: V LAGS I by 90°.

REACTANCES: X_L=ωL   X_C=1/(ωC)
SERIES RLC IMPEDANCE: Z=√[R²+(X_L−X_C)²]
Power factor: cosφ

RESONANCE: X_L=X_C → Z=R (minimum), f₀=1/(2π√LC)

POWER: P=V_rms·I_rms·cosφ (average/real power)` },

        { name: "Maxwell's Equations", link: "https://www.britannica.com/science/Maxwells-equations",
          notes: `4 equations that describe ALL classical electromagnetism:

1. GAUSS (E): ∇·E=ρ/ε₀ — E field lines start on + and end on −.
2. GAUSS (B): ∇·B=0 — no magnetic monopoles.
3. FARADAY: ∇×E=−∂B/∂t — changing B creates E (generator, transformer).
4. AMPÈRE-MAXWELL: ∇×B=μ₀J+μ₀ε₀(∂E/∂t) — current AND changing E create B.

Maxwell added the displacement current term (∂E/∂t) → predicted EM waves.
EM wave speed: c=1/√(μ₀ε₀) ≈ 3×10⁸ m/s → unified electricity, magnetism, and light.` },

        { name: "Bohr's Theory", link: "https://byjus.com/jee/bohrs-model/",
          notes: `Bohr model applies to HYDROGEN (and hydrogen-like atoms).

POSTULATES
1. Electrons orbit in certain allowed orbits without radiating.
2. Angular momentum quantised: mvr=nh/(2π)=nℏ
3. Radiation emitted/absorbed during electron transitions between orbits.

KEY FORMULAS
Radius: rₙ=n²a₀ (a₀=Bohr radius=0.529 Å)
Energy: Eₙ=−13.6/n² eV   (Ground state n=1: E=−13.6 eV)

SPECTRAL SERIES
Lyman (n→1): UV   Balmer (n→2): visible   Paschen (n→3): IR

LIMITATIONS: fails for multi-electron atoms. Replaced by quantum mechanics.` },

        { name: "Photoelectric Effect", link: "https://byjus.com/physics/photoelectric-effect/",
          notes: `Einstein's explanation (1905): Light consists of photons, each with energy E=hf.
(Nobel Prize awarded for this — NOT relativity!)

PHOTOELECTRIC EQUATION: KE_max = hf − φ
φ = work function = minimum energy to eject an electron.
φ = hf₀ (threshold frequency f₀).

KEY OBSERVATIONS (unexplained by wave theory)
• No emission below threshold f₀, regardless of intensity.
• Emission is instantaneous.
• KE depends on FREQUENCY, not intensity.
• Intensity only increases the NUMBER of electrons ejected.

Stopping potential: eV_s = KE_max
h = 6.626×10⁻³⁴ J·s   Compton effect also confirms particle nature of light.` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  PHY104 — WAVES & OPTICS
// ═══════════════════════════════════════════════════════════════
"PHY104": {
    name: "Waves & Optics",
    resourceKey: "PHY",
    topics: [
        { name: "Simple Harmonic Motion (SHM)", notes: `DEFINITION
Simple Harmonic Motion (SHM) is periodic motion where the restoring force is proportional to displacement from equilibrium, always directed toward equilibrium: F = −kx.

KEY EQUATIONS
• Displacement: x(t) = A cos(ωt + φ)
• Velocity: v(t) = −Aω sin(ωt + φ)
• Acceleration: a(t) = −ω²x(t)
• Angular frequency: ω = √(k/m) for spring; ω = √(g/L) for pendulum
• Period T = 2π/ω
• Frequency f = 1/T

ENERGY IN SHM
• Total energy E = ½kA² = constant
• Kinetic energy: KE = ½k(A² − x²)
• Potential energy: PE = ½kx²
• At x = 0 (equilibrium): all KE (max speed)
• At x = ±A (amplitude): all PE (zero speed)

EXAMPLES
• Spring-mass: T = 2π√(m/k)
• Simple pendulum (small θ): T = 2π√(L/g)`, link: "https://byjus.com/physics/simple-harmonic-motion/" },

        { name: "Energy in Vibrating Systems", notes: `ENERGY IN A SPRING-MASS SYSTEM
Total mechanical energy: E = KE + PE = ½mv² + ½kx²
= ½kA² (constant, since no friction)

As the mass oscillates:
• At equilibrium (x=0): v = v_max = Aω, KE is maximum, PE = 0.
• At amplitude (x=±A): v = 0, PE = ½kA² = E, KE = 0.

VELOCITY AT ANY DISPLACEMENT
v = ω√(A² − x²)
v_max = Aω

POWER IN VIBRATING SYSTEMS
Instantaneous power: P = F·v = (−kx)(−Aω sinωt) = kAωx sinωt
Average power over one cycle = 0 (energy just oscillates between KE and PE)

ENERGY IN A PENDULUM
• KE = ½mv²   PE = mgh (where h = L − L cosθ ≈ ½Lθ² for small θ)
• Total energy = ½mgLθ₀² (θ₀ = amplitude in radians)

PRACTICAL IMPLICATIONS
• Resonance can cause dangerous energy build-up in structures.
• Damping dissipates energy, reducing oscillation amplitude over time.
• Springs and oscillating systems are used in shock absorbers, tuning forks, musical instruments.`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Damped SHM", notes: `WHAT IS DAMPING?
In real oscillators, resistive forces (friction, air resistance) remove energy from the system, causing the amplitude to decrease over time.

DAMPING FORCE
F_d = −bv   where b = damping constant (N·s/m)

EQUATION OF MOTION FOR DAMPED SHM
m(d²x/dt²) + b(dx/dt) + kx = 0

TYPES OF DAMPING

1. UNDERDAMPED (b < 2√(mk))
• System oscillates with decreasing amplitude.
• x(t) = A e^(−bt/2m) cos(ω't + φ)
• ω' = √(ω₀² − (b/2m)²) < ω₀
• Examples: Swinging pendulum, car suspension.

2. CRITICALLY DAMPED (b = 2√(mk))
• Returns to equilibrium in the shortest possible time WITHOUT oscillating.
• Desired in many engineering applications (door closers, some shock absorbers).

3. OVERDAMPED (b > 2√(mk))
• Returns slowly to equilibrium without oscillating.
• Too sluggish for most applications.

PRACTICAL EXAMPLES
• Car shock absorber: critically or slightly underdamped.
• Galvanometer: critically damped for accurate meter readings.
• Seismographs: slightly underdamped to detect oscillations.`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Resonance and Transients", notes: `RESONANCE
Resonance occurs when a driving frequency matches the natural frequency of a system. At resonance, energy is most efficiently transferred, causing maximum amplitude buildup.

ω_resonance = ω₀ = √(k/m)

PRACTICAL EXAMPLES OF RESONANCE
• Musical instruments: string resonates at its natural frequency.
• Microwave ovens: 2.45 GHz matches water molecule rotation frequency.
• Radio/TV tuning: circuit resonates at broadcast frequency.
• Tacoma Narrows Bridge (1940): collapsed due to wind-induced resonance.

FORCED OSCILLATIONS
When a periodic external force F₀cos(ωt) is applied:
• Steady-state amplitude: A = F₀/[m√((ω₀²−ω²)² + (bω/m)²)]
• Maximum when ω ≈ ω₀ (resonance condition)

TRANSIENTS
Initial behaviour of a system before reaching steady state.
• Start-up: system oscillates at natural frequency while adjusting.
• Transient response decays exponentially with time constant τ = 2m/b.
• After 3–5 time constants, transient is negligible.

QUALITY FACTOR (Q)
Q = ω₀/(Δω) = ω₀m/b
• High Q: Sharp resonance peak, low damping.
• Low Q: Broad resonance, high damping.`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Coupled Oscillations", notes: `WHAT ARE COUPLED OSCILLATIONS?
When two or more oscillators are connected (coupled), they exchange energy and exhibit collective behaviour.

TWO COUPLED PENDULUMS
Two pendulums connected by a weak spring.

NORMAL MODES — the patterns of motion when all parts oscillate at the same frequency:

1. IN-PHASE MODE (symmetric mode)
• Both pendulums swing in the same direction simultaneously.
• Spring is not stretched/compressed.
• Frequency ω₁ = ω₀ (natural frequency of single pendulum)

2. OUT-OF-PHASE MODE (antisymmetric mode)
• Pendulums swing in opposite directions.
• Spring is alternately stretched and compressed.
• Frequency ω₂ = √(ω₀² + 2k_spring/m) > ω₁

BEATS PHENOMENON
If one pendulum starts from rest:
• Energy transfers periodically between the two pendulums.
• Beat frequency = ω₂ − ω₁ (slow energy exchange)
• This is analogous to beat frequency in acoustics.

IMPORTANCE IN PHYSICS
• Molecules: Normal modes of molecular vibration.
• Solid state physics: Phonon modes in crystals.
• Quantum mechanics: Coupled quantum oscillators (qubits).`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Q-value and Power Response", notes: `Q-VALUE (QUALITY FACTOR)
The Q-value measures how "sharp" the resonance of an oscillator is, or equivalently, how many oscillations occur before the energy decays significantly.

Q = ω₀/Δω = Energy stored / Energy lost per radian

where Δω = full width at half maximum (FWHM) of the resonance peak.

PHYSICAL INTERPRETATION
• Q tells us how many oscillations fit in the time it takes the amplitude to decay to 1/e of its initial value.
• High Q ≈ low damping ≈ sharp resonance ≈ long decay time.

EXAMPLES
• Guitar string in air: Q ≈ 1000–5000
• Quartz crystal oscillator: Q ≈ 10⁴–10⁶
• Atomic clocks: Q ≈ 10¹⁰–10¹³

POWER RESPONSE CURVE
• Peak power at resonance: P_max = F₀²/(2bω₀)
• Half-power points: where P = P_max/2, at ω = ω₀ ± Δω/2
• Bandwidth = Δω = ω₀/Q

RELATIONSHIP TO DECAY TIME
• Decay time (time to fall to e⁻¹ amplitude): τ = 2m/b = 2Q/ω₀
• Time to fall to half amplitude: t₁/₂ = τ ln2`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Normal Modes", notes: `DEFINITION
Normal modes are the natural patterns of oscillation of a system in which all parts of the system move with the same frequency and maintain fixed phase relationships.

NORMAL MODES OF A STRING
A string of length L, fixed at both ends:
• Boundary conditions: y(0, t) = 0 and y(L, t) = 0
• Allowed wavelengths: λₙ = 2L/n (n = 1, 2, 3, ...)
• Allowed frequencies: fₙ = nv/(2L) = nf₁
• f₁ = fundamental frequency (1st harmonic)
• f₂ = 2f₁ (2nd harmonic = 1st overtone)
• f₃ = 3f₁ (3rd harmonic = 2nd overtone)

STANDING WAVES
Superposition of two traveling waves of equal amplitude and frequency moving in opposite directions:
y(x, t) = 2A sin(kx) cos(ωt)
• NODES: Points of zero displacement, at x = 0, L/n, 2L/n, ...
• ANTINODES: Points of maximum displacement.

NORMAL MODES OF OTHER SYSTEMS
• Closed pipe (both ends closed): same as string.
• Open pipe (both ends open): same frequencies as string.
• Half-open pipe (one end closed): only odd harmonics, fₙ = (2n−1)v/(4L).`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Wave Types", notes: `DEFINITION
A wave is a disturbance that transfers energy from one place to another without transferring matter.

CLASSIFICATION BY DIRECTION OF VIBRATION

1. TRANSVERSE WAVES
• Vibration is perpendicular to direction of wave travel.
• Examples: Light, water waves, waves on a string.
• Can be polarised.

2. LONGITUDINAL WAVES
• Vibration is parallel to direction of wave travel.
• Examples: Sound waves, P-waves (seismic).
• Consist of compressions and rarefactions.
• Cannot be polarised.

CLASSIFICATION BY MEDIUM

3. MECHANICAL WAVES: require a medium.
   Examples: Sound, water waves, seismic waves.

4. ELECTROMAGNETIC WAVES: require no medium; can travel in vacuum.
   Examples: Light, radio, X-rays, gamma rays.

CLASSIFICATION BY PERIODICITY

5. PERIODIC (CONTINUOUS) WAVES: regular, repeating pattern.
6. PULSE WAVES: single disturbance.

KEY WAVE PROPERTIES
• Amplitude (A): maximum displacement from equilibrium.
• Wavelength (λ): distance of one complete cycle.
• Period (T): time for one complete cycle.
• Frequency (f = 1/T): cycles per second (Hz).
• Wave speed: v = fλ`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Wave Interference", notes: `PRINCIPLE OF SUPERPOSITION
When two or more waves occupy the same space, the resultant displacement is the algebraic sum of the individual displacements.

TYPES OF INTERFERENCE

1. CONSTRUCTIVE INTERFERENCE
• Waves add together; resultant amplitude is LARGER.
• Occurs when waves are in phase (phase difference = 0, 2π, 4π, ...).
• Path difference = mλ (m = 0, 1, 2, ...)

2. DESTRUCTIVE INTERFERENCE
• Waves cancel; resultant amplitude is SMALLER (zero if equal amplitudes).
• Occurs when waves are out of phase by 180° (π, 3π, ...).
• Path difference = (m + ½)λ

YOUNG'S DOUBLE SLIT EXPERIMENT
Two coherent light sources create an interference pattern on a screen.
• Bright fringes (constructive): y = mλD/d
• Dark fringes (destructive): y = (m+½)λD/d
• Fringe spacing: β = λD/d

BEATS
When two waves of slightly different frequencies interfere:
• Beat frequency = |f₁ − f₂|
• Beats are alternating loud and quiet sounds.
• Used to tune musical instruments.

STANDING WAVES
Interference between a forward and reflected wave of the same frequency creates a standing wave pattern with nodes and antinodes.`, link: "https://www.physicsclassroom.com/class/light" },

        { name: "Diffraction and Refraction", notes: `DIFFRACTION
The bending of waves around obstacles or through openings.
• Significant when: opening/obstacle size ≈ wavelength
• SINGLE SLIT: First dark fringe at sin θ = λ/a (a = slit width)
• DIFFRACTION GRATING: d sin θ = mλ (d = slit spacing, m = order)

REFRACTION
Change in wave speed when a wave passes from one medium to another, causing a change in direction (unless angle = 0°).
• Snell's Law: n₁ sin θ₁ = n₂ sin θ₂
• When entering denser medium: slows down, bends toward normal.
• When entering less dense medium: speeds up, bends away from normal.
• Refractive index: n = c/v (c = speed of light in vacuum, v = speed in medium)

TOTAL INTERNAL REFLECTION
When light in a denser medium hits the boundary at an angle greater than the critical angle:
• sin θ_c = n₂/n₁ (n₁ > n₂)
• ALL light is reflected back into the medium.
• Applications: optical fibres, prisms (binoculars, periscopes).

DISPERSION
Different wavelengths travel at slightly different speeds in a medium.
• Causes white light to split into a spectrum (prism, rainbow).
• Refractive index varies with wavelength (chromatic dispersion).`, link: "https://www.physicsclassroom.com/class/light" },

        { name: "Wave Equations", notes: `THE WAVE EQUATION
The displacement y of a wave travelling in the positive x-direction:
  y(x, t) = A sin(kx − ωt + φ)

where:
• A = amplitude
• k = wave number = 2π/λ
• ω = angular frequency = 2πf
• φ = initial phase constant
• v = ω/k = fλ (wave speed)

WAVE SPEED IN DIFFERENT MEDIA
• On a string: v = √(T/μ)  (T = tension, μ = mass per unit length)
• Sound in a gas: v = √(γP/ρ) = √(γRT/M)
• Light in vacuum: v = c = 3×10⁸ m/s

INTENSITY OF A WAVE
I = P/A = ½ρvω²A² (for mechanical waves)
• I ∝ A² (intensity proportional to amplitude squared)
• I ∝ 1/r² for spherical waves from a point source

THE ELECTROMAGNETIC WAVE EQUATION
For light: ∂²E/∂x² = (1/c²)∂²E/∂t²
This follows from Maxwell's equations with c = 1/√(μ₀ε₀).

COMPLEX NOTATION
y(x,t) = Re[A e^i(kx−ωt)] is often used in advanced wave analysis.`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Wave Energy and Power", notes: `ENERGY IN A WAVE
Energy is carried by waves through oscillation of the medium (or, in EM waves, through oscillating fields).

ENERGY DENSITY IN A MECHANICAL WAVE
Energy per unit volume = ½ρA²ω² (ρ = density, A = amplitude, ω = angular frequency)

INTENSITY
Power per unit area:
I = ½ρvA²ω² (W/m²)

• For a point source emitting power P uniformly in all directions:
  I = P/(4πr²)   (inverse square law)
• Doubling distance → intensity reduced to 1/4

SOUND INTENSITY (DECIBELS)
• Reference intensity: I₀ = 10⁻¹² W/m² (threshold of hearing)
• Sound level: β = 10 log₁₀(I/I₀) dB
• 10 dB increase → 10× increase in intensity
• 20 dB increase → 100× increase in intensity

ELECTROMAGNETIC WAVE ENERGY
Energy density: u = ε₀E² = B²/μ₀ (equal electric and magnetic contributions)
Intensity (Poynting vector magnitude): I = E₀B₀/(2μ₀) = ε₀cE₀²/2

PRACTICAL NOTES
• A string vibrating with larger amplitude carries more energy.
• Higher frequency waves carry more energy per photon (E = hf).`, link: "https://www.physicsclassroom.com/class/waves" },

        { name: "Doppler Effect", notes: `THE DOPPLER EFFECT
The apparent change in frequency (or wavelength) of a wave when the source and observer are in relative motion.

FORMULA
f' = f₀ × [(v ± v_observer)/(v ∓ v_source)]

• Use + for observer moving TOWARD source, − for moving AWAY.
• Use − for source moving TOWARD observer, + for moving AWAY.

INTERPRETATION
• Source approaching observer: f' > f (higher pitch)
• Source receding from observer: f' < f (lower pitch)

WORKED EXAMPLE
Ambulance siren (f₀ = 500 Hz) approaches at 30 m/s.
Speed of sound v = 340 m/s, observer stationary.
f' = 500 × (340/(340−30)) = 500 × 340/310 ≈ 548 Hz (higher pitch)

As ambulance passes and recedes:
f' = 500 × (340/(340+30)) = 500 × 340/370 ≈ 459 Hz (lower pitch)

APPLICATIONS
• Radar (police speed guns): uses Doppler shift of radio waves.
• Astronomy: redshift of galaxies reveals the universe is expanding.
• Medical: Doppler ultrasound measures blood flow speed.
• Weather: Doppler radar detects wind speeds in storms.`, link: "https://www.physicsclassroom.com/class/waves/Lesson-3/The-Doppler-Effect" },

        { name: "Nature of Light", notes: `IS LIGHT A WAVE OR A PARTICLE?
Light exhibits WAVE-PARTICLE DUALITY — it behaves as a wave in some experiments and as a particle (photon) in others.

LIGHT AS A WAVE
• Young's double-slit (1801): Interference pattern proves wave nature.
• Maxwell (1865): Light is an electromagnetic wave (transverse, no medium needed).
• Speed: c = 3×10⁸ m/s in vacuum.

LIGHT AS A PARTICLE (PHOTON)
• Photoelectric effect (Einstein, 1905): Light comes in discrete packets (photons).
• Photon energy: E = hf (h = 6.63×10⁻³⁴ J·s)
• Photon momentum: p = h/λ

PROPERTIES OF LIGHT
• Speed in vacuum: c = 3×10⁸ m/s (fastest anything can travel).
• In a medium: v = c/n (n = refractive index, always ≥ 1).
• Electromagnetic spectrum: visible light is from ~400 nm (violet) to ~700 nm (red).
• Polarisation: light is a transverse EM wave; can be polarised.

WAVE-PARTICLE DUALITY
• De Broglie (1924): ALL particles have wave properties. λ = h/p.
• This is the foundation of quantum mechanics.`, link: "https://www.physicsclassroom.com/class/light" },

        { name: "Reflection and Refraction", notes: `REFLECTION
When light bounces off a surface.
• Law of Reflection: angle of incidence = angle of reflection (both measured from normal).
• Types: Specular (smooth surface → clear image), Diffuse (rough surface → scattered).

PLANE MIRRORS
• Image is: virtual, upright, same size, same distance behind mirror.

CURVED MIRRORS
• Concave (converging): f > 0; can form real, inverted images.
• Convex (diverging): f < 0; always forms virtual, upright, smaller images.
• Mirror formula: 1/f = 1/v + 1/u   (sign convention: real is positive)
• Magnification: m = −v/u

REFRACTION
When light passes from one transparent medium to another and changes speed/direction.
• Snell's Law: n₁ sinθ₁ = n₂ sinθ₂
• Entering denser medium: bends toward normal (slows down).
• Entering less dense: bends away from normal (speeds up).

TOTAL INTERNAL REFLECTION
If θ > θ_c (critical angle): all light reflected back.
sin θ_c = n₂/n₁   (n₁ = denser medium)

OPTICAL FIBRES
Light travels along a glass fibre by total internal reflection.
Used in high-speed internet data transmission.`, link: "https://www.physicsclassroom.com/class/refraction" },

        { name: "Optical Instruments", notes: `THE HUMAN EYE
• Cornea and lens focus light onto the retina.
• Iris adjusts the pupil size (aperture).
• Near point ≈ 25 cm; Far point = infinity (normal vision).
• Defects: Myopia (short sight), Hyperopia (long sight), Astigmatism, Presbyopia.

SIMPLE MAGNIFIER (HAND LENS)
A convex lens used to produce an enlarged virtual image.
Angular magnification: M = 1 + D/f  (D = 25 cm, f = focal length)

COMPOUND MICROSCOPE
• Two lenses: objective (short f) and eyepiece (longer f).
• Total magnification: M ≈ (L/f_obj) × (D/f_eye)
  (L = tube length between lenses)
• Used in biology, materials science, medicine.

ASTRONOMICAL TELESCOPE (REFRACTING)
• Two convex lenses: objective (long f) and eyepiece (short f).
• Angular magnification: M = f_obj/f_eye
• Tube length ≈ f_obj + f_eye (for distant objects).
• Used to view distant stars and planets.

REFLECTING TELESCOPE (Newtonian)
• Uses a large curved mirror instead of an objective lens.
• No chromatic aberration; easier to make large mirrors.
• The Hubble Space Telescope uses a reflecting design.

CAMERA
• Lens focuses image onto film/sensor.
• Aperture (f-number): controls depth of field.
• Shutter speed: controls exposure time.`, link: "https://www.physicsclassroom.com/class/refraction" }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  CHM102 — GENERAL CHEMISTRY II
// ═══════════════════════════════════════════════════════════════
"CHM102": {
    name: "General Chemistry II",
    resourceKey: "CHM",
    topics: [
        { name: "Introduction to Organic Chemistry", link: "https://byjus.com/chemistry/organic-chemistry/",
          notes: `Organic chemistry = chemistry of carbon compounds (excluding CO, CO₂, carbonates).

WHY CARBON IS SPECIAL
• Tetravalent: forms 4 covalent bonds.
• Catenation: forms long chains, rings, branched structures.
• Multiple bonding: single (C-C), double (C=C), triple (C≡C).

ORGANIC COMPOUNDS IN LIVING THINGS
• Carbohydrates: Cₙ(H₂O)ₙ — energy source.
• Proteins: C,H,O,N (sometimes S) — structural and functional.
• Lipids: C,H,O — energy storage, cell membranes.
• Nucleic acids (DNA,RNA): C,H,O,N,P — genetic information.

REACTION TYPES: Addition, Substitution, Elimination, Polymerisation, Condensation, Hydrolysis.

ISOMERISM: Same molecular formula, different structure (structural) or same structure, different arrangement in space (stereoisomers: cis-trans, optical).` },

        { name: "Empirical & Molecular Formula", link: "https://byjus.com/chemistry/empirical-formula-and-molecular-formula/",
          notes: `EMPIRICAL FORMULA: simplest whole-number ratio of atoms.
MOLECULAR FORMULA: actual number of atoms per molecule.
Molecular formula = n × empirical formula, where n = molecular mass / empirical formula mass.

STEPS TO FIND EMPIRICAL FORMULA
1. Get % composition by mass.
2. Divide each % by atomic mass → moles.
3. Divide all moles by the smallest value.
4. Multiply to get whole numbers if needed.

EXAMPLE: 40%C, 6.7%H, 53.3%O; mol.mass=180
  C: 40/12=3.33  H: 6.7/1=6.7  O: 53.3/16=3.33
  Ratio → CH₂O (empirical, mass=30) → n=180/30=6
  Molecular formula: C₆H₁₂O₆ (glucose)` },

        { name: "Nomenclature of Organic Compounds", link: "https://byjus.com/chemistry/iupac-nomenclature/",
          notes: `IUPAC PREFIXES (chain length):
1=meth, 2=eth, 3=prop, 4=but, 5=pent, 6=hex, 7=hept, 8=oct, 9=non, 10=dec

SUFFIXES BY FUNCTIONAL GROUP
-ane (alkane)  -ene (alkene)  -yne (alkyne)
-ol (alcohol)  -al (aldehyde)  -one (ketone)
-oic acid (carboxylic acid)  -amine (amine)

NAMING STEPS
1. Find longest chain containing principal functional group → root name.
2. Number chain from end CLOSEST to principal functional group.
3. Name substituents alphabetically with position numbers.
4. Add suffix for functional group.

EXAMPLE: CH₃−CH(CH₃)−CH₂−CH₃ → 2-methylbutane` },

        { name: "Alkanes, Alkenes, Alkynes", link: "https://byjus.com/chemistry/hydrocarbons/",
          notes: `ALKANES (CₙH₂ₙ₊₂): single bonds only; SATURATED; sp³ hybridisation (109.5°).
• Reactions: combustion, free radical SUBSTITUTION (with halogens under UV).
• Properties: non-polar, low bp, insoluble in water.

ALKENES (CₙH₂ₙ): one or more C=C; UNSATURATED; sp² (120°).
• Reactions: electrophilic ADDITION (H₂, HX, X₂, H₂O).
• Markovnikov's Rule: H adds to C with MORE hydrogens.
• TEST: decolourises bromine water.

ALKYNES (CₙH₂ₙ₋₂): one or more C≡C; UNSATURATED; sp (180°).
• Can add twice (once to give alkene, then again).
• C₂H₂ (ethyne/acetylene): used in oxyacetylene welding.
• TEST: also decolourises bromine water.` },

        { name: "Haloalkanes, Alcohols, Ethers", link: "https://byjus.com/chemistry/haloalkanes-and-haloarenes/",
          notes: `HALOALKANES (Alkyl Halides, R-X): alkanes with H replaced by halogen.
• Reactions: Nucleophilic Substitution (SN1, SN2), Elimination.
• Uses: solvents, CFCs (refrigerants — now banned), anaesthetics.

ALCOHOLS (-OH group): suffix -ol. Primary (1°), Secondary (2°), Tertiary (3°).
• Combustion: C₂H₅OH+3O₂→2CO₂+3H₂O
• Oxidation: 1°→aldehyde→carboxylic acid; 2°→ketone; 3°→resistant.
• Dehydration (with H₂SO₄): alcohol→alkene+H₂O
• Fermentation: C₆H₁₂O₆→2C₂H₅OH+2CO₂ (yeast, anaerobic)

ETHERS (R-O-R'): C-O-C functional group. Very flammable; good organic solvents.` },

        { name: "Aldehydes, Ketones, Carboxylic Acids", link: "https://byjus.com/chemistry/aldehydes-ketones/",
          notes: `ALDEHYDES (-CHO): suffix -al. (e.g., methanal/formaldehyde HCHO, ethanal/acetaldehyde CH₃CHO)
• Oxidation → carboxylic acid. Reduction → primary alcohol.
• Tollens' test: silver mirror formed ✓ (positive for aldehydes)
• Fehling's/Benedict's test: brick-red precipitate ✓

KETONES (C=O flanked by two C): suffix -one. (e.g., propanone/acetone CH₃COCH₃)
• Reduction → secondary alcohol.
• Does NOT react with Tollens' reagent ✗

CARBOXYLIC ACIDS (-COOH): suffix -oic acid.
• Reactions:
  With base → salt+water: CH₃COOH+NaOH→CH₃COONa+H₂O
  With alcohol → ester+water: CH₃COOH+C₂H₅OH→CH₃COOC₂H₅+H₂O
  With Na₂CO₃/NaHCO₃ → salt+CO₂+water` },

        { name: "Amines, Amino Acids & Proteins", link: "https://byjus.com/chemistry/amines/",
          notes: `AMINES (-NH₂): organic derivatives of NH₃. Primary (RNH₂), Secondary (R₂NH), Tertiary (R₃N).
• BASIC: lone pair on N accepts H⁺. Fishy smell.

AMINO ACIDS: have BOTH -NH₂ and -COOH groups.
• 20 standard amino acids; 9 are ESSENTIAL (must come from diet).

PEPTIDE BOND: -COOH of one + -NH₂ of another → dipeptide + H₂O (condensation).

PROTEIN STRUCTURE
• Primary: amino acid sequence (determined by genetic code).
• Secondary: α-helix or β-sheet (H-bonds between backbone groups).
• Tertiary: 3D folding (H-bonds, ionic, hydrophobic, disulfide bridges).
• Quaternary: multiple polypeptide chains (e.g., haemoglobin has 4 subunits).

DENATURATION: heat, pH change or chemicals disrupt structure → loss of function.` },

        { name: "Polymers", link: "https://byjus.com/chemistry/polymers/",
          notes: `Polymer = large molecule made of many repeating units (monomers).

ADDITION POLYMERISATION: monomers add together with NO loss of atoms.
• Requires alkene monomers (C=C double bond opens up).
• nCH₂=CH₂ → (−CH₂−CH₂−)ₙ (polyethylene)
• Examples: Polypropylene (PP), PVC, Polystyrene (PS), Teflon (PTFE).

CONDENSATION POLYMERISATION: monomers join with loss of H₂O (or HCl).
• Nylon (polyamide): diamine + dicarboxylic acid.
• Polyester (e.g., PET/Terylene): diol + dicarboxylic acid.

NATURAL POLYMERS: proteins (amino acids), starch/cellulose (glucose), DNA (nucleotides), natural rubber (isoprene).

ENVIRONMENT: most synthetic polymers non-biodegradable → plastic pollution. Solutions: biodegradable polymers, recycling.` },

        { name: "Transition Metal Chemistry", link: "https://www.britannica.com/science/transition-element",
          notes: `Transition metals = d-block elements (Groups 3–12). Key: Fe, Cu, Ni, Co, Mn, Cr, Zn, Ti, V.

CHARACTERISTICS
1. Variable oxidation states: Fe²⁺ / Fe³⁺; Mn can be +2,+3,+4,+6,+7.
2. Form COLOURED compounds (d-d electron transitions):
   CuSO₄=blue, FeCl₃=yellow-orange, KMnO₄=purple, K₂Cr₂O₇=orange.
3. CATALYTIC activity: Fe (Haber process), V₂O₅ (Contact process), Ni (hydrogenation).
4. Form COMPLEX IONS: central metal + ligands.
   [Cu(NH₃)₄]²⁺ = deep blue tetraamminecopper(II)
5. PARAMAGNETISM: due to unpaired d electrons.

BIOLOGICAL: Haemoglobin (Fe²⁺, carries O₂), Chlorophyll (Mg²⁺), Vitamin B₁₂ (Co³⁺).` },

        { name: "Nuclear Chemistry", link: "https://www.britannica.com/science/radioactivity",
          notes: `RADIOACTIVITY = spontaneous emission from unstable nuclei.

THREE TYPES
• Alpha (α): ⁴₂He nucleus. Stopped by paper. Most ionising.
• Beta (β⁻): electron from nucleus. Stopped by aluminium.
• Gamma (γ): EM radiation. Stopped by thick lead. Most penetrating.

NUCLEAR EQUATIONS
Alpha decay: ²³⁸₉₂U → ²³⁴₉₀Th + ⁴₂He
Beta decay: ¹⁴₆C → ¹⁴₇N + ⁰₋₁e

HALF-LIFE (t½): time for half the nuclei to decay.
N = N₀(½)ⁿ  where n = number of half-lives elapsed.
Example: 100g, t½=10yr → after 20yr → 25g remaining.

FISSION: heavy nucleus splits → energy. Used in nuclear reactors.
FUSION: light nuclei combine → massive energy. Powers the Sun.

APPLICATIONS: cancer radiotherapy, PET scans, smoke detectors, carbon-14 dating (t½=5730yr).` }
    ]
},

//  CHM108 — CHEMISTRY PRACTICAL

"CHM108": {
    name: "Chemistry Practical",
    resourceKey: "CHM",
    topics: [
        { name: "Volumetric Analysis Techniques", link: "https://www.chemguide.co.uk/analysis/uvvisible/whatisit.html", notes: `VOLUMETRIC ANALYSIS
Volumetric analysis (titrimetry) involves measuring volumes of solutions to determine the concentration of an analyte.

KEY APPARATUS
• Burette: delivers measured volumes of titrant (accurate to ±0.05 mL).
• Pipette: measures exact volumes of analyte solution (10, 20, 25 mL).
• Conical flask: holds the analyte solution.
• Volumetric flask: prepares standard solutions to exact volume.
• Wash bottle: delivers distilled water.

GENERAL TITRATION PROCEDURE
1. Rinse burette with titrant solution; rinse pipette with analyte solution.
2. Fill burette with titrant; note initial reading.
3. Pipette exact volume of analyte into conical flask; add indicator.
4. Add titrant dropwise, swirling constantly.
5. At endpoint: indicator changes colour permanently.
6. Record final burette reading. Calculate titre = final − initial.
7. Repeat until concordant results (within ±0.10 mL of each other).

STANDARD SOLUTION
A solution of exactly known concentration.
• Primary standard: pure, stable, high molar mass (e.g., anhydrous Na₂CO₃, KIO₃).
• Secondary standard: standardised against a primary standard (e.g., NaOH, KMnO₄).

MOLARITY CALCULATION
C₁V₁/n₁ = C₂V₂/n₂   (from mole ratio in balanced equation)` },

        { name: "Acid-Base Titrations", link: "https://www.chemguide.co.uk/physical/acidbaseeqia/indicators.html", notes: `ACID-BASE TITRATION
Used to determine the concentration of an acid or a base.

EQUIVALENCE POINT vs ENDPOINT
• Equivalence point: when moles of acid exactly neutralise moles of base.
• Endpoint: when indicator changes colour.
• Goal: choose indicator whose colour change is close to equivalence point.

INDICATORS
• Strong acid + strong base (e.g., HCl + NaOH): pH at equivalence ≈ 7. Use litmus or phenolphthalein.
• Strong acid + weak base (e.g., HCl + NH₃): pH < 7. Use methyl orange.
• Weak acid + strong base (e.g., CH₃COOH + NaOH): pH > 7. Use phenolphthalein.

CALCULATION EXAMPLE
25.0 mL of HCl requires 21.5 mL of 0.10 mol/L NaOH to reach endpoint.
HCl + NaOH → NaCl + H₂O (1:1 ratio)
moles NaOH = 0.0215 L × 0.10 mol/L = 0.00215 mol
moles HCl = 0.00215 mol (1:1 ratio)
[HCl] = 0.00215 mol / 0.025 L = 0.086 mol/L

BACK TITRATION
Used when: direct titration is not possible.
1. Add excess known reagent to react completely with analyte.
2. Titrate the excess with a second standard solution.
3. Calculate the original amount from the difference.` },

        { name: "Redox Titrations", link: "https://www.chemguide.co.uk/physical/redoxeqia/index.html", notes: `REDOX TITRATION
Used to determine concentration of oxidising or reducing agents.

COMMON REDOX TITRATIONS IN PRACTICE

1. PERMANGANATE TITRATIONS (KMnO₄)
• KMnO₄ is its own indicator — changes from purple/pink to colourless at equivalence.
• Acidic conditions (dilute H₂SO₄) required.
• KMnO₄ + Fe²⁺: 5Fe²⁺ + MnO₄⁻ + 8H⁺ → 5Fe³⁺ + Mn²⁺ + 4H₂O
• KMnO₄ + H₂O₂: 5H₂O₂ + 2MnO₄⁻ + 6H⁺ → 5O₂ + 2Mn²⁺ + 8H₂O

2. IODOMETRIC TITRATIONS
• I₂ + 2S₂O₃²⁻ → 2I⁻ + S₄O₆²⁻
• Starch indicator turns blue-black with I₂; colourless at endpoint.
• Used to determine oxidising agents (Cl₂, O₃, H₂O₂, KMnO₄).

3. DICHROMATE TITRATIONS (K₂Cr₂O₇)
• Cr₂O₇²⁻ + 6Fe²⁺ + 14H⁺ → 2Cr³⁺ + 6Fe³⁺ + 7H₂O
• Uses diphenylamine or ferroin as external indicator.

CALCULATION KEY
Calculate n-factor (change in oxidation state per mole) for each species; set up mole ratio accordingly.` },

        { name: "Qualitative Analysis of Cations", link: "https://www.chemguide.co.uk/inorganic/complexions/colour.html", notes: `SYSTEMATIC QUALITATIVE ANALYSIS (Group Analysis)
Cations are separated into groups based on their precipitate reactions.

GROUP I CATIONS (precipitated by HCl)
• Pb²⁺, Hg₂²⁺, Ag⁺ — form insoluble chlorides.
• PbCl₂: white precipitate; dissolves in hot water.
• AgCl: white precipitate; soluble in NH₃(aq).

GROUP II CATIONS (precipitated by H₂S in acidic solution)
• Cu²⁺ (black CuS), Pb²⁺ (black PbS), Cd²⁺ (yellow CdS), Bi³⁺ (black Bi₂S₃)

GROUP III CATIONS (precipitated by NH₄OH in ammoniacal solution)
• Fe³⁺ (brown Fe(OH)₃), Al³⁺ (white Al(OH)₃), Cr³⁺ (green Cr(OH)₃)

GROUP IV CATIONS (precipitated by H₂S in basic solution)
• Zn²⁺ (white ZnS), Ni²⁺ (black NiS), Co²⁺ (black CoS), Mn²⁺ (pinkish MnS)

GROUP V CATIONS (precipitated by (NH₄)₂CO₃)
• Ba²⁺ (white BaCO₃), Ca²⁺ (white CaCO₃), Sr²⁺

GROUP VI CATIONS (remain in solution)
• Mg²⁺, K⁺, Na⁺, NH₄⁺ — detected by flame tests or specific reagents.

FLAME TESTS (important to memorise)
• K⁺: Lilac/violet  • Na⁺: Orange-yellow  • Li⁺: Crimson red
• Ca²⁺: Brick red   • Ba²⁺: Apple green    • Cu²⁺: Blue-green` },

        { name: "Qualitative Analysis of Anions", link: "https://www.chemguide.co.uk/inorganic/tests/negative.html", notes: `ANION IDENTIFICATION

CARBONATE (CO₃²⁻)
• Add dilute HCl: effervescence of colourless, odourless CO₂ gas.
• Test CO₂ with limewater: turns milky.

SULPHATE (SO₄²⁻)
• Add BaCl₂ solution (in acidic conditions): white precipitate of BaSO₄ (insoluble in HCl).

CHLORIDE (Cl⁻)
• Add AgNO₃ solution (in HNO₃ acidic conditions): white precipitate of AgCl.
• Dissolves in NH₃(aq).

BROMIDE (Br⁻)
• Add AgNO₃: pale yellow precipitate of AgBr. Partially soluble in NH₃.

IODIDE (I⁻)
• Add AgNO₃: yellow precipitate of AgI. Insoluble in NH₃.

NITRATE (NO₃⁻) — Brown Ring Test
• Add iron(II) sulphate solution and concentrated H₂SO₄ carefully.
• Brown ring forms at the junction of the two layers.

PHOSPHATE (PO₄³⁻)
• Add ammonium molybdate reagent and warm: yellow precipitate forms.

SULPHIDE (S²⁻)
• Add dilute HCl: H₂S gas produced (rotten egg smell, turns lead acetate paper black).` },

        { name: "Chromatography Techniques", link: "https://www.chemguide.co.uk/analysis/chromatography/tlc.html", notes: `WHAT IS CHROMATOGRAPHY?
Chromatography is a technique for separating mixtures based on differential distribution between a stationary phase and a mobile phase.

THIN LAYER CHROMATOGRAPHY (TLC)
• Stationary phase: silica gel on aluminium/glass sheet.
• Mobile phase: solvent (ethanol, hexane, etc.).
• Procedure: spot sample on baseline; allow solvent to travel up plate; visualise under UV or with iodine.
• Rf value: Rf = distance moved by spot / distance moved by solvent front.
• Rf is characteristic of each compound (in a given system).

PAPER CHROMATOGRAPHY
• Stationary phase: water adsorbed on cellulose paper.
• Mobile phase: organic solvent system.
• Simpler than TLC; commonly used in educational labs.

GAS CHROMATOGRAPHY (GC)
• Stationary phase: high-boiling liquid coated on solid support in a column.
• Mobile phase: inert carrier gas (nitrogen, helium).
• Sample is vaporised; components separated based on boiling point and solubility.
• Very sensitive; used for volatile organics.

HIGH PERFORMANCE LIQUID CHROMATOGRAPHY (HPLC)
• Liquid mobile phase under high pressure.
• Excellent for non-volatile compounds.
• Used in pharmaceutical quality control.

APPLICATIONS
Drug testing, food adulteration detection, environmental pollutant analysis.` },

        { name: "Laboratory Safety and First Aid", link: "https://www.nsc.org/lab-safety", notes: `LABORATORY SAFETY IN CHEMISTRY

PERSONAL PROTECTIVE EQUIPMENT (PPE)
• Lab coat: protects skin and clothing from spills.
• Safety goggles: mandatory when handling chemicals; protects eyes.
• Gloves (nitrile): for handling corrosive, toxic, or irritant chemicals.
• Closed-toe shoes: no sandals in the lab.
• Tie back long hair; remove dangling jewellery.

HAZARD SYMBOLS (GHS/UN standard)
• Skull & crossbones: Toxic
• Flame: Flammable
• Corrosion: Corrosive (acid/base)
• Exclamation mark: Irritant
• Skull on flame: Explosive
• Biohazard: Biological risk
• Environment: Harmful to environment

SAFE HANDLING PRACTICES
• Never smell chemicals directly; use wafting technique.
• Never pipette by mouth.
• Add acid to water (not water to acid) — prevents exothermic splashing.
• Heat test tubes pointing away from yourself and others.
• Know the location of: fire extinguisher, fire blanket, emergency shower, eyewash station, first aid kit, fire exit.

FIRE SAFETY
• Fires in labs: use CO₂ extinguisher (not water on flammable liquids!).
• Fire triangle: Fuel + Heat + Oxygen. Remove any one to stop fire.

FIRST AID
• Acid/base on skin: flush with large amounts of water for 15+ minutes.
• Chemical in eyes: eyewash station, flush for 15 minutes; seek medical help.
• Cuts from glassware: do not try to clean up broken glass with hands; use tongs.` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  BIO102 — GENERAL BIOLOGY II
// ═══════════════════════════════════════════════════════════════
"BIO102": {
    name: "General Biology II",
    resourceKey: "BIO",
    topics: [
        { name: "Hierarchy of Living Things", link: "https://www.britannica.com/science/life",
          notes: `BIOLOGICAL HIERARCHY (small → large):
Atom → Molecule → Organelle → Cell → Tissue → Organ → Organ System → Organism → Population → Community → Ecosystem → Biosphere

3 DOMAINS (current system)
• Bacteria: prokaryotes; peptidoglycan cell walls.
• Archaea: prokaryotes; extremophiles (hot springs, salt lakes).
• Eukarya: true nucleus; includes Protista, Fungi, Plantae, Animalia.

5 KINGDOMS (older system): Monera, Protista, Fungi, Plantae, Animalia.

TAXONOMIC RANKS: Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species
Mnemonic: "Determined Kings Play Chess On Fine Glass Surfaces"

BINOMIAL NOMENCLATURE: Genus species (italicised). e.g., Homo sapiens.` },

        { name: "Characteristics of Bacteria", notes: `CLASSIFICATION
Bacteria are prokaryotes — no membrane-bound nucleus; single-celled organisms.

CELL STRUCTURE
• Cell wall: Made of peptidoglycan (unique to bacteria)
• Plasma membrane, Ribosomes (70S), Circular DNA (no histone proteins)
• Plasmids: Small, circular extra DNA
• Flagella: For locomotion (some species)

SHAPES OF BACTERIA
• Coccus (spherical): Streptococcus, Staphylococcus
• Bacillus (rod): Escherichia coli, Lactobacillus
• Spirillum (spiral): Helicobacter pylori
• Vibrio (comma): Vibrio cholerae

GRAM STAINING
• Gram-positive: Thick peptidoglycan wall → stains purple.
• Gram-negative: Thin wall + outer membrane → stains pink.

REPRODUCTION
• Binary fission (asexual) — rapid; can divide every 20 minutes

ECONOMIC IMPORTANCE
Beneficial: Nitrogen fixation, fermentation (yoghurt, cheese), decomposition, biotechnology.
Harmful: Typhoid, cholera, tuberculosis, anthrax.`, link: "https://www.khanacademy.org/science/biology/bacteria-archaea" },

        { name: "Characteristics of Viruses", notes: `NATURE OF VIRUSES
Viruses are acellular (non-cellular) entities — not truly alive by strict criteria.
• Size: 20–300 nm (smaller than bacteria)
• Obligate intracellular parasites — can only replicate inside a host cell.

STRUCTURE
• Nucleic acid: Either DNA or RNA (never both) enclosed in a protein coat.
• Capsid: Protein shell surrounding the nucleic acid; made of capsomeres.
• Envelope: Some viruses (e.g., HIV, influenza) have a lipid envelope.

CLASSIFICATION
• DNA viruses: Herpes, Hepatitis B, Smallpox
• RNA viruses: HIV, Influenza, Polio, Ebola, COVID-19

REPLICATION (Lytic Cycle)
1. Attachment to host cell receptor
2. Penetration (injection of nucleic acid)
3. Biosynthesis (viral DNA/RNA replication using host machinery)
4. Maturation (assembly of new virions)
5. Release (lysis of host cell)

DISEASES CAUSED BY VIRUSES
HIV/AIDS, Influenza, Common cold, Measles, Polio, Hepatitis, COVID-19

CONTROL
Vaccines, antiviral drugs (not antibiotics — antibiotics kill bacteria only).`, link: "https://www.khanacademy.org/science/biology/biology-of-viruses" },

        { name: "Characteristics of Fungi", link: "https://www.britannica.com/science/fungi",
          notes: `Eukaryotic, non-photosynthetic, heterotrophic — absorb nutrients by secreting enzymes externally.

STRUCTURE
• Cell wall: CHITIN (unique to fungi; NOT cellulose).
• Multicellular: hyphae → mycelium (the main "body"). Exception: yeast (unicellular).

NUTRITION: Absorptive heterotrophs.
• Saprobes: decompose dead organic matter (crucial recyclers!).
• Parasites: e.g., athlete's foot, ringworm, white rot disease.

REPRODUCTION: Asexual (spores, budding, fragmentation) and Sexual.

GROUPS: Zygomycetes (Rhizopus/bread mould), Ascomycetes (yeasts, Penicillium, truffles), Basidiomycetes (mushrooms).

USEFUL: bread, beer (Saccharomyces), cheese (Penicillium roqueforti), penicillin antibiotic.
HARMFUL: crop diseases, aflatoxins (Aspergillus on groundnuts!), candidiasis.` },

        { name: "Classification of Living Organisms", notes: `TAXONOMY
Taxonomy is the science of classifying organisms. Founded by Carl Linnaeus.

HIERARCHICAL CLASSIFICATION (from broadest to narrowest):
Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species

MNEMONIC: "Dumb King Philip Came Over For Good Soup"

THREE DOMAINS (Woese System)
1. Bacteria: Prokaryotes (eubacteria)
2. Archaea: Prokaryotes (extremophiles)
3. Eukarya: All eukaryotes (Protista, Fungi, Plantae, Animalia)

FIVE KINGDOMS (Whittaker)
1. Monera: Bacteria, Cyanobacteria (prokaryotes)
2. Protista: Amoeba, Paramecium (unicellular eukaryotes)
3. Fungi: Moulds, mushrooms, yeasts
4. Plantae: All plants
5. Animalia: All animals

BINOMIAL NOMENCLATURE
Each organism has a two-part Latin name: Genus species
• Homo sapiens (humans)
• Panthera leo (lion)
• Rules: Genus capitalised; species lowercase; italicised or underlined.`, link: "https://www.khanacademy.org/science/biology/her/tree-of-life/a/overview-of-taxonomy" },

        { name: "Evolution", notes: `DARWIN'S THEORY OF EVOLUTION
Charles Darwin (1859 — "On the Origin of Species") proposed:
1. Variation exists within populations.
2. Some variations are heritable.
3. More offspring are produced than can survive (overproduction).
4. Individuals with favourable variations survive and reproduce more (Natural Selection).
5. Over many generations, favourable traits accumulate → new species.

EVIDENCE FOR EVOLUTION
• Fossil record: Sequence of life forms over time.
• Comparative anatomy:
   - Homologous organs: Same structure, different function (e.g., human arm, whale flipper).
   - Analogous organs: Same function, different structure (e.g., bird wing and insect wing).
• Molecular biology: Similar DNA/protein sequences in related organisms.
• Biogeography: Distribution of species matches evolutionary history.

TYPES OF NATURAL SELECTION
• Directional: Shifts population toward one extreme.
• Stabilising: Favours average phenotype.
• Disruptive: Favours extremes over average.

SPECIATION
Formation of new species through:
• Allopatric speciation: Geographic isolation.
• Sympatric speciation: Without geographic isolation.`, link: "https://www.khanacademy.org/science/biology/her" },

        { name: "Ecology of Populations", link: "https://www.britannica.com/science/population-ecology",
          notes: `POPULATION = same species in same area at the same time.

GROWTH = (births + immigration) − (deaths + emigration)

MODELS
• Exponential (J-curve): dN/dt=rN — unlimited resources; colonising new areas.
• Logistic (S-curve): dN/dt=rN[(K−N)/K] — limited by K (carrying capacity). More realistic.

LIMITING FACTORS
• Density-dependent: competition, predation, disease (effect increases as N increases).
• Density-independent: climate, fire, drought (effect independent of N).

AGE STRUCTURE DIAGRAMS
• Expanding: wide base (high birth rate).
• Stable: uniform width.
• Declining: narrow base (low birth rate).

SURVIVORSHIP CURVES
Type I: late loss (humans).  Type II: constant loss (birds).  Type III: early loss (fish, trees).` },

        { name: "Plant and Animal Diversity", link: "https://www.britannica.com/science/plant",
          notes: `PLANT KINGDOM
• Bryophytes (mosses, liverworts): no vascular tissue; need water for reproduction.
• Pteridophytes (ferns): vascular tissue; no seeds; reproduce by spores.
• Gymnosperms (pines, cedars): seeds "naked" on scales; no fruit.
• Angiosperms (flowering plants): seeds enclosed in FRUIT — most diverse!
  Monocots (1 cotyledon, parallel veins): maize, rice, palm.
  Dicots (2 cotyledons, net veins): beans, mango, tomato, cocoa.

MAJOR ANIMAL PHYLA
Porifera (sponges): simplest; no true tissues.
Cnidaria (jellyfish, coral): radial symmetry; cnidocytes (stinging cells).
Platyhelminthes (flatworms): acoelomate; e.g., Schistosoma (bilharzia!), Taenia (tapeworm).
Nematoda (roundworms): Ascaris — very common intestinal parasite in Nigeria!
Arthropoda (insects, spiders, crabs): largest phylum; exoskeleton; jointed appendages.
Mollusca (snails, clams, octopus): soft-bodied; most have shell.
Annelida (earthworms, leeches): segmented; true coelom; closed circulatory system.
Chordata (fish → mammals): notochord, dorsal hollow nerve cord.` }
    ]
},
