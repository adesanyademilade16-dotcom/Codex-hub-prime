        { name: "Cooperative Marketing Strategies", link: "https://www.fao.org/sustainable-food-value-chains/resources/detail/en/c/318", notes: `WHY MARKETING MATTERS FOR COOPERATIVES
Many cooperatives fail not from lack of production but from poor marketing. Connecting members' products to markets at good prices is a core cooperative function.

KEY MARKETING STRATEGIES FOR AGRICULTURAL COOPERATIVES

1. COLLECTIVE MARKETING
• Pool members' produce → larger quantities → better bargaining power.
• Bypass middlemen → farmers get better price.
• Example: cocoa cooperatives negotiate directly with exporters.

2. GRADING AND STANDARDISATION
• Sort produce by size, quality, moisture content.
• Higher grades fetch higher prices.
• Build buyer trust and brand reputation.

3. VALUE ADDITION
• Process raw produce (e.g., cassava → garri, starch; palm fruit → palm oil).
• Higher value-added products earn more.

4. BRANDING AND QUALITY MARKS
• Develop cooperative brand that signals quality.
• Organic, fair trade, or cooperative certifications open premium markets.

5. MARKET INFORMATION SYSTEMS
• Collect and share price information with members.
• Help members time sales for best prices.

6. FORWARD CONTRACTS AND MARKET LINKAGES
• Pre-sell produce at agreed prices before harvest.
• Reduces price risk for farmers.

7. E-COMMERCE AND DIGITAL MARKETING
• Use social media, WhatsApp, and online platforms to reach buyers.` },

• Transparency and accountability to members.

• Basis for management decisions.
• Required for audits and external financing.

TYPES OF RECORDS TO MAINTAIN

1. FINANCIAL RECORDS
• Cash book: records all cash receipts and payments.
• Bank statement and bank reconciliation.
• Receipts and invoices: proof of every transaction.
• Petty cash book: small routine expenses.

2. MEMBERSHIP RECORDS
• Register of all members (name, address, shares, loans).
• Minutes of meetings (General Assembly and Board).
• Copies of applications, resignations, and expulsions.

3. OPERATIONAL RECORDS
• Production records (for producer cooperatives).
• Loan records (for credit cooperatives).
• Sales and purchase records.

PRINCIPLES OF GOOD RECORD KEEPING
• Complete: record every transaction.
• Accurate: amounts and descriptions correct.
• Timely: record transactions immediately.
• Secure: protect from theft, fire, and water damage.
• Auditable: can be examined by auditors and supervisory committee.

THE SUPERVISORY COMMITTEE
• Internal audit body elected by members.
• Reviews financial records regularly.
• Reports to the General Assembly.` }

    topics: [
        { name: "Laboratory Exercise in French", link: "https://www.collinsdictionary.com/dictionary/english-french", notes: `WHAT IS A LANGUAGE LABORATORY?
A language laboratory is a room equipped with audio and recording equipment for language learning practice. Students listen to native speaker models and record themselves for comparison.

TYPES OF ACTIVITIES IN THE FRENCH LANGUAGE LAB
• Listening comprehension: listen to audio of native speakers, answer questions.
• Pronunciation drills: repeat after the recording; compare your pronunciation.
• Dialogue practice: listen to dialogues and practise with a partner.
• Dictation exercises: listen and write what you hear.
• Gap-filling: listen and fill in missing words.

BENEFITS OF LANGUAGE LAB WORK
• Exposes learners to authentic native speaker speech (speed, pronunciation, intonation).
• Provides a safe environment to practise speaking without fear of embarrassment.
• Immediate feedback through recording and playback.
• Develops listening comprehension skills.

KEY PRONUNCIATION CHALLENGES FOR NIGERIAN LEARNERS OF FRENCH
• The French /r/ (uvular fricative): does not exist in most Nigerian languages.
• Nasal vowels: /ɑ̃/, /ɛ̃/, /ɔ̃/, /œ̃/ — sounds through the nose.
• Silent letters: "est" is pronounced /ɛ/, not as written.
• Liaison: final consonants pronounced before vowels.` },

        { name: "Oral Practice and Drills", link: "https://www.lawlessfrench.com/speaking/pronunciation/", notes: `ORAL DRILLS IN FRENCH

SUBSTITUTION DRILLS
Replace one element with another:
• Model: "Je mange une pomme." (I eat an apple.)
• Stimulus: "poire" (pear)
• Response: "Je mange une poire." (I eat a pear.)

TRANSFORMATION DRILLS
Change the structure:
• Positive → Negative: "Je parle français." → "Je ne parle pas français."
• Statement → Question: "Tu parles français." → "Est-ce que tu parles français?"
• Singular → Plural: "Il est étudiant." → "Ils sont étudiants."

RESPONSE DRILLS
Answer questions in a fixed pattern:
• Q: "Est-ce que tu as faim?" (Are you hungry?)
• A: "Oui, j'ai très faim." (Yes, I am very hungry.)

REPEAT AND PRACTISE
Essential phrases to drill:
• Greetings: Bonjour/Bonsoir/Salut/Au revoir
• Introductions: Je m'appelle... / J'ai ... ans / Je suis étudiant(e)
• Requests: Excusez-moi / S'il vous plaît / Pouvez-vous répéter?
• Numbers 1–100 (required for everyday transactions)

TONGUE TWISTERS (Virelangues) for Pronunciation Practice
• "Les chaussettes de l'archiduchesse sont-elles sèches, archi-sèches?"` },

        { name: "Pronunciation and Phonetics Practice", link: "https://www.lawlessfrench.com/speaking/pronunciation/", notes: `FRENCH PHONETICS — KEY FEATURES

THE FRENCH ALPHABET AND SOUNDS
• French has 26 letters but ~36 phonemes.
• Letters can be silent or have different values depending on context.

ACCENT MARKS IN FRENCH
• é (accent aigu): changes the sound of 'e' → /e/ sound. e.g., café /kafe/
• è (accent grave): changes 'e' → /ɛ/ sound. e.g., très /tʁɛ/
• ê (accent circonflexe): historically marks a lost 's'. e.g., forêt (forest)
• ï / ë (tréma): indicates the vowel is pronounced separately. e.g., naïve /naiv/
• ç (cédille): 'c' pronounced /s/ before a, o, u. e.g., ça /sa/, garçon /gaʁsɔ̃/

NASAL VOWELS (very important!)
These are produced by releasing air through the nose:
• /ɑ̃/: en, an, am, em → "enfant" /ɑ̃fɑ̃/
• /ɛ̃/: in, im, ain, ein, un → "vin" /vɛ̃/
• /ɔ̃/: on, om → "bon" /bɔ̃/

THE FRENCH R
• Uvular fricative (gargled at back of throat): /ʁ/
• Does NOT sound like English 'r'.
• Practice: say 'gargle' in English, but softer.

LIAISON
When a usually silent final consonant is pronounced before a word starting with a vowel:
• "les enfants" → /le z ɑ̃fɑ̃/ (the 's' in 'les' is pronounced)
• Mandatory after determiners, pronouns, some prepositions.` },

        { name: "Listening Comprehension Exercises", link: "https://www.fle.fr/Exercices-de-comprehension-orale.html", notes: `BUILDING LISTENING COMPREHENSION SKILLS

WHY LISTENING IS DIFFICULT
• Native speakers speak faster than learners expect.
• Words are often elided (run together).
• Wide variety of accents (Parisian, African French, Canadian).
• Rich use of informal registers (verlan, slang) in natural speech.

STRATEGIES FOR LISTENING COMPREHENSION

1. PRE-LISTENING (Before you listen)
• Predict content from context (title, images, introduction).
• Identify key vocabulary related to the topic.
• Know the purpose: what information are you looking for?

2. WHILE LISTENING
• Listen for gist first (general meaning), not every word.
• Note key words and numbers.
• Use context to guess unknown words.
• Don't panic if you miss something; continue listening.

3. POST-LISTENING
• Check your understanding against the questions.
• Listen again to clarify any points of confusion.
• Note new vocabulary to learn.

LEVELS OF LISTENING TASKS
• A1/A2 (beginner): numbers, simple questions about daily life, basic instructions.
• B1 (intermediate): news broadcasts, conversations, descriptions.
• B2 (upper-intermediate): complex discussions, film dialogues, radio programmes.

RECOMMENDED RESOURCES
• RFI (Radio France Internationale) — has learning programmes for African students.
• TV5Monde — French television channel with subtitles.` }

French composition involves producing written texts in correct French grammar and appropriate style, from simple sentences to complex essays.

WHY COMPOSITION IS IMPORTANT
• Writing consolidates grammar and vocabulary learning.
• Develops the ability to express complex ideas in French.
• Tests understanding of French sentence structure.
• Essential skill for examinations (DELF, DALF, WAEC French).

THE WRITING PROCESS IN FRENCH
1. PLAN (planifier): Brainstorm ideas; organise into a logical structure.
2. DRAFT (rédiger): Write a first draft; focus on ideas, not perfection.
3. REVISE (réviser): Check content, logical flow, coherence.
4. PROOFREAD (relire): Check grammar, spelling, accents, punctuation.

COMMON MISTAKES TO AVOID
• Translating word-for-word from English into French.
• Forgetting to make adjectives agree with nouns.
• Forgetting negative structure: ne...pas, ne...jamais, ne...rien.
• Wrong use of tenses (confusing passé composé and imparfait).
• Forgetting to use subjunctive after certain verbs and conjunctions.` },

        { name: "Sentence Structure and Syntax", link: "https://www.lawlessfrench.com/grammar/", notes: `BASIC FRENCH SENTENCE STRUCTURE
Standard word order: Subject – Verb – Object (similar to English)
"Je mange une pomme." (I eat an apple.)

KEY STRUCTURAL DIFFERENCES FROM ENGLISH

1. ADJECTIVE POSITION
• Most adjectives follow the noun:
  "une voiture rouge" (a red car)
• Common adjectives that precede: beau, bon, grand, gros, jeune, joli, long, mauvais, nouveau, petit, vieux
  "une belle maison" (a beautiful house)

2. NEGATION (using ne...pas)
  "Je ne comprends pas." (I don't understand.)
  "Il ne mange jamais de viande." (He never eats meat.)
  "Il n'y a rien." (There is nothing.)

3. INVERSION (formal questions)
  "Parlez-vous français?" (Do you speak French?)
  Note: when subject is a noun: "Marie parle-t-elle français?"

4. PRONOUN PLACEMENT
  Object pronouns come BEFORE the verb:
  "Je le vois." (I see him/it.)
  "Elle lui parle." (She speaks to him/her.)
  Exception: In affirmative imperatives: "Regardez-le!" (Look at it!)

5. PARTITIVE ARTICLES (some/any)
  "Je mange du pain." (I eat some bread. — du = de + le)
  "Il boit de l'eau." (He drinks some water.)
  After negation: always "de": "Je ne mange pas de pain."` },

        { name: "Essay Writing Techniques", link: "https://www.academichelp.net/essay-writing/tips-on-writing-an-essay-in-french.html", notes: `WRITING A FRENCH ESSAY (Dissertation)

STRUCTURE OF A FRENCH ESSAY

1. INTRODUCTION (Introduction)
• Hook sentence to grab attention.
• General context/background on the topic.
• Definition of key terms.
• Thesis statement (thèse): your main argument or position.
• Announcement of structure (annonce du plan).

2. BODY (Développement)
• Typically 2–3 main sections.
• Each section has a topic sentence (idée directrice).
• Supporting arguments and examples.
• Transitions between sections.

3. CONCLUSION (Conclusion)
• Restate thesis in different words.
• Summarise main arguments.
• Broader implications or opening (ouverture): related question for reflection.

USEFUL LINKING WORDS

To add: De plus, En outre, Également, Par ailleurs
To contrast: Cependant, Néanmoins, Toutefois, En revanche, Pourtant
To conclude: En conclusion, En résumé, Pour conclure, Finalement
To illustrate: Par exemple, Tel que, Notamment, En particulier
To express opinion: Je pense que, À mon avis, Il me semble que` },

        { name: "Letter Writing", link: "https://www.lawlessfrench.com/writing/formal-letters/", notes: `FORMAL LETTER IN FRENCH (Lettre formelle)

FORMAT
• Your address (top right)
• City and date (below your address)
• Recipient's name and address (left side)
• Subject line (Objet:)
• Opening salutation
• Body
• Closing salutation
• Signature

FORMAL OPENING SALUTATIONS
• To an unknown person: "Madame, Monsieur,"
• To a man: "Monsieur,"
• To a woman: "Madame,"
• To an official: "Monsieur le Directeur," / "Madame la Présidente,"

FORMAL CLOSING SALUTATIONS (very important — different from English)
• Standard: "Veuillez agréer, Madame/Monsieur, l'expression de mes salutations distinguées."
• More formal: "Veuillez agréer, Madame/Monsieur, l'assurance de ma considération distinguée."
• To a superior: "...l'expression de mon profond respect."

INFORMAL LETTER (Lettre informelle)
• Opening: "Cher Paul," / "Chère Marie,"
• Closing: "Amicalement," / "Cordialement," / "Bisous," / "À bientôt,"

EXAMPLE — Requesting information:
Objet: Demande d'informations sur vos formations
Madame, Monsieur,
Je me permets de vous contacter afin d'obtenir des informations...` }

        { name: "Introduction to Literary Appreciation", link: "https://www.britannica.com/art/French-literature", notes: `WHAT IS LITERARY APPRECIATION?
The ability to recognise, understand, and evaluate the artistic qualities of literary works — including language, structure, theme, and meaning.

WHY STUDY FRENCH LITERATURE?
• Literature is the most authentic expression of a culture's values, history, and worldview.
• Develops advanced language skills (vocabulary, grammar, style).
• Exposes students to different historical periods and perspectives.
• Builds critical thinking and analytical skills.

THE THREE MAIN LITERARY GENRES
1. PROSE (La prose): novels, short stories, essays.
2. POETRY (La poésie): verse, lyrical expression, rhythm and rhyme.
3. DRAMA (Le théâtre): plays, scripts, dialogue-based performance.

HISTORICAL PERIODS OF FRENCH LITERATURE
• Medieval: chansons de geste (Roland), troubadour poetry.
• Renaissance (16th c.): Rabelais, Ronsard; humanism.
• Classicism (17th c.): Corneille, Racine, Molière; strict rules of form.
• Enlightenment (18th c.): Voltaire, Rousseau; reason and rights.
• Romanticism (19th c.): Hugo, Lamartine; emotion, nature, individual.
• Realism/Naturalism (19th c.): Flaubert, Zola; social reality.
• Symbolism (late 19th c.): Baudelaire, Rimbaud; symbols and suggestion.
• Existentialism (20th c.): Sartre, Camus; human freedom and responsibility.
• Francophone African literature (20th c.–): Senghor, Oyono, Ousmane.` },

        { name: "Literary Devices and Figures of Speech", link: "https://www.britannica.com/art/literary-device", notes: `LITERARY DEVICES IN FRENCH LITERATURE

1. FIGURES OF SPEECH (Figures de style)

SIMILE (Comparaison): comparison using "comme" (like/as)
  "Il est fort comme un lion." (He is as strong as a lion.)

METAPHOR (Métaphore): direct comparison without "comme"
  "Sa voix est un velours." (His voice is velvet.)

PERSONIFICATION (Personnification): giving human qualities to non-human things
  "La tempête hurle dans les arbres." (The storm screams in the trees.)

HYPERBOLE (Hyperbole): deliberate exaggeration
  "Je t'ai dit mille fois!" (I've told you a thousand times!)

IRONY (Ironie): saying the opposite of what is meant

ANTITHESIS (Antithèse): juxtaposition of contrasting ideas
  "L'homme est un animal mortel qui pense." (contrasting mortality and thought)

REPETITION (Anaphore): repetition of a word at the beginning of successive clauses

2. SOUND DEVICES
• Alliteration (Allitération): repetition of consonant sounds.
• Assonance: repetition of vowel sounds.

3. NARRATIVE DEVICES
• Flashback (Retour en arrière): going back in time.
• Foreshadowing: hinting at future events.
• Point of view (Focalisation): narrator perspective.` },

        { name: "Explication de Texte", link: "https://www.etudes-litteraires.com/", notes: `EXPLICATION DE TEXTE
A detailed literary commentary on a short extract of a French text.

PURPOSE
• Demonstrate close reading and understanding.
• Show how the author uses language to convey meaning.
• Analyse style, structure, and content together.
• French secondary/university literary analysis format.

STRUCTURE OF AN EXPLICATION DE TEXTE

1. INTRODUCTION
• Situate the text: author, work, publication date, context.
• State the nature of the extract (narrative, dialogue, description, poem, etc.).
• Announce your reading: what is the extract about, and what are its key features?

2. MAIN COMMENTARY (Commentaire composé or linéaire)
LINÉAIRE approach: follow the text from beginning to end, analysing each paragraph or stanza.
COMPOSÉ approach: organise by themes/techniques (e.g., first discuss imagery, then structure, then theme).

For each point:
• Identify the literary device or technique.
• Cite the exact textual evidence (quote in French).
• Explain its effect and meaning.

3. CONCLUSION
• Summarise the key elements of the extract.
• Link to the broader theme of the work.
• Open to a wider question (ouverture).` }
    ]
},

//  FRE108 — FRANCOPHONE AFRICAN LITERATURE

        { name: "Introduction to Negro-African Literature in French", link: "https://www.britannica.com/art/African-literature", notes: `NEGRO-AFRICAN LITERATURE IN FRENCH
Also called Francophone African Literature — creative writing in French by African authors.

DEFINITION AND SCOPE
Literature produced by African writers in the French language, reflecting African experience, identity, and perspectives.

WHY AFRICAN WRITERS WRITE IN FRENCH
• French is the language of education and publication in many African countries.
• French enables access to a global readership.
• Some see it as a tool for challenging colonialism from within.
• Debate: Can one fully express African experience in a European language?

THE QUESTION OF LANGUAGE
• Ngugi wa Thiong'o (Kenyan writer): argues for writing in African languages.
• Léopold Sédar Senghor: embraced French as a vehicle for African thought ("the Francophone spirit").
• Chinua Achebe (Nigerian, Anglophone): "My English is my home."

PERIODS OF FRANCOPHONE AFRICAN LITERATURE
1. Pre-Negritude (1920s): early journals and essays by African intellectuals.
2. Negritude Movement (1930s–1960s): celebrating African identity.
3. Post-colonial literature (1960s–1980s): critiquing African independence.
4. Contemporary literature (1980s–present): urban life, gender, globalisation.` },

        { name: "Negritude Movement", link: "https://www.britannica.com/art/Negritude", notes: `THE NEGRITUDE MOVEMENT
A literary and intellectual movement founded in Paris in the 1930s by French-speaking African and Caribbean writers.

FOUNDERS
• Aimé Césaire (Martinique): poet and playwright; co-founder.
• Léopold Sédar Senghor (Senegal): poet, philosopher, first President of Senegal.
• Léon-Gontran Damas (French Guiana): poet, co-founder.

CORE BELIEFS
• Rejection of French assimilation: refusing to become "imitation Frenchmen."
• Celebration of African culture, traditions, and values.
• Black pride: "négritude" = the sum total of African cultural values.
• African civilisation as equal to European civilisation.

KEY CONCEPTS
• "African personality": the unique qualities of African thought, art, and community.
• Rhythm as a defining feature of African expression.
• Criticism of colonialism and its dehumanisation of Africans.

INFLUENCE
• Inspired independence movements across Africa.
• Influenced the Black consciousness movement in South Africa.
• Influenced African-American writers of the Harlem Renaissance.
• FESMAN (1966 World Festival of Black Arts): Senghor's major cultural event.

CRITIQUE OF NEGRITUDE
• Fanon criticised it for romanticising African culture and not addressing political liberation.
• Later writers saw it as a reaction to colonialism rather than a forward-looking programme.` },

        { name: "Major Themes in African Literature", link: "https://www.britannica.com/art/African-literature/Major-themes", notes: `MAJOR THEMES IN FRANCOPHONE AFRICAN LITERATURE

1. COLONIALISM AND ITS EFFECTS
• The violence, exploitation, and cultural destruction of colonialism.
• The loss of African identity under colonial rule.
• Examples: Ferdinand Oyono's "Houseboy" (1956) — depicts colonial racism.

2. POST-COLONIAL DISILLUSIONMENT
• The failure of African independence to deliver freedom and development.
• Corruption, tribalism, and neo-colonialism.
• Examples: Ahmadou Kourouma's "The Suns of Independence" (1968).

3. TRADITION vs MODERNITY
• Conflict between traditional African values and Western modernity.
• Tensions within families and communities as societies change.
• Example: Marriage across ethnic/religious lines; generational conflict.

4. EXILE AND IDENTITY
• African writers in the diaspora explore belonging, identity, and displacement.
• Multiple identities: African, French, global citizen.

5. WOMEN AND GENDER
• Patriarchal structures and women's resistance.
• Forced marriage, female circumcision, polygamy.
• Women writers: Mariama Bâ "So Long a Letter" (1979) — epistolary novel about women's condition in Senegal.

6. ORAL TRADITION
• Incorporation of griot traditions, proverbs, folktales.
• Celebrating African oral heritage in written form.

7. RELIGION AND SPIRITUALITY
• African traditional religion vs Islam vs Christianity.
• Syncretism and spiritual hybridity.` }
    ]
},

    resourceKey: "FRE",
    topics: [
        { name: "History of the French Language", link: "https://iifls.com/the-history-and-evolution-of-the-french-language/", notes: `OVERVIEW
French is a Romance language — a descendant of Latin — that evolved over 2,000+ years.

TIMELINE OF FRENCH LANGUAGE DEVELOPMENT

1. LATIN ROOTS (before 5th century AD)
• Gaul was conquered by Julius Caesar (58–50 BC).
• Vulgar Latin (the spoken language of ordinary Romans and soldiers) replaced Gaulish.
• Vulgar Latin in Gaul was influenced by Gaulish vocabulary and pronunciation.

2. OLD FRENCH (Vieux français) — 9th–13th centuries
• Emerged from Vulgar Latin after the fall of the Roman Empire.
• Fragmented into dialects across northern France.
• First written text in French: Serments de Strasbourg (842 AD) — an oath between Frankish kings.
• Divided into: Oïl languages (north, became standard French) and Oc languages (south, → Occitan/Provençal).

3. MIDDLE FRENCH (Moyen français) — 14th–16th centuries
• More unified written language emerged.
• Major literary works: Rabelais, Villon.

4. CLASSICAL FRENCH (17th–18th centuries)
• Académie française founded in 1635 to standardise and purify French.
• French became the language of European diplomacy and culture.

5. MODERN FRENCH (19th century–present)
• Compulsory education in French standardised the language across France.
• Today: ~320 million speakers worldwide.` },

        { name: "Origins and Evolution of French", link: "https://www.britannica.com/topic/French-language", notes: `THE INDO-EUROPEAN LANGUAGE FAMILY
French belongs to the Indo-European family → Italic branch → Romance languages.

THE ROMANCE LANGUAGES
All descended from Latin. Main languages: French, Spanish, Portuguese, Italian, Romanian, Catalan.

How Latin became French — key changes:
• Phonological changes: Latin vowel length distinctions lost; stress shifted.
• Grammatical simplification: Latin case endings largely lost; word order became more fixed (SVO).
• Vocabulary: blended Latin with Gaulish, Frankish (Germanic), and later Norman/English elements.

KEY EXTERNAL INFLUENCES ON FRENCH VOCABULARY

1. GAULISH: few words survive; mostly relating to agriculture and landscape.
   bruyère (heather), mouton (sheep), charrue (plough).

2. FRANKISH (Germanic): the Franks conquered Gaul (5th c. AD).
   guerre (war), bleu (blue), garder (to guard).

3. NORSE (Vikings settled in Normandy, 10th c.):
   vague (wave), dune, falaise (cliff).

4. ARABIC (via Middle Ages contact in southern France):
   alchimie (alchemy), alcool (alcohol), algèbre (algebra).

5. ENGLISH (Anglicisms, 20th–21st c.):
   le weekend, le sandwich, le parking, le manager, selfie, tweet.

THE ACADÉMIE FRANÇAISE
Founded 1635 by Cardinal Richelieu. Produces the official French dictionary (Dictionnaire de l'Académie). Has famously tried to resist Anglicisms (e.g., "courriel" instead of "email").` },

        { name: "Old French Period", link: "https://www.britannica.com/topic/Old-French-language", notes: `OLD FRENCH (9th–13th centuries)

POLITICAL CONTEXT
• Carolingian Empire → Feudal France.
• The Council of Tours (813 AD) instructed priests to preach in the vernacular language (not Latin).
• This official recognition accelerated the development of Old French as a written language.

SERMENTS DE STRASBOURG (842 AD)
• Oaths taken by Louis the German and Charles the Bald.
• Considered the first written document in Old French (and Old High German).
• Marks the beginning of French as a distinct written language.

FEATURES OF OLD FRENCH
• Still had case system with 2 cases: nominative (subject) and oblique (other uses).
• Freer word order than modern French (case system allowed flexibility).
• Multiple dialects: Francien (Île-de-France → became standard), Norman, Picard, Champenois.
• Significant Germanic influence (Frankish).

LITERATURE
• Chansons de geste (heroic epics): La Chanson de Roland (~1100 AD).
  - National epic about Charlemagne and the Battle of Roncevaux Pass.
  - Roland, nephew of Charlemagne, dies heroically.
• Romances (romans courtois): tales of knightly love and chivalry.
  - Chrétien de Troyes: Arthurian romances (Perceval, Lancelot).
• Lyric poetry: trouvères in the north (cf. troubadours in Occitan south).` },

        { name: "Modern French", link: "https://www.francophonie.org/english", notes: `MODERN FRENCH (19th century–present)

THE ROLE OF THE FRENCH REVOLUTION
• Revolution (1789) promoted ideals of a unified French republic speaking ONE language.
• Regional languages (Breton, Basque, Alsatian) were discouraged as "dialects of feudalism."

THE FERRY LAWS (1881–1882)
• Jules Ferry established free, compulsory, secular primary education in French.
• Schools across France taught in Standard French; regional dialects marginalised.
• Result: by 1900, most French people could speak standard French.

CHARACTERISTICS OF MODERN FRENCH
• Simplified grammar: 2-case system disappeared; pronoun clitics carry grammatical relationships.
• Fixed SVO word order.
• Richer vocabulary: technical terms, Anglicisms, neologisms.
• Standardised spelling (though complex and irregular).

FRENCH IN THE 21ST CENTURY
• Official language of 29 countries on 5 continents.
• Major internet language: ~10% of all internet content.
• Growing in Africa: Francophone Africa adds millions of speakers annually.
• Challenge: pressure from English (dominant in business, technology, science).
• Académie française has coined alternatives to Anglicisms but adoption is variable.

REGIONAL VARIETIES WITHIN FRANCE
• Still significant regional accents: Marseille, Lyon, Bordeaux, Strasbourg, Paris.
• "Banlieue French" / "Verlan": youth slang in Paris suburbs (e.g., "meuf" = "femme").` }
    ]
},

        { name: "Introduction to Comprehension in French", link: "https://www.fle.fr/comprehension", notes: `WHAT IS COMPREHENSION IN FRENCH?
Comprehension is the ability to understand a spoken or written text in French — not just recognising words but understanding meaning, context, tone, and implication.

TWO TYPES OF COMPREHENSION
1. COMPRÉHENSION ÉCRITE (Reading comprehension): understanding written texts.
2. COMPRÉHENSION ORALE (Listening comprehension): understanding spoken French.

LEVELS OF COMPREHENSION
• Global comprehension: general understanding of the main idea.
• Selective comprehension: finding specific information.
• Detailed comprehension: understanding all the details.
• Critical comprehension: evaluating the text (tone, attitude, bias).

READING COMPREHENSION PROCESS
1. Pre-reading: look at title, headings, images; activate prior knowledge.
2. First reading: for general meaning (ne pas paniquer face aux mots inconnus!).
3. Second reading: for specific information required by the questions.
4. Vocabulary from context: use surrounding text to infer unknown word meaning.
5. Answer writing: in French; full sentences; evidence from text.

COMMON QUESTION TYPES
• "Qu'est-ce que...?" (What is...?) — factual retrieval
• "Pourquoi...?" (Why...?) — explanation
• "Comment...?" (How...?) — method or manner
• "Selon le texte, est-ce que...?" (According to the text, is...?) — true/false with justification
• "Trouvez dans le texte un mot qui signifie..." — vocabulary synonym` },

        { name: "Reading Comprehension Strategies", link: "https://www.tv5monde.com/Enseigner-apprendre-le-francais", notes: `STRATEGIES FOR READING FRENCH TEXTS

1. SKIMMING (Survol)
• Read quickly to get the overall topic and purpose.
• Look at title, headings, first and last paragraph, first sentence of each paragraph.

2. SCANNING (Repérage)
• Read quickly to find specific information (a name, a date, a number).
• Your eyes move quickly over the text, not reading every word.

3. INTENSIVE READING (Lecture approfondie)
• Slow, careful reading to understand all details.
• Used for complex texts and exam questions.

4. INFERRING VOCABULARY FROM CONTEXT
• When you see an unknown word:
  - Look at the words around it.
  - Is it a noun, verb, adjective?
  - Does it resemble a word in English or another language? (cognates)
  - Does the context give a positive or negative meaning?

5. RECOGNISING TEXT STRUCTURE
• Journalistic text: 5 Ws (Qui, Quoi, Quand, Où, Pourquoi = Who, What, When, Where, Why)
• Argumentative text: thesis → arguments → examples → counterargument → conclusion.
• Narrative text: setting → characters → problem → resolution.

6. USING GRAMMATICAL KNOWLEDGE
• Recognise sentence subjects and verbs helps parse complex sentences.
• Subordinating conjunctions (parce que, bien que, quand, quoique) signal relationships.` },

        { name: "Vocabulary Acquisition from Context", link: "https://www.lawlessfrench.com/vocabulary/", notes: `BUILDING FRENCH VOCABULARY THROUGH READING

THE IMPORTANCE OF VOCABULARY
• Research shows that understanding 95-98% of words in a text allows comfortable reading.
• At A2 level: ~1500 words needed. At B2: ~5000. At C1: ~10,000.

CONTEXT CLUES FOR GUESSING VOCABULARY

1. DEFINITION OR EXPLANATION CLUE
The author defines the word in the sentence.
"Les haïkus, des poèmes japonais très courts, sont appréciés..."
→ haïkus = short Japanese poems.

2. SYNONYM OR RESTATEMENT CLUE
Another word with the same meaning is nearby.
"Il était très courageux — intrépide même face au danger."
→ intrépide = courageux (brave).

3. ANTONYM CLUE
A contrast word signals the opposite meaning.
"Contrairement à son frère paresseux, Marie est très travailleuse."
→ paresseux = opposite of travailleuse (hard-working) → lazy.

4. EXAMPLE CLUE
Examples illustrate the meaning of the word.
"Elle cultivait des légumes comme les tomates, les oignons et les carottes."
→ légumes = vegetables.

5. WORD STRUCTURE (Morphology)
• Prefix: in-/im-/ir-/il- = not: impossible, illégal, irréel.
• Suffix: -eur/-eur = agent: professeur (teacher), directeur.
• Suffix: -tion/-sion/-ation = noun: éducation, révolution.

ACTIVE VOCABULARY LEARNING
Flashcards, spaced repetition systems (Anki, Quizlet).` }

        { name: "Introduction to a Second Foreign Language II", link: "https://www.lawlessfrench.com/", notes: `SECOND LANGUAGE ACQUISITION
Second language acquisition (SLA) is the process by which people learn a language other than their native tongue.

KEY THEORIES

1. BEHAVIOURIST THEORY (Skinner)
• Language learning is habit formation through stimulus-response-reinforcement.
• Audio-lingual method: repetition drills, pattern practice.
• Criticism: does not account for creativity in language use.

2. INNATIST THEORY (Chomsky)
• Humans are born with a Language Acquisition Device (LAD).
• Universal Grammar: all languages share deep structural properties.
• Children acquire language too fast and accurately for it to be pure learning.

3. INTERACTION HYPOTHESIS (Long)
• Language is acquired best through meaningful interaction with others.
• Negotiation of meaning (asking for clarification, repeating) facilitates acquisition.

4. COMMUNICATIVE COMPETENCE (Hymes, Canale & Swain)
• Real language ability involves more than grammar: also social, cultural, and strategic skills.
• Modern language teaching focuses on communication, not just structure.

DIFFICULTIES IN LEARNING FRENCH FOR NIGERIANS
• Nasal vowels do not exist in most Nigerian languages.
• French gender (masculine/feminine nouns) has no equivalent in many Nigerian languages.
• French verb conjugation system is complex.
• Accent marks change pronunciation.
• Silent letters create spelling-pronunciation mismatches.` },

        { name: "Grammar Fundamentals", link: "https://www.lawlessfrench.com/grammar/", notes: `ESSENTIAL FRENCH GRAMMAR

ARTICLES
• Definite articles (The): le (m), la (f), l' (before vowel), les (pl)
• Indefinite articles (A/An): un (m), une (f), des (pl)
• Partitive articles (Some): du (m), de la (f), de l' (vowel), des (pl)
  After negation, always: de/d'

NOUNS AND GENDER
• ALL French nouns are either masculine or feminine.
• No consistent rule (must memorise with each noun).
• Common feminine endings: -tion, -sion, -ure, -ette, -ance, -ence.
• Plural: usually add -s (le livre → les livres).
  Exceptions: -au/-eau → -aux, -al → -aux (cheval → chevaux)

VERB TENSES (Essential)
• Présent: current/habitual action.
• Passé composé (auxiliary + past participle): completed past actions.
  Auxiliaries: avoir (most verbs) or être (movement/state + reflexive verbs).
• Imparfait: ongoing/habitual past states and actions.
• Futur proche (aller + infinitif): near future (je vais manger).
• Futur simple: future events.

KEY IRREGULAR VERBS (must memorise)
Être (to be), Avoir (to have), Aller (to go), Faire (to do/make), Pouvoir (to be able), Vouloir (to want), Savoir (to know)` },

        { name: "Vocabulary Building", link: "https://www.wordreference.com/fren/", notes: `SYSTEMATIC VOCABULARY BUILDING IN FRENCH

WORD FAMILIES (Familles de mots)
Learning related words together multiplies vocabulary quickly:
• travailler (to work) → le travail (work), le travailleur (worker), travailleur/euse (hard-working)
• manger (to eat) → la nourriture (food), le repas (meal), mangeable (edible)
• apprendre (to learn) → l'apprentissage (learning), l'apprenant (learner), appris (learned)

THEMATIC VOCABULARY SETS
1. FAMILY AND RELATIONSHIPS
   la famille, le père, la mère, le frère, la sœur, l'oncle, la tante, les grands-parents

2. NUMBERS AND QUANTITIES
   0–100 (essential), les centaines (hundreds), les milliers (thousands)

3. TIME EXPRESSIONS
   aujourd'hui (today), demain (tomorrow), hier (yesterday)
   maintenant (now), bientôt (soon), déjà (already), encore (again/still)

4. FOOD AND MEALS
   le petit-déjeuner, le déjeuner, le dîner
   le pain, le riz, le poulet, les légumes, les fruits, l'eau, le café

5. TRANSPORTATION
   le bus, le taxi, le train, l'avion, la voiture, le moto, à pied (on foot)

6. COMMON VERBS (second 50)
   chercher (look for), trouver (find), aimer (love/like), détester (hate),
   commencer (begin), finir (finish), ouvrir (open), fermer (close)` }

        { name: "Conversation in French II", link: "https://www.lawlessfrench.com/speaking/", notes: `ADVANCED ORAL FRENCH

At this level, students develop fluency and confidence in French conversation, moving from basic exchanges to expressing complex ideas.

KEY SKILLS

1. EXPRESSING OPINIONS (Donner son opinion)
• À mon avis, ... (In my opinion, ...)
• Je pense que / Je crois que ... (I think that ...)
• Il me semble que ... (It seems to me that ...)
• Je suis (tout à fait) d'accord (I completely agree)
• Je ne suis pas du tout d'accord (I completely disagree)
• D'un côté... d'un autre côté... (On one hand... on the other hand...)

2. AGREEING AND DISAGREEING (Être d'accord / Désaccord)
Polite disagreement:
• "Oui, mais..." (Yes, but...)
• "C'est vrai que..., cependant..." (It's true that..., however...)
• "Je vois ce que tu veux dire, mais..." (I see what you mean, but...)

3. ASKING FOR AND GIVING CLARIFICATION
• "Qu'est-ce que vous voulez dire par...?" (What do you mean by...?)
• "Pourriez-vous répéter plus lentement?" (Could you repeat more slowly?)
• "Autrement dit, ..." (In other words, ...)

4. CHANGING THE SUBJECT

CONVERSATION TOPICS FOR B1+ LEVEL
• Current events in Nigeria and Africa.
• Education and career choices.
• Technology and social media.

        { name: "Debating in French", link: "https://www.tv5monde.com/debats", notes: `DEBATE STRUCTURE IN FRENCH (Le débat)

FORMAL DEBATE FORMAT

INTRODUCTION
• Presenter introduces the motion (la motion).
• "La motion à débattre est la suivante: ..."
• Speakers are introduced.

FOR THE MOTION (Pour la motion)
• Opening: "Nous allons défendre la position suivante..."
• Arguments + evidence.
• Closing: "En conclusion, nous affirmons que..."

AGAINST THE MOTION (Contre la motion)
• "Au contraire, nous soutenons que..."
• Counter-arguments + evidence.
• Rebuttals of opposing arguments.

REBUTTAL (La réfutation)
• "Mes adversaires ont affirmé que..., cependant..."
• "Cet argument est réfutable parce que..."

LANGUAGE FOR DEBATE

Introducing argument: "Premièrement... / Deuxièmement... / Enfin..."
Adding a point: "De plus... / Par ailleurs... / En outre..."
Conceding a point: "Il est vrai que..., néanmoins..."
Attacking an argument: "L'argument selon lequel... est inexact / fallacieux / simpliste."
Summarising: "En résumé... / Pour conclure..."
Calling for action: "Il faut absolument... / Nous demandons que..."

SAMPLE MOTION:
"L'Afrique doit abandonner le français comme langue officielle."
Argument pour: promotes indigenous languages and cultural identity.
Argument contre: essential for international relations and education access.` },

        { name: "Presentation Skills in French", link: "https://www.skillsyouneed.com/present/presentation-planning.html", notes: `GIVING A PRESENTATION IN FRENCH (L'exposé / La présentation)

STRUCTURE
1. INTRODUCTION
   "Bonjour/Bonsoir à tous. Je m'appelle ... et aujourd'hui je vais vous parler de..."
   • Hook: interesting question, startling fact, or quote.
   • State your objective: "L'objectif de cette présentation est de..."
   • Outline: "D'abord..., ensuite..., et enfin..."

2. BODY (Corps)
   Present 2–3 main points.
   • Signal each point: "Premièrement... Deuxièmement... Enfin..."
   • Use examples and evidence.
   • Keep audience engaged: rhetorical questions, pauses.

3. CONCLUSION
   "Pour conclure..."
   • Restate main points briefly.
   • Call to action or final thought.
   • Thank the audience: "Je vous remercie de votre attention."
   • Invite questions: "Avez-vous des questions?"

DELIVERY TIPS
• Maintain eye contact (ne pas lire vos notes!).
• Speak clearly and at moderate pace.
• Use appropriate gestures.
• Use transition phrases to guide the audience.

VISUAL AIDS (Supports visuels)
• Slides (diapositives): clear, not too much text.
• Key terms in French displayed on each slide.
• Graphs, images to illustrate.

COMMON PHRASES DURING PRESENTATION
• "Comme vous pouvez le voir..." (As you can see...)
• "Il est important de noter que..." (It is important to note that...)
• "En d'autres termes..." (In other words...)` }

//  OOU-FRE158 — GENDER STUDIES IN FRENCH

"OOU-FRE158": {

    resourceKey: "FRE",
    topics: [
        { name: "Concept of Gender in French Society", link: "https://www.britannica.com/topic/gender-studies", notes: `WHAT IS GENDER?
Gender refers to the social, cultural, and psychological roles, behaviours, and identities associated with being male or female. It is distinct from biological sex.

• Sex: biological characteristics (chromosomes, hormones, anatomy).
• Gender: socially constructed roles and expectations.
• Gender identity: a person's internal sense of their own gender.
• Gender expression: how gender is communicated through appearance, behaviour.

GENDER IN FRENCH SOCIETY

HISTORICAL CONTEXT
• French women gained the right to vote only in 1944.
• The "Napoleonic Code" (1804) gave husbands legal authority over wives — repealed gradually through the 20th century.
• In 1970, France replaced "paternal authority" with "parental authority" — recognising women's equal parental rights.

GENDER EQUALITY PROGRESS IN FRANCE
• Simone Veil Law (1975): legalised abortion.
• Equal pay legislation (1972, strengthened 2018).
• Parity Law (2000): requires equal numbers of male and female candidates on electoral lists.
• Femicide awareness: movement to address violence against women (100+ women killed per year by intimate partners in France).

GENDER IN THE FRENCH LANGUAGE
• French grammar assigns masculine or feminine gender to all nouns.
• Historically, the generic masculine (using "ils" for mixed groups) has been criticised as reinforcing male dominance.
• "Écriture inclusive" (gender-neutral writing): uses "iel" (they), midpoint dots (e.g., "étudiant·e·s") — controversial; Académie française opposes it.` },

        { name: "Feminism and Women's Rights in France", link: "https://www.britannica.com/topic/feminism", notes: `WAVES OF FEMINISM IN FRANCE

FIRST WAVE (19th–early 20th century)
• Suffrage movement: demanding women's right to vote.
• Key figures: Olympe de Gouges (wrote Declaration of Rights of Woman, 1791 — executed by guillotine).
• French women got the vote: 1944 (later than UK 1918, USA 1920).

SECOND WAVE (1960s–1980s)
• Women's Liberation Movement (MLF) in France, influenced by 1968 May events.
• Key demands: legal abortion, contraception, equal pay.
• Simone de Beauvoir's "The Second Sex" (1949): "One is not born, but rather becomes, a woman."
• Simone Veil Law (1975): legalised abortion.

THIRD WAVE (1990s–2000s)
• Intersectionality: women's experiences vary by race, class, sexuality.
• Violence against women: domestic violence, rape, sexual harassment.

FOURTH WAVE (2010s–present)
• MeToo movement (#MeToo, France: #BalanceTonPorc — "denounce your pig")
• Social media accelerated awareness and accountability.
• Adèle Haenel's accusations against director Christophe Ruggia (2019) triggered major French MeToo moment.

KEY FEMINIST FIGURES IN FRANCE
• Simone de Beauvoir: existentialist philosopher and feminist writer.
• Simone Veil: minister who legalised abortion; later President of European Parliament.
• Christine Lagarde: first female head of IMF; later European Central Bank.` },

        { name: "Gender and Language in French", link: "https://www.britannica.com/topic/gender-language", notes: `GRAMMATICAL GENDER IN FRENCH
Every French noun is either masculine or feminine:
• le livre (m), la table (f), le stylo (m), la chaise (f)
• Gender is often arbitrary: le parfum (m) but la saveur (f) — both are "senses"

GENERIC MASCULINE
Traditional rule: when a group includes both men and women, masculine forms are used:
• "Les étudiants sont présents" (even if all but one are women)
• "Ils sont partis" (for mixed group)

Feminist critique: this "erases" women linguistically.

FEMINISATION OF PROFESSIONS
Traditionally, many professional titles had only masculine forms. Feminist campaigns have successfully created feminine forms:
• un professeur / une professeure
• un médecin / une médecin / une médecine (still debated)
• un auteur / une auteure / une autrice (author)
• un acteur / une actrice
• le/la Premier(e) ministre

ÉCRITURE INCLUSIVE (Gender-Neutral Writing)
• Uses a midpoint/interpunct: "les étudiant·e·s" (students, m+f)
• New pronoun "iel" (they/them: for non-binary or gender-neutral 3rd person)
• Académie française (2021): declared this an "immediate danger" to French language.
• School textbooks using écriture inclusive have been banned by some French regional governments.

DEBATES
• Language shapes thought: if French grammar always defaults to masculine, does it unconsciously marginalise women?
• Counter-argument: grammatical gender is arbitrary and distinct from social gender.` }

        { name: "Community Engagement in French", link: "https://www.francophonie.org/", notes: `COMMUNITY ENGAGEMENT
Active participation in community life, contributing to collective well-being through service, advocacy, or education.

USING FRENCH FOR COMMUNITY ENGAGEMENT IN NIGERIA

RELEVANT CONTEXTS
• Cross-border communities: Nigerian villages near the border with Benin Republic or Niger often need French communication.
• Educational outreach: teaching French in communities to improve ECOWAS integration.
• ECOMOG/Peacekeeping: Nigerian soldiers in Francophone peacekeeping contexts need French.

LANGUAGE AND COMMUNITY DEVELOPMENT
• French-speaking NGOs operate in West Africa; French-speaking staff can engage better.
• USAID, FAO, UNICEF all conduct activities in French across West Africa.
• Health campaigns (malaria, HIV) in Francophone communities need French communication.

CREATING COMMUNITY PROJECTS IN FRENCH
• Identify a community need (sanitation, literacy, food security).
• Develop a project proposal in French.
• Present the project to French-speaking partners.
• Write reports in French for international donors.

KEY VOCABULARY FOR COMMUNITY WORK
• le développement communautaire (community development)
• le projet (project), le bénévolat (volunteering)
• la sensibilisation (awareness-raising)
• la mobilisation sociale (community mobilisation)
• les bénéficiaires (beneficiaries)` },

        { name: "Cultural Exchange Activities", link: "https://www.culturalvistas.org/programs/abroad/", notes: `CULTURAL EXCHANGE AND THE FRENCH LANGUAGE

THE VALUE OF CULTURAL EXCHANGE
• Understanding another culture reduces prejudice and promotes cooperation.
• ECOWAS integration requires cultural bridges between Anglophone Nigeria and Francophone neighbours.
• French language opens doors to Francophone African culture.

TYPES OF CULTURAL EXCHANGE ACTIVITIES

1. LANGUAGE EXCHANGE PARTNERSHIPS (Échanges linguistiques)
• A Nigerian English speaker pairs with a Beninois/Nigerien French speaker.
• Each teaches their language; both develop cultural understanding.
• Platforms: Tandem, HelloTalk, Conversation Exchange.

    resourceKey: "THA",
    topics: [
        { name: "Drama as Literature", link: "https://www.britannica.com/art/dramatic-literature", notes: `WHAT IS DRAMA?
Drama is a form of literature intended to be performed on stage by actors in front of an audience. It communicates through action, dialogue, and spectacle.

DRAMA AS LITERATURE vs DRAMA AS PERFORMANCE
• As literature: we read and analyse the script (text).
• As performance: the text comes alive through voice, movement, set, and costume.
• A great dramatic text must work both on the page and on the stage.

THE ORIGINS OF DRAMA
• Ancient Greece: drama began as part of religious festivals honouring the god Dionysus (~5th century BC).
  - Tragedy: Aeschylus, Sophocles, Euripides.
  - Comedy: Aristophanes.
• Theatre spread through Rome (Plautus, Terence, Seneca), medieval Europe (mystery and morality plays), and the Renaissance (Shakespeare, Marlowe).

DRAMA IN AFRICA
• African societies have rich dramatic traditions: masquerades, festivals, oral performance.
• Written African drama in English and French emerged in the 20th century.
• Wole Soyinka (Nigeria): first African Nobel Prize in Literature (1986) — primarily a dramatist.
  Key works: The Lion and the Jewel, Death and the King's Horseman, The Trials of Brother Jero.
• John Pepper Clark-Bekederemo: Song of a Goat.
• Ola Rotimi: The Gods Are Not to Blame.

DRAMA AND SOCIETY
• Drama holds a mirror to society: criticises injustice, celebrates heroes, processes tragedy.
• Political theatre: Soyinka was imprisoned for his political plays during the Nigerian Civil War.` },

        { name: "Elements of Drama", link: "https://www.britannica.com/art/dramatic-literature/Elements-of-dramatic-literature", notes: `THE SEVEN ELEMENTS OF DRAMA (Aristotle's Poetics, 335 BC)
Aristotle identified six elements of tragedy; modern drama theorists have expanded these.

1. PLOT (Mythos) — The most important element
The sequence of events that makes up the story.
• Exposition: introduction of characters, setting, and situation.
• Rising action: complications develop; conflict intensifies.
• Climax: the moment of highest tension; the turning point.
• Falling action: events after the climax moving toward resolution.
• Resolution/Denouement: the conclusion; loose ends tied up.

2. CHARACTER (Ethos)
The people (or beings) who populate the drama.
• Protagonist: the main character, whose journey we follow.
• Antagonist: the force or character opposing the protagonist.
• Round characters: complex, multi-dimensional.
• Flat characters: one-dimensional, stereotypical.

3. THOUGHT/THEME (Dianoia)
The central ideas, messages, and philosophical content of the play.

4. DICTION/LANGUAGE (Lexis)
The language used: verse or prose? Formal or colloquial? Figurative or plain?

5. MELODY/MUSIC (Melopoeia)
Originally: song in Greek tragedy. Today: music, sound design, rhythm of speech.

6. SPECTACLE (Opsis)
Visual elements: stage design, costumes, lighting, special effects.

7. (Modern addition) AUDIENCE
Theatre is completed by the audience's response.` },

        { name: "Characterization in Drama", link: "https://www.britannica.com/art/dramatic-literature/Character", notes: `CHARACTERIZATION
Characterisation is how a playwright creates and develops characters.

METHODS OF CHARACTERIZATION

1. DIALOGUE
• What a character says reveals their personality, values, and intelligence.
• How they speak (dialect, vocabulary, style) also characterises them.

2. ACTION AND BEHAVIOUR
• What a character does under pressure reveals their true nature.
• "Actions speak louder than words" — especially in drama.

3. OTHER CHARACTERS' REACTIONS
• How other characters respond to and describe a character.

4. STAGE DIRECTIONS
• The playwright's descriptions of physical appearance, movement, and manner.

5. SOLILOQUY AND ASIDE
• SOLILOQUY: character speaks alone on stage, revealing inner thoughts.
  Example: Hamlet's "To be or not to be..." — reveals his suicidal contemplation.
• ASIDE: character speaks to the audience but other characters cannot hear.
  Used for irony and comedy.

TYPES OF CHARACTERS
• PROTAGONIST: central figure whose desires drive the plot.
• ANTAGONIST: opposes the protagonist (may be a person, society, nature, or inner conflict).
• FOIL: a character whose contrasting qualities highlight the protagonist's traits.
  Example: Laertes is a foil to Hamlet — both mourn murdered fathers, but react differently.
• STOCK/STEREOTYPED CHARACTER: the miser, the pompous authority figure, the wise fool.
• DYNAMIC CHARACTER: changes significantly through the play.
• STATIC CHARACTER: does not change.` },

        { name: "Dramatic Genres (Tragedy, Comedy, Tragicomedy)", link: "https://www.britannica.com/art/tragic-drama", notes: `TRAGEDY (La Tragédie)

ARISTOTLE'S DEFINITION
Tragedy is the imitation of an action that is serious, complete, and of a certain magnitude... through pity and fear effecting the purgation (catharsis) of these emotions.

KEY FEATURES
• A noble protagonist (a hero of high status).
• A hamartia (tragic flaw or mistake) that leads to downfall.
• Hubris (excessive pride) is a common tragic flaw.
• Catastrophe: the protagonist's downfall/death.
• Catharsis: audience feels pity and fear, then emotional release/purification.

EXAMPLES
• Sophocles: Oedipus Rex (Oedipus kills his father and marries his mother — unknowingly).
• Shakespeare: Hamlet, Macbeth, King Lear.
• African: Ola Rotimi's "The Gods Are Not to Blame" (based on Oedipus).

COMEDY (La Comédie)

KEY FEATURES
• Deals with everyday life and ordinary people.
• Uses humour, satire, and absurdity.
• Typically ends happily (often with marriage or reconciliation).
• Language is often colloquial, even vulgar.

TYPES OF COMEDY
• Physical comedy (slapstick): Commedia dell'arte, Charlie Chaplin.
• Comedy of manners: satirises social class (Molière, Oscar Wilde).
• Comedy of errors: mistaken identities (Shakespeare's Comedy of Errors).

TRAGICOMEDY (La Tragi-comédie)
• Mixes tragic and comic elements.
• Does not end in catastrophe but avoids pure happiness.
• Example: Beckett's "Waiting for Godot" — darkly comic; existential despair played for laughs.` },

        { name: "History of Drama", link: "https://www.britannica.com/art/dramatic-literature/History-of-Western-theatre", notes: `HISTORICAL OVERVIEW OF DRAMA

ANCIENT GREECE (5th century BC)
• Theatre in the sanctuary of Dionysus, Athens.
• Competitions: playwrights competed for prizes.
• THREE GREAT TRAGEDIANS: Aeschylus (Oresteia), Sophocles (Oedipus Rex), Euripides (Medea).
• ARISTOPHANES: master of comedy (Lysistrata).
• Theatre conventions: chorus, masks, open-air amphitheatre.

ROME (2nd century BC – 4th century AD)
• Plautus and Terence: comedies based on Greek models.
• Seneca: bloody, rhetorical tragedies (more meant to be read than performed).

MEDIEVAL THEATRE (10th–15th centuries)
• Mystery plays: dramatised Biblical stories in church/marketplace.
• Morality plays: allegorical (characters named Everyman, Death, Virtue).
• Everyman (anonymous): most famous morality play.

RENAISSANCE (16th century)
• Neoclassical vs popular theatre.
• England: Shakespeare (1564–1616) — greatest dramatist in English language.
• Spain: Lope de Vega, Calderón.
• France: Jean Racine (Phèdre), Corneille (Le Cid), Molière (Tartuffe, Le Bourgeois Gentilhomme).

19TH CENTURY: REALISM
• Henrik Ibsen (Norway): "Father of Modern Drama" — social problem plays (A Doll's House, Hedda Gabler).
• Chekhov (Russia): The Cherry Orchard, Three Sisters.

20TH CENTURY
• Bertolt Brecht: Epic theatre — break illusion; make audience think, not just feel.
• Samuel Beckett: Theatre of the Absurd (Waiting for Godot).
• African theatre: Soyinka, Ngugi wa Thiong'o, Athol Fugard.` },

        { name: "Dramatic Theory and Criticism", link: "https://www.britannica.com/art/theatrical-production/Dramatic-theory", notes: `MAJOR THEORIES OF DRAMA

ARISTOTLE'S POETICS (335 BC)
• First systematic theory of drama.
• Six elements: plot, character, thought, diction, melody, spectacle.
• Tragedy produces CATHARSIS (emotional purgation).
• Unity of time, place, and action (later interpreted as "three unities" by neoclassicists).

BRECHTIAN (EPIC) THEATRE
• Bertolt Brecht (1898–1956) deliberately broke the illusion of theatre (Verfremdungseffekt = alienation effect).
• Methods: characters step out of the story to address the audience; placards; songs that interrupt the narrative.
• Goal: audience should think critically about social/political issues, not just emotionally identify with characters.

STANISLAVSKI'S SYSTEM (Method Acting)
• Konstantin Stanislavski (1863–1938): actors should draw on their own emotional memories to give authentic performances.
• The actor "becomes" the character.
• Foundation of "The Method" acting in Hollywood.

THEATRE OF THE ABSURD
• Post-WWII movement: Beckett, Ionesco, Pinter.
• Humans face a meaningless universe; language and communication break down.
• Conventional logic and drama are abandoned.
• Waiting for Godot: two characters wait indefinitely for someone who never comes — symbol of human existential waiting.

AFRICAN DRAMA THEORY
• African drama synthesises performance, ritual, music, dance, and community participation.
• Not always script-based; improvisation is valued.
• Soyinka: combines Yoruba mythology with Western tragic form.` },

        { name: "Analysis of Dramatic Texts", link: "https://www.britannica.com/art/dramatic-literature", notes: `HOW TO ANALYSE A PLAY

STEP 1: READ/WATCH WITH AN OPEN MIND
• First impression: what is the play about? What are you feeling?
• Note major characters, key events, and central conflicts.

STEP 2: IDENTIFY THEME(S)
• The main idea(s) the playwright is exploring.
• Ask: What question is this play asking about human experience?
• Common themes: power and corruption, love and betrayal, tradition vs change, justice, identity.

STEP 3: ANALYSE PLOT STRUCTURE
• Map out: exposition → rising action → climax → falling action → resolution.
• Identify turning points and moments of crisis.

STEP 4: CHARACTER ANALYSIS
• Who is the protagonist? What do they want? What stands in their way?
• How do they change (or fail to change)?
• What does their journey tell us about the theme?

STEP 5: LANGUAGE AND STYLE
• How does the playwright use language to reveal character and theme?
• Imagery, metaphor, irony, symbolism.
• Verse or prose? Why?

STEP 6: DRAMATIC DEVICES
• Soliloquy: reveals inner thoughts.
• Aside: creates dramatic irony.
• Dramatic irony: audience knows what a character does not.
• Stage directions: how do they shape the physical world of the play?

STEP 7: CONTEXT
• Historical, biographical, cultural context.
• How does context help explain the play's concerns?` },

        { name: "Theatre and Performance Studies", link: "https://www.britannica.com/art/theatrical-production", notes: `FROM TEXT TO PERFORMANCE
A play is not complete until it is performed. Performance studies explores how meaning is created in the theatre.

THE THEATRICAL PRODUCTION PROCESS

1. PRE-PRODUCTION
• Director's concept: the guiding artistic vision for the production.
• Set design: how will the space look and how will it serve the story?
• Costume design: what will characters wear? How does it reveal character?
• Lighting design: mood, focus, time of day.
• Sound/Music design: atmosphere, transitions.
• Casting: choosing actors for each role.

2. REHEARSAL
• Read-through: first reading of the play with the full cast.
• Table work: discussing character, theme, and interpretation.
• Blocking: staging the physical movements of actors.
• Character work: developing truthful performances.
• Technical rehearsals: integrating set, lights, sound.
• Dress rehearsals: full run with all technical elements.

3. PERFORMANCE
• The "live" event: the play exists only in the shared moment between actors and audience.
• No two performances are identical.
• The audience's presence and response affects the performance.

4. POST-PRODUCTION ANALYSIS
• Critical reviews.
• Reflection by cast and director: what worked? what could improve?

KEY ROLES IN THEATRE
• Director, actor, designer (set/costume/lighting/sound), stage manager, producer, playwright.` },

        { name: "Dramaturgy and Play Analysis", link: "https://www.britannica.com/art/dramaturgy", notes: `DRAMATURGY
The practice and study of the composition and craft of drama.

WHAT A DRAMATURG DOES
• Researches the historical and cultural context of a play.
• Advises the director and cast on historical accuracy, social context, and interpretation.
• May adapt existing texts for new productions.
• Writes programme notes for audiences.
• Sometimes helps develop new plays (working with living playwrights).

DRAMATURGICAL ANALYSIS — QUESTIONS TO ASK

ABOUT THE WORLD OF THE PLAY
• When and where is this set? What are the social and political realities?
• What do the characters believe about their world?

ABOUT THE ACTION
• What does each character want? (Desire/objective)
• What obstacles prevent them from getting it? (Conflict)
• What is at stake? What happens if they fail?

ABOUT LANGUAGE
• Is the language realistic (mimetic) or heightened (poetic)?
• What is the rhythm of the dialogue? (Fast exchanges = conflict/excitement)

ABOUT SPACE
• Is the play site-specific (performed in a real location) or in a conventional theatre?
• Thrust, proscenium, in-the-round, black box — each stage shape creates different audience relationship.

ABOUT TIME
• Chronological or fractured time?
• How much time passes in the play's world?
• Why does the playwright start the story at this particular moment?` }
    ]
},

<script>
function getQueryParameter(name) {
    return new URLSearchParams(window.location.search).get(name);
}
let currentSubjectCode = null;
document.addEventListener('DOMContentLoaded', initializeNotesDisplay);

function initializeNotesDisplay() {
    currentSubjectCode = getQueryParameter('subject');
    if (!currentSubjectCode || !STUDY_CONTENT[currentSubjectCode]) {
        document.getElementById('subjectName').textContent = 'Error: Subject Not Found';
        return;
    }
    const subjectData = STUDY_CONTENT[currentSubjectCode];
    document.getElementById('subjectName').textContent = currentSubjectCode + ': ' + subjectData.name;
    renderTopics(subjectData.topics);
}

function renderTopics(topics) {
    const list = document.getElementById('topicList');
    list.innerHTML = '';
    topics.forEach((topic, index) => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = '<div class="topic-num">' + (index + 1) + '</div><div class="topic-name">' + topic.name + '</div>';
        card.onclick = () => displayNotes(topic);
        list.appendChild(card);
    });
}

function formatNotesContent(raw) {
    const lines = raw.split('\n');
    let html = '';
    
    lines.forEach(line => {
        const trimmed = line.trim();
        
        if (!trimmed) {
            html += '<div style="height:6px"></div>';
            return;
        }
        
        if (/^[A-Z][A-Z0-9 &()'\/—–,-]{4,}$/.test(trimmed) && !trimmed.startsWith('•') && !trimmed.startsWith('-')) {
            html += '<div class="section-heading">' + trimmed + '</div>';
            return;
        }
        
        if ((trimmed.includes('=') || trimmed.match(/[∑∫√±≈→←⊆∪∩∀∃∈]/)) 
            && trimmed.length < 120 && !trimmed.startsWith('•')) {
            html += '<code class="formula-line">' + escHtml(trimmed) + '</code>';
            return;
        }
        
        if (trimmed.startsWith('•') || trimmed.startsWith('-')) {
            html += '<div style="display:flex;gap:8px;margin:3px 0 3px 8px"><span style="color:var(--ink3);flex-shrink:0;margin-top:2px">›</span><span style="color:#334155;line-height:1.7">' + escHtml(trimmed.replace(/^[•\-]\s*/,'')) + '</span></div>';
            return;
        }
        
        if (/^\d+\.\s/.test(trimmed) && trimmed.length < 200) {
            html += '<div style="display:flex;gap:8px;margin:4px 0 4px 8px"><span style="background:var(--ink2);color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:2px">' + trimmed[0] + '</span><span style="color:#334155;line-height:1.7">' + escHtml(trimmed.replace(/^\d+\.\s+/,'')) + '</span></div>';
            return;
        }
        
        if (trimmed.includes('|') && trimmed.split('|').length >= 3) {
            const cells = trimmed.split('|').map(c => c.trim()).filter(Boolean);
            const isHeader = cells.some(c => /^[A-Z]/.test(c));
            html += '<div style="display:flex;gap:8px;padding:4px 8px;background:' + (isHeader ? 'var(--sky)' : 'transparent') + ';border-radius:4px;font-size:.83rem;font-family:var(--mono)">';
            cells.forEach(cell => {
                html += '<span style="flex:1;color:' + (isHeader ? 'var(--ink2)' : '#475569') + ';font-weight:' + (isHeader ? '600' : '400') + '">' + escHtml(cell) + '</span>';
            });
            html += '</div>';
            return;
        }
        
        html += '<p style="margin:3px 0;color:#334155;line-height:1.75">' + escHtml(trimmed) + '</p>';
    });
    
    return html;
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function displayNotes(topic) {
    const subjectData = STUDY_CONTENT[currentSubjectCode];
    const notesArea = document.getElementById('notesDisplayArea');
    document.getElementById('notesTopicTitle').textContent = 'Key Notes: ' + topic.name;
    
    const contentEl = document.getElementById('notesContent');
    contentEl.innerHTML = formatNotesContent(topic.notes || '');

    const btnContainer = document.getElementById('buttonContainer');
    btnContainer.innerHTML = '';

    const topicLink = topic.link || EXTERNAL_RESOURCES[subjectData.resourceKey] || '#';
    const readBtn = document.createElement('button');
    readBtn.className = 'notes-btn notes-btn-primary';
    readBtn.innerHTML = '🌐 Read More Online';
    readBtn.onclick = () => window.open(topicLink, '_blank');

    const driveBtn = document.createElement('button');
    driveBtn.className = 'notes-btn notes-btn-secondary';
    driveBtn.innerHTML = '📥 Download Materials';
    driveBtn.onclick = () => window.open('pdf_resources.html', '_blank');

    btnContainer.appendChild(readBtn);
    btnContainer.appendChild(driveBtn);
    notesArea.style.display = 'block';
    notesArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
