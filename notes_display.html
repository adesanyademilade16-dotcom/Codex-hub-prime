"BIO108": {
    name: "Biology Practical",
    resourceKey: "BIO",
    topics: [
        { name: "Microscopy Techniques", link: "https://www.khanacademy.org/science/biology/intro-to-biology/microscopy/a/light-microscopes", notes: `THE LIGHT (COMPOUND) MICROSCOPE

PARTS AND FUNCTIONS
• Eyepiece (ocular): magnifies x10 typically.
• Objective lenses: low power (x4, x10), high power (x40, x100 oil immersion).
• Stage: holds the slide.
• Condenser: focuses light onto specimen.
• Diaphragm/Iris: controls amount of light.
• Coarse focus knob: large adjustments.
• Fine focus knob: precise focusing.

TOTAL MAGNIFICATION = eyepiece magnification × objective magnification
  e.g., 10× eyepiece × 40× objective = 400× total

RESOLUTION vs MAGNIFICATION
• Resolution: minimum distance between two points that can be distinguished as separate.
• Light microscope: resolution ~200 nm.
• Electron microscope: resolution ~0.1 nm (x1000 better than light).

TYPES OF MICROSCOPES
• Light/Compound: used for routine cell observation.
• Electron microscope (TEM, SEM): for ultra-fine structure (organelles, viruses).
• Phase contrast: observes living, unstained cells.
• Fluorescence: uses fluorescent dyes to highlight specific molecules.

CARE AND MAINTENANCE
• Never touch lens surfaces with fingers.
• Start with lowest magnification; switch up gradually.
• Always use proper cleaning cloth.` },

        { name: "Cell Structure Observation", link: "https://www.khanacademy.org/science/biology/cellular-molecular-biology/prokaryotes-and-eukaryotes/a/prokaryote-structure", notes: `PREPARING TEMPORARY MOUNTS

ONION EPIDERMAL CELL PREPARATION
1. Peel a thin layer of epidermis from an onion scale.
2. Place on clean slide with a drop of water.
3. Add a drop of iodine/methylene blue/crystal violet to stain.
4. Cover with a coverslip (lower at 45° to avoid air bubbles).
5. Observe: you should see brick-shaped cells with cell wall, cell membrane, cytoplasm, large central vacuole, and nucleus stained dark.

CHEEK CELL PREPARATION (Animal cells)
1. Gently scrape the inside of the cheek with a flat-ended tool.
2. Smear onto clean slide with a drop of saline.
3. Stain with methylene blue.
4. Observe: smaller, irregular cells; no cell wall; visible nucleus.

WHAT TO OBSERVE AND DRAW
• Cell shape and size
• Presence/absence of cell wall
• Nucleus (location and shape)
• Vacuoles (large in plants, small in animals)
• Chloroplasts (in plant green tissue only)

BIOLOGICAL DRAWING RULES
• Use pencil only.
• Draw what you actually see, not what you expect to see.
• Use smooth, single continuous lines.
• Label with horizontal lines and label text on the right.
• Include magnification and scale bar.` },

        { name: "Mitosis and Meiosis in Cells", link: "https://www.khanacademy.org/science/biology/cellular-molecular-biology/mitosis/a/phases-of-mitosis", notes: `OBSERVING MITOSIS IN CELLS

ROOT TIP SQUASH PREPARATION (Allium/onion root tip)
1. Cut 1–2 cm of actively growing root tip.
2. Macerate in HCl (1M, 60°C, 5 min) to separate cells.
3. Squash onto slide in aceto-orcein or acetocarmine stain (stains chromosomes red).
4. Apply gentle pressure with thumb to squash cells into monolayer.
5. Seal with nail varnish.

STAGES VISIBLE UNDER MICROSCOPE
• Interphase: large cell, visible nucleus, no distinct chromosomes.
• Prophase: chromosomes become visible, condensing.
• Metaphase: chromosomes aligned at the equator (easiest stage to count chromosomes).
• Anaphase: chromosomes moving to poles.
• Telophase: two nuclei forming.

MITOTIC INDEX
MI = (number of cells in mitosis / total number of cells) × 100
Higher MI indicates faster growing/dividing tissue (e.g., cancer has high MI).

OBSERVING MEIOSIS
• Testis sections or anthers (pollen mother cells) are used.
• Prophase I shows bivalents (pairs of homologous chromosomes).
• Crossing over visible as chiasmata in late prophase I.` },

        { name: "Plant Tissue Preparation", link: "https://www.britannica.com/science/plant-anatomy", notes: `WHY STUDY PLANT TISSUES?
To understand structure and function of different plant tissues (vascular, ground, dermal).

TYPES OF PLANT SECTIONS
• Transverse section (TS): cut across the organ (shows circular arrangement).
• Longitudinal section (LS): cut along the length (shows elongation of cells).

PREPARING HAND SECTIONS
1. Hold plant material (stem, root, leaf) between two pieces of carrot or elder pith for support.
2. Use a razor blade to cut as thin as possible sections.
3. Float sections onto water in a watch glass to select the thinnest ones.
4. Stain with phloroglucinol (stains lignified cell walls red/pink) or toluidine blue.
5. Mount on slide with glycerol and coverslip.

WHAT TO IDENTIFY IN STEMS
• Epidermis: outer protective layer.
• Cortex: parenchyma cells for storage.
• Vascular bundles: arranged in a ring (dicots) or scattered (monocots).
  - Xylem: thick-walled, dead cells; stains red with phloroglucinol.
  - Phloem: thin-walled, living cells; companion cells present.
• Pith: central parenchyma.

WHAT TO IDENTIFY IN ROOTS
• Epidermis with root hairs.
• Cortex (stores starch).
• Endodermis with Casparian strip.
• Pericycle, xylem (X-shaped), phloem (between xylem arms).` },

        { name: "Aseptic Techniques", link: "https://www.britannica.com/science/asepsis", notes: `WHAT ARE ASEPTIC TECHNIQUES?
Procedures that prevent contamination of cultures and specimens with unwanted microorganisms.

WHY ASEPSIS IS IMPORTANT
• To obtain pure cultures of a specific organism.
• To prevent contamination of experiments.
• To protect the experimenter from potentially pathogenic organisms.

KEY ASEPTIC PRACTICES

1. FLAMING
• Bunsen burner flame is used to sterilise metal inoculation loops, needles.
• Hold loop in blue (hot) part of flame until red-hot; cool before use.
• Flame the neck/mouth of culture tubes/bottles before and after opening.

2. LAMINAR FLOW CABINET (CLEAN BENCH)
• Provides sterile air flow over work area.
• Work performed here has minimal contamination risk.

3. INOCULATION TECHNIQUE
• Streak plate method: zigzag pattern to dilute bacteria and isolate colonies.
• Pour plate method: diluted bacteria mixed with molten agar before pouring.
• Loop method: transfer from one tube to another.

4. AUTOCLAVING (STERILISATION)
• 121°C, 15 psi, 15 minutes kills all spores and vegetative cells.
• Used for culture media, glassware.

5. UV IRRADIATION
• UV lamp in cabinet kills surface microorganisms.
• Does not penetrate materials; protects bench surfaces only.` },

        { name: "Staining Techniques", link: "https://www.khanacademy.org/science/biology/bacteria-archaea", notes: `WHY STAIN BIOLOGICAL SPECIMENS?
Most cells and tissues are nearly transparent; staining adds contrast for visibility.

SIMPLE STAINING
• One stain applied. All cells the same colour.
• Methylene blue: stains nuclei/bacterial cells blue.
• Crystal violet: stains all bacteria.
• Purpose: observe cell shape and arrangement.

DIFFERENTIAL STAINING

GRAM STAINING (most important bacteriological stain)
1. Crystal violet (primary stain): all cells purple.
2. Gram's iodine (mordant): fixes crystal violet.
3. Acetone/alcohol (decolouriser): removes crystal violet from Gram-negative cells.
4. Safranin (counterstain): Gram-negative cells stain pink.

Result:
• Gram-positive: Purple (thick peptidoglycan retains crystal violet)
• Gram-negative: Pink/red (thin peptidoglycan loses stain)

ACID-FAST STAINING (Ziehl-Neelsen)
• For Mycobacterium tuberculosis (TB bacillus) and M. leprae.
• Acid-fast bacteria retain carbol-fuchsin (red) even after acid decolorisation.
• Non-acid-fast: blue after methylene blue counterstain.

SPECIAL STAINS
• Iodine: stains starch blue-black.
• Phloroglucinol: stains lignin red-pink.
• Aceto-carmine/aceto-orcein: stains chromosomes red (mitosis/meiosis).` },

        { name: "Biological Drawing and Documentation", link: "https://www.britannica.com/science/biological-illustration", notes: `IMPORTANCE OF BIOLOGICAL DRAWING
Scientific drawings create a permanent, accurate record of what was observed. They are preferred over photographs in many contexts because they focus attention on the key features.

RULES FOR BIOLOGICAL DRAWINGS

1. USE PENCIL ONLY
• Dark, sharp, well-defined lines.
• No shading (unless specifically required — use stippling/dots instead).

2. DRAW WHAT YOU SEE — NOT WHAT YOU THINK YOU SHOULD SEE
• Do not "invent" structures not visible in your specimen.

3. PROPORTION AND SIZE
• Proportions must be correct.
• Drawings should be large enough to show details clearly.

4. CLEAN LINES
• Smooth, single, continuous lines.
• No sketchy or rough lines.
• Do not draw dotted lines for visible features.

5. LABELS AND ANNOTATION
• Use a ruler to draw label lines.
• All label lines should be horizontal.
• Label text on the right-hand side where possible.
• Labels should be written in small, clear letters; no arrows needed.

6. TITLE AND MAGNIFICATION
• Write the name of the specimen (species name if known).
• State section type (TS/LS), magnification used.
• Scale bar: e.g., [___ 0.1 mm]

7. PLAN DRAWINGS vs DETAIL DRAWINGS
• Plan drawing: shows distribution of tissues; no individual cells.
• Detail drawing: shows individual cells in one region.` },

        { name: "Laboratory Safety and Ethics", link: "https://www.nsc.org/lab-safety", notes: `SAFETY IN THE BIOLOGY LABORATORY

BIOHAZARD RISKS
• Microorganism cultures: potential pathogens.
• Human tissue and blood: risk of bloodborne pathogens (HIV, Hepatitis B).
• Plant/animal specimens: may carry allergens or parasites.

CONTAINMENT LEVELS
• Biosafety Level 1 (BSL-1): Non-pathogenic organisms (used in teaching labs).
• BSL-2: Moderate-risk organisms (E. coli, Salmonella).
• BSL-3: Serious/potentially lethal agents (TB bacillus).
• BSL-4: Deadly agents with no cure (Ebola — only in specialised labs).

SAFETY RULES IN BIOLOGY LAB
• Wear lab coat, gloves, and goggles.
• Never eat, drink, or apply cosmetics in the lab.
• Wash hands thoroughly before leaving.
• Dispose of biological waste in appropriate biohazard containers.
• Report all cuts, spills, and accidents immediately.
• Autoclave or disinfect all material before disposal.

ETHICAL ISSUES IN BIOLOGY

ANIMAL ETHICS
• The 3Rs principle: Replace, Reduce, Refine animal experiments.
• Experiments must be approved by an Institutional Animal Care Committee.

HUMAN RESEARCH ETHICS
• Informed consent: participants must understand what they are agreeing to.
• Confidentiality: personal data must be protected.
• Beneficence: research should benefit humanity.
• Do no harm: risks to participants must be minimal.

SCIENTIFIC INTEGRITY
• Never fabricate or falsify data.
• Acknowledge all sources (no plagiarism).
• Report findings honestly, even negative results.` },

        { name: "Microorganism Culturing", link: "https://www.khanacademy.org/science/biology/bacteria-archaea", notes: `GROWING MICROORGANISMS IN THE LAB

CULTURE MEDIA
• Nutrient broth: liquid; used for mass growth.
• Nutrient agar: solid (after cooling); used for isolation.
• Selective media: favours growth of specific organisms (e.g., blood agar for haemolytic bacteria).
• Differential media: distinguishes organisms based on colony appearance.

STERILISATION OF MEDIA
• Autoclave at 121°C, 15 psi, 15 min.
• Pour into Petri dishes and allow to solidify before use.

STREAKING FOR ISOLATION
Goal: dilute bacteria enough to get individual colonies.
1. Flame loop; cool.
2. Pick up a loopful of culture.
3. Streak in zone 1 (one third of plate) back and forth.
4. Flame loop; rotate plate 60°; streak through end of zone 1 into zone 2.
5. Repeat for zone 3.
6. Invert Petri dish; incubate at appropriate temperature (37°C for human pathogens).

COLONY CHARACTERISTICS
• Size, shape, colour, margin, texture, elevation.
• These help identify organisms.

INCUBATION CONDITIONS
• Temperature: most human pathogens grow best at 37°C.
• Time: most bacteria form visible colonies in 24–48 hours.
• Atmosphere: aerobic (most), anaerobic (e.g., anaerobe jar).` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  BOT102 — BOTANY
// ═══════════════════════════════════════════════════════════════
"BOT102": {
    name: "Botany",
    resourceKey: "BIO",
    topics: [
        { name: "Plant Classification and Biodiversity", link: "https://www.britannica.com/science/plant", notes: `PLANT KINGDOM (PLANTAE)
Plants are multicellular eukaryotes that are photosynthetic (contain chlorophyll), have cell walls made of cellulose, and alternate between haploid (gametophyte) and diploid (sporophyte) generations.

MAJOR PLANT DIVISIONS

1. BRYOPHYTA (Non-vascular plants)
• Mosses, liverworts, hornworts.
• No true roots, stems, or leaves (rhizoids, thallus).
• No vascular tissue; depend on diffusion.
• Require water for reproduction.
• Live in moist environments.

2. PTERIDOPHYTA (Vascular, seedless)
• Ferns, horsetails, clubmosses.
• Have xylem and phloem (vascular tissue).
• No seeds; reproduce by spores.
• Sporophyte is dominant generation.

3. GYMNOSPERMS (Naked seeds)
• Conifers (pine, cedar, fir, spruce), cycads, Ginkgo.
• Seeds not enclosed in a fruit.
• Pollination by wind.
• Example: Most plantation timber trees.

4. ANGIOSPERMS (Flowering plants) — most advanced
• Seeds enclosed in fruits.
• Most diverse plant group (~250,000 species).
• Monocots: 1 cotyledon, parallel veins, floral parts in 3s. (grasses, palms, maize, rice)
• Dicots: 2 cotyledons, net veins, floral parts in 4s or 5s. (beans, mango, cocoa, tomato)` },

        { name: "Morphology of Flowering Plants", link: "https://www.britannica.com/science/angiosperm", notes: `MORPHOLOGY = study of external form and structure.

THE ROOT
FUNCTIONS: Anchorage, absorption of water and minerals, storage, transport.
TYPES:
• Taproot system: one main root + laterals (dicots, e.g., carrot).
• Fibrous root system: no main root; many similar roots (monocots, e.g., maize).
• Adventitious roots: arise from stem (e.g., maize prop roots, mangrove pneumatophores).

ROOT MODIFICATIONS
• Storage roots: cassava, yam (thick, store starch).
• Aerial roots: orchids (absorb moisture from air).
• Parasitic haustoria: penetrate host plant (e.g., striga weed).

THE STEM
FUNCTIONS: Support, transport (xylem + phloem), storage.
MODIFICATIONS: Bulb (onion), corm (cocoyam), rhizome (ginger), runner/stolon (strawberry), tendril (cucumber), thorn (orange).

THE LEAF
FUNCTIONS: Photosynthesis, transpiration, gas exchange.
PARTS: Lamina (blade), petiole (stalk), stipules (if present), midrib, veins.
TYPES: Simple leaf (one blade), compound leaf (leaflets — e.g., oil palm, acacia).

THE FLOWER
Parts: Sepals (calyx), Petals (corolla), Stamens (anthers + filaments), Pistil/Carpel (stigma + style + ovary).
• Perfect flower: has both stamens and pistil.
• Imperfect flower: only stamens OR pistil.` },

        { name: "Plant Physiology", link: "https://www.britannica.com/science/plant-physiology", notes: `PLANT PHYSIOLOGY — the study of how plants function.

MINERAL NUTRITION
Plants require macronutrients (N, P, K, Ca, Mg, S) and micronutrients (Fe, Mn, Cu, Zn, B, Mo, Cl).

NITROGEN (N): For amino acids, proteins, nucleic acids, chlorophyll. Deficiency → yellowing (chlorosis).
PHOSPHORUS (P): For ATP, nucleic acids, phospholipids. Deficiency → purple leaves.
POTASSIUM (K): For enzyme activation, stomatal opening. Deficiency → leaf margin burning.
IRON (Fe): For chlorophyll synthesis. Deficiency → interveinal chlorosis.

WATER RELATIONS
• Water potential (Ψ): Ψ = Ψ_s + Ψ_p (osmotic + pressure)
• Water moves from high Ψ to low Ψ (down the gradient).
• Turgid cell: high Ψ_p (high pressure potential).
• Plasmolysis: cell loses water; membrane pulls away from cell wall.
• Wilting: loss of turgor pressure.

HORMONES
• Auxin (IAA): promotes cell elongation; phototropism; apical dominance.
• Gibberellins: promote stem elongation, seed germination, fruit development.
• Cytokinins: promote cell division; delay leaf senescence.
• Abscisic acid (ABA): promotes dormancy, stomatal closure (drought response).
• Ethylene: promotes fruit ripening; leaf abscission.` },

        { name: "Photosynthesis and Respiration", link: "https://www.khanacademy.org/science/biology/photosynthesis-in-plants", notes: `PHOTOSYNTHESIS
The process by which plants use light energy, CO₂, and water to produce glucose and oxygen.
  6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂

TWO STAGES
1. LIGHT REACTIONS (in thylakoid membranes)
   • Light absorbed by chlorophyll.
   • Water split (photolysis): 2H₂O → 4H⁺ + 4e⁻ + O₂
   • ATP and NADPH produced.
   • O₂ released as a by-product.

2. CALVIN CYCLE / DARK REACTIONS (in stroma)
   • CO₂ fixed by RuBisCO enzyme.
   • ATP and NADPH used to make glucose.
   • Regenerates RuBP (CO₂ acceptor).

FACTORS AFFECTING RATE
• Light intensity, CO₂ concentration, temperature, water availability, chlorophyll.

AEROBIC CELLULAR RESPIRATION
  C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36–38 ATP

STAGES
• Glycolysis (cytoplasm): glucose → 2 pyruvate + 2 ATP + 2 NADH
• Krebs Cycle (mitochondrial matrix): CO₂ released; NADH, FADH₂ produced.
• Electron Transport Chain (inner mitochondrial membrane): most ATP made.

ANAEROBIC RESPIRATION (in plants under waterlogging)
  Pyruvate → ethanol + CO₂ (only 2 ATP total)` },

        { name: "Plant Reproduction", link: "https://www.britannica.com/science/plant-reproduction", notes: `TYPES OF PLANT REPRODUCTION

ASEXUAL REPRODUCTION (VEGETATIVE PROPAGATION)
• No fertilisation; offspring are genetically identical (clones) to parent.
• Natural methods: runners (strawberry), bulbs (onion), tubers (yam, cassava), rhizomes (ginger), stem cuttings.
• Artificial methods: grafting (cocoa, citrus), cuttings (cassava, sugarcane), tissue culture.
• Advantage: faster than seeds; maintains desirable traits.

SEXUAL REPRODUCTION IN FLOWERING PLANTS

POLLINATION: Transfer of pollen from anther to stigma.
• Self-pollination: same flower or same plant.
• Cross-pollination: different plant of same species. Agents: wind, insects, birds, water.

FERTILISATION: Double fertilisation (unique to angiosperms):
• One sperm fertilises egg → zygote → embryo.
• Other sperm fertilises two polar nuclei → endosperm (food for embryo).

SEED AND FRUIT DEVELOPMENT
• Ovule → seed; ovary wall → fruit wall (pericarp).
• Fruit types: drupe (mango), berry (tomato), pod (beans), capsule (okra), nut (cashew).

GERMINATION CONDITIONS
• Water, oxygen, suitable temperature.
• Some seeds also need light or a period of cold (vernalisation).` },

        { name: "Seed Structure and Germination", link: "https://byjus.com/biology/seed-germination/", notes: `SEED STRUCTURE

A seed consists of:
1. SEED COAT (TESTA): Protective outer layer; may be hard or papery.
   Hilum: scar where seed was attached to ovary wall.
   Micropyle: small pore through which water enters.

2. EMBRYO: The new plant within the seed.
   • Radicle: develops into the root.
   • Plumule: develops into the shoot.
   • Hypocotyl: region between radicle and cotyledons.
   • Cotyledon(s): seed leaf/leaves; store food OR absorb food from endosperm.

3. ENDOSPERM (in some seeds): nutritive tissue surrounding the embryo.

DICOT SEED EXAMPLE (bean/Phaseolus)
• Two cotyledons storing food (starch, protein, fat).
• No separate endosperm (food stored in cotyledons).

MONOCOT SEED EXAMPLE (maize/Zea mays)
• One cotyledon (scutellum) that absorbs food from the endosperm.
• Coleoptile: sheath protecting plumule.
• Coleorhiza: sheath protecting radicle.

GERMINATION PROCESS
1. Water absorption (imbibition) → seed swells.
2. Enzymes activated; food reserves mobilised.
3. Radicle emerges first → root system established.
4. Shoot (plumule) emerges next.
5. Cotyledons may emerge above ground (epigeal — bean) or remain below (hypogeal — maize).` },

        { name: "Ecological Adaptations of Plants", link: "https://www.britannica.com/science/plant-adaptation", notes: `PLANTS IN DIFFERENT ENVIRONMENTS

XEROPHYTES (drought-tolerant plants: desert/dry savanna)
• Reduced/absent leaves → reduced transpiration.
• Thick waxy cuticle on leaves.
• Deep or extensive root systems (tap roots reach water table).
• Succulent stems/leaves store water (cacti, agave, aloe).
• CAM photosynthesis: stomata open only at night to reduce water loss.
• Small leaf area; rolled leaves (grasses).
Examples in Nigeria: Euphorbia species, dry-zone grasses, baobab.

HYDROPHYTES (water plants)
• Submerged, floating, or emergent in water.
• Air spaces (aerenchyma) in stems for buoyancy and oxygen transport to submerged roots.
• Water lilies: stomata on upper surface; cuticle waxy above.
• Floating leaves: broad surface to maximise light absorption.
Examples: water hyacinth (invasive in Nigeria's waterways!), papyrus.

HALOPHYTES (salt-tolerant plants: mangroves)
• Mangrove trees: pneumatophores (aerial roots) for oxygen exchange in waterlogged soil.
• Viviparous seeds: germinate on parent tree; seedling drops as a ready-to-root propagule.
• Salt glands: excrete excess salt.
Examples: Rhizophora, Avicennia (dominant in Niger Delta mangroves).

EPIPHYTES (plants growing on other plants for support only)
• Not parasites; get nutrients from air, rain, and debris.
• Orchids, bromeliads, ferns.` },

        { name: "Medicinal Plants", link: "https://www.who.int/traditional-complementary-integrative-medicine/en/", notes: `IMPORTANCE OF MEDICINAL PLANTS
About 80% of the world's population, especially in rural Africa, depend primarily on traditional plant-based medicine for primary healthcare (WHO estimate).

COMMON MEDICINAL PLANTS IN NIGERIA

1. NEEM (Azadirachta indica)
• Uses: Antimalarial, antiparasitic, antifungal.
• Active compound: Azadirachtin.
• Used as insecticide, toothbrush (chew sticks), skin treatment.

2. MORINDA LUCIDA (Oruwo in Yoruba)
• Uses: Fever, malaria treatment in traditional medicine.

3. OCIMUM GRATISSIMUM (African basil; Efirin)
• Uses: Antimicrobial; used for coughs, nasal congestion, skin infections.

4. CARICA PAPAYA (Pawpaw)
• Leaves: used for malaria treatment (contain antiplasmodial compounds).
• Unripe fruit: contains papain enzyme (used to tenderise meat and treat wounds).

5. ZINGIBER OFFICINALE (Ginger)
• Uses: Nausea, anti-inflammatory, digestive disorders.
• Active compound: Gingerols.

6. ALLIUM SATIVUM (Garlic)
• Uses: Antibacterial, cardiovascular benefits (reduces blood pressure/cholesterol).

IMPORTANCE TO PHARMACEUTICAL INDUSTRY
Many modern drugs originated from plant compounds:
• Aspirin from willow bark (salicin).
• Morphine/Codeine from Papaver somniferum (opium poppy).
• Artemisinin (anti-malaria) from Artemisia annua (Nobel Prize 2015).` },

        { name: "Economic Botany", link: "https://www.britannica.com/science/economic-botany", notes: `ECONOMIC BOTANY
The study of plants used by humans for food, medicine, timber, fibre, and other purposes.

FOOD PLANTS
• Cereals: maize, rice, wheat, sorghum, millet — provide most of the world's calories.
• Root/tuber crops: cassava (Nigeria = world's largest producer!), yam, sweet potato.
• Legumes: cowpea, groundnut, soybean — important protein sources.
• Tree crops: cocoa, oil palm, cashew, mango, banana/plantain.

INDUSTRIAL CROPS
• Rubber (Hevea brasiliensis): latex for tyres and rubber products. Major crop in Edo/Delta/Ondo states.
• Cotton (Gossypium hirsutum): fibre for textiles; seed for edible oil. Grown in northern Nigeria.
• Oil palm (Elaeis guineensis): palm oil (edible) + palm kernel oil (soap, cosmetics). Nigeria was once world's largest exporter.

TIMBER AND WOOD
• Hardwoods: teak, mahogany, iroko, obeche — used in furniture and construction.
• Softwoods: pine, eucalyptus — pulp for paper.
• Bamboo: fast-growing; used for furniture, construction, and crafts.

CONSERVATION OF PLANT GENETIC RESOURCES
• Many traditional crop varieties (landraces) are being lost as farmers adopt improved varieties.
• Gene banks (e.g., IITA in Ibadan) preserve seed samples.
• In situ conservation: national parks and forest reserves preserve wild relatives.
• Biodiversity loss is a major threat to food security.` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  ZOO102 — ANIMAL DIVERSITY
// ═══════════════════════════════════════════════════════════════
"ZOO102": {
    name: "Animal Diversity",
    resourceKey: "BIO",
    topics: [
        { name: "Introduction to Animal Diversity", link: "https://www.britannica.com/animal/animal", notes: `Animals = multicellular eukaryotes; heterotrophic; usually motile; no cell walls.

KEY CLASSIFICATION CRITERIA
1. Body symmetry: Radial (jellyfish, sea urchin) vs Bilateral (most animals).
2. Body cavity: Acoelomate (no cavity — flatworms), Pseudocoelomate (false cavity — roundworms), Coelomate (true cavity lined by mesoderm — earthworms to mammals).
3. Germ layers: Diploblastic (2 layers — Cnidarians) vs Triploblastic (3 layers — most others).
4. Segmentation: repeated body units (Annelids, Arthropods, Chordates).
5. Notochord & dorsal nerve cord (Phylum Chordata).

PHYLA ORDER (simple → complex):
Porifera → Cnidaria → Platyhelminthes → Nematoda → Annelida → Mollusca → Arthropoda → Echinodermata → Chordata` },

        { name: "Phylum Protozoa", link: "https://www.britannica.com/science/protozoan", notes: `Unicellular eukaryotes; heterotrophic. Now classified in Kingdom Protista.

CLASSIFICATION BY LOCOMOTION
1. Sarcodina (Amoebozoa): move by pseudopodia. Amoeba proteus; Entamoeba histolytica (amoebic dysentery).
2. Mastigophora (Flagellates): move by flagella. Trypanosoma gambiense (sleeping sickness; tsetse fly), Giardia.
3. Ciliophora (Ciliates): move by cilia. Paramecium (most complex; two nuclei).
4. Sporozoa (Apicomplexa): non-motile; ALL PARASITES.
   PLASMODIUM → MALARIA (P. falciparum most deadly; ~600,000 deaths/year).
   Transmitted by female Anopheles mosquito.

IMPORTANCE: Malaria, sleeping sickness, amoebic dysentery — major health challenges in Nigeria.` },

        { name: "Phylum Coelenterata", link: "https://www.britannica.com/animal/cnidarian", notes: `Also called CNIDARIA (cnidos = stinging nettle).

CHARACTERISTICS
• Radially symmetrical.
• DIPLOBLASTIC: epidermis + gastrodermis, separated by mesoglea.
• Single opening (mouth); gastrovascular cavity.
• CNIDOCYTES: unique stinging cells containing nematocysts (inject toxin into prey).
• Two body forms: POLYP (sessile, cylindrical) and MEDUSA (free-swimming, bell-shaped).

CLASSES
• Hydrozoa: Hydra (freshwater, only polyp); Portuguese man-of-war (colonial).
• Scyphozoa: jellyfish (e.g., Aurelia) — dominant medusa stage.
• Anthozoa: sea anemones and corals — only polyp stage; no medusa.

IMPORTANCE: Coral reefs = most biodiverse marine ecosystems.` },

        { name: "Phylum Platyhelminthes", link: "https://www.britannica.com/animal/flatworm", notes: `FLATWORMS — dorsoventrally flattened; triploblastic; ACOELOMATE.

CHARACTERISTICS
• Bilaterally symmetrical; no circulatory or respiratory system (flat → gas exchange by diffusion).
• Excretion by flame cells. Most are HERMAPHRODITES.

CLASSES
1. Turbellaria: free-living. Planaria (famous for regeneration).
2. Trematoda (Flukes): ALL PARASITES; complex life cycles with intermediate host (snail!).
   Schistosoma → SCHISTOSOMIASIS (bilharzia); major disease in Nigeria!
   Fasciola hepatica → liver fluke in sheep and cattle.
3. Cestoda (Tapeworms): adult lives in vertebrate intestine.
   Taenia saginata (beef; cow is intermediate host).
   Taenia solium (pork; pig is intermediate host).
   Head = scolex (with hooks/suckers). Body = proglottids.` },

        { name: "Phylum Nematoda", link: "https://www.britannica.com/animal/roundworm-phylum-Nematoda", notes: `ROUNDWORMS — cylindrical, unsegmented, PSEUDOCOELOMATE.

CHARACTERISTICS
• Tapered at both ends; covered by tough CUTICLE (moulted as they grow).
• Separate sexes (females usually larger); complete digestive system (mouth→anus).
• Most numerous multicellular animals on Earth!

PARASITIC (major human pathogens!)
• Ascaris lumbricoides: large intestinal roundworm — VERY COMMON in Nigeria. Fecal-oral transmission; causes malnutrition.
• Enterobius (pinworm): causes perianal itching, especially in children.
• Wuchereria bancrofti: FILARIASIS (elephantiasis); transmitted by mosquitoes.
• Hookworms (Ancylostoma/Necator): penetrate skin; cause anaemia.

PLANT PARASITES: root-knot nematodes damage cassava, tomato, pepper.` },

        { name: "Phylum Arthropoda", link: "https://www.britannica.com/animal/arthropod", notes: `LARGEST ANIMAL PHYLUM — ~80% of all known animal species!

CHARACTERISTICS
• Bilaterally symmetrical; segmented body.
• EXOSKELETON (chitin-protein): protection + prevents water loss. Must be MOULTED (ecdysis) for growth.
• JOINTED appendages (arthr=joint, poda=foot).
• Open circulatory system (haemolymph in haemocoel).

MAJOR CLASSES
1. INSECTA: 3 body parts (head,thorax,abdomen); 3 pairs legs; 2 pairs wings (usually).
   Mosquito (Anopheles=malaria, Culex=filariasis, Aedes=yellow fever/dengue).
   Metamorphosis: Complete (egg→larva→pupa→adult) or Incomplete (egg→nymph→adult).
2. ARACHNIDA: 2 body parts (cephalothorax+abdomen); 4 pairs legs; no wings.
   Spiders, scorpions, ticks (transmit Lyme disease), mites.
3. CRUSTACEA: usually aquatic; 2 pairs antennae. Crabs, lobsters, shrimps, crayfish.
4. MYRIAPODA: Centipedes (one pair legs per segment; predatory) and Millipedes (two pairs; herbivorous).` },

        { name: "Phylum Mollusca", link: "https://www.britannica.com/animal/mollusk", notes: `2nd LARGEST phylum; wide diversity: snails, clams, squids, octopuses.

GENERAL CHARACTERISTICS
• Soft-bodied (mollis=soft).
• Usually have a SHELL (calcium carbonate) — lost in slugs, octopuses.
• MANTLE: fleshy fold that secretes the shell.
• RADULA: toothed tongue for feeding (absent in bivalves).
• Muscular FOOT for locomotion.

MAJOR CLASSES
1. GASTROPODA (snails, slugs): single coiled shell; undergoes torsion.
   Freshwater snails = INTERMEDIATE HOSTS for Schistosoma and liver fluke!
   Giant African land snail (Achatina): edible in Nigeria.
2. BIVALVIA (clams, oysters, mussels): two hinged valves; filter feeders; no radula.
   Commercially important seafood.
3. CEPHALOPODA (squid, octopus, cuttlefish): most intelligent invertebrates!
   Jet propulsion; ink sac for defence; 8 or 10 tentacles; complex eyes.` },

        { name: "Phylum Annelida", link: "https://www.britannica.com/animal/annelid", notes: `SEGMENTED WORMS — true METAMERIC segmentation (repeated body units).

CHARACTERISTICS
• TRUE COELOM (lined by mesoderm/peritoneum).
• CLOSED circulatory system (blood in vessels — unlike arthropods!).
• Each segment has: nerve ganglia, nephridia (excretory), muscles, blood vessels.
• SETAE (chaetae): tiny bristles; aid locomotion.

MAJOR CLASSES
1. POLYCHAETA (many bristles): mostly marine; parapodia for swimming. Nereis (ragworm).
2. OLIGOCHAETA (few bristles): terrestrial and freshwater; no parapodia.
   Key example: EARTHWORM (Lumbricus terrestris).
   Importance: burrowing aerates/drains soil; casts enrich soil; decompose organic matter.
3. HIRUDINEA (LEECHES): suckers at each end; no setae.
   Parasitic blood-suckers OR predators.
   Medical use: hirudin (anti-coagulant) used in microsurgery.` },

        { name: "Phylum Echinodermata", link: "https://www.britannica.com/animal/echinoderm", notes: `ECHINODERMS (echino=spiny; derma=skin)

CHARACTERISTICS
• PENTARADIAL SYMMETRY (5-fold) as adults; bilateral as larvae.
• WATER VASCULAR SYSTEM: unique hydraulic system for locomotion via tube feet.
• CALCAREOUS ENDOSKELETON (calcium carbonate ossicles) under skin.
• Triploblastic, coelomate.
• Slow moving; mostly marine.

MAJOR CLASSES
1. ASTEROIDEA (Starfish/Sea stars)
   • 5+ arms; tube feet with suckers for locomotion and opening shellfish.
   • Remarkable regeneration ability.

2. ECHINOIDEA (Sea urchins, sand dollars)
   • No arms; globular body covered with moveable spines.
   • Aristotle's lantern: complex jaw apparatus for feeding on algae.

3. HOLOTHUROIDEA (Sea cucumbers)
   • Elongated; soft body; no spines.
   • Food source in Asia.

4. CRINOIDEA (Sea lilies, feather stars)
   • Sessile or free-moving; filter feeders.

5. OPHIUROIDEA (Brittle stars)
   • Long, slender arms; move by writhing.

ECOLOGICAL IMPORTANCE
• Starfish are keystone predators in rocky intertidal zones.
• Sea urchin grazing controls algae on coral reefs.` },

        { name: "Phylum Chordata", link: "https://www.britannica.com/animal/chordate", notes: `DEFINING CHARACTERISTICS OF CHORDATES
At some stage in their life (even if only embryonic), all chordates have:
1. NOTOCHORD: flexible rod providing support.
2. DORSAL HOLLOW NERVE CORD: develops into brain + spinal cord.
3. PHARYNGEAL SLITS: gill slits (function in filter-feeding or gas exchange).
4. POST-ANAL TAIL: extension of body past the anus.

SUB-PHYLA
1. Urochordata (Tunicates/Sea squirts): adults are sessile filter feeders; larvae have all chordate features.
2. Cephalochordata (Lancelets): fish-like; retain notochord as adults. e.g., Branchiostoma.
3. VERTEBRATA: have a vertebral column (backbone) replacing the notochord.

VERTEBRATE CLASSES
1. AGNATHA (Jawless fish): lampreys, hagfish. No jaws, no paired fins.
2. CHONDRICHTHYES (Cartilaginous fish): sharks, rays. Cartilage skeleton.
3. OSTEICHTHYES (Bony fish): most fish. Bony skeleton; swim bladder.
4. AMPHIBIA: frogs, salamanders, toads. Metamorphosis; skin must stay moist.
5. REPTILIA: lizards, snakes, crocodiles, tortoises. Dry scales; amniotic egg.
6. AVES (Birds): warm-blooded; feathers; hollow bones; hard-shelled egg.
7. MAMMALIA: warm-blooded; hair; mammary glands; mostly viviparous.
   Order Primates includes humans (Homo sapiens).` }
    ]
},

//  FRS102 — FORENSIC SCIENCE
// ═══════════════════════════════════════════════════════════════
"FRS102": {
    name: "Forensic Science",
    resourceKey: "FRS",
    topics: [
        { name: "Historical Development of Forensic Science", link: "https://www.britannica.com/topic/forensic-science", notes: `Forensic science = application of scientific methods and techniques to the investigation of crime.

KEY MILESTONES
• 700 AD: China used fingerprints on contracts and clay seals.
• 1248: Sung Tz'u (China) wrote "The Washing Away of Wrongs" — first known forensic text on cause of death.
• 1858: Sir William Herschel (India) used fingerprints for identification.
• 1879: Alphonse Bertillon introduced BERTILLONAGE — body measurements for criminal ID.
• 1892: Francis Galton published "Fingerprints" — established fingerprints are unique.
  Sir Edward Henry developed the Henry Classification System (still used).
• 1901: Karl Landsteiner discovered ABO blood groups.
• 1910: Edmond Locard proposed LOCARD'S EXCHANGE PRINCIPLE: "Every contact leaves a trace."
• 1984: Sir Alec Jeffreys developed DNA FINGERPRINTING (genetic profiling).
• 1990s: DNA profiling databases established internationally (CODIS in the US).` },

        { name: "Scopes and Areas in Forensic Science", link: "https://www.britannica.com/topic/forensic-science", notes: `MAJOR AREAS OF FORENSIC SCIENCE

1. FORENSIC PATHOLOGY: study of the body to determine cause and manner of death. Autopsy (post-mortem examination).

2. FORENSIC TOXICOLOGY: detection of drugs, poisons, and alcohol in body fluids and tissues.

3. FORENSIC BIOLOGY: blood typing, DNA analysis, identification of biological materials (hair, saliva, semen).

4. FORENSIC CHEMISTRY: analysis of drugs, explosives, paint, glass, fibres, soil samples.

5. FORENSIC ODONTOLOGY: dental evidence for identification (bite marks, dental records).

6. FORENSIC ENTOMOLOGY: use of insects to estimate time since death (post-mortem interval).

7. FORENSIC ANTHROPOLOGY: analysis of skeletal remains for identification.

8. FORENSIC DOCUMENT EXAMINATION: forgery detection, handwriting analysis.

9. DIGITAL FORENSICS: recovery and investigation of evidence from electronic devices.

10. FORENSIC PSYCHIATRY: assessment of mental state of offenders/defendants.` },

        { name: "Medical and Legal Aspects", link: "https://www.britannica.com/topic/forensic-medicine", notes: `MEDICO-LEGAL ASPECTS OF FORENSIC SCIENCE

CAUSE OF DEATH
• Forensic pathologist determines: cause, mechanism, and manner of death.
• Manner of death: Natural, Accident, Suicide, Homicide, Undetermined.
• Cause of death: the disease/injury directly causing death (e.g., gunshot wound, heart attack).

TIME OF DEATH ESTIMATION
• Rigor mortis: muscle stiffening begins 2–6 hrs, peaks 12 hrs, disappears ~48 hrs.
• Livor mortis (hypostasis): blood pools at lowest points; fixed after ~12 hrs.
• Decomposition stages: fresh, bloat, active decay, advanced decay, dry/skeletal.
• Algor mortis: body cooling; loses ~1°C/hour.
• Entomology: insect colonisation patterns estimate PMI (Post-Mortem Interval).

CHAIN OF CUSTODY
• Legal concept: every person who handles evidence must be documented.
• Any break in chain can invalidate evidence in court.

EXPERT WITNESS
• Forensic scientist who gives testimony in court based on scientific analysis.
• Must be impartial; duty is to the court, not to prosecution or defence.
• Subject to cross-examination on methodology.

CRIME SCENE INTEGRITY
• Scene must be preserved: no contamination.
• Primary scene (where crime occurred) vs secondary scenes.` },

        { name: "Documentation and Court Presentation", link: "https://www.britannica.com/topic/forensic-science", notes: `CRIME SCENE DOCUMENTATION
• Photography: overall, mid-range, close-up shots. Measure and include scale markers.
• Sketching: rough sketch at scene; final scale drawing in lab.
• Notes: detailed written record — date, time, weather, personnel present, observations.
• Video recording: increasingly standard.

EVIDENCE HANDLING
• CHAIN OF CUSTODY: every person who handles evidence must be documented. Any break in chain can invalidate evidence in court.
• LOCARD'S EXCHANGE PRINCIPLE: "Every contact leaves a trace" — the fundamental principle of trace evidence.
• Packaging: biological samples in paper (not plastic — prevents mould); hard evidence in sealed plastic bags.

COURT PRESENTATION
• Expert witness: forensic scientist explains findings clearly to judge/jury.
• Must be objective, impartial — not an advocate for either side.
• Written report: must clearly state findings, methods, limitations, and conclusions.
• Must be able to withstand cross-examination on methodology and interpretation.` },

        { name: "Fingerprint Detection, Preservation & Analysis", link: "https://www.nist.gov/topics/forensic-science/fingerprints", notes: `TYPES OF FINGERPRINTS
• Latent: invisible; made by sweat/oils; require development to become visible.
• Patent (Visible): already visible; left in blood, grease, paint, dust.
• Plastic (3D/Impressed): left in soft materials (wax, putty, fresh paint, butter).

DEVELOPMENT TECHNIQUES
• Powder dusting (latent on smooth non-porous surfaces): aluminium (light), carbon (dark).
• Ninhydrin: reacts with amino acids; best for paper/cardboard. Produces purple Ruhemann's complex.
• Cyanoacrylate fuming (superglue): vapour reacts with sweat; gives white deposit on non-porous surfaces.
• VMD (Vacuum Metal Deposition): gold + zinc; most sensitive for plastic bags.
• Iodine fuming: temporary; good for paper; must be photographed immediately.

PRESERVATION: lift with adhesive tape; photograph before lifting; use appropriate packaging.` },

        { name: "Patterns and Classification of Fingerprints", link: "https://www.nist.gov/topics/forensic-science/fingerprints", notes: `FRICTION RIDGE SKIN: unique to every individual; permanent.

THREE FUNDAMENTAL RIDGE PATTERNS

1. LOOPS (most common: ~65-70% of population)
  • One delta; ridges enter and exit on the same side.
  • Radial loop: opens toward thumb (radius bone).
  • Ulnar loop: opens toward little finger (ulna bone).

2. WHORLS (~30-35%)
  • At least two deltas; at least one ridge makes a complete circuit.
  • Types: Plain whorl, Central pocket loop, Double loop, Accidental.

3. ARCHES (~5%)
  • No deltas; ridges enter from one side, rise, and exit on the other.
  • Plain arch: gentle rise. Tented arch: sharp rise with a spike.

HENRY CLASSIFICATION SYSTEM: assigns numerical values to fingerprint patterns to create a searchable formula.

MINUTIAE: specific ridge features used for comparison (ridge endings, bifurcations, dots, short ridges).
MATCHING: most countries require 10–12 matching minutiae points for a positive identification.` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  CSC102 — COMPUTER SCIENCE (VISUAL BASIC)
// ═══════════════════════════════════════════════════════════════
"CSC102": {
    name: "Computer Science (Visual Basic)",
    resourceKey: "COS",
    topics: [
        { name: "Introduction to Visual Basic", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/", notes: `Visual Basic (VB) = high-level, event-driven, object-oriented programming language by Microsoft. Part of the .NET framework.

KEY FEATURES
• Event-driven: code runs in response to user actions (clicks, keyboard).
• Object-oriented: supports classes, objects, inheritance.
• Integrated IDE: Visual Studio provides drag-and-drop form design.

BASIC STRUCTURE
  Module Module1
    Sub Main()
      Console.WriteLine("Hello!")
    End Sub
  End Module

DATA TYPES: Integer, Long, Double, String, Boolean, Char, Date

VARIABLES
  Dim age As Integer = 18
  Dim name As String = "Emeka"
  Const PI As Double = 3.14159

OUTPUT: Console.WriteLine("text") or MsgBox("text")

        { name: "Memory & Arithmetic Operators", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/language-reference/operators/", notes: `ARITHMETIC OPERATORS

        { name: "Relational Operators", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/language-reference/operators/", notes: `RELATIONAL (COMPARISON) OPERATORS — result is always Boolean (True/False)

        { name: "Subroutines & Functions", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/programming-guide/language-features/procedures/", notes: `SUBROUTINE (Sub): performs action; does NOT return a value.
  Sub Greet(ByVal name As String)
    MsgBox("Hello, " & name & "!")

  → Called: Greet("Emeka")

FUNCTION: performs action AND returns a value.

  End Function
  → Called: Dim result = Add(3, 7)  'result = 10

SCOPE
• Local: declared inside Sub/Function — accessible only there.
• Module-level: declared at module level — accessible throughout module.
• Public: accessible throughout entire program.

RECURSION: function that calls itself.
  Function Factorial(n As Integer) As Integer
    If n <= 1 Then Return 1
    Return n * Factorial(n - 1)
  End Function` },

        { name: "Pass-by-Value vs Pass-by-Reference", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/programming-guide/language-features/procedures/passing-arguments-by-value-and-by-reference", notes: `PASS-BY-VALUE (ByVal): a COPY is passed. Changes inside the procedure do NOT affect the original.

PASS-BY-REFERENCE (ByRef): a REFERENCE to the original is passed. Changes DO affect the original.

EXAMPLE
  Sub ChangeVal(ByVal x As Integer)
    x = 100  'changes copy only
  End Sub

  Sub ChangeRef(ByRef x As Integer)
    x = 100  'changes ORIGINAL variable!
  End Sub

  Dim num As Integer = 5
  ChangeVal(num)  'num still = 5
  ChangeRef(num)  'num now = 100 ✓

WHEN TO USE
• ByVal: protect original data from modification.
• ByRef: when procedure needs to modify the calling variable.` },

        { name: "One-dimensional Arrays", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/programming-guide/language-features/arrays/", notes: `ARRAY = collection of same-type variables; accessed by INDEX.

DECLARATION

        { name: "Sorting & Searching Arrays", link: "https://learn.microsoft.com/en-us/dotnet/visual-basic/programming-guide/language-features/arrays/", notes: `BUBBLE SORT: repeatedly compare adjacent elements; swap if out of order. O(n²).
  For i = 0 To n-2
    For j = 0 To n-i-2
      If arr(j) > arr(j+1) Then
        temp=arr(j) : arr(j)=arr(j+1) : arr(j+1)=temp
      End If
    Next j
  Next i

BUILT-IN SORT: Array.Sort(arr)  'ascending — much faster O(n log n)
Array.Reverse(arr)  'reverse to get descending

LINEAR SEARCH: check each element one by one. O(n) — works on UNSORTED arrays.
  For i = 0 To arr.Length-1
    If arr(i) = target Then MsgBox("Found at " & i) : Exit For
    End If
  Next

BINARY SEARCH: O(log n) — MUST be SORTED first!
  Array.Sort(arr)

KEY: Linear=simple,any array. Binary=fast,sorted only.` }

"COS102": {
    name: "Computing Concepts",
    resourceKey: "COS",
    topics: [
        { name: "Core Concepts of Computing", link: "https://www.bbc.co.uk/bitesize/subjects/zvnrjxs", notes: `COMPUTING
Computing involves using computers to solve problems through the design, development, and use of software and hardware systems.

CORE CONCEPTS
1. Computational thinking: breaking down problems to be solvable by a computer.
2. Algorithms: step-by-step procedures for solving problems.
3. Data representation: how information is encoded in binary (0s and 1s).
4. Hardware and software: physical components and programs.
5. Networks: connecting computers to share data.

DATA REPRESENTATION
• All data in a computer is stored in BINARY (base 2).
• 1 bit = one binary digit (0 or 1).
• 1 byte = 8 bits. 1 KB = 1024 bytes. 1 MB = 1024 KB.
• Text: ASCII/Unicode codes map characters to numbers.
• Images: pixels (tiny dots), each stored as colour values.
• Sound: sampled at regular intervals (e.g., 44,100 samples/second for CD quality).

BOOLEAN LOGIC
• AND: output true only if ALL inputs true.
• OR: output true if ANY input is true.
• NOT: inverts the input.
• XOR: true if inputs are DIFFERENT.
Used in processor circuits to perform calculations.` },

        { name: "Routine vs Non-routine Problems", link: "https://www.bbc.co.uk/bitesize/guides/z6x26yc/revision/1", notes: `ROUTINE PROBLEMS
Well-defined problems with established solution methods.
• The problem is well understood.
• A standard algorithm or procedure exists.
• The same approach can be applied consistently.
Examples: Sorting a list of names, calculating payroll, searching a database.

NON-ROUTINE PROBLEMS
Problems that are not fully defined, have multiple possible solutions, or require creative thinking.
• No established solution method exists.
• May have several acceptable solutions.
• Require analysis, judgement, and creativity.
Examples: Designing a new user interface, writing a novel algorithm for a new type of problem, diagnosing an unusual system error.

APPROACHING NON-ROUTINE PROBLEMS
1. Understand the problem fully.
2. Break it into smaller sub-problems (decomposition).
3. Look for similar problems that have been solved (analogy).
4. Try possible approaches (trial and error).
5. Brainstorm possible solutions.
6. Test and refine chosen approach.
7. Document the solution.` },

        { name: "Algorithms & Heuristics", link: "https://www.britannica.com/science/heuristics", notes: `ALGORITHMS
A finite, ordered, well-defined set of instructions to solve a problem.
• Deterministic: always produces the same output for the same input.
• Guaranteed to terminate (finite).
• Correct for all valid inputs.

ALGORITHM EFFICIENCY
Big-O notation describes how time/space requirements grow with input size n.
• O(1): Constant — independent of n.
• O(log n): Logarithmic — binary search.
• O(n): Linear — sequential search.
• O(n²): Quadratic — bubble sort.
• O(2ⁿ): Exponential — brute force combinatorial problems.

HEURISTICS
Rules of thumb or approximate methods used when an exact algorithm is too slow or impossible.
• NOT guaranteed to find the optimal solution.
• BUT find a "good enough" solution quickly.
Examples:
• Nearest neighbour heuristic for Travelling Salesman Problem.
• A* search in pathfinding/game AI.
• Genetic algorithms.

WHEN TO USE HEURISTICS
• Problem is NP-hard (no known polynomial-time exact algorithm).
• When speed matters more than perfection.
• Real-world scheduling, route optimisation, game AI.` },

        { name: "Abstraction & Analogy", link: "https://www.bbc.co.uk/bitesize/guides/zttrcdm/revision/1", notes: `ABSTRACTION = removing/hiding unnecessary detail to focus on what matters.

LEVELS IN COMPUTING
1. Problem level: what needs solving? (real-world understanding)
2. Algorithm level: how to solve it? (logical steps)
3. Code level: how to implement it? (specific language)
4. Hardware level: how does hardware execute it? (machine code, transistors)

EXAMPLES
• A map: shows roads and landmarks; omits every leaf on every tree.
• Function calculateAverage(): hides all implementation details from caller.
• OOP class: hides internal details; exposes only interface.

ANALOGY = using a familiar concept to explain an unfamiliar one.
• CPU is like the brain of the computer.
• RAM is like a desk (temporary); hard drive is like a filing cabinet (permanent).
• Internet is like a postal system; data packets are like letters.
• A computer virus is like a biological virus — spreads and replicates within a host.

WHY USEFUL: activates existing knowledge → faster, more intuitive understanding.` },

        { name: "Brainstorming & Trial/Error", link: "https://www.interaction-design.org/literature/topics/brainstorming", notes: `BRAINSTORMING = creative technique for generating many ideas quickly, without immediate criticism.

RULES
1. Quantity over quality at first.
2. No criticism during idea generation — all ideas welcome.
3. Build on each other's ideas (in groups).
4. Encourage wild ideas.
5. Evaluate and select AFTER the session.

TECHNIQUES
• Mind mapping: central problem → branching ideas → sub-ideas.
• SCAMPER: Substitute, Combine, Adapt, Modify, Put to other uses, Eliminate, Reverse.
• Reverse brainstorming: "How could we make the problem WORSE?" → reverse the ideas.

TRIAL AND ERROR = attempt a solution, observe result, adjust based on what went wrong.
• Systematic: try all possibilities in organised order (exhaustive search).
• Random: try random combinations.
• Informed: use knowledge to guide which trials to attempt.

LIMITATION: time-consuming for complex problems → algorithms and heuristics preferred.` },

        { name: "Flowcharts & Pseudocode", link: "https://www.geeksforgeeks.org/introduction-to-flowcharts/", notes: `FLOWCHART = graphical representation of an algorithm using standard symbols.

STANDARD SYMBOLS
• Oval (Terminator): Start / End
• Parallelogram (I/O): Read input, Display output
• Rectangle (Process): any computation or assignment
• Diamond (Decision): Yes/No question; branches the flow
• Arrow: direction of flow

FLOWCHART EXAMPLE — Find largest of 2 numbers:
[Start]→[Input A,B]→<A>B?>→Yes→[Print A]→[End]
                              →No→[Print B]→[End]

PSEUDOCODE = structured English-like description; not tied to any programming language.

EXAMPLE — Calculate average of 5 numbers:
  BEGIN
  SET sum = 0
  FOR i = 1 TO 5
    INPUT number
    SET sum = sum + number
  END FOR
  SET average = sum / 5
  OUTPUT average
  END` },

        { name: "Decision Tables & Trees", link: "https://www.geeksforgeeks.org/decision-tree/", notes: `DECISION TABLE = tabular representation of all possible conditions and corresponding actions.

STRUCTURE
• Condition Stubs: list of all relevant conditions.
• Action Stubs: list of all possible actions.
• Condition Entries: Y/N/- for each rule.
• Action Entries: X marks the action(s) to take for each rule.

EXAMPLE: Loan Approval
Condition         | Rule 1 | Rule 2 | Rule 3
Credit score>700  |   Y    |   Y    |   N
Employed          |   Y    |   N    |   -
Action: Approve   |   X    |        |
Action: Review    |        |   X    |
Action: Reject    |        |        |   X

DECISION TREE = hierarchical tree-like graph; each internal node = test on a feature; each leaf = decision/outcome.
• Used in: Machine Learning, medical diagnosis, business decisions, game AI.
• ADVANTAGES: Easy to understand; visual; handles both numerical and categorical data.
• DISADVANTAGES: Can overfit; unstable if data changes slightly.` }
    ]
},

"STA102": {

    topics: [
        { name: "Statistical Computing Tools", link: "https://www.r-project.org/about.html", notes: `Statistical computing uses software to perform complex data analysis.

MAJOR TOOLS

• SPSS (IBM): widely used in social sciences; GUI-based; syntax scripting available.

KEY CONCEPTS

• Data cleaning: handle missing values, outliers, wrong data types.

        { name: "Data Visualization", link: "https://www.data-to-viz.com/", notes: `CHART TYPE SELECTION
• Bar chart: comparing discrete categories.
• Histogram: distribution of continuous data.
• Line graph: trends over time.
• Pie chart: proportions of a whole (use sparingly).
• Scatter plot: relationship between two continuous variables.
• Box plot (Box-and-whisker): shows median, IQR, outliers.
• Heatmap: shows correlation matrix or intensity of values.

GOOD VISUALISATION PRINCIPLES
• Clear title and labelled axes.
• Appropriate scale (start y-axis at 0 for bar charts).
• Use colour purposefully; consider colour-blind accessibility.
• Avoid 3D charts (distort perception).
• Data-ink ratio: maximise data, minimise non-data ink (Tufte's principle).` },

        { name: "Descriptive Statistics with Software", link: "https://www.khanacademy.org/math/statistics-probability", notes: `MEASURES OF CENTRAL TENDENCY (using software)
• Mean: =AVERAGE(range) [Excel]  |  mean(x) [R]  |  x.mean() [Python]
• Median: =MEDIAN(range)  |  median(x)
• Mode: =MODE(range)  |  most common value

MEASURES OF SPREAD
• Range: max − min
• Variance (s²): average squared deviation from the mean.
• Standard Deviation (s): √variance; same units as the data.
  s = √[Σ(xᵢ−x̄)²/(n−1)]
• IQR (Interquartile Range): Q3−Q1; the middle 50% of data.
  Outlier if < Q1−1.5(IQR) or > Q3+1.5(IQR)

SHAPE OF DISTRIBUTION
• Symmetric (Normal): mean=median=mode.
• Positively skewed (right tail): mean>median>mode.
• Negatively skewed (left tail): mean<median<mode.` },

        { name: "Probability Computations", link: "https://www.khanacademy.org/math/statistics-probability/probability-library", notes: `PERMUTATIONS: number of ways to arrange r items from n distinct items ORDER MATTERS.
  P(n,r) = n!/(n−r)!
  In Excel: =PERMUT(n,r)   In R: choose(n,r)*factorial(r)

COMBINATIONS: number of ways to choose r items from n ORDER DOESN'T MATTER.
  C(n,r) = n!/[r!(n−r)!]
  In R: choose(5,3)  In Excel: =COMBIN(5,3)

NORMAL DISTRIBUTION COMPUTATIONS
• Standardise: Z=(X−μ)/σ
• In Excel: =NORM.DIST(x,mean,sd,TRUE)  =NORM.INV(prob,mean,sd)
• In R: pnorm(x,mean,sd)  qnorm(prob,mean,sd)

BINOMIAL PROBABILITIES
• P(X=k) = C(n,k)·pᵏ·(1−p)ⁿ⁻ᵏ
• In Excel: =BINOM.DIST(k,n,p,FALSE)  In R: dbinom(k,n,p)` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  STA112 — PROBABILITY I
// ═══════════════════════════════════════════════════════════════
"STA112": {
    name: "Probability I",
    resourceKey: "STA",
    topics: [
        { name: "Permutations & Combinations", notes: `FUNDAMENTAL COUNTING PRINCIPLE
If event A can occur in m ways and event B in n ways, both can occur in m × n ways.

PERMUTATIONS (order matters)
P(n, r) = n! / (n−r)!
= number of ways to arrange r items from n items.

Example: Arrange 3 books from 5:
P(5,3) = 5!/(5−3)! = 5×4×3 = 60

COMBINATIONS (order does NOT matter)
C(n, r) = n! / [r!(n−r)!]  also written ⁿCᵣ or C(n,r)

Example: Choose 3 books from 5:
C(5,3) = 5!/(3!×2!) = 10

FACTORIAL
n! = n × (n−1) × (n−2) × ... × 1
0! = 1, 1! = 1

WORKED EXAMPLES
1. How many ways to form a committee of 4 from 10 people?
   C(10,4) = 210

2. How many 3-digit numbers from {1,2,3,4,5} (no repetition)?
   P(5,3) = 60`, link: "https://www.khanacademy.org/math/statistics-probability/counting-permutations-and-combinations" },

        { name: "Probability Principles", notes: `DEFINITION
P(A) = (Number of favourable outcomes) / (Total number of equally likely outcomes)
Range: 0 ≤ P(A) ≤ 1

KEY TERMS
• Sample Space (S): Set of all possible outcomes.
• Event (A): A subset of the sample space.
• Complement (A'): P(A') = 1 − P(A)

BASIC RULES
• Addition Rule: P(A ∪ B) = P(A) + P(B) − P(A ∩ B)
• For mutually exclusive events: P(A ∪ B) = P(A) + P(B)
• Multiplication Rule: P(A ∩ B) = P(A) × P(B|A)
• For independent events: P(A ∩ B) = P(A) × P(B)

CONDITIONAL PROBABILITY
P(A|B) = P(A ∩ B) / P(B)  [Probability of A given B has occurred]

BAYES' THEOREM
P(A|B) = P(B|A)P(A) / P(B)`, link: "https://www.khanacademy.org/math/statistics-probability/probability-library" },

        { name: "Random Variables", link: "https://www.khanacademy.org/math/statistics-probability/random-variables-stats-library",
          notes: `RANDOM VARIABLE (X): a variable whose value is determined by the outcome of a random experiment.

DISCRETE RANDOM VARIABLE: takes countable values (0,1,2,3,...)
• Probability Mass Function (PMF): P(X=x) gives the probability for each specific value.
• Requirements: all probabilities ≥ 0; Σ P(X=x) = 1.
• Expected Value (Mean): E(X) = μ = Σ x·P(X=x)
• Variance: Var(X) = σ² = Σ[(x−μ)²·P(X=x)] = E(X²)−[E(X)]²

CONTINUOUS RANDOM VARIABLE: takes any value in an interval.
• Probability Density Function (PDF): f(x). Probabilities are areas under the curve.
• P(a ≤ X ≤ b) = ∫ₐᵇ f(x)dx
• P(X = exact value) = 0 for continuous r.v.!

EXAMPLE (discrete): X = number on a die.
  E(X) = 1(1/6)+2(1/6)+3(1/6)+4(1/6)+5(1/6)+6(1/6) = 21/6 = 3.5` },

        { name: "Binomial & Poisson Distribution", link: "https://byjus.com/maths/binomial-distribution/",
          notes: `BINOMIAL DISTRIBUTION: number of successes in n independent trials, each with probability p of success.

Conditions (BINS):
• B: Binary outcomes (success/failure only).
• I: Independent trials.
• N: Fixed number of trials n.
• S: Same probability p each trial.

PMF: P(X=k) = C(n,k)·pᵏ·(1−p)ⁿ⁻ᵏ
Mean: μ=np    Variance: σ²=np(1−p)

EXAMPLE: 10 students, each has 70% chance of passing. P(exactly 7 pass)?
  P(X=7) = C(10,7)·(0.7)⁷·(0.3)³ ≈ 26.7%

POISSON DISTRIBUTION: number of events in fixed time/space at constant rate λ.
PMF: P(X=k) = (e⁻λ·λᵏ)/k!
Mean = λ    Variance = λ   (UNIQUE: mean = variance)

EXAMPLE: λ=4 calls/hr. P(exactly 6 calls)?  P(X=6)=e⁻⁴·4⁶/6! ≈ 10.4%` },

        { name: "Normal Distribution", notes: `THE NORMAL DISTRIBUTION
A continuous probability distribution that is symmetric about the mean, forming a bell-shaped curve.

KEY PROPERTIES
• Mean = Median = Mode
• Symmetric about μ (mean)
• Total area under curve = 1
• Described by μ (mean) and σ (standard deviation)
• Notation: X ~ N(μ, σ²)

EMPIRICAL RULE (68-95-99.7 Rule)
• ≈ 68% of data falls within μ ± 1σ
• ≈ 95% of data falls within μ ± 2σ
• ≈ 99.7% of data falls within μ ± 3σ

STANDARD NORMAL DISTRIBUTION
Z ~ N(0, 1) (mean = 0, std dev = 1)
Z-score: Z = (X − μ) / σ

Z-score tells you how many standard deviations X is from the mean.

WORKED EXAMPLE
Heights are N(170, 10²). What P(height < 180)?
Z = (180 − 170)/10 = 1.0
From Z-table: P(Z < 1.0) = 0.8413 = 84.13%`, link: "https://www.khanacademy.org/math/statistics-probability/modeling-distributions-of-data/normal-distributions-library/a/normal-distributions-review" }
    ]
},

        { name: "Soil Science Basics", link: "https://www.fao.org/soils-portal/en/", notes: `SOIL = uppermost layer of Earth's surface; natural body of minerals, organic matter, water, air, and living organisms.

        { name: "Introduction to Agriculture II", link: "https://www.fao.org/home/en/", notes: `POST-HARVEST TECHNOLOGY
• Post-harvest losses in Nigeria estimated at 30–50% of production value.

  - Processing: turning raw produce into value-added products

AGRICULTURAL ECONOMICS BASICS
• Farm management: allocating scarce resources (land, labour, capital) to maximise profit.

• Variable costs: change with output (seeds, fertiliser, labour).

        { name: "Livestock Management", link: "https://www.fao.org/livestock-systems/en/", notes: `LIVESTOCK CLASSIFICATION
• Ruminants (4-chambered stomach, chew cud): Cattle, Sheep, Goats.

    topics: [
        { name: "Engineering Graphics", link: "https://www.britannica.com/technology/technical-drawing", notes: `Engineering Graphics = the language of engineers — a systematic method of representing objects using standardised drawings.

IMPORTANCE
• Communicates design ideas precisely between designers, manufacturers, and builders.
• Provides exact dimensions, tolerances, and specifications.

TYPES OF ENGINEERING DRAWINGS
1. Orthographic drawings: 2D views of 3D objects.
2. Isometric drawings: 3D-looking drawings on a 2D plane.
3. Perspective drawings: realistic representation with vanishing points.
4. Assembly drawings: show how parts fit together.
5. Working/Production drawings: with full dimensions and specifications.

DRAWING INSTRUMENTS
• T-square: draw horizontal lines.
• Set squares (45° and 30°/60°): draw angled lines.
• Compass: draw circles and arcs.
• Scale rule: draw objects to reduced/enlarged scale.
• Drawing pencils: H (hard, light lines), HB (general), 2H (construction lines).` },

        { name: "Orthographic Projection", link: "https://www.engineeringtoolbox.com/orthographic-projection-d_1837.html", notes: `ORTHOGRAPHIC PROJECTION = representing a 3D object using multiple 2D views where projection lines are parallel.

FIRST ANGLE PROJECTION (used in Nigeria, Europe, Africa)
• Object placed BETWEEN the viewer and the plane.
• The view obtained is placed on the OPPOSITE side.

THIRD ANGLE PROJECTION (used in USA, Canada)
• Plane placed BETWEEN the viewer and the object.
• The view obtained is placed on the SAME side as the viewer.

SIX PRINCIPAL VIEWS: Front, Top (Plan), Right, Left, Bottom, Back.

KEY DRAWING STANDARDS
• Visible lines: thick continuous (0.5–0.7mm).
• Hidden lines: thin dashed lines.
• Centre lines: thin chain (long-short-long).
• Dimension lines: thin with arrowheads.
• Title block: contains drawing number, scale, name, date, projection symbol.` },

        { name: "Solid Modelling Basics", link: "https://www.autodesk.com/solutions/3d-modeling", notes: `SOLID MODELLING = representing 3D objects as solid bodies using computer-aided design (CAD) software.

CONSTRUCTIVE SOLID GEOMETRY (CSG)
Builds complex shapes by combining simple primitives using BOOLEAN OPERATIONS:
• Union (∪): combine two solids.
• Difference (−): subtract one solid from another.
• Intersection (∩): keep only the overlapping volume.

FEATURE-BASED MODELLING
• Profile sketched on a plane → Extrude (push/pull to create 3D solid).
• Revolved solid: sketch rotated around an axis (e.g., turned parts).
• Fillet: round a sharp edge.  Chamfer: cut a flat bevel on an edge.

COMMON CAD SOFTWARE: AutoCAD, SolidWorks, CATIA, Fusion 360, FreeCAD (free, open-source).` }
    ]
},

"ACC102": {
    name: "Financial Accounting II",
    resourceKey: "ACC",
    topics: [
        { name: "Introduction to Financial Accounting", link: "https://www.investopedia.com/terms/f/financialaccounting.asp", notes: `Financial Accounting = systematic process of recording, summarising, and reporting financial transactions.

USERS OF FINANCIAL INFORMATION
• Internal: management (day-to-day decisions), employees.
• External: investors, banks/creditors, tax authorities (FIRS), customers, government regulators.

ACCOUNTING PRINCIPLES (GAAP/IFRS)
• Entity Concept: business is separate from its owner(s).
• Going Concern: business will continue to operate indefinitely.
• Accrual Concept: revenue/expenses recorded when earned/incurred — not when cash is received/paid.
• Matching Principle: match expenses with the revenue they helped generate.
• Historical Cost: assets recorded at their original purchase price.

ACCOUNTING EQUATION (FUNDAMENTAL): Assets = Liabilities + Owner's Equity
This equation MUST ALWAYS BALANCE.` },

        { name: "Double Entry System", link: "https://www.investopedia.com/terms/d/double-entry.asp", notes: `DOUBLE ENTRY BOOKKEEPING: every transaction has TWO equal and opposite effects.

ACCOUNT TYPES AND NORMAL BALANCES
• Assets (e.g., Cash, Equipment, Inventory): increase with DEBIT.
• Liabilities (e.g., Loans, Creditors): increase with CREDIT.
• Owner's Equity (Capital): increase with CREDIT.
• Revenue/Income: increase with CREDIT.
• Expenses/Costs: increase with DEBIT.

Mnemonic: DEAD CLIC
Debit: Expenses, Assets, Drawings | Credit: Liabilities, Income, Capital

JOURNAL ENTRY FORMAT
  Date | Account Title | Debit (₦) | Credit (₦)

EXAMPLE: Owner deposits ₦500,000 cash into business.
  Dr. Cash A/c          500,000
    Cr. Capital A/c                500,000
  (Asset ↑ by debit; Equity ↑ by credit)` },

        { name: "Trial Balance", link: "https://www.investopedia.com/terms/t/trial_balance.asp", notes: `TRIAL BALANCE = a list of all ledger account balances at a specific date, arranged in debit and credit columns.

PURPOSE: verify the mathematical accuracy of the double entry bookkeeping — total debits must equal total credits.

FORMAT
  Account Name         | Debit (₦) | Credit (₦)
  Cash at Bank         | 150,000   |
  Equipment            | 200,000   |
  Capital              |           | 300,000
  Creditors            |           |  50,000
  TOTAL                | 350,000   | 350,000 ✓

LIMITATIONS (ERRORS NOT DETECTED BY TRIAL BALANCE)
1. Error of omission: a transaction completely omitted from the books.
2. Error of commission: correct amount, but posted to the wrong account (same type).
3. Error of principle: posted to wrong type of account.
4. Compensating errors: two equal errors that cancel each other out.
5. Error of original entry: same wrong amount entered in both debit and credit.
6. Complete reversal: debit and credit correctly entered but in reversed accounts.

Mnemonic: COPCER` }
    ]
},

// ═══════════════════════════════════════════════════════════════
//  AMS104 — PROJECT MANAGEMENT
// ═══════════════════════════════════════════════════════════════
"AMS104": {
    name: "Project Management",
    resourceKey: "AMS",
    topics: [
        { name: "Concept of Project and Project Management", link: "https://www.pmi.org/learning/library/project-definition-factors-make-project-6098", notes: `WHAT IS A PROJECT?
A project is a temporary endeavour undertaken to create a unique product, service, or result.

KEY CHARACTERISTICS OF A PROJECT
• Temporary: has a defined beginning and end.
• Unique: produces a one-of-a-kind output.
• Progressive elaboration: developed in steps as more information becomes available.
• Cross-functional: involves people from different areas.

WHAT IS PROJECT MANAGEMENT?
The application of knowledge, skills, tools, and techniques to project activities to meet project requirements.

THE PROJECT MANAGEMENT TRIANGLE (Iron Triangle)
Three constraints that must be balanced:
• SCOPE: what is to be done (deliverables).
• TIME: when it must be done (schedule).
• COST: what budget is available.
• Quality is at the centre — affected by all three.
• Changing one constraint typically affects the others.

STAKEHOLDERS
Anyone who has an interest in or is affected by the project:
• Project sponsor, project manager, team members, customers, suppliers, regulators.` },

        { name: "Project Life Cycle", link: "https://www.pmi.org/learning/library/project-life-cycle-6152", notes: `PROJECT LIFE CYCLE
The series of phases that a project passes through from initiation to closure.

PHASES OF A PROJECT

1. INITIATION
• Define the project at a high level.
• Identify stakeholders.
• Develop the Project Charter (formal authorisation).
• Conduct feasibility study.

2. PLANNING
• Develop detailed project management plan.
• Define scope, create Work Breakdown Structure (WBS).
• Develop schedule (Gantt chart, network diagram).
• Estimate costs and develop budget.
• Plan quality, resources, communication, risk, and procurement.

3. EXECUTION
• Carry out the work defined in the project plan.
• Manage and lead the project team.
• Communicate with stakeholders.
• Procure resources.

4. MONITORING & CONTROLLING
• Track, review, and regulate project progress and performance.
• Identify changes to the plan and take corrective action.
• Earned Value Management (EVM) tracks cost and schedule performance.

5. CLOSURE
• Formal acceptance of deliverables by the customer.
• Release project resources.
• Document lessons learned.
• Archive project records.` },

        { name: "Risk Management in Projects", link: "https://www.pmi.org/learning/library/risk-management-project-failure-7784", notes: `WHAT IS RISK?
An uncertain event or condition that, if it occurs, has a positive or negative effect on project objectives.

TYPES OF RISK
• Known risks: can be identified in advance.
• Unknown risks: cannot be identified in advance; need contingency reserves.
• Positive risks (opportunities): may benefit the project.
• Negative risks (threats): may harm the project.

RISK MANAGEMENT PROCESS
1. PLAN: determine the approach to risk management.
2. IDENTIFY: document potential risks (risk register).
3. QUALITATIVE ANALYSIS: assess probability and impact (P×I matrix).
4. QUANTITATIVE ANALYSIS: assign numerical values to impacts (Monte Carlo simulation).
5. PLAN RESPONSES: strategies for threats and opportunities.
6. IMPLEMENT RESPONSES: carry out the risk response plans.
7. MONITOR AND CONTROL: track identified risks, detect new risks.

RISK RESPONSE STRATEGIES (Threats)
• Avoid: change plan to eliminate the risk.
• Transfer: shift risk to a third party (insurance, contracts).
• Mitigate: reduce probability or impact.
• Accept: do nothing (passive) or prepare a contingency plan (active).

RISK RESPONSE STRATEGIES (Opportunities)
• Exploit, Share, Enhance, Accept.` },

        { name: "Project Management Tools and Techniques", link: "https://www.projectmanager.com/blog/project-management-tools", notes: `KEY PROJECT MANAGEMENT TOOLS

1. WORK BREAKDOWN STRUCTURE (WBS)
• Hierarchical decomposition of project scope into manageable work packages.
• Organises and defines total work scope.
• Bottom level = work packages (assignable tasks).

2. GANTT CHART
• Bar chart showing project schedule over time.
• Horizontal bars = duration of each activity.
• Shows dependencies, milestones, and critical path.
• Tools: Microsoft Project, Excel, Smartsheet.

3. NETWORK DIAGRAMS
• Shows dependencies between activities.
• Critical Path Method (CPM): longest path through network = minimum project duration.
• Activities on critical path have ZERO float/slack.

4. EARNED VALUE MANAGEMENT (EVM)
Integrates scope, schedule, and cost:
• Planned Value (PV): budgeted cost of planned work.
• Earned Value (EV): budgeted cost of work actually performed.
• Actual Cost (AC): actual cost of work performed.
• Schedule Variance: SV = EV − PV (positive = ahead of schedule).
• Cost Variance: CV = EV − AC (positive = under budget).

5. RACI MATRIX
Defines roles: Responsible, Accountable, Consulted, Informed.` }
    ]
},

//  CRD104 — RURAL DEVELOPMENT

    resourceKey: "CRD",
    topics: [
        { name: "Concept of Rural and Rural Development", link: "https://www.ifad.org/en/rural-development", notes: `RURAL AREAS
Areas characterised by low population density, dependence on agriculture and natural resources, limited infrastructure, and strong community ties.

DEFINITION OF RURAL DEVELOPMENT
Rural development is the process of improving the quality of life and economic well-being of people living in rural areas.

KEY DIMENSIONS
• Economic: Increasing farm income, diversifying rural livelihoods.
• Social: Improving education, healthcare, clean water, sanitation.
• Physical: Building roads, electricity, markets, communication infrastructure.
• Institutional: Strengthening local governance and community organisations.

RURAL DEVELOPMENT APPROACHES
• Top-down: Government designs and implements projects without consulting communities.
• Bottom-up/Participatory: Communities identify their own needs and participate in planning.

KEY INSTITUTIONS IN NIGERIA
• ADPs (Agricultural Development Programmes).
• FADAMA Programme: World Bank-funded scheme for smallholder farmers.` },

        { name: "Problems of Rural Development in Nigeria", link: "https://www.un.org/sustainabledevelopment/cities/", notes: `MAJOR CHALLENGES OF RURAL DEVELOPMENT IN NIGERIA

1. POOR INFRASTRUCTURE
• Bad rural roads: increase cost of moving produce to market.
• Lack of electricity: prevents food processing and cold storage.
• Poor communication: digital divide limits access to markets and services.

2. POVERTY AND LOW INCOME
• Most rural farmers operate at subsistence level.
• Low and unstable farm incomes.

3. RURAL-URBAN MIGRATION
• Young people move to cities, leaving an ageing farming population.
• "Brain drain" depletes rural human capital.

4. INSECURITY
• Farmer-herder conflicts over land and water.
• Banditry and kidnapping disrupt farming in many states.
• Boko Haram/ISWAP insurgency in the Northeast.

5. ENVIRONMENTAL DEGRADATION
• Soil erosion, deforestation, desertification (especially in the North).
• Climate change disrupting rainfall patterns and planting seasons.

6. LIMITED ACCESS TO FINANCE
• Smallholder farmers struggle to access loans.
• Banks prefer urban, formal sector clients.

7. POOR GOVERNANCE
• Corruption and mismanagement of rural development funds.
• Weak local government capacity.

SOLUTIONS BEING TRIED
• FADAMA projects, CBN agricultural loan schemes, USAID rural programmes, state governments' rural electrification.` },

        { name: "Community Development and Social Actions", link: "https://www.communitymatters.com.au/what-is-community-development", notes: `COMMUNITY DEVELOPMENT
Community development is a process where community members come together to take collective action and generate solutions to common problems.

PRINCIPLES OF COMMUNITY DEVELOPMENT
1. Self-help: community solves its own problems using its own resources.
2. Felt needs: programmes address what the community actually feels it needs.
3. Participation: all community members, especially marginalised groups.
4. Sustainability: solutions that can be maintained without external help.
5. Local leadership: develops indigenous leadership capacity.

SOCIAL ACTION
Social action is organised effort by a community to bring about change in their social situation.

TYPES OF COMMUNITY GROUPS IN NIGERIA
• Age grades: Igbo traditional organisation for communal labour.
• Women's groups: rotating savings (ajo/esusu).
• Religious organisations (churches, mosques): provide social welfare.
• Town development associations (TDA): diaspora contribute to hometown development.

COMMUNITY DEVELOPMENT PROCESS
1. Social mapping and needs assessment.
2. Community mobilisation and awareness.
3. Planning and prioritisation.
4. Implementation with community participation.
5. Monitoring and evaluation.
6. Sustainability planning.` }
    ]

// ═══════════════════════════════════════════════════════════════
//  OOU-CRD152 — COOPERATIVE PRINCIPLES
// ═══════════════════════════════════════════════════════════════
"OOU-CRD152": {
    name: "Principles of Cooperatives",
    resourceKey: "CRD",
    topics: [
        { name: "Principles of Cooperatives", link: "https://www.ica.coop/en/cooperatives/cooperative-identity", notes: `THE ICA COOPERATIVE IDENTITY STATEMENT (1995)
Adopted by the International Cooperative Alliance at the Manchester Congress.

DEFINITION: A cooperative is an autonomous association of persons voluntarily united to meet their common economic, social, and cultural needs and aspirations through a jointly-owned and democratically-controlled enterprise.

COOPERATIVE VALUES
• Self-help, self-responsibility, democracy, equality, equity, solidarity.
• Ethical values: honesty, openness, social responsibility, caring for others.

THE 7 ICA COOPERATIVE PRINCIPLES
1. Voluntary and Open Membership
2. Democratic Member Control (one member, one vote)
3. Member Economic Participation
4. Autonomy and Independence
5. Education, Training and Information
6. Cooperation Among Cooperatives
7. Concern for Community

THE ROCHDALE PIONEERS (1844)
• 28 working-class weavers in Rochdale, England founded the first successful modern cooperative.
• Established fundamental cooperative principles still in use today.
• Set up a consumer cooperative to buy food in bulk and sell at fair prices.` },

        { name: "History and Evolution of Cooperatives", link: "https://www.ica.coop/en/cooperatives/history-cooperative-movement", notes: `HISTORICAL BACKGROUND
The cooperative movement emerged as a response to the hardships of the Industrial Revolution (1750–1850s) in Europe.

KEY HISTORICAL MILESTONES

1. PRE-MODERN ROOTS
• Village savings clubs, grain banks, mutual aid societies existed in Africa and Asia for centuries.
• Osusu/Ajo (rotating savings) in Nigeria predates formal cooperatives.

2. ROCHDALE PIONEERS (1844)
• First successful modern consumer cooperative.
• Their principles became the foundation of the global cooperative movement.

3. 19th CENTURY EXPANSION
• Robert Owen: early cooperativist; "cooperative commonwealth."
• Workers' cooperatives spread across Europe.
• Friedrich Wilhelm Raiffeisen: founded rural credit cooperatives in Germany (1850s).

4. ICA FOUNDED (1895)
• International Cooperative Alliance established to link national cooperative movements.

5. COOPERATIVES IN NIGERIA
• 1935: Cooperative Societies Ordinance enacted.
• 1940s–1960s: Agricultural cooperatives established, especially cocoa and groundnut marketing.
• Post-independence: Government encouraged cooperatives as rural development tools.
• 1993: Federal Cooperative College, Kaduna established.` },

        { name: "Rochdale Principles", link: "https://www.ica.coop/en/cooperatives/rochdale-principles", notes: `THE ROCHDALE PRINCIPLES (1844)
The Rochdale Pioneers established a set of operating principles that defined cooperative business.

ORIGINAL ROCHDALE PRINCIPLES
1. Open membership: any person of good character could join.
2. Democratic control: one member, one vote.
3. Payment of limited interest on capital.
4. Patronage dividend (net surplus distributed to members in proportion to their purchases).
5. Cash trading (no credit initially — to prevent debt).
6. Provision of pure and unadulterated goods.
7. Education: the cooperative educated its members.
8. Political and religious neutrality.

EVOLUTION TO MODERN ICA PRINCIPLES
• The original Rochdale principles have been revised and expanded by the ICA (1966, 1995).
• The 7 current ICA principles build on the Rochdale foundation.
• Key addition: "Concern for Community" (7th principle, 1995) reflects cooperatives' role in sustainable development.

PATRONAGE DIVIDEND
Unlike ordinary companies that distribute profits to shareholders based on capital invested, cooperatives distribute surplus (profit) to members in proportion to their TRANSACTIONS with the cooperative.
• If you buy more from the cooperative, you get more of the surplus.
• This keeps surplus circulating within the membership.` }
