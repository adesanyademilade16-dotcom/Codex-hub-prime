<style>
  :root {
    --ink:#0d1b2a; --ink2:#1b2e44; --ink3:#2c4a6e;

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--sky3);border-radius:4px}

  .top-bar{
    background:linear-gradient(135deg,var(--ink) 0%,var(--ink3) 100%);
    padding:14px 20px;position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 3px 16px rgba(13,27,42,.22);
  }
  .top-bar-logo{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:-.3px}
  .top-bar-logo span{color:var(--gold2)}
  .cbt-logo{width:36px;height:auto;display:block}
  .back-btn{
    background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);
    color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;
    font-size:.8rem;font-weight:600;font-family:var(--font);
    margin-left:auto;transition:.2s;
  }
  .back-btn:hover{background:rgba(255,255,255,.24)}

  .page-wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px}
  .page-header{text-align:center;margin-bottom:22px}
  .page-header h1{font-size:1.55rem;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
  .page-header p{color:#64748b;font-size:.88rem;line-height:1.5;max-width:520px;margin:0 auto}

  .search-wrap{position:relative;margin-bottom:22px}
  .search-input{
    width:100%;padding:14px 16px 14px 44px;border-radius:12px;
    border:1.5px solid var(--border);background:var(--card);
    font-family:var(--font);font-size:.95rem;color:var(--ink);
    box-shadow:var(--shadow);outline:none;transition:.2s;
  }
  .search-input:focus{border-color:var(--ink3);box-shadow:0 0 0 3px var(--sky2)}
  .search-icon{
    position:absolute;left:15px;top:50%;transform:translateY(-50%);
    font-size:1.05rem;color:#94a3b8;pointer-events:none;
  }

  .hint{font-size:.78rem;color:#94a3b8;margin-bottom:18px;text-align:center}
  .result-count{font-size:.82rem;color:#64748b;margin-bottom:12px;font-weight:600}

  .result-list{display:flex;flex-direction:column;gap:10px}
  .result-card{
    background:var(--card);border:1.5px solid var(--border);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;gap:14px;
    box-shadow:var(--shadow);transition:.2s;
  }
  .result-card:hover{border-color:var(--ink3)}
  .result-icon{font-size:1.5rem;flex-shrink:0}
  .result-info{flex:1;min-width:0}
  .result-code{font-weight:800;font-size:.95rem;letter-spacing:-.2px}
  .result-name{font-size:.82rem;color:#64748b;margin-top:2px;line-height:1.35}
  .result-meta{font-size:.71rem;color:#94a3b8;margin-top:4px;font-family:var(--mono)}
  .add-btn{
    flex-shrink:0;padding:8px 14px;border-radius:9px;border:none;cursor:pointer;
    font-family:var(--font);font-size:.8rem;font-weight:700;transition:.2s;
    background:var(--ink2);color:#fff;white-space:nowrap;
  }
  .add-btn:hover{background:var(--ink3)}
  .add-btn.added{background:var(--green2);color:var(--green);cursor:default}
  .add-btn:disabled{opacity:.7}

  .empty-msg{text-align:center;padding:50px 20px;color:#94a3b8;font-size:.92rem}
  .empty-msg .big{font-size:2rem;display:block;margin-bottom:10px}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;
    font-size:.85rem;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.25);
    opacity:0;transition:.25s;pointer-events:none;z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    civil_engineering: "engineering"
};

function normalizeDept(dept) {
    if (!dept) return "other";
    const cleaned = dept.toLowerCase().trim().replace(/\s+/g, "_");
    return DEPARTMENT_ALIASES[cleaned] || cleaned;
}

function getUserPrefix(email) {
    return (email || 'guest').replace(/[^a-z0-9]/gi, '_');
}

function getManuallyAdded() {
    try {
        return JSON.parse(localStorage.getItem('manuallyAddedSubjects') || '[]');
    } catch (e) { return []; }
}

function saveManuallyAddedLocal(codes) {
    localStorage.setItem('manuallyAddedSubjects', JSON.stringify(codes));
}

const resultCount = document.getElementById('resultCount');
const searchInput = document.getElementById('searchInput');
const toastEl      = document.getElementById('toast');

let currentUser = null; // Firebase user, set once auth resolves

function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function renderResults(query) {
    const q = query.trim().toLowerCase();
    const added = new Set(getManuallyAdded());

    let matches = [];
    if (q.length === 0) {
        matches = []; // don't dump the whole library until they type something
    } else {
        matches = SUBJECT_DATA.filter(s =>
            s.code.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)
        );
    }

    resultList.innerHTML = '';

    if (q.length === 0) {
        resultCount.textContent = '';
        resultList.innerHTML = `<div class="empty-msg"><span class="big">🔎</span>Start typing a course code or name to search the full library.</div>`;
        return;
    }

    if (matches.length === 0) {
        resultCount.textContent = '';
        resultList.innerHTML = `<div class="empty-msg"><span class="big">🤷</span>No course matches "${query}". Try a different code or spelling.</div>`;
        return;
    }

    resultCount.textContent = `${matches.length} course${matches.length === 1 ? '' : ''} found`;

    matches.forEach(subject => {
        const isAdded = added.has(subject.code);
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div class="result-icon">${subject.icon || '📘'}</div>
            <div class="result-info">
                <div class="result-code">${subject.code}</div>
                <div class="result-name">${subject.name}</div>
                <div class="result-meta">Semester ${subject.semester}${subject.level ? ' · Level ' + subject.level : ''}</div>
            </div>
            <button class="add-btn ${isAdded ? 'added' : ''}" data-code="${subject.code}">
                ${isAdded ? '✓ Added' : '+ Add'}
            </button>
        `;
        resultList.appendChild(card);
    });

    resultList.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => addSubject(btn.dataset.code, btn));
    });
}

async function addSubject(code, btnEl) {
    const added = getManuallyAdded();
    if (added.includes(code)) return;

    added.push(code);
    saveManuallyAddedLocal(added);

    btnEl.textContent = '✓ Added';
    btnEl.classList.add('added');
    btnEl.disabled = true;
    showToast(`${code} added to your subjects`);

    // Sync to Firestore for logged-in users so it follows them across devices
    if (currentUser) {
        try {
            const userRef = doc(db, "users", currentUser.uid);
            await setDoc(userRef, {
                manuallyAddedSubjects: arrayUnion(code)
            }, { merge: true });
        } catch (e) {
            // Firestore write failed (offline, etc.) — localStorage copy still holds,
            // it will simply stay device-local until a future successful sync.
            console.warn('Could not sync added subject to Firestore:', e);
        }
    }
}

async function loadFirestoreAdded(user) {
    try {
        const userRef  = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            const data = userSnap.data();
            const remote = Array.isArray(data.manuallyAddedSubjects) ? data.manuallyAddedSubjects : [];
            const local  = getManuallyAdded();
            const merged = Array.from(new Set([...local, ...remote]));
            saveManuallyAddedLocal(merged);
        }
    } catch (e) {
        // Keep using localStorage only
    }
}

searchInput.addEventListener('input', () => renderResults(searchInput.value));
renderResults('');

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        await loadFirestoreAdded(user);
        renderResults(searchInput.value); // re-render so "Added" badges reflect synced data
    }
});
</script>
</body>
</html>
