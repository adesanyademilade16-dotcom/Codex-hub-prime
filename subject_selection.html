<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Study Hub — Select Subject</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0d1b2a; --ink2:#1b2e44; --ink3:#2c4a6e;
    --sky:#e8f4fd; --sky2:#d0e8f8; --sky3:#b8ddf5;
    --gold:#f0a500; --gold2:#fbbf24; --gold3:#fef3c7;
    --green:#059669; --green2:#d1fae5;
    --red:#dc2626; --red2:#fee2e2;
    --amber:#d97706; --amber2:#fef3c7;
    --border:#dde6f0; --bg:#f2f7fc;
    --card:#ffffff; --radius:14px;
    --shadow:0 2px 12px rgba(13,27,42,.08);
    --shadow-md:0 6px 24px rgba(13,27,42,.12);
    --shadow-lg:0 16px 48px rgba(13,27,42,.16);
    --font:'Sora',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--sky3);border-radius:4px}

  body{display:block;padding:0}
  .top-bar{
    background:linear-gradient(135deg,var(--ink) 0%,var(--ink3) 100%);
    padding:14px 20px;position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 3px 16px rgba(13,27,42,.22);
  }
  .top-bar-logo{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:-.3px}
  .top-bar-logo span{color:var(--gold2)}
  .page-wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px}
  .page-header{text-align:center;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid var(--border)}
  .mode-pill{
    display:inline-block;background:var(--gold3);color:var(--amber);
    padding:5px 16px;border-radius:20px;font-size:.78rem;font-weight:700;
    border:1.5px solid var(--gold2);margin-bottom:10px;
  }
  .page-header h1{font-size:1.7rem;font-weight:800;color:var(--ink);letter-spacing:-.4px;margin-bottom:4px}
  #modeDisplay{font-size:.95rem;color:#64748b;margin-top:4px}
  .subject-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;
  }
  .subject-card{
    background:var(--card);border-radius:12px;padding:18px 20px;
    cursor:pointer;border:1.5px solid var(--border);
    box-shadow:var(--shadow);transition:all .22s ease;position:relative;
    overflow:hidden;
  }
  .subject-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(to bottom,var(--ink2),var(--ink3));
    border-radius:4px 0 0 4px;
  }
  .subject-card:hover{
    border-color:var(--ink3);transform:translateY(-3px);
    box-shadow:var(--shadow-md);background:var(--sky);
  }
  .card-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .code{font-size:1.15rem;font-weight:800;color:var(--ink);letter-spacing:-.3px}
  .name{font-size:.82rem;color:#64748b;margin-top:3px;line-height:1.4}
  .lock-badge{
    position:absolute;top:10px;right:10px;
    background:var(--red);color:#fff;
    padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:700;
  }
  .trial-badge{
    position:absolute;top:10px;right:10px;
    background:var(--gold2);color:#78350f;
    padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:700;
  }
  .unlocked-badge{
    position:absolute;top:10px;right:10px;
    background:var(--green2);color:var(--green);
    padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:700;
  }
  .back-btn{
    background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);
    color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;
    font-size:.8rem;font-weight:600;font-family:var(--font);
    margin-left:auto;transition:.2s;
  }
  .back-btn:hover{background:rgba(255,255,255,.24)}
  .cbt-logo {
    width: 60px;
    height: auto;
    margin: 0 auto;
    display: block;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .loading-msg{text-align:center;padding:40px;color:#64748b;font-size:.95rem;grid-column:1/-1}
</style>

let currentMode = null;
// Map of subjectCode -> true/false, populated from Firestore
let firestoreUnlocks = {};

function getQueryParameter(name) {
    return new URLSearchParams(window.location.search).get(name);
}

function getUserPrefix(email) {
    return (email || 'guest').replace(/[^a-z0-9]/gi, '_');
}

function renderSubjects(currentUserEmail, firestoreData) {
    const mode = currentMode;
    const session = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
    const userPrefix = getUserPrefix(currentUserEmail || session.email);
    const userDept = (session.department || "all").toLowerCase().trim();
    const userFaculty = (session.faculty || "general").toLowerCase().trim();
    const selectedSemester = localStorage.getItem('selectedSemester') || "1";

    const modeText = mode === 'read' ? 'Reading / Study Notes' : 'Practice / Exam Mode';
    document.getElementById('modeDisplay').textContent = `Semester ${selectedSemester} - ${modeText}`;

    const grid = document.getElementById('subjectGrid');
    grid.innerHTML = "";

    const filteredSubjects = SUBJECT_DATA.filter(s => {
        const matchSem = String(s.semester) === String(selectedSemester);

        const targetFac = userFaculty.toLowerCase().trim();
        const targetDept = userDept.toLowerCase().trim();

        let matchFac = false;
        if (Array.isArray(s.faculty)) {
            matchFac = s.faculty.map(f => f.toLowerCase().trim()).includes(targetFac);
        } else {
            matchFac = (
                s.faculty.toLowerCase().trim() === targetFac ||
                s.faculty.toLowerCase().trim() === "general"
            );
        }

        let matchDept = false;
        if (s.dept === "all") {
            matchDept = true;
        } else if (Array.isArray(s.dept)) {
            matchDept = s.dept.map(d => d.toLowerCase().trim()).includes(targetDept);
        } else {
            matchDept = s.dept.toLowerCase().trim() === targetDept;
        }

        return matchSem && matchFac && matchDept;
    });

    if (filteredSubjects.length === 0) {
        grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1; color: #666;'>No subjects found for your profile this semester.</p>";
        return;
    }

    filteredSubjects.forEach(subject => {
        const card = document.createElement('div');
        card.className = 'subject-card';

        const trialKey = `trials_${userPrefix}_${subject.code}`;
        const trials = parseInt(localStorage.getItem(trialKey) || '0');

        // Check unlock: Firestore data takes priority, then localStorage
        const firestoreUnlocked = firestoreData && firestoreData[`unlocked_${subject.code}`] === true;
        const localUnlocked = localStorage.getItem(`unlocked_${userPrefix}_${subject.code}`) === 'true';
        const isUnlocked = firestoreUnlocked || localUnlocked;

        // Sync Firestore unlock back to localStorage so future page loads are instant
        if (firestoreUnlocked && !localUnlocked) {
            try { localStorage.setItem(`unlocked_${userPrefix}_${subject.code}`, 'true'); } catch(e) {}
        }

        const isLocked = !isUnlocked && trials >= 3;

        let badge = '';
        if (isUnlocked) badge = '<div class="unlocked-badge">✓ UNLOCKED</div>';
        else if (isLocked) badge = '<div class="lock-badge">🔒 LOCKED</div>';
        else if (trials > 0) badge = `<div class="trial-badge">${3 - trials} Trials Left</div>`;

        card.innerHTML = `
            ${badge}
            <div class="code">${subject.icon} ${subject.code}</div>
            <div class="name">${subject.name}</div>
        `;

        card.onclick = () => {
            if (isLocked) {
                alert("Subject Locked! Please unlock this subject from the Home screen.");
            } else {
                selectSubject(subject.code, mode);
            }
        };
        grid.appendChild(card);
    });
}

function selectSubject(subjectCode, mode) {
    localStorage.setItem(`access_time_${subjectCode}`, new Date().toISOString());
    if (mode === 'read') {
        window.location.href = `notes_display.html?subject=${subjectCode}`;
    } else {
        window.location.href = `topic_exam_selection.html?subject=${subjectCode}`;
    }
}

function initializeSubjectSelection() {
    const mode = getQueryParameter('mode');
    currentMode = mode;

    if (!mode) {
        window.location.href = 'home.html';
        return;
    }

    // Render immediately with localStorage data (fast), then re-render once Firestore loads
    renderSubjects(null, null);

    // Load Firestore unlock data for the logged-in user
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // Not logged in with Firebase — rely on localStorage only
            return;
        }
        try {
            const userRef  = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            const firestoreData = userSnap.exists() ? userSnap.data() : {};
            // Re-render with accurate Firestore data
            renderSubjects(user.email, firestoreData);
        } catch(e) {
            // Firestore error — keep using localStorage data
        }
    });
}

document.addEventListener('DOMContentLoaded', initializeSubjectSelection);
