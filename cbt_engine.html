<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex CBT Engine</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9642494442871029" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0d1b2a; --ink2:#1b2e44; --ink3:#2c4a6e;
    --sky:#e8f4fd; --sky2:#d0e8f8;
    --gold:#f0a500; --gold2:#fbbf24;
    --green:#059669; --red:#dc2626;
    --border:#dde6f0; --bg:#f2f7fc;
    --card:#ffffff; --radius:14px;
    --shadow:0 2px 12px rgba(13,27,42,.08);
    --font:'Sora',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;

    /* ═══════════════════════════════════════════════════════
       LOCKED CARD DIMENSIONS — these stop all size-jumping.
       The card is a fixed viewport-relative height.
       Question text scrolls internally. Options scroll internally.
       Navigation is always pinned at the bottom.
       ═══════════════════════════════════════════════════════ */
    --card-height: calc(100vh - 60px - 48px);   /* viewport minus topbar minus padding */
    --header-h: 68px;
    --nav-h: 72px;
    --q-text-h: 160px;
    /* options fill remaining space: card - header - qtext - nav - padding gaps */
    --options-h: calc(var(--card-height) - var(--header-h) - var(--q-text-h) - var(--nav-h) - 80px);
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:var(--font); height:100vh; overflow:hidden; }

  /* ── TOP BAR ── */
  .cbt-topbar {
    position:fixed; top:0; left:0; right:0; z-index:30;
    background:linear-gradient(135deg,var(--ink),var(--ink3));
    padding:0 18px; height:60px;
    display:flex; justify-content:space-between; align-items:center;
    box-shadow:0 3px 16px rgba(13,27,42,.25);
  }
  .cbt-topbar h2 { font-size:.95rem; font-weight:700; color:#fff; letter-spacing:-.2px; }
  .topbar-right { display:flex; align-items:center; gap:8px; }

  .timer-box {
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.2);
    border-radius:20px; padding:5px 14px;
  }
  #timerDisplay,#timerDisplayMobile {
    font-size:1.1rem; font-weight:800; color:#fff; font-family:var(--mono);
  }

  /* ── CALC BUTTON — SVG ── */
  #calcBtn {
    display:flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:20px; cursor:pointer;
    font-size:.78rem; font-weight:600; font-family:var(--font);
    background:rgba(255,255,255,.14); border:1.5px solid rgba(255,255,255,.22); color:#fff;
    transition:.2s;
  }
  #calcBtn:hover { background:rgba(255,255,255,.22); }
  #calcBtn svg { width:16px; height:16px; flex-shrink:0; }

  #finishTestBtn {
    display:flex; align-items:center; gap:6px;
    padding:7px 16px; border-radius:20px; cursor:pointer;
    font-size:.78rem; font-weight:700; font-family:var(--font);
    background:var(--red); color:#fff; border:none; transition:.2s;
  }
  #finishTestBtn svg { width:15px; height:15px; }

  /* ── LAYOUT ── */
  .app-layout {
    display:flex;
    margin-top:60px; /* push below fixed topbar */
    height:calc(100vh - 60px);
    max-width:1240px; margin-left:auto; margin-right:auto;
    margin-top:60px;
  }

  .main-content {
    flex:1; min-width:0;
    padding:24px 16px;
    display:flex; justify-content:center; align-items:flex-start;
    overflow:hidden;
  }

  .sidebar {
    width:290px; flex-shrink:0;
    padding:16px 16px 16px 0;
    display:flex; flex-direction:column; gap:12px;
    overflow-y:auto;
  }

  /* ══════════════════════════════════════════════════════
     THE QUESTION CARD — COMPLETELY FIXED SIZE
     Uses display:grid with locked row heights so nothing
     can push the navigation off-screen or change card size.
     ══════════════════════════════════════════════════════ */
  .question-card {
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    width:100%; max-width:820px;

    /* Fixed height = full visible area minus padding */
    height:var(--card-height);

    /* Grid: header row | question row | options row | nav row */
    display:grid;
    grid-template-rows: var(--header-h) var(--q-text-h) 1fr var(--nav-h);
    overflow:hidden; /* NOTHING can escape */
  }

  /* ── HEADER ROW (locked) ── */
  .question-header {
    padding:16px 22px 12px;
    border-bottom:2px solid var(--sky);
    overflow:hidden;
  }
  #questionNumber { font-size:.75rem; font-weight:700; color:var(--ink3); margin-bottom:4px; }
  #questionTopic {
    font-size:.7rem; color:#94a3b8; background:var(--sky);
    display:inline-block; padding:2px 10px; border-radius:12px; font-weight:600;
  }

  /* ── QUESTION TEXT ROW (locked, scrollable) ── */
  .question-text-container {
    padding:16px 22px 0;
    overflow-y:auto;
    /* custom scrollbar */
  }
  .question-text-container::-webkit-scrollbar { width:4px; }
  .question-text-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  #questionText { font-size:1rem; line-height:1.7; font-weight:500; color:var(--ink); }

  /* ── OPTIONS ROW (fills remaining, scrollable) ── */
  .options-wrapper {
    padding:14px 22px 0;
    overflow-y:auto;
    display:flex; flex-direction:column;
  }
  .options-wrapper::-webkit-scrollbar { width:4px; }
  .options-wrapper::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .options-list {
    list-style:none; padding:0; margin:0;
    display:flex; flex-direction:column; gap:8px;
  }

  .option-label {
    display:flex; align-items:center; gap:12px;
    background:var(--bg); padding:12px 14px;
    border-radius:10px; cursor:pointer;
    border:1.5px solid var(--border);
    transition:all .15s ease;
    font-size:.9rem; color:var(--ink); font-weight:500;
    /* Fixed height per option — stops layout shift */
    min-height:52px;
  }
  .option-label:hover { background:var(--sky); border-color:var(--ink3); }
  .option-letter {
    width:26px; height:26px; border-radius:7px; flex-shrink:0;
    background:var(--border); display:flex; align-items:center;
    justify-content:center; font-size:.75rem; font-weight:700; color:var(--ink2);
    transition:all .15s;
  }
  .option-item input[type="radio"] { display:none; }
  .option-item input[type="radio"]:checked + .option-label {
    background:var(--sky2); border-color:var(--ink3); font-weight:600;
  }
  .option-item input[type="radio"]:checked + .option-label .option-letter {
    background:var(--ink2); color:#fff;
  }

  /* ── NAV ROW (locked at bottom) ── */
  .navigation-controls {
    padding:0 22px;
    display:flex; align-items:center; gap:12px;
    border-top:2px solid var(--sky);
  }
  .nav-btn {
    flex:1; height:44px; border:none; border-radius:10px;
    font-size:.92rem; font-weight:700; cursor:pointer; transition:.15s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  #prevBtn { background:var(--bg); color:var(--ink2); border:1.5px solid var(--border); }
  #prevBtn:hover { border-color:var(--ink3); }
  #nextBtn { background:linear-gradient(135deg,var(--ink2),var(--ink3)); color:#fff; }
  #nextBtn:hover { opacity:.9; }
  #prevBtn:disabled, #nextBtn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── SIDEBAR ── */
  .sidebar-panel { background:var(--card); border-radius:12px; padding:16px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .progress-text { display:flex; justify-content:space-between; font-size:.8rem; font-weight:600; color:var(--ink2); margin-bottom:6px; }
  .progress-bar { height:8px; background:var(--border); border-radius:6px; overflow:hidden; }
  .progress-bar-inner { height:100%; background:linear-gradient(90deg,var(--ink3),var(--gold2)); border-radius:6px; transition:width .4s ease; }
  .navigator-title { font-size:.78rem; font-weight:700; color:var(--ink2); margin:0 0 10px; text-transform:uppercase; letter-spacing:.5px; }
  #navContainer { display:grid; grid-template-columns:repeat(auto-fill,minmax(38px,1fr)); gap:5px; }
  .nav-button {
    padding:7px 0; border:1.5px solid var(--border); background:var(--bg);
    color:var(--ink); border-radius:6px; cursor:pointer;
    font-size:.75rem; font-weight:600; text-align:center; transition:.15s;
  }
  .nav-button.current { background:var(--ink3); color:#fff; border-color:var(--ink3); }
  .nav-button.answered { background:var(--green); color:#fff; border-color:var(--green); }

  /* Subject Rank Panel */
  #rankPanel { display:none; }
  .rank-entry {
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; border-radius:8px;
    background:rgba(13,27,42,.04); border:1px solid var(--border);
    font-size:.8rem;
  }
  .rank-entry.is-me { background:rgba(44,74,110,.08); border-color:rgba(44,74,110,.25); }

  /* ── CALCULATOR (draggable, floating) ── */
  .calculator {
    position:fixed; bottom:20px; right:20px; width:300px;
    background:var(--card); border-radius:18px;
    box-shadow:0 8px 40px rgba(13,27,42,.2);
    display:none; z-index:9999;
    border:2px solid var(--border); overflow:hidden;
    user-select:none;
  }
  .calc-header {
    background:linear-gradient(135deg,var(--ink),var(--ink3));
    color:#fff; padding:12px 18px; font-weight:700; font-size:.92rem;
    display:flex; justify-content:space-between; align-items:center; cursor:move;
  }
  .calc-close {
    background:none; border:none; color:#fff; cursor:pointer;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; transition:.15s;
  }
  .calc-close:hover { background:rgba(255,255,255,.2); }
  .calc-close svg { width:14px; height:14px; }

  #calcDisplay {
    width:100%; height:64px; font-size:1.7rem; text-align:right;
    padding:0 18px; border:none; border-bottom:1px solid var(--border);
    font-family:var(--mono); background:#f8fafc; color:var(--ink);
    outline:none;
  }
  .calc-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); }
  .calc-buttons button {
    padding:16px 8px; font-size:1rem; font-weight:600;
    border:none; background:var(--card); cursor:pointer;
    font-family:var(--font); transition:all .12s; color:var(--ink);
  }
  .calc-buttons button:hover { background:var(--sky); }
  .calc-buttons button:active { transform:scale(.94); }
  .calc-buttons .op { background:var(--sky2); color:var(--ink3); }
  .calc-buttons .eq { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#fff; }
  .calc-buttons .clr { background:#fee2e2; color:var(--red); }
  .calc-buttons .clr:hover { background:var(--red); color:#fff; }

  /* ── RESPONSIVE ── */
  @media(max-width:900px) {
    .app-layout { flex-direction:column; height:auto; overflow:auto; }
    body { overflow:auto; }
    .main-content { padding:12px; }
    .sidebar { width:100%; padding:0 12px 12px; order:2; }
    .question-card {
      height:auto;
      grid-template-rows: auto auto 1fr auto;
      min-height:600px;
    }
    :root { --q-text-h: auto; }
    .question-text-container { max-height:160px; }
    .options-wrapper { min-height:260px; }
    #timerBox { display:none !important; }
    #mobileTimerBox { display:flex !important; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="cbt-topbar">
  <h2 id="subjectTitle">📚 CBT Engine</h2>
  <div class="topbar-right">
    <!-- Mobile timer (hidden on desktop) -->
    <div id="mobileTimerBox" class="timer-box" style="display:none">
      <p id="timerDisplayMobile">--:--</p>

    <!-- CALCULATOR BUTTON — SVG icon, no emoji -->
    <button id="calcBtn" onclick="toggleCalculator()">

        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
        <line x1="8" y1="6" x2="16" y2="6"/>
        <line x1="8" y1="10" x2="8" y2="10" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="12" y1="10" x2="12" y2="10" stroke-width="2.5" stroke-linecap="round"/>

    <!-- FINISH TEST BUTTON — SVG icon -->

    </button>

</div>

<!-- MAIN LAYOUT -->
<div class="app-layout">

  <!-- MAIN QUESTION AREA -->
  <div class="main-content">
    <div class="question-card">

      <!-- ROW 1: HEADER (fixed height) -->
      <div class="question-header">
        <p id="questionNumber">Question 1 of —</p>
        <p id="questionTopic">Topic</p>
      </div>

      <!-- ROW 2: QUESTION TEXT (fixed height, scrolls internally) -->

      <div class="navigation-controls">

  <!-- SIDEBAR -->

    <div class="sidebar-panel">

<!-- ═══════════════════════════════════════════════════════════
     FIRESTORE PATCH — saves per-user results to Firestore,
     updates leaderboard, and shows top scorers in sidebar.
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion,
  collection, query, where, orderBy, limit, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCd7l9eOMbO7F4TSuV55VqnaJUQbFvsibA",
  authDomain:"codex-study-hub-923c5.firebaseapp.com",
  projectId:"codex-study-hub-923c5",
  storageBucket:"codex-study-hub-923c5.appspot.com",
  messagingSenderId:"750631534625",
  appId:"1:750631534625:web:5f59e1841bb856bdbba360"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let _user = null;
let _pending = null;
let _lastSavedTimestamp = 0;

const RANKS = [
  {name:"Rookie",icon:"🌱",min:0},{name:"Scholar",icon:"📖",min:100},
  {name:"Apprentice",icon:"⚡",min:300},{name:"Challenger",icon:"🔥",min:600},
  {name:"Expert",icon:"🎯",min:1000},{name:"Master",icon:"🏆",min:1500},
  {name:"Legend",icon:"👑",min:2500},
];
function getRank(pts){let r=RANKS[0];for(const x of RANKS){if(pts>=x.min)r=x;}return r;}
function calcPoints(history){return history.reduce((pts,t)=>{const p=t.totalQuestions?Math.round((t.score/t.totalQuestions)*100):0;pts+=Math.round(p*.5);if(p>=80)pts+=20;if(p===100)pts+=30;return pts;},0);}

onAuthStateChanged(auth, async(user)=>{
  _user=user||null;
  if(user&&_pending){await saveToFirestore(_pending);_pending=null;}
  if(user){loadSubjectRank();}
});

// Intercept localStorage writes from cbt.js
const _orig=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(key,val){
  _orig(key,val);
  if(key==='cbtHistory'){
    try{
      const arr=JSON.parse(val);
      if(arr.length>0){
        const latest=arr[arr.length-1];
        // Avoid duplicate saves (cbt.js may call setItem multiple times)
        if(latest.timestamp && latest.timestamp!==_lastSavedTimestamp){
          _lastSavedTimestamp=latest.timestamp;
          if(_user){saveToFirestore(latest);}else{_pending=latest;}
        }
      }
    }catch(e){}
  }
};

async function saveToFirestore(result){
  if(!_user)return;
  const uid=_user.uid;
  try{
    const ref=doc(db,"stats",uid);
    const snap=await getDoc(ref);
    if(snap.exists()){
      const existing=(snap.data().history||[]);
      if(existing.some(h=>h.timestamp===result.timestamp&&h.subject===result.subject))return;
      await updateDoc(ref,{history:arrayUnion(result)});
    }else{
      await setDoc(ref,{history:[result]});
    }
    // Leaderboard
    const pct=result.totalQuestions?Math.round((result.score/result.totalQuestions)*100):0;
    const usnap=await getDoc(doc(db,"users",uid));
    const ud=usnap.exists()?usnap.data():{};
    const lbRef=doc(db,"leaderboard",`${result.subject}_${uid}`);
    const lbSnap=await getDoc(lbRef);
    if(!lbSnap.exists()||pct>(lbSnap.data().percentage||0)){
      await setDoc(lbRef,{uid,userName:ud.fullName||"Student",photoURL:ud.photoURL||"",avatarEmoji:ud.avatarEmoji||"",subject:result.subject,score:result.score,totalQuestions:result.totalQuestions,percentage:pct,duration:result.duration,date:result.date,timestamp:Date.now()});
    }
    // XP + rank
    const asnap=await getDoc(ref);
    if(asnap.exists()){
      const pts=calcPoints(asnap.data().history||[]);
      const rank=getRank(pts);
      await updateDoc(doc(db,"users",uid),{xpPoints:pts,rank:rank.name,rankIcon:rank.icon});
    }
  }catch(e){console.warn("[CBT-Firestore]",e.message);}
}

async function loadSubjectRank(){
  const params=new URLSearchParams(window.location.search);
  const subject=params.get('subject')||localStorage.getItem('selectedSubject')||'';
  if(!subject)return;
  try{
    const q=query(collection(db,"leaderboard"),where("subject","==",subject),orderBy("percentage","desc"),orderBy("duration","asc"),limit(5));
    const snap=await getDocs(q);
    if(snap.empty)return;
    const panel=document.getElementById('rankPanel');
    const list=document.getElementById('rankList');
    panel.style.display='block';
    list.innerHTML='';
    const medals=['🥇','🥈','🥉','④','⑤'];
    let i=0;
    snap.forEach(d=>{
      const data=d.data();
      const isMe=_user&&data.uid===_user.uid;
      const dur=data.duration?`${Math.floor(data.duration/60)}m ${data.duration%60}s`:'—';
      const av=data.avatarEmoji||(data.userName?.[0]?.toUpperCase()||'S');
      const el=document.createElement('div');
      el.className='rank-entry'+(isMe?' is-me':'');
      el.innerHTML=`<span style="font-size:1rem;flex-shrink:0">${medals[i]||i+1}</span><span style="font-size:1.1rem;flex-shrink:0">${av}</span><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${data.userName}${isMe?' (You)':''}</div><div style="font-size:.7rem;color:#94a3b8">${dur}</div></div><div style="font-weight:800;font-size:.82rem;color:${data.percentage>=70?'#059669':data.percentage>=50?'#f0a500':'#dc2626'}">${data.percentage}%</div>`;
      list.appendChild(el);i++;
    });
  }catch(e){console.warn("[SubjectRank]",e.message);}
}
</script>
</body>
</html>
