<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — Codex AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ✅ CLEAN pdf.js load — single correct tag, worker set AFTER load -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:#080c14; --s1:#0f1623; --s2:#151e30; --s3:#1c283d;
      --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
      --blue:#3b82f6; --blue-s:rgba(59,130,246,.12); --blue-b:rgba(59,130,246,.25);
      --green:#10b981; --green-s:rgba(16,185,129,.1);
      --purple:#a855f7; --purple-s:rgba(168,85,247,.12); --purple-b:rgba(168,85,247,.3);
      --gold:#f59e0b; --red:#ef4444;
      --text:#f0f4ff; --muted:#8fa3c0; --dim:#4a6380; --r:14px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
      display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    }

    /* ── NOVA ANIMATIONS ── */
    @keyframes blink { 0%,88%,100%{transform:scaleY(1)} 93%{transform:scaleY(.06)} }
    @keyframes antPulse { 0%,100%{r:3;opacity:.8} 50%{r:4.8;opacity:1} }
    @keyframes bodyFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes ringGlow { 0%,100%{opacity:.4} 50%{opacity:1} }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes dot { 0%,60%,100%{opacity:.2;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .nova-eye-l,.nova-eye-r { animation:blink 3.8s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
    .nova-eye-r { animation-delay:.15s; }
    .nova-ant-tip { animation:antPulse 1.9s ease-in-out infinite; }
    .nova-body-g { animation:bodyFloat 2.6s ease-in-out infinite; }
    .nova-ear { animation:ringGlow 2.2s ease-in-out infinite; }
    .nova-ear2 { animation:ringGlow 2.2s ease-in-out infinite; animation-delay:.7s; }

    /* ── HEADER ── */
    .header {
      flex-shrink:0; padding:12px 16px;
      background:linear-gradient(135deg,#0a1828,#160820);
      border-bottom:1px solid rgba(168,85,247,.18);
      display:flex; align-items:center; gap:12px;
    }
    .back-btn {
      width:36px; height:36px; border-radius:9px;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      text-decoration:none; color:#fff; transition:.2s; flex-shrink:0;
    }
    .back-btn:hover { background:rgba(255,255,255,.15); }
    .back-btn svg { width:18px; height:18px; }
    .header-av { width:44px; height:44px; flex-shrink:0; }
    .header-av svg { width:44px; height:44px; }
    .header-info { flex:1; }
    .header-info h1 { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; color:#fff; margin-bottom:2px; }
    .header-status { display:flex; align-items:center; gap:5px; font-size:.7rem; color:rgba(255,255,255,.65); }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:ringGlow 2s infinite; }
    .hdr-btn {
      padding:6px 12px; border-radius:8px; font-size:.73rem; font-weight:600;
      border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05);
      color:#fff; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:5px;
    }
    .hdr-btn:hover { background:rgba(255,255,255,.12); }
    .hdr-btn svg { width:13px; height:13px; }

    /* ── CAPS BAR ── */
    .caps-bar {
      flex-shrink:0; padding:8px 14px;
      background:var(--s1); border-bottom:1px solid var(--border);
      display:flex; gap:6px; overflow-x:auto;
    }
    .caps-bar::-webkit-scrollbar { display:none; }
    .cap-pill {
      flex-shrink:0; display:flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:20px; font-size:.7rem; font-weight:600;
      border:1px solid var(--border2); color:var(--muted); background:var(--s2); white-space:nowrap;
    }
    .cap-pill svg { width:11px; height:11px; }
    .cap-pill.blue { border-color:var(--blue-b); color:var(--blue); background:var(--blue-s); }
    .cap-pill.green { border-color:rgba(16,185,129,.3); color:var(--green); background:var(--green-s); }
    .cap-pill.purple { border-color:var(--purple-b); color:var(--purple); background:var(--purple-s); }
    .cap-pill.gold { border-color:rgba(245,158,11,.3); color:var(--gold); background:rgba(245,158,11,.08); }

    /* ── CHAT ── */
    .chat-area {
      flex:1; overflow-y:auto; padding:16px 14px 8px;
      display:flex; flex-direction:column; gap:14px;
    }
    .chat-area::-webkit-scrollbar { width:4px; }
    .chat-area::-webkit-scrollbar-thumb { background:var(--s3); border-radius:2px; }

    /* Welcome */
    .welcome { text-align:center; padding:8px 0; animation:fadeIn .5s ease; }
    .welcome-nova { margin:0 auto 14px; }
    .welcome h2 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:6px; }
    .welcome p { color:var(--muted); font-size:.84rem; line-height:1.65; max-width:320px; margin:0 auto 14px; }

    .quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .q-btn {
      background:var(--s1); border:1px solid var(--border); border-radius:10px;
      padding:10px 11px; cursor:pointer; text-align:left; transition:.2s;
      font-family:'DM Sans',sans-serif; color:var(--text);
    }
    .q-btn:hover { background:var(--s2); border-color:var(--blue-b); }
    .q-icon { font-size:.82rem; margin-bottom:3px; display:block; }
    .q-text { font-size:.76rem; font-weight:500; line-height:1.4; display:block; }

    /* Messages */
    .msg { display:flex; gap:9px; animation:msgIn .25s ease; max-width:100%; }
    .msg.user { flex-direction:row-reverse; }

    .msg-av {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.82rem; font-weight:700; overflow:hidden;
    }
    .msg-av.ai-av { background:linear-gradient(135deg,#0a1828,#160820); border:1.5px solid var(--purple-b); }
    .msg-av.user-av { background:linear-gradient(135deg,var(--blue),var(--green)); border:1.5px solid var(--border2); }
    .msg-av svg { width:18px; height:18px; }

    .msg-bubble {
      max-width:78%; background:var(--s1); border:1px solid var(--border);
      border-radius:16px 16px 16px 4px;
      padding:11px 14px; font-size:.87rem; line-height:1.65; word-break:break-word;
    }
    .msg.user .msg-bubble {
      background:linear-gradient(135deg,#1d4ed8,#4f46e5);
      border-color:transparent; color:#fff;
      border-radius:16px 16px 4px 16px;
    }
    .msg-bubble strong { color:#93c5fd; font-weight:700; }
    .msg.user .msg-bubble strong { color:#e0f2fe; }
    .msg-bubble em { color:var(--muted); }
    .msg-bubble code {
      background:var(--s2); padding:1px 5px; border-radius:4px;
      font-family:'Courier New',monospace; font-size:.81rem; color:#7dd3fc;
    }
    .msg-bubble ul, .msg-bubble ol { padding-left:18px; margin:6px 0; }
    .msg-bubble li { margin-bottom:4px; }
    .msg-bubble .sh {
      font-family:'Syne',sans-serif; font-weight:700; font-size:.8rem;
      color:var(--blue); margin:10px 0 4px; border-bottom:1px solid var(--border);
      padding-bottom:3px; display:block;
    }
    .mode-tag {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 7px; border-radius:5px; font-size:.68rem; font-weight:700;
      background:var(--purple-s); color:var(--purple); border:1px solid var(--purple-b);
      margin-bottom:6px;
    }
    .mode-tag svg { width:10px; height:10px; }
    .mode-tag.green { background:var(--green-s); color:var(--green); border-color:rgba(16,185,129,.3); }
    .mode-tag.gold { background:rgba(245,158,11,.1); color:var(--gold); border-color:rgba(245,158,11,.3); }
    .mode-tag.red { background:rgba(239,68,68,.1); color:var(--red); border-color:rgba(239,68,68,.25); }

    /* Typing */
    .typing-dots { display:flex; gap:4px; padding:3px 0; }
    .typing-dots span { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:dot .9s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay:.2s; }
    .typing-dots span:nth-child(3) { animation-delay:.4s; }

    /* PDF progress bar inside bubble */
    .pdf-progress { margin-top:8px; }
    .pdf-progress-bar { height:5px; background:var(--s2); border-radius:3px; overflow:hidden; margin-top:4px; }
    .pdf-progress-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--purple)); border-radius:3px; transition:width .3s ease; }
    .pdf-progress-label { font-size:.73rem; color:var(--muted); }

    /* PDF preview bar */
    #pdfPreviewBar {
      flex-shrink:0; padding:0 14px 8px; background:var(--s1);
      display:none; border-bottom:1px solid var(--border);
    }
    .pdf-preview {
      display:flex; align-items:center; gap:10px; padding:9px 12px;
      background:var(--blue-s); border:1px solid var(--blue-b); border-radius:9px;
    }
    .pdf-preview svg { width:18px; height:18px; color:var(--blue); flex-shrink:0; }
    .pdf-preview-info { flex:1; font-size:.79rem; }
    .pdf-preview-info strong { display:block; }
    .pdf-preview-info span { color:var(--muted); font-size:.72rem; }
    .pdf-badge {
      font-size:.68rem; font-weight:700; padding:2px 7px; border-radius:5px;
      background:var(--green-s); color:var(--green); border:1px solid rgba(16,185,129,.3);
    }
    .pdf-remove { background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; }
    .pdf-remove svg { width:14px; height:14px; display:block; }

    /* ── INPUT ── */
    .input-section { flex-shrink:0; background:var(--s1); border-top:1px solid var(--border2); padding:10px 14px; }
    .mode-selector { display:flex; gap:5px; margin-bottom:9px; overflow-x:auto; }
    .mode-selector::-webkit-scrollbar { display:none; }
    .mode-pill {
      flex-shrink:0; padding:5px 11px; border-radius:20px; font-size:.71rem; font-weight:600;
      border:1px solid var(--border2); color:var(--muted); background:transparent;
      cursor:pointer; transition:.2s; font-family:'DM Sans',sans-serif;
      display:flex; align-items:center; gap:4px;
    }
    .mode-pill svg { width:11px; height:11px; }
    .mode-pill.active { border-color:var(--purple-b); color:var(--purple); background:var(--purple-s); }

    .input-row { display:flex; gap:8px; align-items:flex-end; }
    .input-row textarea {
      flex:1; background:var(--s2); border:1.5px solid var(--border2);
      border-radius:12px; padding:11px 13px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:.88rem;
      resize:none; min-height:46px; max-height:110px; outline:none; transition:.2s; line-height:1.5;
    }
    .input-row textarea:focus { border-color:var(--blue); }
    .input-row textarea::placeholder { color:var(--dim); }

    .input-actions { display:flex; gap:6px; align-items:flex-end; }
    .icon-btn {
      width:42px; height:42px; border-radius:10px; border:1px solid var(--border2);
      background:var(--s2); color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0;
    }
    .icon-btn:hover { border-color:var(--blue); color:var(--blue); }
    .icon-btn.has-file { border-color:var(--green); color:var(--green); background:var(--green-s); }
    .icon-btn svg { width:18px; height:18px; }
    .send-btn {
      width:46px; height:46px; border-radius:12px; flex-shrink:0;
      background:linear-gradient(135deg,var(--blue),var(--purple));
      border:none; color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 16px rgba(59,130,246,.28); transition:.2s;
    }
    .send-btn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 6px 22px rgba(59,130,246,.42); }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .send-btn svg { width:20px; height:20px; }

    #pdfFileInput { display:none; }

    @media(max-width:480px) {
      .quick-grid { grid-template-columns:1fr; }
      .msg-bubble { max-width:88%; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="home.html" class="back-btn">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>

  <!-- NOVA header character (small, animated) -->
  <div class="header-av">
    <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hb" cx="50%" cy="38%" r="55%"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0a1520"/></radialGradient>
        <linearGradient id="ha" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
      </defs>
      <g class="nova-body-g">
        <line x1="22" y1="2" x2="22" y2="9" stroke="url(#ha)" stroke-width="1.8" stroke-linecap="round"/>
        <circle class="nova-ant-tip" cx="22" cy="2" r="2.8" fill="#a855f7"/>
        <rect x="7" y="9" width="30" height="28" rx="7" fill="url(#hb)" stroke="#253a5a" stroke-width="1"/>
        <rect x="10" y="12" width="24" height="18" rx="4" fill="#07111e" stroke="#162840" stroke-width=".8"/>
        <g class="nova-eye-l"><rect x="13" y="16" width="7" height="6" rx="3" fill="url(#ha)"/><rect x="14.5" y="17.5" width="3.5" height="1.8" rx=".9" fill="rgba(255,255,255,.6)"/></g>
        <g class="nova-eye-r"><rect x="24" y="16" width="7" height="6" rx="3" fill="url(#ha)"/><rect x="25.5" y="17.5" width="3.5" height="1.8" rx=".9" fill="rgba(255,255,255,.6)"/></g>
        <path d="M15 26 Q22 30.5 29 26" stroke="url(#ha)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <rect x="19" y="37" width="6" height="3" rx="1.5" fill="#162840"/>
        <circle class="nova-ear" cx="8" cy="21" r="2.5" fill="#3b82f6" opacity=".55"/>
        <circle class="nova-ear2" cx="36" cy="21" r="2.5" fill="#a855f7" opacity=".55"/>
      </g>
    </svg>
  </div>

  <div class="header-info">
    <h1>Nova — Codex AI</h1>
    <div class="header-status">
      <div class="status-dot"></div>
      Online · OOU Study Companion
    </div>
  </div>

  <button class="hdr-btn" onclick="clearChat()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    New Chat
  </button>
</div>

<!-- CAPS BAR -->
<div class="caps-bar">
  <div class="cap-pill purple">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF Reader ✓
  </div>
  <div class="cap-pill gold">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Quiz Generator
  </div>
  <div class="cap-pill green">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10"/></svg>
    Progress Coach
  </div>
  <div class="cap-pill blue">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Web Research
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeBlock">
    <!-- Welcome NOVA (large animated) -->
    <div class="welcome-nova">
      <svg style="width:72px;height:72px" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="wb" cx="50%" cy="38%" r="55%"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#07111e"/></radialGradient>
          <linearGradient id="wa" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
          <filter id="gw"><feGaussianBlur stdDeviation="2" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
        </defs>
        <g class="nova-body-g">
          <line x1="36" y1="3" x2="36" y2="14" stroke="url(#wa)" stroke-width="2.5" stroke-linecap="round"/>
          <circle class="nova-ant-tip" cx="36" cy="3" r="4.5" fill="#a855f7" filter="url(#gw)"/>
          <ellipse cx="36" cy="3" rx="10" ry="3.5" fill="none" stroke="rgba(168,85,247,.25)" stroke-width="1" class="nova-ear"/>
          <rect x="10" y="14" width="52" height="44" rx="11" fill="url(#wb)" stroke="#253a5a" stroke-width="1.5"/>
          <rect x="15" y="19" width="42" height="28" rx="6" fill="#060e1a" stroke="#162840" stroke-width="1"/>
          <g class="nova-eye-l">
            <rect x="18" y="25" width="14" height="11" rx="5.5" fill="url(#wa)"/>
            <rect x="21" y="27.5" width="6" height="3" rx="1.5" fill="rgba(255,255,255,.65)"/>
            <circle cx="27" cy="28.5" r="2.2" fill="rgba(255,255,255,.9)"/>
          </g>
          <g class="nova-eye-r">
            <rect x="40" y="25" width="14" height="11" rx="5.5" fill="url(#wa)"/>
            <rect x="43" y="27.5" width="6" height="3" rx="1.5" fill="rgba(255,255,255,.65)"/>
            <circle cx="49" cy="28.5" r="2.2" fill="rgba(255,255,255,.9)"/>
          </g>
          <path d="M22 41 Q36 50 50 41" stroke="url(#wa)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
          <rect x="28" y="58" width="16" height="6" rx="3" fill="#162840"/>
          <circle class="nova-ear" cx="11" cy="32" r="5" fill="#3b82f6" opacity=".45"/>
          <circle class="nova-ear2" cx="61" cy="32" r="5" fill="#a855f7" opacity=".45"/>
          <line x1="16" y1="35" x2="56" y2="35" stroke="rgba(59,130,246,.06)" stroke-width="1"/>
          <line x1="16" y1="40" x2="56" y2="40" stroke="rgba(59,130,246,.04)" stroke-width="1"/>
        </g>
      </svg>
    </div>

    <h2>Hello, <span id="userName">Student</span>! I'm Nova</h2>
    <p>Your personal AI tutor for OOU. Upload your PDFs, ask me anything, or let me generate practice questions for your exams.</p>

    <div class="quick-grid">
      <button class="q-btn" onclick="quickAsk('Generate 5 MCQ practice questions on calculus integration for 100L science students at OOU')">
        <span class="q-icon">📝</span>
        <span class="q-text">Generate practice questions</span>
      </button>
      <button class="q-btn" onclick="quickAsk('What topics should I focus on for MTH101 at OOU? Give me a study plan')">
        <span class="q-icon">📚</span>
        <span class="q-text">MTH101 study plan</span>
      </button>
      <button class="q-btn" onclick="quickAsk('Show me my progress and tell me which subjects I need to improve')">
        <span class="q-icon">📊</span>
        <span class="q-text">Analyse my progress</span>
      </button>
      <button class="q-btn" onclick="quickAsk('Explain the concept of osmosis with examples, as if teaching a 100L Biology student')">
        <span class="q-icon">🔬</span>
        <span class="q-text">Explain a concept</span>
      </button>
    </div>
  </div>
</div>

<!-- PDF PREVIEW BAR -->
<div id="pdfPreviewBar">
  <div class="pdf-preview">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <div class="pdf-preview-info">
      <strong id="pdfFileName">document.pdf</strong>
      <span id="pdfFileMeta">0 KB · 0 pages</span>
    </div>
    <span class="pdf-badge" id="pdfBadge">Ready</span>
    <button class="pdf-remove" onclick="removePDF()" title="Remove">

onAuthStateChanged(auth, async (user) => {

    const statsSnap = await getDoc(doc(db, "stats", user.uid));
    if (statsSnap.exists()) {
      const hist = statsSnap.data().history || [];
      const tot  = hist.length;
      const avg  = tot > 0 ? Math.round(hist.reduce((s,t)=>s+(t.totalQuestions?t.score/t.totalQuestions*100:0),0)/tot) : 0;
      const best = tot > 0 ? Math.max(...hist.map(t=>t.totalQuestions?Math.round(t.score/t.totalQuestions*100):0)) : 0;
      const bySub = {};
      hist.forEach(t => {
        if (!bySub[t.subject]) bySub[t.subject]={acc:0,tests:0};
        bySub[t.subject].acc += t.totalQuestions?t.score/t.totalQuestions*100:0;
        bySub[t.subject].tests++;
      });
      Object.values(bySub).forEach(s=>s.acc=Math.round(s.acc/s.tests));
      const weak = Object.entries(bySub).sort((a,b)=>a[1].acc-b[1].acc).slice(0,3).map(([s])=>s);

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────

// This is the FIXED version — uses pdf.js v3 properly, returns text reliably

window.handlePDFUpload = async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  // Reset previous PDF
  pdfText = ''; pdfPages = 0;

  document.getElementById('pdfFileName').textContent = file.name;
  document.getElementById('pdfFileMeta').textContent = `${(file.size/1024).toFixed(1)} KB · Reading…`;
  document.getElementById('pdfBadge').textContent = 'Reading…';
  document.getElementById('pdfBadge').style.color = 'var(--gold)';
  document.getElementById('pdfBadge').style.borderColor = 'rgba(245,158,11,.3)';
  document.getElementById('pdfBadge').style.background = 'rgba(245,158,11,.1)';
  document.getElementById('pdfPreviewBar').style.display = 'block';
  document.getElementById('pdfUploadBtn').classList.add('has-file');

  // Switch to PDF mode
  setMode('pdf');

  // Hide welcome, show progress message
  document.getElementById('welcomeBlock').style.display = 'none';
  const progressMsgEl = addMsg('ai', '', 'pdf');
  const bubbleEl = progressMsgEl.querySelector('.msg-bubble');

  // Handle .txt files directly
  if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
    try {
      pdfText = await file.text();
      pdfPages = 1;
      finishPDFLoad(file, bubbleEl);
    } catch(err) {
      showPDFError(bubbleEl, err.message);
    }
    return;
  }

  // PDF reading with pdf.js
  try {
    if (typeof pdfjsLib === 'undefined') {
      throw new Error('PDF reader not loaded yet. Please wait 2 seconds and try again.');
    }

    const arrayBuffer = await file.arrayBuffer();

    // Show initial progress
    bubbleEl.innerHTML = `<div class="mode-tag"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> PDF Reading</div>
      <div>Reading <strong>${file.name}</strong>…</div>
      <div class="pdf-progress">
        <div class="pdf-progress-label" id="pdfProgLabel">Loading PDF structure…</div>
        <div class="pdf-progress-bar"><div class="pdf-progress-fill" id="pdfProgFill" style="width:10%"></div></div>
      </div>`;
    scrollChat();

    const loadTask = pdfjsLib.getDocument({ data: arrayBuffer, useWorkerFetch: false, isEvalSupported: false });

    // Progress callback
    loadTask.onProgress = ({ loaded, total }) => {
      if (total > 0) {
        const pct = Math.round((loaded / total) * 40);
        const fill = document.getElementById('pdfProgFill');
        if (fill) fill.style.width = pct + '%';
      }
    };

    const pdf = await loadTask.promise;
    pdfPages = pdf.numPages;

    const fill = document.getElementById('pdfProgFill');
    const label = document.getElementById('pdfProgLabel');
    if (fill) fill.style.width = '50%';
    if (label) label.textContent = `Reading ${pdfPages} pages…`;

    let allText = '';
    for (let i = 1; i <= pdfPages; i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();

      // Join text items, preserving line structure
      let pageText = '';
      let lastY = null;
      content.items.forEach(item => {
        if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) {
          pageText += '\n';
        }
        pageText += item.str;
        if (item.hasEOL) pageText += '\n';
        lastY = item.transform[5];
      });
      allText += `\n--- Page ${i} ---\n${pageText.trim()}\n`;

      // Update progress
      const pct = 50 + Math.round((i / pdfPages) * 45);
      const f2 = document.getElementById('pdfProgFill');
      const l2 = document.getElementById('pdfProgLabel');
      if (f2) f2.style.width = pct + '%';
      if (l2) l2.textContent = `Page ${i} of ${pdfPages}…`;
    }

    pdfText = allText.trim();

    if (!pdfText || pdfText.replace(/\s|-|Page \d+/g,'').length < 20) {
      throw new Error('This PDF appears to be a scanned image — no readable text was found. Please use a text-based PDF.');
    }

    finishPDFLoad(file, bubbleEl);

  } catch(err) {
    showPDFError(bubbleEl, err.message);
  }

  // Reset file input so same file can be re-uploaded
  e.target.value = '';
};

function finishPDFLoad(file, bubbleEl) {
  const preview = Math.min(pdfText.length, 200);
  const wordCount = pdfText.trim().split(/\s+/).length;

  document.getElementById('pdfFileMeta').textContent = `${(file.size/1024).toFixed(1)} KB · ${pdfPages} page${pdfPages>1?'s':''}`;

  document.getElementById('pdfBadge').style.borderColor = 'rgba(16,185,129,.3)';

  bubbleEl.innerHTML = `<div class="mode-tag green"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> PDF Loaded</div>
    <div>Successfully read <strong>${file.name}</strong></div>

      <li>Pages: <strong>${pdfPages}</strong></li>
      <li>Words extracted: <strong>~${wordCount.toLocaleString()}</strong></li>

    <div style="margin-top:10px;padding:8px 10px;background:var(--s2);border-radius:8px;font-size:.76rem;color:var(--muted);font-style:italic">"${preview}…"</div>
    <div style="margin-top:10px;font-size:.82rem;color:var(--muted)">Try: <em>Summarise this document</em> · <em>Generate 5 questions from it</em> · <em>What are the key definitions?</em></div>`;
  scrollChat();
}

    <ul style="margin-top:8px;font-size:.82rem;color:var(--muted)">
      <li>Use text-based PDFs, not scanned images</li>
      <li>Try a smaller file (under 10 MB)</li>
      <li>Some password-protected PDFs can't be read</li>
      <li>Convert scanned PDFs to text using Smallpdf or ILovePDF first</li>

  scrollChat();

window.sendMessage = async function() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  autoResize(input);

  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.style.display = 'none';

  addMsg('user', text);

  let userContent = text;
  if (currentMode === 'quiz') {
    userContent = `Generate 5 MCQ practice questions on this topic for a Nigerian 100-level university student: "${text}". Include options A, B, C, D for each question. End with "ANSWERS:" listing the correct options.`;
  } else if (currentMode === 'explain') {
    userContent = `Explain this topic clearly for a Nigerian 100-level university student: "${text}". Use simple language, real-world examples, and step-by-step breakdown.`;
  } else if (currentMode === 'research') {
    userContent = `Research and provide a thorough answer about: "${text}". Include key facts, background context, and practical application for a Nigerian university student.`;
  } else if (currentMode === 'pdf' && pdfText) {
    userContent = text || 'Please summarise this document, highlight the key points, and generate 3 practice questions from it.';
  }

  chatHistory.push({ role:'user', content: userContent });
  if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);

  const typingId = showTyping();

  try {
    const system = buildSystemPrompt();

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_KEY}`
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [
          { role:'system', content: system },
          ...chatHistory
        ],
        max_tokens: 1200,
        temperature: 0.65,
        stream: false
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `API error ${response.status}`);
    }

    const data    = await response.json();
    const aiText  = data.choices?.[0]?.message?.content?.trim() || "Sorry, I couldn't generate a response. Please try again.";

    chatHistory.push({ role:'assistant', content: aiText });

    removeTyping(typingId);
    addMsg('ai', aiText, currentMode);

  } catch(err) {
    removeTyping(typingId);
    addMsg('ai', `**Connection error:** ${err.message}\n\nPlease check your internet and try again.`, 'error');
  }

  btn.disabled = false;
  input.focus();
};

  if (role === 'ai' && mode && mode !== 'normal') {
    const modeInfo = {
      pdf:      { label:'PDF Analysis', cls:'purple' },

    const info = modeInfo[mode];
    if (info) {
      const tag = document.createElement('div');
      tag.className = `mode-tag ${info.cls}`;
      tag.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${info.label}`;
      bubble.appendChild(tag);
    }
  }

  const content = document.createElement('div');
  content.innerHTML = text ? formatText(text) : '';
  bubble.appendChild(content);

  msg.appendChild(av);

function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/^#{1,3} (.+)$/gm, '<span class="sh">$1</span>')
    .replace(/^[-•*] (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li><strong>$1.</strong> $2</li>')
    .replace(/(<li>[\s\S]*?<\/li>)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

      <rect x="10" y="12" width="24" height="18" rx="4" fill="#040c17"/>
      <rect x="13" y="16" width="7" height="6" rx="3" fill="url(#ta)"/>
      <rect x="24" y="16" width="7" height="6" rx="3" fill="url(#ta)"/>
      <path d="M15 26 Q22 30.5 29 26" stroke="url(#ta)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  scrollChat();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollChat() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

window.clearChat = function() {
  chatHistory = []; pdfText = ''; pdfPages = 0;
  document.getElementById('pdfPreviewBar').style.display = 'none';
  document.getElementById('pdfFileInput').value = '';
  document.getElementById('pdfUploadBtn').classList.remove('has-file');
  const area = document.getElementById('chatArea');
  area.innerHTML = `<div class="welcome" id="welcomeBlock">
    <p style="color:var(--muted);font-size:.9rem;padding:30px 0">Chat cleared. I'm ready when you are!</p>
  </div>`;
  setMode('normal');
};

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
};
</script>
</body>
</html>
